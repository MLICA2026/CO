<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 36 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

, je viendrai te chercher à la gare."],"a":1,"k":"Bien sûr, je passe te prendre chez toi.","transcript":"– Salut Charlie, je prends l'avion jeudi à 4h du matin. À cette heure-là, il n'y a pas de transport en commun. Tu pourrais m'emmener à l'aéroport en voiture ?"},{"type":"extrait","q":"","prompt":"Dimanche, il fera beau. J'aimerais bien faire un peu de sport. Tu veux faire du vélo avec moi ?","c":["Attends, je prends mes lunettes de soleil.","Bonne idée. On pourra aller en forêt.","C'est d'accord. J'arrive tout de suite.","Quel dommage, demain c'est fermé."],"a":1,"k":"Bonne idée. On pourra aller en forêt.","transcript":"– Dimanche, il fera beau. J'aimerais bien faire un peu de sport. Tu veux faire du vélo avec moi ?"},{"type":"extrait","q":"","prompt":"Salut Yann ! Je fais une fête samedi, tu viens ? Ouais super, avec plaisir ! Comment on fait pour aller chez toi ?","c":["Tu apportes quelque chose à boire.","Tu arrives vers 20h30.","Tu descends au dernier arrêt du bus 78.","Tu peux venir avec ta sœur si tu veux."],"a":2,"k":"Tu descends au dernier arrêt du bus 78.","transcript":"– Salut Yann, je fais une fête samedi. Tu viens ? – Ouais, super. Avec plaisir. Comment on fait pour aller chez toi ?"},{"type":"document","q":"Question 10. À 20h50 sur notre chaîne, participez à notre émission. Composez le 01 40 00 01 pour choisir la meilleure chanson francophone de l'année. Que doit-on faire pour participer ?","c":["Écrire.","Téléphoner.","Lire.","Écouter."],"a":1,"k":"Téléphoner.","transcript":"À 20h50 sur notre chaîne, participez à notre émission. Composez le 01 40 00 01 pour choisir la meilleure chanson francophone de l'année. Que doit-on faire pour participer ?"},{"type":"document","q":"Question 11. Comment Olivier s'est-il cassé le bras ?","c":["Il a eu un accident sur la route.","Il a fait une chute à la montagne.","Il est tombé dans son escalier.","Il s'est battu avec un ami."],"a":2,"k":"j'ai manqué une marche en montant à l'étage","transcript":"– Mais qu'est-ce qui t'est arrivé, Olivier ? Tu t'es blessé dans une bagarre ?\n– Non, c'est une histoire idiote. Je suis allé skier avec des copains dans une station près de Montréal. On a passé la journée à descendre les pistes à toute allure.\n– Et c'est comme ça que tu t'es cassé le bras ?\n– Même pas. Je suis rentré chez moi en voiture et là, j'ai manqué une marche en montant à l'étage.\nComment Olivier s'est-il cassé le bras ?"},{"type":"document","q":"Question 12. Que permet cette association ?","c":["De faire des rencontres.","De manger gratuitement.","De trouver un travail.","De vivre chez quelqu'un."],"a":3,"k":"vous habitez chez une personne âgée","transcript":"– Bonjour monsieur, je suis étudiante, je cherche un logement.\n– Bienvenue chez nous. Est-ce que vous savez comment fonctionne notre association ?\n– Non, pas très bien.\n– Eh bien, vous habitez chez une personne âgée et en échange, vous lui rendez quelques petits services, faire les courses, préparer le repas et surtout lui tenir compagnie. Et combien ça coûte ? Ça dépend du temps passé auprès de la personne et de ce que vous faites. Vous payerez un petit loyer si vous assurez une présence certains soirs.\nQue permet cette association ?"},{"type":"document","q":"Question 13. De quoi parlent ces deux personnes ?","c":["De l'actualité européenne.","Du dernier film qu'elles ont vu.","D'un trafic de documents.","D'un vieil ami commun."],"a":1,"k":"le héros quitte secrètement la France","transcript":"– Alors, tu as aimé ?\n– Bof ! Je n'ai pas très bien compris la fin.\n– Ah oui, mais enfin, le héros quitte secrètement la France.\n– Et il part où ?\n– Je ne sais pas. En Espagne. Il est espagnol. Alors, pourquoi le voit-on rentrer dans cette maison ?\n– Pour aller chercher un faux passeport. Tu t'es endormi pendant la séance, toi ? Non.\nDe quoi parlent ces deux personnes ?"},{"type":"document","q":"Question 14. Selon cette personne, que permet la fête de la gastronomie ?","c":["Conseiller les parents en matière d'alimentation.","Créer l'occasion de se retrouver en famille.","Découvrir des recettes de grand-mère.","Rassembler des enfants du monde entier."],"a":1,"k":"parents et enfants réunis autour d'une même recette","transcript":"Cette fête de la gastronomie, l'occasion d'évoquer un plaisir que l'on peut partager très tôt en famille, le plaisir de cuisiner à quatre mains, parents et enfants réunis autour d'une même recette. Cuisiner avec son enfant, c'est une activité à la fois ludique, créative, enrichissante pour un enfant puisqu'elle fait appel à tous ses sens et c'est bien entendu un bon moment à passer ensemble.\nSelon cette personne, que permet la fête de la gastronomie ?"},{"type":"document","q":"Question 15. Que souhaite faire la femme ?","c":["Féliciter les acteurs dans leur loge.","Remettre un vêtement au vestiaire.","Retourner à la salle de spectacle.","S'informer sur la programmation."],"a":1,"k":"déposer mon manteau","transcript":"– Puis-je déposer mon manteau ?\n– Certainement, madame. C'est à votre gauche. Cette année, c'est gratuit pour les abonnés au théâtre.\n– Voilà une bonne nouvelle pour débuter la saison ! Je vous souhaite une agréable soirée.\nQue souhaite faire la femme ?"},{"type":"document","q":"Question 16. Que propose la vendeuse à la cliente ?","c":["D'essayer un vêtement près du corps.","De changer la taille de l'article choisi.","De choisir une tenue multicolore.","De compléter son achat avec un pull."],"a":0,"k":"porter les vestes cintrées","transcript":"– Vous désirez ?\n– Est-ce que cette veste existe en noir ?\n– Je ne l'ai plus, mais nous avons ce modèle-là, plus classique. Passez-la.\n– Oh, elle est trop serrée.\n– Non, je vous assure, c'est la tendance cette année de porter les vestes cintrées. Je ne pourrais pas mettre de gilet en dessous ?\n– Oh, vous n'en avez pas besoin. C'est de la pure laine, ça tient chaud. Bon, je la prends.\nQue propose la vendeuse à la cliente ?"},{"type":"document","q":"Question 17. À qui madame Martin demande-t-elle des conseils ?","c":["À un couturier.","À un jardinier.","À un traiteur.","À un décorateur."],"a":3,"k":"quelque chose de doux, de fleuri, dans les roses","transcript":"– Vous, un professionnel, qu'est-ce que vous me conseillez pour l'entrée ?\n– Pour l'entrée, madame Martin, quelque chose de doux, de fleuri, dans les roses peut-être.\n– Ah, ça c'est une bonne idée ! Et pour la pièce principale ?\n– Là, au contraire, il faut de la lumière. Je pense que du jaune ou du saumon irait bien.\nÀ qui madame Martin demande-t-elle des conseils ?"},{"type":"document","q":"Question 18. Que propose chaque semaine cette radio à ses auditeurs ?","c":["De déjeuner ensemble.","De faire une soirée.","De participer à un jeu.","De rencontrer un invité."],"a":0,"k":"on partage en commun le repas","transcript":"Tout le monde rêve de faire de la proximité, d'être proche des auditeurs. Alors quand on est une radio associative locale, on a plus de facilité. Vous, chaque vendredi, vous ouvrez le local à 13h. On peut venir avec son panier et on partage en commun le repas. Tout à fait. Et là, pour la fin de l'année, on a donc lancé une invitation à tous ceux qui voudraient pour venir manger avec nous et réaliser une émission collective de fin d'année, un petit peu festive.\nQue propose chaque semaine cette radio à ses auditeurs ?"},{"type":"document","q":"Question 19. Quelle est la condition pour répondre à cette annonce ?","c":["Avoir de l'expérience dans la vente.","Habiter près de Sainton-les-Tonges.","Pratiquer régulièrement un sport.","Savoir gérer un site internet."],"a":2,"k":"des vendeurs qui soient en même temps des sportifs","transcript":"Et maintenant, les annonces de Radio Saintonge. Vous faites du sport dans un club et avez toujours rêvé de faire de votre passion votre métier ? Les magasins « Sportez-vous bien » recherchent des vendeurs qui soient en même temps des sportifs pour l'ouverture de leur nouvelle boutique à Sainton-les-Tonges. Si vous êtes intéressé, veuillez déposer votre CV et votre lettre de motivation dans la boutique la plus proche de chez vous ou en ligne sur notre site internet.\nQuelle est la condition pour répondre à cette annonce ?"},{"type":"document","q":"Question 20. Pourquoi y a-t-il un retard de livraison ?","c":["La circulation routière est coupée.","La commande s'est perdue.","Le transporteur est en grève.","Les marchandises ont été volées."],"a":0,"k":"La neige a interrompu le trafic.","transcript":"– Allô ! Bonjour, je suis madame Leroy. J'ai passé une commande de vêtements par téléphone il y a dix jours avec une livraison à domicile et pourtant rien n'est arrivé pour l'instant.\n– Donnez-moi votre numéro client Blanche-Maison, s'il vous plaît. Je vais vérifier. En effet, la livraison n'a pas été faite. La neige a interrompu le trafic. Le transporteur ne pourra vous livrer que demain.\nPourquoi y a-t-il un retard de livraison ?"},{"type":"document","q":"Question 21. Quel est le projet de Régis Olivères et de ses élèves ?","c":["Interviewer un réalisateur.","Participer à un festival.","Tourner un film.","Visiter des studios de cinéma."],"a":2,"k":"participer à la réalisation d'un film","transcript":"– Régis Olivères, bonjour.\n– Bonjour, bonjour Philippe. Régis, vous lancez une aventure, enfin vous vous lancez dans une aventure assez incroyable qui est de participer à la réalisation d'un film, un film avec un réalisateur professionnel, avec des professionnels du cinéma. Il s'appelle François Chailloux.\n– Oui. À l'occasion du festival de Luchon, j'ai rencontré François, je lui ai dit que je voulais faire un film.\nQuel est le projet de Régis Olivères et de ses élèves ?"},{"type":"document","q":"Question 22. Qu'aurait souhaité cette personne en allant chez Georges Brassens ?","c":["Visiter des studios de cinéma.","Lui apporter un livre.","Lui présenter son travail.","Lui proposer une interview."],"a":2,"k":"J'ai lu vos chansons et j'aimerais bien vous en parler","transcript":"Quand j'étais adolescent, j'avais écrit un long poème à Georges Brassens. J'avais fini de le recopier. Enfin, c'était une espèce de chanson que j'avais fini de recopier dans le bistrot en face de l'impasse Fleurymont où il habitait. Et j'étais allé lui porter, sauf qu'il n'habitait plus là depuis des années et que j'étais assez rassuré qu'il n'habite plus là parce que je ne sais pas ce que je lui aurais raconté. Mais je l'avais écrite. Et je me dis que si un jour j'avais reçu un petit mot de Brassens me disant « J'ai lu vos chansons et j'aimerais bien vous en parler », ça m'aurait intéressé.\nQu'aurait souhaité cette personne en allant chez Georges Brassens ?"},{"type":"document","q":"Question 23. Quelle est l'attitude des jeunes face au don du sang ?","c":["Ils déplorent un manque d'information.","Ils refusent de participer à la collecte.","Ils s'inquiètent de la sécurité sanitaire.","Ils souhaitent rencontrer des soignants."],"a":0,"k":"ils ne savent pas où aller","transcript":"La question du jour, Valérie Antier. Pourquoi l'établissement français du sang en appelle-t-il aux étudiants ? Les jeunes donnent plus facilement leur sang, il faut le savoir. Ils voient ça comme un premier acte de citoyenneté. Un acte solidaire, disent-ils, un geste utile. C'est ce qui ressort des sondages. Un donneur sur cinq a entre 18 et 24 ans en France. Mais souvent, ils déclarent ne pas donner parce qu'ils ne sont pas sollicités, pas assez en tout cas, ou bien parce qu'ils ne savent pas où aller. Du coup, la semaine prochaine, l'établissement français du sang lance une campagne pour mobiliser les étudiants. Le slogan : « On est plus qu'amis, on est donneurs de sang. »\nQuelle est l'attitude des jeunes face au don du sang ?"},{"type":"document","q":"Question 24. Quel est le problème soulevé ?","c":["La voiture est interdite en centre-ville.","Le sens de la circulation a été modifié.","Le stationnement est devenu payant.","Les embouteillages sont fréquents."],"a":2,"k":"la réglementation vient de changer","transcript":"– Charlotte, tu as trouvé une place pour te garer ?\n– Oui, mais j'ai mis au moins un quart d'heure entre les emplacements réservés et les arrêts minutes.\n– Et tu t'es garé où ?\n– Rue Colbert, après l'intersection avec la rue en sens interdit. Tu as pensé à prendre un ticket de stationnement ?\n– Non, c'est gratuit dans ce quartier.\n– Plus maintenant, la réglementation vient de changer. Bon, j'y retourne avant le passage des policiers municipaux.\nQuel est le problème soulevé ?"},{"type":"document","q":"Question 25. Qu'est-ce qui est important pour Christelle Nolo ?","c":["L'organisation d'ateliers vidéo.","La présence de réalisateurs étrangers.","La projection de documentaires.","La variété de la programmation."],"a":3,"k":"proposer le maximum de diversité","transcript":"Christelle Nolo, directrice d'une salle de cinéma, nous parle du festival Le printemps du cinéma. Je décide moi-même des films que nous présentons. Le but est de proposer le maximum de diversité, qu'il y en ait pour tous les goûts. C'est l'occasion de mettre en avant des films qui ont bien marché mais qui n'ont pas assez été exploités. Pour les amateurs de cinéma d'auteur, il y a aussi une sélection de 15 films art et essai déjà récompensés.\nQu'est-ce qui est important pour Christelle Nolo ?"},{"type":"document","q":"Question 26. D'après Camille, quel est le point fort de l'immobilier à Québec ?","c":["La recherche d'un appartement est rapide.","Le système de la colocation est encouragé.","Les habitations proposées sont de qualité.","Les logements sont bon marché en banlieue."],"a":0,"k":"Ça se fait en quelques jours.","transcript":"– Camille, à ton arrivée à Québec, dans quel type de logement résidais-tu ?\n– J'ai d'abord habité un appartement en colocation dans le quartier de Montcalm. Au bout de six mois à peine, j'ai emménagé à deux pas du centre-ville. C'est très simple de trouver un logement ici. Ça se fait en quelques jours.\n– Comment as-tu trouvé ton premier appartement ?\n– Avant de quitter la France, sur un site internet regroupant les annonces de colocation. Mais je conseille de chercher sur place. Il y a tout ce qu'il faut pour trouver facilement. On peut découvrir le quartier, voir si les pièces sont spacieuses, lumineuses et surtout bien insonorisées. Ce n'était pas le cas de mon premier logement, malgré le nom du quartier.\nD'après Camille, quel est le point fort de l'immobilier à Québec ?"},{"type":"document","q":"Question 27. Pour quelle raison ces évaluations ont-elles été critiquées ?","c":["Parce qu'elles étaient difficiles à mettre en œuvre.","Parce qu'elles ignoraient la particularité des contextes.","Parce qu'elles avaient lieu tôt dans l'année scolaire.","Parce qu'elles proposaient des exercices complexes."],"a":2,"k":"une évaluation qui intervenait au mois de janvier","transcript":"Dans toutes les écoles primaires de France, 815 900 élèves du cours élémentaire vont passer des évaluations nationales en français et mathématiques. Alors ces évaluations nationales sont-elles utiles ? L'évaluation est un acte quotidien pour tous les enseignants. Là, c'est une évaluation institutionnelle que propose le ministère de l'Éducation nationale. Ça a déjà été effectué au mois de janvier pour les élèves du cours moyen et, à l'époque, on l'avait d'ailleurs fortement critiqué puisque c'était une évaluation qui intervenait au mois de janvier alors qu'une grande partie des programmes n'avaient pas été effectués.\nPour quelle raison ces évaluations ont-elles été critiquées ?"},{"type":"document","q":"Question 28. Quel est le sujet de cette émission ?","c":["L'état actuel de la biodiversité.","L'existence de plantes menaçantes.","La découverte de nouvelles espèces menacées.","Le rôle de l'ONU dans la préservation des espèces."],"a":0,"k":"la biodiversité est aujourd'hui menacée par les activités humaines","transcript":"S'il est normal que des espèces apparaissent et disparaissent au gré de l'évolution, il est par contre inédit qu'une seule espèce, la nôtre, mette en danger l'existence de l'ensemble du vivant. Les spécialistes sont en effet unanimes pour dire que la biodiversité est aujourd'hui menacée par les activités humaines. Une récente étude britannique estime ainsi qu'une plante sur cinq dans le monde est menacée. L'ONU affirme de son côté que le rythme annuel des disparitions d'espèces est désormais cent fois plus élevé que ce qu'il devrait être naturellement. Il y a donc urgence à réagir pour préserver la vie sur terre et préserver l'existence de notre propre espèce.\nQuel est le sujet de cette émission ?"},{"type":"document","q":"Question 29. Que propose ce reportage ?","c":["D'apprendre à élaborer des itinéraires de visites.","D'expérimenter une manière différente de voyager.","De découvrir des adresses d'hôpitaux à l'étranger.","De participer à des actions de solidarité internationale."],"a":1,"k":"faire le tour du monde sans avoir à payer pour te loger","transcript":"Imagine pouvoir faire le tour du monde sans avoir à payer pour te loger. Imagine partager des cultures différentes avec des guides personnalisés, totalement gratuits. Arrête d'imaginer, ça existe. Depuis l'an 2000, près de 300 000 personnes l'ont fait, à bon marché et hors des circuits touristiques programmés, grâce à l'hospitalité des membres d'un réseau social qui s'étend sur les cinq continents. Son fondateur, jeune étudiant allemand de 22 ans, assure que l'objectif final est de promouvoir la paix par l'échange interculturel.\nQue propose ce reportage ?"},{"type":"document","q":"Question 30. Selon le locuteur, à quoi servent les notes à l'école ?","c":["À classer les établissements selon un taux de performance.","À communiquer sur les progrès de l'élève dans chaque matière.","À créer une échelle lisible de classification des élèves.","À susciter chez l'élève l'envie de devenir le meilleur de la classe."],"a":2,"k":"visibiliser les hiérarchies à l'intérieur de la classe","transcript":"L'effet sur l'apprentissage est faible, mais les notes ont d'autres fonctions. Elles servent à visibiliser les hiérarchies à l'intérieur de la classe. Elles servent à savoir exactement à quel niveau se trouvent les élèves. Donc, elles donnent une indication très claire. Ensuite, elles permettent de faire le tri en termes de redoublement ou d'orientation. Et elles permettent aussi une objectification, une réification du jugement qu'on donne de l'élève. Par exemple, lorsqu'on communique les résultats aux parents, c'est numérique, c'est vrai, c'est objectif.\nSelon le locuteur, à quoi servent les notes à l'école ?"},{"type":"document","q":"Question 31. De quoi dépend le montant du pourboire au Québec ?","c":["De la législation en vigueur.","De la paye des employés.","Du bon vouloir du client.","Du type d'établissement."],"a":2,"k":"laisser une somme d'argent à quelqu'un pour le remercier de ses bons services","transcript":"– Bonjour. Alors, voilà ma question. Je voudrais savoir comment fonctionne le système des pourboires au Québec, car cela varie beaucoup d'un pays à l'autre. Est-ce obligatoire ou non ?\n– Eh bien, c'est une chose courante chez nous de laisser une somme d'argent à quelqu'un pour le remercier de ses bons services, car le service n'est pas inclus dans le salaire du personnel.\n– Et comment calcule-t-on la somme d'argent qu'on doit laisser ?\n– En général, on doit laisser entre 15 et 20 % de la somme indiquée sur la facture. C'est une vraie gymnastique au moment de payer ?\n– Non, pas vraiment. Nous autres Québécois, on est habitués à ce système. Ça se fait presque automatiquement.\nDe quoi dépend le montant du pourboire au Québec ?"},{"type":"document","q":"Question 32. Quel constat la journaliste fait-elle sur la contrefaçon ?","c":["Elle concerne de moins en moins d'articles.","Elle est maîtrisée grâce aux contrôles.","Elle met en danger le marché du travail.","Elle se concentre sur des objets précieux."],"a":2,"k":"contribue à supprimer 30 000 emplois en France chaque année","transcript":"Longtemps, la copie illégale de produits ne concernait que le domaine du luxe. Aujourd'hui, tous les secteurs de l'économie sont atteints par ce phénomène. Pièces automobiles, prêt-à-porter, jouets ou encore médicaments. La douane française a saisi plus de 5 millions d'articles, soit deux fois plus que l'année dernière. Et on estime que cette contrefaçon contribue à supprimer 30 000 emplois en France chaque année.\nQuel constat la journaliste fait-elle sur la contrefaçon ?"},{"type":"document","q":"Question 33. Que dénonce cette journaliste ?","c":["La télévision touche des droits importants sur les compétitions.","Les comportements machistes perdurent dans l'univers sportif.","Les fédérations sont souvent impliquées dans des scandales.","Les grandes équipes concentrent la majorité des financements."],"a":1,"k":"les médias ont souvent tendance à détourner caméras et micros","transcript":"Le monde bouge, partout, trop lentement, certes, mais enfin il bouge même quand on parle de sport féminin. Non que nous ne célébrions depuis longtemps nos championnes. Une médaille d'or aux JO n'a pas de sexe. C'est une médaille d'or pour la France, un point c'est tout. Mais dès qu'il s'agit de s'intéresser à l'actualité des équipes féminines de sport collectif et de retransmettre leur compétition, bah là, les médias ont souvent tendance à détourner caméras et micros. Et quand on scrute d'un peu près les instances dirigeantes des clubs et des fédérations, là encore, beaucoup de testostérone et encore bien peu de parité.\nQue dénonce cette journaliste ?"},{"type":"document","q":"Question 34. Sur quoi porte le projet de recherche mentionné par l'intervenante ?","c":["Un aménagement territorial en fonction des données météorologiques.","Un programme de réduction des différentes sources de pollution.","Une analyse comparative entre les modes de vie citadins et ruraux.","Une proposition de prévention renforcée des grands cataclysmes."],"a":0,"k":"l'adaptation du milieu urbain au changement climatique","transcript":"Dans le cadre du CRAB, je coordonne un projet de recherche justement sur l'adaptation du milieu urbain au changement climatique. L'adaptation, ça veut dire non pas l'atténuation nécessairement des gaz à effet de serre, mais plutôt, puisque le climat change, il faut s'y adapter. Il faut voir à ce que la ville s'y adapte pour anticiper les changements plutôt qu'y réagir et avoir à payer pour tout ce que ça veut dire comme bris et catastrophes et désorganisation, déstructuration. Alors ce qu'on fait nous, c'est depuis trois ans, on mène une démarche participative pour savoir sur quoi se fonder pour justement planifier l'adaptation.\nSur quoi porte le projet de recherche mentionné par l'intervenante ?"},{"type":"document","q":"Question 35. Pour l'auteur, de quoi les gens cultivés doivent-ils se rendre compte ?","c":["De l'absurdité qu'il y a à valoriser leur manque de culture scientifique.","De la nécessité de mieux défendre les acquis de la culture classique.","Du besoin qu'ont les mathématiciens d'avoir une culture générale.","Du refus des valeurs humanistes par les milieux scientifiques."],"a":0,"k":"se vantant de rien connaître aux mathématiques","transcript":"On l'a dit, la culture générale a tous ses défauts, mais en plus elle a le défaut d'ignorer les sciences. Ça c'est assez facile à faire comme constat. Oui, assez facile à faire comme constat. Mais ce qui est déplorable, c'est que c'est pas incorporé cette idée-là, il me semble. C'est-à-dire qu'on peut très bien aujourd'hui se prétendre cultivé, et les gens qui parlent de culture générale sont très souvent, ou typiquement, des humanistes qui ont une culture littéraire, être cultivés sans avoir de connaissances scientifiques. Et j'irais même jusqu'à dire pire, en méprisant, ou en trouvant que ça pose absolument pas problème de pas avoir de culture scientifique, ou pour prendre un exemple que j'aime beaucoup, en se vantant de rien connaître aux mathématiques. Mais là je pense que c'est une profonde erreur et puis le livre se veut une défense passionnée, j'oserais dire, de l'importance d'incorporer une notion de culture scientifique.\nPour l'auteur, de quoi les gens cultivés doivent-ils se rendre compte ?"},{"type":"document","q":"Question 36. Quelle est la particularité du groupe Émile Dubois ?","c":["Ses créations sont très romantiques.","Ses décors sont créés par des artistes américains.","Ses membres sont d'origines variées.","Ses spectacles sont donnés dans des sites insolites."],"a":3,"k":"des lieux de la ville où on ne s'attendait pas à voir de la danse","transcript":"Au milieu des années 70, à Grenoble, un étudiant des Beaux-Arts se convertit à la danse, par amour pour une danseuse qui deviendra sa muse et sa compagne. Après avoir suivi pendant deux ans les cours de Merce Cunningham à New York, il crée, en 1979, le groupe Émile Dubois. Groupes, tribus, hordes, un désordre qui investit des lieux de la ville où on ne s'attendait pas à voir de la danse. Piscines vides, carrefours, parcs, gymnases. Les lieux ne sont pas attendus et cette danse-là encore moins.\nQuelle est la particularité du groupe Émile Dubois ?"},{"type":"document","q":"Question 37. Que préconise ce spécialiste face à l'engouement des jeunes pour les jeux vidéo ?","c":["De consulter un médecin psychothérapeute.","D'attendre que le temps ait fait son œuvre.","De prescrire un traitement médicamenteux.","D'informer les utilisateurs sur leurs dangers."],"a":1,"k":"l'adolescence, on l'accompagne, ne la pathologisons pas","transcript":"Voilà, la question principale, c'est de savoir si on va médicaliser la crise d'adolescence ou pas. Sachant qu'aujourd'hui le symptôme principal de la crise d'adolescence chez le garçon, c'est le jeu vidéo excessif ou l'internet excessif. Donc, si on dit addiction, on le médicalise et ça veut dire tôt ou tard, pas seulement des psychothérapies, mais des chimiothérapies pour tous les adolescents joueurs. Alors qu'on sait encore une fois d'expérience que 99 % arrêtent de jouer à 17 ou 18 ans parce qu'ils ont fini leur crise d'adolescence, qu'ils sont plus en révolte contre les parents, qu'ils sont soucieux de s'intégrer à la société et d'avoir une activité professionnelle. Donc l'adolescence, on l'accompagne, voilà, ne la pathologisons pas, et je suis bien content que l'Académie de médecine ait pris cette position.\nQue préconise ce spécialiste face à l'engouement des jeunes pour les jeux vidéo ?"},{"type":"document","q":"Question 38. Que peut offrir un propriétaire de gîte rural ?","c":["De la tranquillité et de l'intimité.","Des facilités de réservation.","Un contrat privilégié avec son hôte.","Un tarif intéressant toute l'année."],"a":0,"k":"le vacancier va séjourner en toute autonomie","transcript":"Ouvrir une chambre d'hôte, c'est d'abord opter pour un mode de vie bien particulier où vous partagez la vie de votre quotidien avec des gens de passage, soit toute l'année, ou une partie de l'année. C'est une formule conviviale qui a du succès puisqu'on en compte plus de 110 000 en France. Est-ce qu'il y a moins de contraintes pour les gîtes ruraux ? Oui, tout à fait. Si vous êtes moins disponible, le gîte rural, c'est pour cela, il vous suffit d'être là à l'arrivée, au départ des vacanciers. Et en fait, ils proposent au contraire un logement qui est vraiment indépendant du vôtre, qui est généralement situé à proximité de celui du propriétaire, mais où le vacancier va séjourner en toute autonomie pendant la semaine ou pour le week-end.\nQue peut offrir un propriétaire de gîte rural ?"},{"type":"document","q":"Question 39. Selon l'intervenant, qu'est-ce qui caractérise nos vies contemporaines ?","c":["L'absence de temps morts.","L'ennui des distractions.","L'insuffisance de repos.","Le manque d'action."],"a":0,"k":"vont être expulsées de nos journées, tous les temps d'attente, de non-action","transcript":"On part du principe que nos vies contemporaines étant ce qu'elles sont, peu à peu, si on n'y prend pas garde, vont être expulsées de nos journées, tous les temps d'attente, de non-action. On est sans arrêt soit en train de nous engager dans des actions, faire des choses avec nos mains ou avec notre cerveau, soit nous nous reposons dans des distractions. On regarde si on a des messages sur internet, on écoute de la musique, on se passe un film, mais à aucun moment notre cerveau n'entre sur un mode très simple qui est d'être là, conscient que je suis vivant, conscient que j'appartiens à un ordre naturel, et juste contempler et ressentir ce phénomène.\nSelon l'intervenant, qu'est-ce qui caractérise nos vies contemporaines ?"}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 36/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test36_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 36</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 36 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 36</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
</html>
