<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 3 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

rmacie.", "C'est un menu à 25 €."], "a": 2, "k": "C'est tout droit après la pharmacie", "transcript": "Excusez-moi madame, je cherche le restaurant Les Quatre Saisons. Est-ce que vous savez où il se trouve ? A. C'est la formule avec le plat du jour. B. C'est mieux de réserver avant. C. C'est tout droit après la pharmacie. D. C'est un menu à 25 €."}, {"type": "extrait", "q": "Question 5. Choisissez la bonne réponse.", "c": ["Des antibiotiques contre la fièvre.", "Des comprimés contre la grippe.", "Un sirop contre la toux.", "Une crème contre la douleur."], "a": 3, "k": "Une crème contre la douleur", "transcript": "Bonjour monsieur. Ce matin, je me suis brûlé la main quand je cuisinais. J'ai vraiment mal. Quel médicament est-ce que vous me conseillez ? A. Des antibiotiques contre la fièvre. B. Des comprimés contre la grippe. C. Un sirop contre la toux. D. Une crème contre la douleur."}, {"type": "extrait", "q": "Question 6. Choisissez la bonne réponse.", "c": ["Au restaurant chez Pierrot.", "C'est prêt dans une minute.", "Comme tu veux, tu choisis.", "Prends des assiettes en plastique."], "a": 2, "k": "Comme tu veux, tu choisis", "transcript": "Qu'est-ce qu'on mange ? A. Au restaurant chez Pierrot. B. C'est prêt dans une minute. C. Comme tu veux, tu choisis. D. Prends des assiettes en plastique."}, {"type": "extrait", "q": "Question 7. Choisissez la bonne réponse.", "c": ["Ah oui, mais tu ne viens pas.", "Non, moi j'aime bien nager.", "Non, j'ai envie de nager.", "Oui, pourquoi pas ?"], "a": 3, "k": "Oui, pourquoi pas", "transcript": "J'ai envie de me baigner. On se retrouve à la piscine ? A. Ah oui, mais tu ne viens pas. B. Non, moi j'aime bien nager. C. Non, j'ai envie de nager. D. Oui, pourquoi pas ?"}, {"type": "extrait", "q": "Question 8. Choisissez la bonne réponse.", "c": ["C'est pour ses 18 ans.", "Il veut une écharpe en laine.", "Je le trouve sympa.", "On y va en voiture."], "a": 1, "k": "Il veut une écharpe en laine", "transcript": "Je vais aussi à l'anniversaire de Tom ce soir. Qu'est-ce qu'on peut lui offrir ? A. C'est pour ses 18 ans. B. Il veut une écharpe en laine. C. Je le trouve sympa. D. On y va en voiture."}, {"type": "document", "q": "Question 9. Quel est le problème de la voiture de Jeanne ?", "c": ["Elle coûte très cher à réparer.", "Elle est restée au garage.", "Elle fait un bruit anormal.", "Elle vient de tomber en panne."], "a": 2, "k": "elle roule, mais avec un bruit bizarre", "transcript": "– Hey, ça va Jeanne ?\n– Non Kamel, j'ai un problème avec ma nouvelle voiture.\n– Elle est en panne ?\n– Non, elle roule, mais avec un bruit bizarre. C'est le moteur, je crois.\n– Tu dois vite appeler le mécanicien du garage, il va la réparer.\n– Ah oui, tu as raison."}, {"type": "document", "q": "Question 10. Que conseille le médecin à Madame Chabert ?", "c": ["Dormir plus longtemps.", "Faire un bilan de santé.", "Manger équilibré.", "Pratiquer un sport."], "a": 2, "k": "pensez à varier vos repas", "transcript": "– Bonjour Docteur.\n– Ah, bonjour Madame Chabert. Qu'est-ce qui vous amène ?\n– J'ai encore mal aux genoux et je me sens de plus en plus fatiguée. C'est peut-être à cause de l'hiver ?\n– Vous m'avez pourtant l'air en pleine forme. Pour la fatigue, je vais vous prescrire des vitamines. Et pensez à varier vos repas. Pour votre genou, nous allons regarder cela de plus près. Suivez-moi."}, {"type": "document", "q": "Question 11. Quel cadeau est-ce que Mathieu va choisir ?", "c": ["Un bouquet.", "Un gâteau.", "Un roman.", "Un vêtement."], "a": 2, "k": "un livre ou un film", "transcript": "– Mathieu regarde ce pull. Il est parfait pour Johanna, tu ne trouves pas ?\n– Ouais, elle n'aime pas le rose. Je préfère lui prendre autre chose, un livre ou un film. Elle adore les histoires d'amour.\n– C'est vrai, elle lit toujours en mangeant des pâtisseries."}, {"type": "document", "q": "Question 12. Quel bilan Alex tire-t-il de sa première journée de travail ?", "c": ["Il a été très agréablement surpris.", "Il préfère attendre pour se prononcer.", "Il aurait aimé se mettre déjà au travail.", "Il a trouvé son supérieur peu disponible."], "a": 0, "k": "Je n'en revenais pas", "transcript": "– Alors, comment s'est passée cette première journée dans la vie active ?\n– Plutôt bien. Les collègues ont été très accueillants.\n– Et avec ton chef ? Tu m'avais dit qu'il était un peu froid.\n– Ben, en fait, il a été très sympa. Il m'a présenté à toute l'équipe, fait visiter les locaux et montré mon bureau, qui est très grand. Je n'en revenais pas.\n– Bienvenue dans le monde professionnel, Alex. Tu n'es pas au bout de tes découvertes."}, {"type": "document", "q": "Question 13. Qu'est-ce qu'il faut acheter pour recevoir un cadeau ?", "c": ["Un chapeau de soleil.", "Un maillot de foot.", "Un sac de sport.", "Un vêtement de plage."], "a": 3, "k": "pour l'achat d'un maillot de bain", "transcript": "Le soleil revient, c'est bientôt les vacances. Dans votre magasin Sport Plus, pour l'achat d'un maillot de bain, un tube de crème en cadeau. Rendez-vous au rayon articles de plage jusqu'au 30 juin."}, {"type": "document", "q": "Question 14. Que doit faire monsieur Berton ?", "c": ["Rentrer en France.", "Remplir un dossier.", "Se rendre à l'ambassade.", "Prendre contact avec sa banque."], "a": 3, "k": "Vous téléphonez tout de suite à votre banque", "transcript": "– Assistance mondiale, bonjour.\n– Bonjour, Monsieur. Je suis Monsieur André Berton. Je vous appelle d'Adélaïde, en Australie. Je ne retrouve plus ma carte bancaire. Qu'est-ce que je dois faire ?\n– Vous téléphonez tout de suite à votre banque en France et vous faites opposition. Vous nous faxez la déclaration de perte et nous allons vous envoyer 1000 dollars en chèque de voyage à Adélaïde en poste restante. Vous les retirerez avec une carte d'identité."}, {"type": "document", "q": "Question 15. Pourquoi le jeune homme ne trouve-t-il pas la pharmacie Bollet ?", "c": ["Elle n'existe plus depuis un moment.", "Il n'est pas dans la bonne rue.", "Il s'est trompé d'adresse et de nom.", "Le passant ignore où elle se trouve."], "a": 0, "k": "ça fait longtemps que ce n'est plus une pharmacie", "transcript": "– Bonjour, Monsieur. Je cherche la pharmacie Bollet. C'est dans le coin, je crois.\n– Oh, mon garçon, ça fait longtemps que ce n'est plus une pharmacie. C'est une laverie automatique maintenant. Monsieur Bollet, il est mort il y a 5 ans.\n– Ah bon ? Mais c'est ma mère qui me l'a indiqué. Vous êtes sûr qu'elle n'est plus là ?\n– Bien sûr, ça fait 20 ans que j'habite le quartier, alors je connais bien la pharmacie du coin. Il y en a une autre, mais dans deux rues, à droite, c'est pas loin."}, {"type": "document", "q": "Question 16. Qu'explique cet homme sur son arrivée au Canada ?", "c": ["Il a détesté le mauvais temps.", "Il a dû changer ses habitudes.", "Il avait du mal à s'intégrer.", "Il connaissait peu le pays."], "a": 3, "k": "tout ce que je savais du Canada", "transcript": "– Au premier marché sur le sol ici, qu'est-ce qui s'est passé dans votre tête ? Quel est votre esprit ?\n– Quand je suis arrivé, je me demandais où j'allais. Au Canada, j'avais étudié ça au lycée, mais tout ce que je savais, que j'ai retenu du Canada, c'est que le Canada a des hivers longs et froids et des étés courts et chauds.\n– C'est tout ce que vous savez ?\n– C'est tout ce que je savais du Canada.\n– Vous alliez déjà ?\n– Non."}, {"type": "document", "q": "Question 17. Qu'est-ce que Jérémy propose ?", "c": ["D'acheter des médicaments.", "D'aller au travail ensemble.", "De faire une promenade.", "De manger au restaurant."], "a": 1, "k": "Demain, je vais au bureau en voiture", "transcript": "Salut Mina, c'est Jérémy. Demain, je vais au bureau en voiture. Je peux passer te chercher vers 8h30. Je dois passer à la pharmacie en bas de chez toi. Tu peux m'attendre devant. Si ça t'intéresse, rappelle-moi ce soir."}, {"type": "document", "q": "Question 18. Qu'explique ce jeune homme ?", "c": ["Il a été déçu par le concert de rap.", "Il a payé ses billets trop cher.", "La banque a refusé son règlement.", "Le spectacle a été annulé."], "a": 1, "k": "c'était 70 euros la place", "transcript": "Trouver des places pour son rappeur préféré, c'était presque inespéré pour Yoann. Alors, il s'est laissé embarquer par le premier site trouvé sur son moteur de recherche. Attention, ce sont les derniers billets disponibles. J'en avais pour deux places, pour à peu près 350 euros. J'ai appris après que finalement, c'était 70 euros la place. Impossible d'annuler son achat, il s'estime arnaqué et réussit finalement à se faire rembourser par sa banque."}, {"type": "document", "q": "Question 19. Quel est le secret de la réussite de cette chanteuse ?", "c": ["C'est une interprète sincère.", "Des danseurs l'accompagnent.", "Elle répète très régulièrement.", "Son répertoire est romantique."], "a": 0, "k": "Je chante simplement avec mon cœur", "transcript": "– Linda Copin, bonjour. Merci de participer à notre émission. Linda, vous êtes une artiste reconnue aujourd'hui. Les gens vous aiment. Quel est votre secret ?\n– C'est simple. Vous savez, je n'ai jamais pris de cours de ma vie. Je chante simplement avec mon cœur. Je dis souvent à mes élèves que la musique doit être leur sport. Et oui, il faut qu'ils chantent avec toutes les parties de leur corps, épaules, yeux. Il faut partager avec les musiciens, avec le public."}, {"type": "document", "q": "Question 20. Qu'explique Marie à Benjamin ?", "c": ["Elle va assister à un match de rugby.", "Elle va faire une promenade à vélo.", "Elle va passer la soirée à la maison.", "Elle va voir un ami malade à l'hôpital."], "a": 2, "k": "On va rester à la maison ce soir", "transcript": "– Allô Marie, qu'est-ce que vous faites ? On vous attend pour commencer le repas.\n– Ah, Benjamin, excuse-moi, j'ai oublié de t'appeler. On sort juste de l'hôpital. Mathieu a fait une chute de vélo et s'est cassé le bras. On l'a conduit aux urgences et il a été plâtré. On va rester à la maison ce soir, car il n'a pas le moral. Il a sa finale de rugby demain et il ne pourra pas jouer.\n– Ah mince, ne t'inquiète pas. Nous nous verrons un autre jour. Souhaite-lui un bon rétablissement de notre part."}, {"type": "document", "q": "Question 21. Qu'est-ce que Frédéric a trouvé difficile pendant son voyage ?", "c": ["Le comportement des habitants.", "Le sentiment de solitude.", "Les conditions météorologiques.", "Les obstacles linguistiques."], "a": 2, "k": "par 40 degrés à l'ombre", "transcript": "– Alors Frédéric, ce voyage en Inde.\n– Très intéressant, mais c'était dur. J'ai traversé des paysages magnifiques et des régions très pittoresques, mais par 40 degrés à l'ombre. Je ne recommencerai pas. Puis, ce n'est pas vraiment prévu pour un voyage à vélo. Beaucoup de circulation sur les routes et pratiquement pas de voies cyclables. Par contre, l'accueil des gens a été partout très chaleureux."}, {"type": "document", "q": "Question 22. Dans ce dialogue, quelle est l'intention du monsieur ?", "c": ["Il fait des compliments.", "Il formule une invitation.", "Il cherche à convaincre.", "Il donne des conseils."], "a": 2, "k": "il faut y aller", "transcript": "– Tiens, c'est le salon de l'agriculture la semaine prochaine. Il faut que vous y alliez, Françoise. Je suis sûr que vous allez adorer.\n– Vous savez, moi, je n'y connais rien. Ce n'est pas le genre de salon que je fréquente.\n– Vous avez tort. Moi, j'y vais tous les ans. Imaginez la plus grande ferme du monde qui s'installe en plein Paris pour 10 jours.\n– Oui, bien sûr. Mais il y a plein d'autres choses intéressantes à faire à Paris.\n– Oui, bien sûr. Mais il faut y aller. Vous allez voir les animaux, par exemple. C'est incroyable. Vous pourrez les caresser et je ne vous parle pas des spécialités gastronomiques. Un régal !\n– Vous savez, moi, les animaux... Cependant, vous avez éveillé ma curiosité. Mais il faudra venir avec moi."}, {"type": "document", "q": "Question 23. Qu'est-ce que Gérard aurait aimé faire ?", "c": ["Acquérir son logement.", "Épargner de l'argent.", "Exercer un autre métier.", "Fonder un foyer."], "a": 3, "k": "Je n'ai jamais été marié, je n'ai jamais eu d'enfant", "transcript": "– Bonjour Gérard. Nous écoutons votre témoignage.\n– Eh bien, moi, j'ai passé la plus grande partie de ma vie à travailler. J'ai placé ma vie sous le signe de cette phrase d'un philosophe : on existe parce que l'on fait. Mais aujourd'hui, à 62 ans, je me dis que le bilan n'est peut-être pas aussi positif que ça. J'ai une jolie maison, un train de vie plutôt élevé. Je n'ai jamais été marié, je n'ai jamais eu d'enfant. Ma vie amoureuse fut un parfait désastre."}, {"type": "document", "q": "Question 24. Quelle est l'ambition du prix des lycéens autrichiens ?", "c": ["Développer le marché du livre de jeunesse en Autriche.", "Faire découvrir aux élèves la culture française.", "Favoriser la création artistique en classe de langue.", "Utiliser la littérature comme un support pédagogique."], "a": 3, "k": "prouver que c'est un bon outil d'apprentissage du français", "transcript": "– Quel but poursuivez-vous en organisant le prix des lycéens autrichiens auprès des élèves qui apprennent le français comme langue étrangère ?\n– Bien entendu, nous cherchons d'abord à promouvoir la langue française en Autriche. Mais nous avons surtout l'objectif d'introduire plus fortement la littérature de jeunesse française, que nous considérons comme étant très riche, dans la classe de français, pour prouver que c'est un bon outil d'apprentissage du français. En effet, c'est un excellent moyen de s'entraîner à la lecture suivie, ce qui n'est pas toujours facile dans l'apprentissage du français."}, {"type": "document", "q": "Question 25. Pour quelles raisons la jeune femme accepte-t-elle de recevoir la candidature de ce monsieur ?", "c": ["Il a quatre ans d'expérience.", "Il a travaillé dans un commerce.", "Il accepte de travailler l'été.", "Il est très motivé par la formation."], "a": 1, "k": "j'ai travaillé deux étés comme caissier en supermarché", "transcript": "– CDD formations. Bonjour.\n– Bonjour. Je suis intéressé par votre formation en vente.\n– Oui. Quel est votre parcours ?\n– Je suis déménageur depuis quatre ans. Je voudrais me réorienter.\n– Malheureusement, notre formation s'adresse à des personnes déjà expérimentées en vente.\n– Je vois. Mais je pense que j'ai travaillé deux étés comme caissier en supermarché. C'est suffisant ?\n– Envoyez-nous un CV et une lettre de motivation. Nous étudierons votre candidature."}, {"type": "document", "q": "Question 26. Pourquoi le visiteur ne peut-il pas accéder à cette salle du musée ?", "c": ["Parce que la salle est en travaux aujourd'hui.", "Parce qu'un vol a eu lieu dans cette salle.", "Parce que le personnel procède au nettoyage.", "Parce qu'il manque du personnel aujourd'hui."], "a": 3, "k": "nous ne sommes pas assez nombreux", "transcript": "– Bonjour. Monsieur, vous voyez bien qu'il y a une barrière. Vous ne pouvez pas aller voir ces tableaux-là. En plus, il y a une alarme qui peut se mettre à sonner.\n– Oui, mais je ne voulais rien voler. Excusez-moi. Habituellement, on peut visiter cette salle. Vous êtes en train de la refaire ?\n– Non, non. Mais aujourd'hui, nous ne sommes pas assez nombreux pour ouvrir toutes les salles. Il y a une épidémie de grippe.\n– Ah, très bien. Je comprends mieux. Mais au moins, il n'y aura pas besoin d'y faire le ménage aujourd'hui."}, {"type": "document", "q": "Question 27. Pourquoi certains jeunes choisissent-ils de rester chez leurs parents ?", "c": ["La peur de faire de la peine à leur entourage familial.", "Le confort que leur procure leur structure familiale.", "Le plaisir de voir leur famille comme ils le souhaitent.", "L'obligation de soutenir financièrement leur famille."], "a": 1, "k": "Maman et papa prennent soin de tout", "transcript": "– À peine a-t-on le temps de s'habituer à être parents, que l'on doit préparer nos enfants à devenir autonomes, puis à partir. Ce moment où le jeune adulte quitte la maison est difficile, effectivement.\n– Ce moment est difficile tant pour le parent que pour l'enfant. Nos adolescents, qui ont attendu parfois très longtemps ce temps de liberté, eux-mêmes peuvent se retrouver démunis au moment de franchir la porte de la maison. Aujourd'hui, les jeunes adultes vivent de plus en plus longtemps chez leurs parents.\n– Tout à fait. On invoque des raisons économiques pour rester à la maison plus longtemps. Ceci est parfois lié aussi à une question d'immaturité. On est bien à la maison. Maman et papa prennent soin de tout, c'est pratique quand même."}, {"type": "document", "q": "Question 28. Que permettent les sites internet dont parle le document ?", "c": ["D'établir un diagnostic en ligne.", "D'éviter des pertes de temps.", "De réduire les frais de santé.", "De vérifier la qualité des soins."], "a": 1, "k": "fini les longues minutes d'attente", "transcript": "Ces sites internet ont tout changé. Et pour tout le monde, oui, grâce à eux, fini les longues minutes d'attente au bout du fil sur un air de musique classique. Fini aussi les secrétariats médicaux injoignables. Désormais, il est possible de prendre rendez-vous en un clic à n'importe quelle heure du jour et de la nuit chez son dentiste, son ostéopathe et même à l'hôpital. La révolution est en marche. Tout le monde semblait y gagner."}, {"type": "document", "q": "Question 29. Que souhaite l'association dont il est question ?", "c": ["Accroître la mixité sociale dans les grandes villes.", "Décrocher des financements pour ses activités.", "Modifier le fonctionnement des marchés aux puces.", "Obtenir un statut professionnel officiel pour les biffins."], "a": 3, "k": "C'est un travail et il devrait être connu comme tel", "transcript": "Projecteurs maintenant sur la biffe. C'est un phénomène qui s'étend, surtout à Paris, poussé par la précarité. Des hommes et des femmes qui font de la récup leur métier revendent en fait tout ce qui peut l'être. Le dialogue avec les autorités n'est pas toujours simple, mais une association se mobilise pour leur permettre de poursuivre leur activité. Ce dynamisme économique est nécessaire en ville pour lutter contre la pauvreté, pour réduire les déchets, pour créer une économie circulaire populaire et pour protéger les ressources de la planète. Pour les familles démunies, c'est nécessaire d'avoir un peu d'argent en vendant sa récup. C'est un travail et il devrait être connu comme tel."}, {"type": "document", "q": "Question 30. Comment se prend l'étudiant pour réviser l'anglais ?", "c": ["Il parle toujours anglais avec ses amis anglais.", "Il bavarde régulièrement avec son voisin anglais.", "Il va souvent au café avec un groupe d'amis anglais.", "Il fait beaucoup d'exercices avec un ami anglais."], "a": 1, "k": "Le garçon qui a la chambre à côté de la mienne est anglais", "transcript": "– Dis, comment tu fais pour réviser ton anglais, toi ? Surtout l'oral. J'ai beau apprendre des centaines de mots, faire des exercices, je n'avance pas.\n– Moi, j'ai un truc. Pour l'oral, pas de livres, pas de cassettes. Le garçon qui a la chambre à côté de la mienne est anglais, alors on s'invite pour le café deux soirs par semaine et on parle moitié en anglais, moitié en français.\n– Ah mais c'est bien ça ! Et je pourrais venir aussi.\n– D'accord, mais tu viens avec une copine. À quatre, c'est plus amusant."}, {"type": "document", "q": "Question 31. Qu'est-ce qui participe à la charge mentale des salariés ?", "c": ["L'inégalité dans la répartition des tâches.", "La surabondance de sollicitations.", "Le manque de fonctionnalité des locaux.", "Les interventions des collègues."], "a": 1, "k": "dérangés par des notifications ou par des mails", "transcript": "Aujourd'hui, on parle beaucoup des effets négatifs des écrans pour les enfants. Les psychologues s'accordent à dire que les enfants qui sont trop soumis aux écrans ont des troubles de l'apprentissage, de la concentration, voire des difficultés de sommeil. En fait, pour les adultes, c'est exactement la même chose. On voit des salariés aujourd'hui qui ont du mal à se concentrer parce qu'ils sont en permanence dérangés par des notifications ou par des mails. Il y a beaucoup de salariés qui, aujourd'hui, se plaignent de cette charge mentale. Un tiers des salariés se sentent surchargés par l'information sur leur travail."}, {"type": "document", "q": "Question 32. Que propose le projet Capidou aux lycéens toulousains ?", "c": ["D'envisager des formations dans des secteurs de pointe.", "D'initier des programmes humanitaires.", "De concevoir des équipements technologiques.", "De prendre part à des expéditions scientifiques."], "a": 3, "k": "en les impliquant dans des expéditions sur le terrain", "transcript": "– Qui n'a pas rêvé de se glisser dans le sac d'un explorateur ? 18 lycéens toulousains ont la chance de réaliser ce rêve en participant au projet Capidou. L'explorateur Stéphane Leblanc a décidé de sensibiliser les jeunes aux problèmes de réchauffement climatique en les impliquant dans des expéditions sur le terrain.\n– Pour moi, c'est leur permettre de vivre une aventure extraordinaire.\n– Au total, 9 partenaires industriels spécialistes en recherche technologique soutiennent le projet.\n– Leur objectif est de tester en milieu extrême du matériel qui pourra servir lors de missions humanitaires. Les lycéens ont suivi un entraînement physique."}, {"type": "document", "q": "Question 33. Pourquoi Luc Château dessine-t-il au cours de ses voyages ?", "c": ["Pour illustrer des brochures touristiques.", "Pour s'imprégner des rencontres effectuées.", "Pour s'occuper pendant la durée des trajets.", "Pour repérer des itinéraires de promenade."], "a": 1, "k": "je veux créer des liens avec les gens", "transcript": "On voit souvent parmi les meilleures ventes de livres les carnets de voyage. Mais qui sont réellement ces auteurs, artistes voyageurs ? Écoutons l'impression de Luc Château.\n– Pendant mes séjours à l'étranger, quand je dessine, je veux créer des liens avec les gens, instaurer un dialogue avec la personne que je dessine et apprendre son mode de vie. En même temps, j'intègre des petits textes avec mes croquis. Ça ressemble un peu à un journal de bord, c'est spontané, mais il arrive que je les retravaille à mon retour. Ces parcours d'artistes inspirent aussi les voyagistes qui proposent des formules randonnée et carnet de voyage."}, {"type": "document", "q": "Question 34. Qu'est-ce qui intéresse le plus cette femme dans son métier ?", "c": ["Avoir un bon salaire en fabriquant de beaux objets.", "Exercer une activité intellectuellement enrichissante.", "Rencontrer des célébrités et travailler avec elles.", "Travailler avec ses collègues et développer ses projets."], "a": 1, "k": "J'ai vraiment la possibilité d'être dans une recherche artistique qui me motive", "transcript": "J'aime bien cet aspect du travail, du travail en équipe. C'est plus agréable qu'un travail en atelier où on est tout seul sur ses plans, un côté plus calme, plus cérébral. Là, ça bouge partout, il y a du monde partout. Souvent, on travaille la nuit. Ça a des côtés sympas, mais ça peut être franchement fatigant. Et puis, dans ce métier, les perspectives d'évolution sont diverses. On peut entrer dans une carrière type star système, où on va devenir très connu et gagner beaucoup d'argent. Moi, c'est pas trop mon cas. J'ai vraiment la possibilité d'être dans une recherche artistique qui me motive."}, {"type": "document", "q": "Question 35. D'après cette interview, qu'attend le public d'un artiste ?", "c": ["Un festival d'improvisations.", "Un récital de nouveautés.", "Une interprétation sincère.", "Une performance impeccable."], "a": 2, "k": "les gens vont le sentir", "transcript": "La scène, c'est un lieu sacré. Elle vous donne beaucoup et elle autorise beaucoup, parce que vous avez le droit, sur scène, de débuter. Vous avez le droit d'apprendre, vous avez le droit d'être maladroit, de chercher vos marques. Par contre, il y a un truc qu'elle ne pardonne pas : c'est que vous ne soyez pas toujours au meilleur de vous-même. Et les gens vont le sentir. C'est pas du blabla, ça, c'est très, très concret. On ne peut pas faire ce métier d'artiste par devoir, on ne peut pas se laisser installer la routine. Moi, je me suis toujours battu contre ça, parce que j'ai toujours le même plaisir de chanter sur scène."}, {"type": "document", "q": "Question 36. Quelle est la particularité de l'œuvre présentée ?", "c": ["Des partitions musicales ponctuent les chapitres.", "Elle réunit des textes de musiciens sur le thème de la peur.", "L'éditeur a choisi d'accompagner le livre d'un DVD.", "Sa mise en page est comparable à celle du livret d'un disque."], "a": 3, "k": "cette présentation-là qu'on trouve dans les jaquettes des CD", "transcript": "Et on est rendu à notre chronique littéraire avec Audrey Manet. Tout d'abord, Daniel Bélanger, un musicien, guitariste aguerri. Mais Daniel Bélanger, c'est d'abord un compositeur, c'est l'auteur de ses chansons. Et c'est ce pan de son travail qu'on retrouve ici. On a d'ailleurs cette présentation-là qu'on trouve dans les jaquettes des CD, vous savez, le texte qui est centré au milieu de la page. On a des renvois à la ligne à chaque strophe. Ici, c'est la même chose. On connaît cette maison d'édition pour ses parutions souvent étrangères, aussi poétiques. Mais les Allusifs sortent une nouvelle collection de petits livres qu'ils appellent Les Peurs, avec comme adage : un auteur, une peur, un livre."}, {"type": "document", "q": "Question 37. Que permet la musique de chambre selon Renaud Capuçon ?", "c": ["D'affiner l'écoute entre musiciens.", "D'exprimer l'originalité d'une interprétation.", "De faire varier le répertoire des concerts.", "De perfectionner la technique du violoniste."], "a": 0, "k": "parvenir à une symbiose", "transcript": "– Renaud Capuçon, ce que je me demande, c'est comment vous, en tant que violoniste, vous arrivez à vous accorder si bien avec les autres instruments.\n– C'est le grand bonheur de la musique de chambre. Et c'est justement ce plaisir d'essayer, non pas de tirer la couverture à soi ou de jouer solo, mais de parvenir à une symbiose. Je trouve que cela remet vraiment les pendules à l'heure. Parfois, on joue peu avec un orchestre, ou bien on passe d'un orchestre à un autre. Au contraire, la musique de chambre permet d'aller au fond des choses. On ne peut pas tricher sur scène. Le dialogue est absolument sans limite."}, {"type": "document", "q": "Question 38. Quel jugement cette personne porte-t-elle sur les lieux culturels ?", "c": ["Elle déplore le manque de structures pour accueillir et réunir les jeunes.", "Elle désapprouve la disparition d'endroits consacrés aux pratiques culturelles.", "Elle estime insuffisantes les tentatives des cinémas de mélanger les publics.", "Elle regrette le désintérêt des publics pour les espaces et les échanges culturels."], "a": 0, "k": "Je regrette qu'il n'y ait pas plus de lieux", "transcript": "On voit vraiment que les pratiques culturelles sont suivies. Malheureusement, aujourd'hui, même au niveau de la jeunesse, qui pourrait être fédérée par le phénomène générationnel, les pratiques culturelles sont très séparées. Je regrette qu'il n'y ait pas plus de lieux qui permettent aux jeunes de se retrouver sur des terrains festifs. C'est vrai que ce sont des moments de se retrouver, de vivre ensemble, mais sans être dans une posture d'affrontement. Cela manque. Il y a des salles de cinéma, même dans les multiplexes. On voit que selon les films, les publics ne sont pas les mêmes."}, {"type": "document", "q": "Question 39. D'après cet extrait, quelle est l'origine du mouvement de transition ?", "c": ["Un désir de changement face à l'immobilisme des élus.", "Un questionnement des pratiques du secteur industriel.", "Une convention écologique internationale.", "Une volonté d'aider les citoyens démunis."], "a": 0, "k": "une réponse au manque d'imagination des élus", "transcript": "– En 2015, le film « Demain » de Cyril Dion et Mélanie Laurent propulsait l'idée de transition auprès du grand public. Et aujourd'hui, où en est le mouvement ?\n– Ça marche bien. Il existe dans plus de 50 pays, avec des milliers de communautés qui ont imaginé des initiatives qui vont de l'autosuffisance alimentaire au principe de tirage au sort des citoyens pour prendre des décisions. Ce mouvement se veut une réponse au manque d'imagination des élus. Rob Hopkins déplore d'ailleurs que les pouvoirs publics ne soutiennent pas cet activisme local comme ils soutiennent les grands groupes industriels. Il souhaite maintenant créer un bureau de l'imagination citoyenne et même une loi sur l'imagination nationale."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 3/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test34_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 3</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 3 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}

      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}

      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${document.querySelector('.header img').src}" alt="MLI">
      <div><h1>Compréhension orale – Test 3</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
