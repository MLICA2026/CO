<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 29 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

 train pour Londres a une heure de retard. Pourquoi ? C'est encore des cheminots qui ne sont pas contents ?\n— Non, pas cette fois. Mais malheureusement, je n'en sais pas plus que vous.\n— Alors là, c'est un comble ! Pour une fois que ce n'est pas un arrêt de travail, il n'y a personne qui puisse nous renseigner !\n— Ben... non. C'est peut-être une panne. Je ne sais pas non plus. Il faut attendre et continuer à consulter le panneau, c'est tout."}, {"type": "document", "q": "Qu'apprécie Pascale dans son métier ?", "c": ["La répartition des horaires", "Le contact avec les élèves", "Les activités pédagogiques", "L'organisation des leçons"], "a": 1, "k": "les relations avec les enseignants et les enfants", "transcript": "— Je m'appelle Pascale. Ça fait 4 ans que je travaille dans une école maternelle. Je suis chargée d'aider les enseignants dans la classe. Alors, le plus dans le métier pour moi, c'est les relations avec les enseignants et les enfants. Ça, on a vraiment beaucoup de chance à ce niveau-là, surtout avec les enfants. Les côtés négatifs du métier... hmm... je dirais, peut-être les journées un peu longues dans le bruit, parce que les enfants sont quand même en général bruyants."}, {"type": "document", "q": "Où sera Sophia à 19 heures ?", "c": ["Au bureau", "Au cinéma", "Au restaurant", "Au théâtre"], "a": 2, "k": "Ils ont réservé une table pour 19 heures", "transcript": "— Et Sophia, qu'est-ce qu'elle devient ?\n— Non, elle ne pourra pas venir avec nous au cinéma. Elle m'a demandé de vous prévenir.\n— Et pourquoi ?\n— Elle a une sortie avec ses collègues. Ils ont réservé une table pour 19 heures.\n— C'est dommage. Peut-être qu'elle pourra nous rejoindre plus tard."}, {"type": "document", "q": "Quel est le sujet du livre ?", "c": ["La découverte des palais de l'empereur", "L'élargissement de Paris à ses environs", "Les lieux qui ont changé sous Napoléon", "Les traces des batailles napoléoniennes"], "a": 2, "k": "les transformations les plus remarquables voulues par Napoléon", "transcript": "Avis aux auditeurs, voici une idée de lecture originale. Les éditions Parigramme ont publié un ouvrage intitulé Paris et ses alentours au temps de Napoléon. Histoire de nous faire découvrir les lieux qui ont compté au cours de cette période, mais aussi les principaux travaux, les constructions les plus emblématiques et les transformations les plus remarquables voulues par Napoléon. Car quand il n'est pas à la guerre, il nourrit de grands desseins pour la capitale : l'Arc de Triomphe, la colonne Vendôme..."}, {"type": "document", "q": "Pourquoi cet homme appelle-t-il ?", "c": ["Il veut obtenir des renseignements", "Il cherche à joindre la directrice", "Il désire visiter les locaux disponibles", "Il souhaite participer à un congrès"], "a": 0, "k": "Quels sont vos tarifs et les services proposés ?", "transcript": "— Centre d'affaires de la Cité, bonjour.\n— Bonjour madame. Je voudrais louer une salle de conférence. Quels sont vos tarifs et les services proposés ?\n— C'est ma collègue, madame Martino, qui s'occupe de la réservation des salles. Je vous la passe, ne quittez pas.\n— Merci madame. Au revoir."}, {"type": "document", "q": "Que font ces personnes ?", "c": ["Elles ont assisté à un concert", "Elles ont lu le même livre", "Elles ont rencontré une célébrité", "Elles ont vu un film au cinéma"], "a": 3, "k": "j'ai trouvé le scénario original", "transcript": "— Alors, ça t'a plu ?\n— Oui, j'ai trouvé le scénario original et la fin surprenante. Mais je ne suis pas très fan de l'acteur principal. Je trouve qu'ils auraient pu choisir quelqu'un d'autre pour ce rôle. Et la musique était insupportable."}, {"type": "document", "q": "Quel est le but du Collège de la Cité des sciences et de l'industrie ?", "c": ["Délivrer des diplômes à ceux qui suivent ses cours", "Elargir les connaissances scientifiques des participants", "Faire progresser la recherche scientifique en France", "Recueillir des fonds pour les laboratoires français"], "a": 1, "k": "permettre à chacun d'acquérir des connaissances fondamentales", "transcript": "Les avancées des sciences et des techniques soulèvent des questions qui touchent à la vie de chacun et font débat. Le progrès n'est plus une évidence. Les citoyens veulent comprendre ce que la recherche rend possible. Le Collège de la Cité des sciences et de l'industrie organise, tout au long de l'année, des cycles de conférences et de débats où des chercheurs viennent à la rencontre du public. L'ambition est de permettre à chacun d'acquérir des connaissances fondamentales, de s'informer des développements récents, de se former une opinion éclairée, pour que la science devienne une composante de la culture."}, {"type": "document", "q": "Qu'exprime le jeune homme ?", "c": ["De l'enthousiasme", "De l'étonnement", "De l'admiration", "De l'intérêt"], "a": 1, "k": "Ça alors ! Je ne peux pas le croire.", "transcript": "— Mathieu, je vous félicite. Vous avez fait un très bon travail de recherche.\n— C'est vrai ? Je ne pensais pas avoir réussi. J'ai mis beaucoup de temps. Ça n'a pas été facile.\n— En tout cas, c'est une excellente copie. Vous avez la meilleure note du groupe.\n— Ça alors ! Je ne peux pas le croire."}, {"type": "document", "q": "Qu'est-ce qui inquiète cette mère de famille ?", "c": ["La fréquence des compétitions sportives", "Le contenu des programmes sportifs", "Les contraintes liées aux pratiques sportives", "L'insuffisance des résultats sportifs"], "a": 2, "k": "on fait plusieurs faux pas à l'hygiène de vie parfois pour réussir à rencontrer les horaires", "transcript": "— Est-ce que c'est toujours compatible, ça, d'avoir beaucoup d'heures de sport comme ça et de pouvoir concilier les études aussi ?\n— Non, spontanément, c'est pas toujours compatible et puis c'est un grand paradoxe qui s'installe dans ce jeu, parce qu'on fait faire du sport à nos enfants pour développer des valeurs... des valeurs de rigueur, de saines habitudes de vie, de qualité de vie. Et puis on se retrouve à devoir composer avec des habitudes qui ne sont pas très très de grande qualité. Alors, on va faire manger les enfants dans la voiture en s'en allant à l'aréna, on va faire des devoirs deux ou trois fois plus parce que on sait que tel ou tel jour on n'aura pas le temps de les faire. Donc, on fait plusieurs faux pas à l'hygiène de vie parfois pour réussir à rencontrer les horaires."}, {"type": "document", "q": "Pourquoi madame Lefebvre a-t-elle appelé monsieur Noguet ?", "c": ["Pour lui annoncer le rejet de sa proposition", "Pour lui confirmer un rendez-vous de travail", "Pour lui demander des documents supplémentaires", "Pour lui fixer un entretien d'embauche"], "a": 3, "k": "nous aimerions vous rencontrer dans les prochains jours", "transcript": "Bonjour monsieur Noguet. Madame Lefebvre, de la direction des ressources humaines de la société AG Pro. Je vous appelle au sujet de votre candidature pour le poste de graphiste. Votre CV a été présélectionné par la directrice des ressources humaines. Si ce poste vous intéresse toujours, nous aimerions vous rencontrer dans les prochains jours. Merci de me rappeler au 01 25 38 67 54. Au revoir."}, {"type": "document", "q": "Qu'apprend-on sur le camping ?", "c": ["Il intéresse très peu les vacanciers", "Il offre des services de qualité supérieure", "Il permet le développement des campagnes", "Il souffre d'une augmentation des tarifs"], "a": 1, "k": "des terrains 5 étoiles qui proposent même des restaurants gastronomiques", "transcript": "Les Français sont de plus en plus nombreux à rechercher les loisirs de plein air. Et le camping n'est plus seulement choisi pour de simples raisons économiques, puisqu'on trouve des terrains 5 étoiles qui proposent même des restaurants gastronomiques et des salles de bain privées. Le mot camping commence d'ailleurs à laisser la place à « hôtellerie de plein air »."}, {"type": "document", "q": "Qu'est-ce que la fille achète ?", "c": ["Une paire de boucles d'oreille", "Une paire de chaussures", "Une paire de lunettes", "Une paire de skis"], "a": 2, "k": "j'aime bien la forme des branches", "transcript": "— Et celles-là, qu'est-ce que t'en penses ?\n— Ouais, pas mal. J'aime bien la forme des branches. Tourne un peu pour voir... Ça sera parfait pour la montagne.\n— Bon, j'essaie encore ces trois paires et je me décide.\n— Moi, je préfère celles-là. Elles vont très bien avec la couleur de tes cheveux et elles sont très élégantes.\n— Bon, ben allez, d'accord, je vais les prendre."}, {"type": "document", "q": "Quels sont les critères de recrutement des professeurs de l'Inalco ?", "c": ["Avoir effectué de nombreux séjours à l'étranger", "Avoir été eux-mêmes formés à l'école Colbert", "Avoir obtenu la nationalité française", "Avoir vécu dans le pays de la langue qu'ils enseignent"], "a": 3, "k": "des Français qui ont vécu dans ce pays", "transcript": "L'Institut des langues et civilisations orientales, c'est-à-dire l'Inalco, a été fondé par Colbert au XVIIe siècle à Istanbul. Aujourd'hui encore, même si l'école est à Paris, les professeurs sont soit des autochtones originaires du pays dont ils enseignent la langue, soit des Français qui ont vécu dans ce pays. Les professeurs étrangers ont souvent acquis la nationalité française par la suite. Ils sont tous des spécialistes de leur domaine, linguistique ou culturel, et un certain nombre d'entre eux ont fait leurs études à l'Institut."}, {"type": "document", "q": "De quoi s'étonne le jeune homme ?", "c": ["Des différences entre la taxe locative et la taxe foncière", "Du délai accordé pour le paiement des taxes", "Du mode de calcul de la taxe locative", "Du système français de taxe d'habitation"], "a": 3, "k": "Quoi ? Il faut que je paye le loyer et cette facture locale ? Mais dans mon pays, ça n'existe pas, ça.", "transcript": "— Bonjour madame. J'habite en France depuis 6 mois seulement dans un studio. J'ai reçu une feuille d'impôt bizarre à payer avant le 15 octobre prochain. Pourquoi ?\n— Oui, c'est normal. Il y a le loyer et, une fois par ans, il y a les impôts locaux. Ils sont basés sur la superficie de votre studio et sur le lieu de résidence.\n— Quoi ? Il faut que je paye le loyer et cette facture locale ? Mais dans mon pays, ça n'existe pas, ça.\n— Désolée, mais chaque pays a ses lois. Si vous étiez propriétaire, vous payeriez aussi la taxe foncière, mais pas de loyer, bien sûr."}, {"type": "document", "q": "Que propose la guide aux touristes ?", "c": ["Un tour de la capitale en bus découvert", "Un parcours à pied le long des quais", "Une visite guidée du musée du Louvre", "Une croisière-promenade sur la Seine"], "a": 3, "k": "bienvenue sur le bateau de la société Safrane", "transcript": "Mesdames, messieurs, bienvenue sur le bateau de la société Safrane au service de notre clientèle ukrainienne. Nous allons découvrir ensemble Paris au gré de la Seine. Voici votre programme : de 10h à 12h, nous allons longer les quais et passer sous de nombreux ponts. Nous nous arrêterons devant Notre-Dame de Paris, le musée du Louvre et d'Orsay. Enfin, nous arriverons au Trocadéro. Pour vous remettre de toutes ces émotions, un déjeuner est prévu ici même à 12h30. Un bus viendra vous reprendre à 13h30 pour vous conduire à votre hôtel. Passez un très agréable moment en notre compagnie."}, {"type": "document", "q": "Quelle information le chef de train donne-t-il aux voyageurs ?", "c": ["Ils devront demander le remboursement de leur billet par écrit", "Ils devront descendre en gare de Valence suite à une panne", "Ils devront patienter à leur place jusqu'à l'arrêt complet du train", "Ils devront présenter leur billet à leur descente du train"], "a": 0, "k": "un document à remplir et à retourner à l'adresse indiquée", "transcript": "Mesdames, messieurs, suite à un incident technique, notre train arrive en gare de Valence TGV avec un retard de 45 minutes. Nous invitons tous les voyageurs qui descendent à se rapprocher du personnel de gare. Il vous remettra une enveloppe et un document à remplir et à retourner à l'adresse indiquée pour que la SNCF puisse vous virer la somme correspondant au prix de votre billet de train, à titre de dédommagement. Nous vous prions de bien vouloir nous excuser pour la gêne occasionnée. Assurez-vous de n'avoir rien oublié à vos places. Bonne fin de journée."}, {"type": "document", "q": "Quelle hypothèse expliquerait les meilleurs résultats des garçons en mathématiques ?", "c": ["Ils bénéficient d'enseignements adaptés", "Ils se consacrent peu aux matières littéraires", "Ils sont dotés d'un esprit plus scientifique", "Ils sont encouragés lors de leur apprentissage"], "a": 3, "k": "les enseignants interrogent un petit peu moins les filles que les garçons", "transcript": "— L'idée reçue selon laquelle les filles sont moins douées pour les mathématiques que les garçons est tellement ancrée dans la tête des filles ou des femmes qu'elle vient perturber les résultats des tests, et du coup, elle auto-entretient cette idée reçue.\n— Alors, as-tu une idée, Daniel, de ce qui alimente cette idée reçue dans notre société ?\n— Alors, c'est vraiment insidieux. On peut entretenir ce stéréotype sans même s'en rendre compte. Par exemple, les enseignants en mathématiques eux-mêmes, en tout cas certains d'entre eux, pourraient avoir leur part de responsabilité. Des chercheurs ont mené des études dans des classes, ils ont observé que, dans cette discipline, statistiquement, les enseignants interrogent un petit peu moins les filles que les garçons, et que lorsque les filles prennent la parole, ils les incitent un peu moins à parler, et à parler un peu moins longtemps."}, {"type": "document", "q": "À quoi sera confrontée la famille dans le futur ?", "c": ["A la baisse de l'intérêt manifesté pour le mariage", "A la difficulté de retrouver dans un même lieu", "A l'augmentation des tarifs des transports aériens", "Aux problèmes relationnels rencontrés par les enfants"], "a": 1, "k": "La possibilité de se réunir devrait être diminuée par le coût des transports", "transcript": "Si on en croit ce que disent certains sociologues, je crois qu'on peut oublier les dimanches en famille l'hiver au coin du feu. Dans 10 ans, les parents auront de grandes chances de se rencontrer à l'étranger. Du coup, les enfants auront des grands-parents de pays différents, ils voyageront plus souvent, plus jeunes. Et tout ça est le résultat d'une plus grande mobilité dans le monde du travail. La possibilité de se réunir devrait être diminuée par le coût des transports. Alors, les familles auront sûrement un réseau internet très développé, mais d'une certaine manière, ça va les éloigner. On peut imaginer qu'il y aura une tension entre la valorisation de la famille en tant que groupe et le désir de s'investir dans son travail."}, {"type": "document", "q": "Quelle mesure a pris l'État dans les années 80 ?", "c": ["Il a accepté les articles de presse dans les livres scolaires", "Il a créé un journal quotidien dédié à l'éducation publique", "Il a distribué des journaux aux établissements scolaires", "Il a intégré l'étude de la presse à ses programmes"], "a": 3, "k": "le ministère de l'Éducation nationale ne se décide à administrer l'enseignement de la presse à l'école", "transcript": "Les articles de journaux, en tant qu'objets d'études dans les manuels scolaires, existent depuis le XIXe siècle. En revanche, l'actualité des journaux est restée très longtemps interdite d'entrer dans les écoles. Ce n'est qu'en 1957 que le gouvernement a offert aux journaux quotidiens le droit de pénétrer tels quels dans les établissements scolaires. Ainsi, l'idée que la presse et l'école avaient quelque chose à faire ensemble, que la presse pouvait constituer un objet pédagogique, faisait son chemin. Il a fallu attendre 1983 pour que le ministère de l'Éducation nationale ne se décide à administrer l'enseignement de la presse à l'école. C'est la création du CLEMI, le Centre pour l'éducation aux médias et à l'information."}, {"type": "document", "q": "Qu'explique la créatrice Agnès b. ?", "c": ["Elle cherche à privilégier le travail avec des entreprises françaises", "Elle organise régulièrement des réunions avec ses couturiers", "Elle s'apprête à signer un nouveau contrat avec un atelier de dentellerie", "Elle souhaite modifier ses commandes avec les usines partenaires"], "a": 0, "k": "on continue à fabriquer en France", "transcript": "— Est-ce que la marque Agnès b. que nous connaissons tous est tellement encore fabriquée dans notre pays ? Et dans quelle proportion ?\n— Oui, on continue à fabriquer en France, et on a commencé ça il y a très longtemps. Je le continue autant que je peux. On en est à entre 40 et 50 % de fabriqué en France, avec les usines avec lesquelles on travaille depuis très longtemps. On travaille ensemble, on leur donne des facultés à l'avance, enfin on travaille de façon très très proche.\n— Est-ce que vous avez vu disparaître vos prestataires, en fait, de sous-traitants ?\n— On a vu disparaître tellement de choses et puis...\n— Dans quelle proportion ?\n— C'est terrible. Tous les trois jours, on entend que quelque chose a fermé, quelqu'un qui fait de la dentelle, des boutons, des ateliers..."}, {"type": "document", "q": "Quelle est l'accusation portée contre l'industrie pharmaceutique ?", "c": ["Elle commercialise des produits dangereux pour la santé", "Elle crée des besoins pour réutiliser de vieux remèdes", "Elle fait des profits grâce à la vente de traitements périmés", "Elle limite la recherche consacrée aux pathologies rares"], "a": 1, "k": "elle invente des maladies pour recycler les molécules antérieures", "transcript": "— Le zoom de France Info consacré ce matin aux dérives de l'industrie pharmaceutique ou comment inventer de nouvelles maladies pour recycler d'anciennes molécules. Le mal de dos est devenu une spondylarthrite ankylosante, une période de tristesse cache forcément une dépression... Aujourd'hui, on a l'impression, Philippe Éven, que tout est maladie.\n— Oui, ça c'est maintenant 15 ans que ça dure. Vous savez, quand une industrie comme celle-là, qui a beaucoup rapporté, ne trouve plus de médicaments, alors elle invente des maladies pour recycler les molécules antérieures et trouver de nouveaux créneaux d'exploitation. Ce que vous venez de raconter est absolument scandaleux. Un, la spondylarthrite ankylosante est une maladie exceptionnelle. Mais deuxièmement, malheureusement, on n'a aucun moyen de la guérir."}, {"type": "document", "q": "Quelle est la position de cette syndicaliste sur les audits au travail ?", "c": ["Elle critique la fiabilité des méthodes d'investigation utilisées", "Elle déplore leur manque d'impact au sein des entreprises", "Elle doute de la qualité de l'interprétation des données collectées", "Elle met en question la représentativité des échantillons"], "a": 0, "k": "On sait ce que c'est le sondage, la façon dont on oriente les questions", "transcript": "Ce sont les entreprises elles-mêmes qui payent la société « Une boîte à vivre » pour être auditées, et à chaque fois, entre 200 et 800 salariés sont consultés. Réaction de Marie-Alice Medeuf-Andrieu, responsable du dialogue social au sein du syndicat Force Ouvrière.\n— Quand une entreprise force ses salariés à être interrogés par une structure extérieure, forcément, vous allez vanter les qualités de votre entreprise, et vous allez répondre favorablement. Les problèmes internes de l'entreprise ne seront pas du tout dévoilés. On sait ce que c'est le sondage, la façon dont on oriente les questions. Et qui plus est, il s'agit aussi d'une procédure qui consiste à permettre à l'entreprise d'améliorer son image à l'extérieur. Donc, forcément, la réalité est biaisée."}, {"type": "document", "q": "Qu'explique ce voyagiste sur sa façon de travailler ?", "c": ["Il privilégie des partenaires impliqués dans la vie de leur région", "Il favorise des hôtels qui répondent aux exigences occidentales", "Il préfère les conseils des populations autochtones à ceux des fournisseurs", "Il propose des prestations qui contribuent au développement humanitaire"], "a": 0, "k": "afin que les retombées locales soient plus fortes", "transcript": "— Le choix de ce prestataire revient à un voyageur responsable. C'est eux qui embauchent les gens localement, qui vont faire des repérages, qui choisissent les hôtels avec lesquels ils travaillent et réservent directement auprès des locaux. En général, afin que les retombées locales soient plus fortes, ils vont favoriser le développement de l'économie locale.\n— Comment est-ce que vous sélectionnez les agences ?\n— On va voir déjà toutes les agences locales qui existent dans le pays. On a un certain nombre de critères sur la francophonie, sur la qualité des échanges, sur l'expertise des agents et sur leur activité responsable. Une agence en Tanzanie, par exemple, qui a monté un orphelinat, une agence au Népal qui reforeste une partie de l'Everest... Beaucoup d'agences essaient de développer très fortement leur spécificité locale."}, {"type": "document", "q": "Sur quoi s'appuie la recommandation de Thomas Lepeltier ?", "c": ["Sur des considérations morales", "Sur des convictions écologiques", "Sur des certitudes économiques", "Sur des prescriptions diététiques"], "a": 0, "k": "c'est une question d'éthique animale", "transcript": "— Dans mon article de presse pour commencer, vous signez donc pour le magazine Sciences Humaines un article qui s'intitule « Faut-il encore manger de la viande ? » et vous écrivez qu'il est nécessaire de diminuer fortement notre consommation sans pour autant devenir végétarien. C'est la condition animale qui vous intéresse principalement sur cette question ?\n— Oui, c'est une question d'éthique animale. Moi, je pense qu'il y a une grande évolution de la société. La notion de cruauté envers les animaux a de plus en plus de mal à être acceptée. Or, on a assisté depuis les cinquante dernières années à une mise en place d'une industrie de la viande qui fait terriblement souffrir les animaux."}, {"type": "document", "q": "Sur quel point l'homme et la femme sont-ils d'accord ?", "c": ["La situation de l'emploi ne s'améliore pas cette année en France", "La France n'est pas le pays européen le plus frappé par le chômage", "Le chômage a reculé pour tous, sans distinction d'âge ou de sexe", "L'action engagée par le gouvernement permettra une amélioration"], "a": 1, "k": "Oui, c'est vrai. C'est bien pire ailleurs chez certains de nos voisins.", "transcript": "— J'ai entendu à la radio que le chômage avait reculé en février selon le ministère du Travail.\n— Ce n'est pas l'analyse du Bureau international du travail, pour qui le taux de chômage en France n'a pas varié le mois dernier.\n— Je t'assure que, comparé avec les pays voisins, le chômage a baissé en France pour tout le monde : hommes, femmes, jeunes...\n— Oui, c'est vrai. C'est bien pire ailleurs chez certains de nos voisins. Ce qui est préoccupant, c'est que la situation s'aggrave davantage pour les femmes et les jeunes.\n— Sur l'année, ça devrait s'arranger. Le gouvernement a fait de l'action pour l'emploi sa priorité.\n— Des promesses ! Pour les 12 derniers mois, le nombre de demandeurs d'emploi a augmenté de plus de 3 %."}, {"type": "document", "q": "D'après les chercheurs dont parle le journaliste, qu'est-ce qui est bénéfique pour la santé ?", "c": ["Pratiquer des exercices mentaux", "Exprimer ses sentiments", "Se montrer chaleureux", "Se retirer régulièrement au calme"], "a": 2, "k": "plus nous manifestons d'amabilité, et plus nous sécrétons de sérotonine", "transcript": "D'après les chercheurs, plus nous manifestons d'amabilité, et plus nous sécrétons de sérotonine, l'hormone de la bonne humeur. De plus, l'altruisme aurait des effets positifs sur le cerveau en activant des connexions qui sont moins vivaces quand la compassion est absente. Les pensées hostiles ou agressives augmentent le rythme cardiaque et la pression artérielle, alors que la gentillesse abaisse le niveau de stress et apaise la tension. On a vu des gens mourir de méchanceté. L'agressivité pratiquée au quotidien augmente les risques cardiaques et conduit à une solitude qui aggrave tous les problèmes."}]

  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 29/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test40_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 29</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 29 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 29</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
</html>
