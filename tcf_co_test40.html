<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 40 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

  {"type":"extrait","q":"Choisissez la bonne réponse.","prompt":"Comment allez-vous à votre travail ?","c":["À l'heure","À Paris","À pied","À 8 heures"],"a":2,"k":"À pied","transcript":"— Comment allez-vous à votre travail ?\nRéponse : C. À pied"},
  {"type":"extrait","q":"Choisissez la bonne réponse.","prompt":"Je ne sais pas utiliser la photocopieuse. Tu peux m'aider ?","c":["Attends, je vais y aller.","Laisse, je vais la réparer.","Regarde, je vais te montrer.","Tiens, je vais lui demander."],"a":2,"k":"je vais te montrer","transcript":"— Je ne sais pas utiliser la photocopieuse. Tu peux m'aider ?\nRéponse : C. Regarde, je vais te montrer."},
  {"type":"extrait","q":"Choisissez la bonne réponse.","prompt":"Cette année, c'est décidé. Nous allons faire du ski pendant les vacances de Noël. Tu nous accompagnes ?","c":["Avec plaisir. Je suis libre demain.","Bonne idée. J'adore la neige.","D'accord. Je pars tout seul.","Super, je connais bien cette ville."],"a":1,"k":"J'adore la neige","transcript":"— Cette année, c'est décidé. Nous allons faire du ski pendant les vacances de Noël. Tu nous accompagnes ?\nRéponse : B. Bonne idée. J'adore la neige."},
  {"type":"extrait","q":"Choisissez la bonne réponse.","prompt":"Salut Sylvie, ça va ? T'as l'air fatiguée. Quand est-ce que tu pars en vacances ?","c":["J'ai mon vol mardi prochain.","Je reste cinq jours sur place.","Je vais visiter l'Italie.","Je voyage avec mes collègues."],"a":0,"k":"mon vol mardi prochain","transcript":"— Salut Sylvie, ça va ? T'as l'air fatiguée. Quand est-ce que tu pars en vacances ?\nRéponse : A. J'ai mon vol mardi prochain."},
  {"type":"extrait","q":"Choisissez la bonne réponse.","prompt":"Qui a écrit ce roman policier ?","c":["C'est un jeune auteur.","Il est en solde aujourd'hui.","Je le trouve intéressant.","Ma sœur me l'a offert."],"a":0,"k":"C'est un jeune auteur","transcript":"— Qui a écrit ce roman policier ?\nRéponse : A. C'est un jeune auteur."},
  {"type":"extrait","q":"Choisissez la bonne réponse.","prompt":"Pour le souper de ce soir avec tes parents, qu'est-ce que tu penses d'un poulet aux champignons ?","c":["Ce sera parfait avec du riz.","Ils sont contents de venir.","Je m'occupe du dessert.","On peut manger au salon."],"a":0,"k":"parfait avec du riz","transcript":"— Pour le souper de ce soir avec tes parents, qu'est-ce que tu penses d'un poulet aux champignons ?\nRéponse : A. Ce sera parfait avec du riz."},
  {"type":"document","q":"Que veut faire cette femme ?","c":["Acheter des médicaments.","Envoyer une lettre.","Prendre un transport.","Voir un film."],"a":1,"k":"poster ce courrier","transcript":"— Bonjour, monsieur. Je cherche une boîte pour poster ce courrier.\n— Ah, allez à la poste. C'est à gauche, juste après le cinéma. Ou alors, il y en a une de l'autre côté, près du métro, en face de la pharmacie.\n— Ah, parfait. Merci."},
  {"type":"document","q":"De quoi Laura a-t-elle peur ?","c":["D'arriver en retard.","D'avoir une mauvaise note.","De manquer de temps.","De tomber malade."],"a":1,"k":"je n'ai pas réussi mon examen","transcript":"— Salut Laura. Tu fais une drôle de tête. Tu ne te sens pas bien ?\n— Non. Je pense que je n'ai pas réussi mon examen d'histoire. Je n'ai pas pu réviser. Samedi, je suis allée au cinéma et dimanche, j'ai joué au tennis.\n— Tu pouvais travailler le soir.\n— Mais j'étais beaucoup trop fatiguée."},
  {"type":"document","q":"Qu'est-ce qui est difficile pour Léo ?","c":["La communication avec ses clients.","La recherche d'un nouveau travail.","L'achat d'un nouveau téléphone fixe.","L'utilisation de son ordinateur portable."],"a":0,"k":"Je ne peux pas travailler et contacter mes clients","transcript":"— Léo, comment ça va depuis que tu es dans ta nouvelle maison ?\n— Ça va, ça va, mais je n'ai pas encore Internet. Je viens de m'acheter un ordinateur tout neuf, mais sans Internet. Je ne peux pas travailler et contacter mes clients.\n— Je comprends. Tu as vu quelqu'un pour arranger ça ?"},
  {"type":"document","q":"De quoi parlent ces deux personnes ?","c":["De cinéma.","De lecture.","De musique.","De théâtre."],"a":0,"k":"aller voir Liberté","transcript":"— Ça te dirait d'aller voir Liberté ce soir ? La séance est à 20h.\n— D'accord, mais pas à 20h. C'est l'heure où je quitte le travail.\n— Allons voir Séraphine alors. Il passe à 21h.\n— Je l'ai déjà vue.\n— Et pourquoi pas l'Arbre ? Il n'est pas encore sorti."},
  {"type":"document","q":"Pourquoi M. Didier appelle-t-il ?","c":["Pour annuler un achat.","Pour modifier une commande.","Pour réclamer un paquet.","Pour retourner un colis."],"a":1,"k":"j'aimerais ajouter deux ordinateurs supplémentaires","transcript":"— Allô, bonjour, M. Didier à l'appareil. Je téléphone au sujet de la livraison des articles dont la référence est 433JS. S'il n'est pas trop tard, j'aimerais ajouter deux ordinateurs supplémentaires.\n— Il n'y a aucun problème, ce sera fait."},
  {"type":"document","q":"Qu'apprennent les élèves de cette classe ?","c":["L'annulation d'un cours.","Le retard d'un professeur.","Les horaires d'un examen.","Un changement de salle."],"a":0,"k":"ne viendra pas aujourd'hui","transcript":"Bonjour. Votre professeur de mathématiques a téléphoné. Il a un problème personnel et ne viendra pas aujourd'hui. Il sera là pour votre prochain cours vendredi après-midi de 14h30 à 17h30. Je reste avec vous dans la salle jusqu'à 10h. Faites ce que vous voulez, mais en silence."},
  {"type":"document","q":"Pourquoi Anne-Marie se trouve-t-elle en Auvergne ?","c":["Elle passe ses congés dans la région.","Elle réside là depuis son enfance.","Elle travaille dans le tourisme local.","Elle vient participer à un concours."],"a":0,"k":"nous venons très souvent","transcript":"— Bonjour Anne-Marie. Vous êtes de Limoges mais vous êtes en vacances ici en Auvergne.\n— Absolument. Ça vous arrive souvent ?\n— Oh oui, nous aimons beaucoup la région, nous venons très souvent. On loue un gîte rural, c'est très intéressant parce qu'on connaît des gens qui nous aident à découvrir des choses qu'on ne connaîtrait pas autrement."},
  {"type":"document","q":"Qu'apprécie Pascale dans son métier ?","c":["La répartition des horaires.","Le contact avec les élèves.","Les activités pédagogiques.","L'organisation des leçons."],"a":1,"k":"les relations avec les enseignants et les enfants","transcript":"Je m'appelle Pascale. Ça fait quatre ans que je travaille dans une école maternelle. Je suis chargée d'aider les enseignants dans la classe. Le plus dans le métier pour moi, c'est les relations avec les enseignants et les enfants. Ça, on a vraiment beaucoup de chance à ce niveau-là, surtout avec les enfants. Les côtés négatifs du métier, je dirais peut-être les journées un peu longues, dans le bruit."},
  {"type":"document","q":"Quel est l'objet de cet appel ?","c":["Confirmer la date d'un entretien d'embauche.","Se renseigner sur les conditions de travail.","S'informer sur une formation professionnelle.","Vérifier si un courrier est bien arrivé."],"a":3,"k":"s'il a bien reçu ma candidature","transcript":"— Allô ? Pourrais-je parler au directeur des ressources humaines ?\n— Le directeur est actuellement en réunion.\n— Je souhaite savoir s'il a bien reçu ma candidature pour le poste d'ingénieur. Je lui ai envoyé mon CV et ma lettre de motivation il y a deux semaines et je n'ai pas reçu de réponse.\n— Donnez-moi votre nom, s'il vous plaît, et je lui dirai de vous recontacter."},
  {"type":"document","q":"Qu'est-ce qui déplaît à la jeune femme dans les achats en ligne ?","c":["Le prix élevé des produits.","Les délais pour être livrée.","Les difficultés en cas d'échange.","Les tailles de vêtements différentes."],"a":2,"k":"J'ai réussi à le rendre, mais c'était compliqué","transcript":"— Est-ce que tu achètes des vêtements sur Internet ?\n— Oui, souvent. Les prix sont vraiment intéressants.\n— Moi, j'ai eu une mauvaise expérience. J'ai commandé un pantalon, mais ils m'ont envoyé un modèle différent. J'ai réussi à le rendre, mais c'était compliqué. Finalement, je préfère les boutiques."},
  {"type":"document","q":"Que constate cet employé ?","c":["Les conditions de recrutement sont plus difficiles aujourd'hui.","Les étudiants ignorent le fonctionnement de l'entreprise.","Les jeunes étaient préparés plus sérieusement dans le passé.","Les patrons actuels ont un degré d'exigence trop élevé."],"a":0,"k":"on n'embauche plus si facilement","transcript":"Oh, j'ai commencé dans l'entreprise il y a 30 ans, à l'époque où on ne s'embarrassait pas avec le recrutement. Mon patron de stage m'a proposé de rester dès le soir où j'ai fini ma formation. Ah, c'est sûr, on n'embauche plus si facilement. Maintenant je dois recruter les jeunes qui arrivent, et je trouve ça incroyable. Ils accumulent les diplômes. On fait plein de stages, 150 à postuler."},
  {"type":"document","q":"Que propose le vendeur à la cliente ?","subq":"Que propose le vendeur à la cliente ?","c":["D'acheter un roman.","D'attendre son collègue.","De réserver un livre.","De revenir le lendemain."],"a":2,"k":"je peux vous en garder un si vous voulez","transcript":"— Bonjour monsieur, je cherche le dernier livre de Michel Tellier sur la France rurale du 19e siècle.\n— En fait, l'ouvrage que vous cherchez est en rupture de stock. Nous en recevrons quelques-uns dans deux semaines, je peux vous en garder un si vous voulez.\n— Oui, très bien, merci. Je reviendrai.\n— Voilà madame, c'est noté."},
  {"type":"document","q":"Quel temps fait-il aujourd'hui ?","c":["Il fait plus beau qu'hier.","Il fait plus mauvais qu'hier.","Il pleut plus qu'hier.","Il y a moins de soleil qu'hier."],"a":0,"k":"au moins, il y a du soleil","transcript":"— Quel froid ce matin.\n— Oui, mais au moins, il y a du soleil.\n— C'est sûr, à côté d'hier, la pluie toute la journée, c'était l'horreur.\n— Ah oui, j'aime mieux ce froid sec."},
  {"type":"document","q":"Quel objectif Sylvie poursuit-elle en enseignant le français ?","c":["La diffusion d'une langue qui exprime les nuances des sentiments.","La multiplication des actions pour la défense des droits de l'homme.","La promotion d'un moyen d'échanges entre les différentes nationalités.","La reconnaissance d'un patrimoine culturel unique par sa richesse."],"a":2,"k":"l'apprentissage des langues est une passerelle entre les peuples","transcript":"En tant que responsable multimédia, je suis aussi enseignante de français langue étrangère. Un de mes centres d'intérêt concerne le développement d'une politique linguistique en faveur du français comme langue de communication, et pas seulement comme symbole d'une certaine culture. J'essaie de montrer que l'apprentissage des langues est une passerelle entre les peuples et les cultures."},
  {"type":"document","q":"Pourquoi les filles partent-elles de la maison plutôt que les garçons ?","c":["Elles entrent dans la vie active avant les jeunes garçons.","Elles se rebellent très vite face à l'autorité familiale au quotidien.","Elles sont en désaccord avec leurs parents au sujet de leurs études.","Elles sont mieux préparées aux tâches de tous les jours."],"a":1,"k":"entrent plus vite dans les conflits avec leurs parents","transcript":"Dans votre livre, vous dites que les jeunes filles partent plus vite de chez elles que les garçons. Comment l'expliquez-vous ? Elles sont plus précoces que les garçons. Elles sont plus mûres et entrent plus vite dans les conflits avec leurs parents. Les conflits sont de toute nature, de l'habillement à l'argent de poche. Elles sont donc plus pressées de partir de la maison, de devenir plus indépendantes."},
  {"type":"document","q":"Quelle est l'intention de cette personne ?","c":["Découvrir une région de France.","Partir vivre sur la Côte d'Azur.","Rejoindre son épouse dans le Sud.","Rendre visite à un ami français."],"a":0,"k":"visiter le sud de la France avec mon épouse","transcript":"— Bonjour monsieur, puis-je vous renseigner ?\n— Bonjour, je souhaiterais visiter le sud de la France avec mon épouse.\n— Eh bien, nous pouvons vous proposer un séjour sur la Côte d'Azur. Voici la brochure du séjour.\n— Je vais en parler à ma femme et je reviendrai demain."},
  {"type":"document","q":"Pourquoi les pêcheurs utilisent-ils une cabane ?","c":["Pour conserver le poisson.","Pour ranger leur matériel.","Pour se réchauffer.","Pour se reposer."],"a":2,"k":"se protège du froid en installant une cabane","transcript":"— Dis-moi, Paul, c'est quoi la pêche blanche au Québec ?\n— On l'appelle blanche parce qu'on pêche l'hiver à la ligne en creusant des trous dans la glace.\n— Vous devez geler à attendre le poisson.\n— Non, car chaque pêcheur se protège du froid en installant une cabane en bois au-dessus des trous.\n— C'est une pêche d'intérieur ! En tout cas, le poisson est bien frais."},
  {"type":"document","q":"Pourquoi Claudine a-t-elle autant d'activités ?","c":["Elle a arrêté d'exercer sa profession.","Elle a décidé d'enrichir son curriculum vitae.","Elle a obtenu un congé de longue durée.","Elle a réduit son nombre d'heures de travail."],"a":0,"k":"je suis à la retraite maintenant","transcript":"— Vous avez beaucoup d'activités, beaucoup de passion artistique, vous faites du soutien scolaire, vous êtes écrivain publique.\n— Oui, j'essaie d'occuper mes journées par des activités qui me plaisent, étant donné que je suis à la retraite maintenant. J'adore l'art. Et puis, j'aime bien les enfants, j'aime bien la nature, tout ce que je peux faire maintenant que j'ai du temps."},
  {"type":"document","q":"Qu'est-ce que les deux amis n'ont pas beaucoup apprécié dans le film ?","c":["Le jeu de l'acteur.","Les dialogues.","La musique.","Le scénario."],"a":2,"k":"Y'a que la musique et un rien mélo qui m'a ennuyé","transcript":"— C'était bien, hein ? Quel acteur, ce type !\n— T'exagères un peu, mais oui. C'est surtout le scénario qui était original, pour une fois.\n— Y'a que la musique et un rien mélo qui m'a ennuyé.\n— C'est vrai, moi aussi. Mais les dialogues... T'as remarqué comme ils sonnaient juste ? Ça faisait l'équilibre.\n— Ils auraient pu soigner davantage la bande sonore."},
  {"type":"document","q":"Qu'apprend-on sur cette jeune femme ?","c":["Elle a gardé des enfants dans une famille britannique.","Elle a passé son enfance dans un pays étranger.","Elle a suivi des études dans un lycée bilingue.","Elle a travaillé avec une institutrice américaine."],"a":3,"k":"J'étais l'assistante d'une institutrice dans une école maternelle","transcript":"— Pouvez-vous me parler de votre expérience aux États-Unis ?\n— Oui, beaucoup. Je suis restée là-bas un an. J'étais l'assistante d'une institutrice dans une école maternelle.\n— C'était votre premier long séjour à l'étranger ?\n— Aussi long, oui, mais je suis déjà partie plusieurs fois en Grande-Bretagne. Nous avons de la famille à Londres.\n— Vous n'avez pas eu de difficultés pour communiquer en anglais ?\n— Non, je suis parfaitement bilingue."},
  {"type":"document","q":"De quoi traite ce reportage ?","c":["D'un appel à projets imaginaires.","D'un examen de fin d'études.","D'un nouveau plan d'urbanisme.","D'une rénovation d'un monument."],"a":0,"k":"la consigne était de rêver","transcript":"Pour ce concours organisé par la Fondation Eiffel, adressé aux élèves des écoles d'architecture, la consigne était de rêver. Concevoir un édifice de très grande hauteur sur le Champ de Mars à Paris, à la place de la Tour Eiffel. Trois étudiants suppriment donc carrément la tour. À la place, ils y construisent un aéroport vertical ou creusent un puits de lumière avec de vastes plateaux. D'autres choisissent de la rendre habitable."},
  {"type":"document","q":"Qu'apprend-on sur le site historique de Pompéi ?","c":["L'attitude des touristes accélère sa dégradation.","Le financement des travaux d'entretien est menacé.","Les autorités restaurent actuellement les vestiges.","L'intérêt pour l'architecture des lieux est en déclin."],"a":0,"k":"l'inconscience des visiteurs","transcript":"C'est le plus grand site archéologique du monde. Sur une superficie de 44 hectares, il accueille chaque année 2,5 millions de visiteurs. C'est sa chance, mais c'est aussi son malheur, car Pompéi est en péril. Ces dernières années, des effondrements à répétition nous montrent que l'on a franchi la frontière de l'urgence. Tout concourt à un laissé-aller dramatique, sans oublier l'inconscience des visiteurs qui se conduisent souvent dans ces ruines comme dans un vulgaire parc d'attraction."},
  {"type":"document","q":"Comment la personne considère-t-elle la marche ?","c":["C'est un temps de découverte et l'humanité.","C'est une occasion de dépenser son énergie.","C'est une opportunité d'apprécier la solitude.","C'est une possibilité quotidienne d'évasion."],"a":0,"k":"on se rencontre aussi soi-même","transcript":"Je suis un marcheur, et mes vacances se passent à marcher parce que ça me permet de réfléchir, que le rythme de la marche est musical pour les oreilles, éblouissant pour les paysages. Je ne marche pas n'importe où, je marche sur des sentiers de grande randonnée, et j'y ai souvent fait des rencontres vraiment merveilleuses. On y rencontre à la fois le paysage, les autres, mais on se rencontre aussi soi-même."},
  {"type":"document","q":"Quelle est la particularité de l'établissement de Philippe ?","c":["C'est la reproduction d'un café du siècle dernier.","Il contient un dépôt-vente de meubles design.","C'est à la fois un restaurant et une galerie d'art.","Il y organise un festival de musique électronique."],"a":2,"k":"on peut assister à des soirées musicales","transcript":"— Quand j'ai récupéré l'endroit, il s'agissait d'un lieu qui était ancien à Montréal, début 19e siècle. J'ai donc gardé ce qui était d'époque et j'ai rajouté une touche moderne. Comme je suis un passionné de meubles design, j'ai acheté des pièces qui me plaisent. Et en plus d'y manger, on peut assister à des soirées musicales avec un DJ très connu. Enfin, j'ai accroché des tableaux, des œuvres contemporaines, et on organise aussi des expos temporaires."},
  {"type":"document","q":"En quoi consiste le concept présenté par la société Biomim Greenloop ?","c":["À comparer les étapes du clonage naturel et artificiel.","À observer l'effet des activités humaines sur la nature.","À orienter la recherche en prenant la nature comme modèle.","À sensibiliser les hommes à respecter leur milieu naturel."],"a":2,"k":"s'inspirer du vivant, de la nature, pour concevoir de nouvelles technologies","transcript":"Le biomimétisme, c'est en fait s'inspirer du vivant, de la nature, pour concevoir de nouvelles technologies, pour innover. Le monde du vivant a de nombreuses choses à nous apprendre. La vie s'est maintenue effectivement depuis 3,8 milliards d'années. On est actuellement entouré d'au moins 8 millions d'espèces qui ont toutes les leçons à nous donner pour pérenniser notre présence sur Terre."},
  {"type":"document","q":"Dans ce reportage, qu'apprend-on sur les seniors ?","c":["Ils consomment plus que la jeune génération.","Ils dépensent beaucoup pour leur santé.","Ils profitent peu des effets de la croissance.","Ils sont à l'origine de créations d'emplois."],"a":3,"k":"formidable gisement de croissance et d'emplois","transcript":"Les plus de 60 ans, ils sont près d'un milliard sur la planète, 15 millions en France, et ce nombre a vocation à grossir. Aujourd'hui, les seniors, c'est 23% de la population française. Un marché juteux pour les entreprises et un formidable gisement de croissance et d'emplois. Dans le secteur de l'aide à domicile, on considère qu'il faut 220 000 emplois de plus d'ici 2020."},
  {"type":"document","q":"Qu'explique cette utilisatrice des produits cosmétiques bio ?","c":["Ils dégagent une odeur agréable.","Ils ont des résultats spectaculaires.","Ils ont l'avantage d'être peu chers.","Ils répondent à ses convictions."],"a":3,"k":"c'est en accord avec mes idées","transcript":"J'avoue qu'au début j'étais très décontenancée par les textures des cosmétiques bio. Les parfums quasi inexistants m'ont également déstabilisé. Mais les marques ont fait des progrès considérables depuis. Au final je choisis mieux mes produits, j'en achète moins, et donc je dépense moins. Et surtout c'est en accord avec mes idées. À quoi bon manger des fruits et légumes bio si l'on continue à se tartiner de crèmes enrichies aux produits chimiques ?"},
  {"type":"document","q":"Que dit Nadia Belawi au sujet du service civique ?","c":["C'est aux parents de choisir pour leurs enfants.","Il faut l'étendre à toutes les générations.","Le dispositif fonctionne bien tel qu'il est.","L'État doit l'imposer à la population."],"a":2,"k":"on n'a pas idée de remercier quelqu'un pour un service qu'il n'a pas choisi","transcript":"Aujourd'hui le service est plébiscité par les jeunes qui le font, puisqu'il fait du bien aux jeunes, pourquoi ne pas le rendre obligatoire ? Le service civique fait du bien aux jeunes précisément parce qu'ils ont décidé de rendre un service à la nation, ils en sont parfaitement conscients. Vous savez, on n'a pas idée de remercier quelqu'un pour un service qu'il n'a pas choisi de rendre."},
  {"type":"document","q":"Sur quoi porte l'intervention ?","c":["La relation liant Camille Claudel et Rodin.","La richesse du musée Auguste Rodin.","Les difficultés rencontrées par Rodin.","Les sources d'inspiration de Rodin."],"a":0,"k":"Je lui ai montré où trouver de l'or, mais l'or qu'elle trouvait bien à elle","transcript":"Camille Claudel restera pour la postérité une élève de Rodin. Elle est exposée dans le musée Auguste Rodin, elle est connue comme telle. Elle a beaucoup reçu de Rodin, mais elle s'en est servie pour créer une œuvre totalement différente. On connaît évidemment la fameuse phrase : « Je lui ai montré où trouver de l'or, mais l'or qu'elle trouvait bien à elle »."},
  {"type":"document","q":"Comment réagissent les populations indigènes concernées par ce projet ?","c":["Elles demandent un nouveau statut juridique.","Elles exigent des garanties réelles et tangibles.","Elles mettent en doute la viabilité du projet.","Elles veulent que les terres restent intactes."],"a":1,"k":"s'assurer que les jeunes Inus soient formés","transcript":"Le plan Nord mise aussi sur l'appui des populations locales, notamment celui des Inuits et des Amérindiens. Certaines nations, comme celle des Inus, ont des réticences. Ce conseiller juridique milite pour que son peuple et le gouvernement du Québec signent une entente. Je pense que c'est une responsabilité de l'État québécois de s'assurer que les jeunes Inus soient formés et qu'ils aient accès à des jobs valorisants dans le cadre des projets miniers."},
  {"type":"document","q":"Quel est le constat de l'intervenant sur l'exploitation des gaz de schiste ?","c":["Elle est régie par des normes internationales strictes.","Elle est réputée sans danger pour le milieu naturel.","Les inconvénients qu'elle présente sont manifestes.","Les sociétés de production en exagèrent la rentabilité."],"a":3,"k":"les effets économiques ne sont pas aussi élevés que ceux que nous avons","transcript":"On voit aujourd'hui que le débat est très mal posé parce que d'un côté on nous parle de gains économiques supposés rapides et sûrs, et de l'autre un coût environnemental qui maintenant est sous contrôle. Mais en réalité, quand on se penche uniquement sur les effets économiques, on se rend compte que les effets économiques ne sont pas aussi élevés que ceux que nous avons, les pro-exploitations."}
]
</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function playAudio(qi) {
  var q = QQ[qi];
  var src = q.audio || ("CO 40/" + String(qi+1).padStart(3,"0") + ".MP3");
  if (!audioObjs[qi]) audioObjs[qi] = new Audio(src);
  var a = audioObjs[qi];
  var icon = document.getElementById("play-icon-"+qi);
  var status = document.getElementById("audio-status-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    if (status) status.textContent = "En pause";
    return;
  }
  a.play().catch(function(){ if(status) status.textContent="⚠️ Fichier audio introuvable"; });
  if (icon) icon.textContent = "⏸";
  if (status) status.textContent = "En cours...";
  a.onended = function() {
    if (icon) icon.textContent = "▶";
    if (status) status.textContent = "✓ Terminé";
  };
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test40_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var audioHtml =
    "<div class='audio-row'>" +
      "<button class='play-btn' onclick='playAudio("+i+")'>"+
        "<span id='play-icon-"+i+"'>▶</span>"+
      "</button>" +
      "<span class='audio-label'>Écouter le document</span>" +
      "<span class='audio-status' id='audio-status-"+i+"'></span>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done
        ? "<span>" + esc(q.c[ci]) + "</span>"
        : "<span style='color:#bbb;font-style:italic;font-size:13px'>— — —</span>";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-top:.7rem'>🔑 Phrase-clé surlignée</div>" : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine + keyLabel +
      "</div>";
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 40</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 40 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 40</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
</html>
