<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 2 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

Quand est-ce que tu pars en vacances ?\n– Ah, j'ai mon vol mardi prochain."},{"type":"document","q":"Question 9. Où va la femme ?","c":["À l'opéra.","Au cabaret.","Au cinéma.","Au théâtre."],"a":2,"k":"Au cinéma.","transcript":"Bonjour, je voudrais réserver deux places pour le film Neige éternelle à 20h.\n– Très bien madame. Je vous mets deux places."},{"type":"document","q":"Question 10. Que fait cet homme ?","c":["Il achète un plan.","Il prend un train.","Il cherche un hôtel.","Il visite un musée."],"a":1,"k":"Il prend un train.","transcript":"– Excusez-moi madame, mais je suis complètement perdu. Je ne trouve pas la gare et mon train part dans 5 minutes. À l'hôtel, on m'a dit de passer par là.\n– Montrez-moi votre plan. Mais vous le regardez à l'envers. Le musée est au bout de la rue et la gare juste derrière.\n– Ah, merci beaucoup."},{"type":"document","q":"Question 11. Que faut-il faire pour s'inscrire ?","c":["S'inscrire sur place.","Téléphoner.","Envoyer un courrier.","Utiliser internet."],"a":3,"k":"Utiliser internet.","transcript":"– Conservatoire de Toulouse. Bonjour.\n– Bonjour. J'aimerais inscrire ma fille de 10 ans au cours de violon pour la rentrée prochaine.\n– Désolé madame mais toutes les inscriptions se font en ligne à partir du mois de juin.\n– Ah bon ? D'accord. Merci. Au revoir.\n– Je vous en prie. Au revoir."},{"type":"document","q":"Question 12. Que veut faire l'étudiant ?","c":["Utiliser la salle informatique.","Mettre à jour sa carte d'étudiant.","Prendre une photo pour sa carte d'étudiant.","Trouver le code d'accès à la salle."],"a":0,"k":"Utiliser la salle informatique.","transcript":"– Bonjour, je suis étudiant ici. Je voudrais travailler en salle informatique pour le cours de commerce international. C'est possible ?\n– Oui. Vous avez votre carte d'étudiant ?\n– Oui, mais il n'y a pas encore de photo dessus.\n– Ce n'est pas grave pour la photo. Il faut votre carte d'étudiant pour vous connecter. Le code d'accès est écrit dessus. Vous pouvez vous installer au poste numéro 3.\n– Merci beaucoup."},{"type":"document","q":"Question 13. Pourquoi Lara téléphone-t-elle à Alex ?","c":["Pour lui conseiller d'aller voir un médecin.","Pour lui dire qu'elle sera un peu en retard.","Pour lui proposer un film qu'elle veut voir.","Pour lui rappeler une chose importante."],"a":3,"k":"Pour lui rappeler une chose importante.","transcript":"Allô Alex, c'est Lara. N'oublie pas de prendre tes lunettes pour la séance de ciné ce soir. La dernière fois, tu ne voyais rien et tu as dormi pendant 2h. On se retrouve comme prévu. Salut."},{"type":"document","q":"Question 14. Quelle est la condition à remplir pour faire une formation en alternance dans cette banque ?","c":["Être inscrit dans une université.","Avoir le Baccalauréat.","Avoir terminé des études de master.","Avoir une expérience professionnelle préalable."],"a":1,"k":"Avoir le Baccalauréat.","transcript":"La banque recrute des jeunes en alternance issus de différents cursus. Nous allons recruter des jeunes bacheliers qui vont préparer pour 2 ans un BTS en alternance. Nous pouvons recruter des jeunes ayant obtenu leur diplôme du baccalauréat plus 2 années d'études supérieures qui se préparent à une insertion professionnelle. Nous pouvons enfin recruter des jeunes qui ont obtenu un baccalauréat plus 3 années d'études supérieures et qui poursuivent un cursus à bac+4 voire bac+5."},{"type":"document","q":"Question 15. Où sera Sophia à 19h ?","c":["Au bureau.","Au cinéma.","Au restaurant.","Au théâtre."],"a":2,"k":"Au restaurant.","transcript":"– Et Sophia, elle vient ?\n– Non, elle ne pourra pas venir avec nous au cinéma. Elle m'a demandé de vous prévenir.\n– Pourquoi ?\n– Elle a une sortie avec ses collègues. Ils ont réservé une table pour 19h.\n– C'est dommage. Peut-être qu'elle pourra nous rejoindre plus tard."},{"type":"document","q":"Question 16. Pourquoi le client téléphone-t-il ?","c":["Pour commander un nouveau canapé-lit.","Pour exiger l'annulation de sa commande.","Pour demander un échange de marchandise.","Pour se plaindre d'une commande non livrée."],"a":3,"k":"Pour se plaindre d'une commande non livrée.","transcript":"– Allô ! Bonjour, je vous appelle encore une fois parce que j'ai commandé un canapé en ligne il y a 6 semaines et que je n'ai toujours pas reçu. Je suis monsieur Marceau et mon numéro de commande est le 3802. Que se passe-t-il ?\n– Je regarde, ne quittez pas.\n– Oui, en effet, je vois que votre canapé est encore à l'usine. Je pense que la livraison devrait se faire bientôt. Vous avez un numéro de téléphone ? Je vais me renseigner et je vous rappelle.\n– Je vous ai déjà appelé cinq fois. Je veux des explications tout de suite."},{"type":"document","q":"Question 17. Qu'explique la journaliste ?","c":["Comment diminuer la consommation d'énergie.","Comment il faut appliquer les conseils des experts.","Comment la santé est influencée par le calendrier.","Comment se protéger des maladies contagieuses."],"a":2,"k":"Comment la santé est influencée par le calendrier.","transcript":"Février est l'un des mois les plus maussades au niveau de la météo. C'est souvent le mois le plus gris et le plus froid de l'année. Du coup, les gens ont tendance d'une part à surchauffer leur chambre et aussi à moins l'aérer. Or, tous les spécialistes le disent, une température intérieure au-dessus de 19° et le manque d'air frais sont néfastes à la qualité du sommeil. Il se trouve qu'en février l'organisme est plus vulnérable, notamment avec tous les virus qui circulent. Et puis il y a aussi le manque de lumière, un peu comme en octobre-novembre, où de nombreuses personnes font la fameuse dépression saisonnière."},{"type":"document","q":"Question 18. Que demande le directeur ?","c":["D'annuler une réunion.","D'informer de son retard.","De recevoir un client.","De reporter un entretien."],"a":1,"k":"D'informer de son retard.","transcript":"– La rencontre avec les représentants du personnel est bien prévue aujourd'hui.\n– Oui, monsieur. À 15h dans la salle du rez-de-chaussée.\n– Il faut les prévenir que je ne serai pas à l'heure. J'attends un appel très important d'un de nos importateurs.\n– D'accord. Mais je croyais que vous lui aviez parlé hier.\n– Non, il n'a pas pu me téléphoner."},{"type":"document","q":"Question 19. Que constate cet employé ?","c":["Les conditions de recrutement sont plus difficiles aujourd'hui.","Les étudiants ignorent le fonctionnement de l'entreprise.","Les jeunes étaient préparés plus sérieusement dans le passé.","Les patrons actuels ont un degré d'exigence trop élevé."],"a":0,"k":"Les conditions de recrutement sont plus difficiles aujourd'hui.","transcript":"Oh, j'ai commencé dans l'entreprise il y a quand même 30 ans, à l'époque où on ne s'embarrassait pas avec le recrutement. Je me souviens, le soir où j'ai fini ma formation, mon patron de stage m'a proposé de rester et pour mes copains de formation pareil. C'est différent maintenant, on n'embauche plus si facilement. Maintenant, je suis à l'ancien. Je vois des jeunes qui arrivent et je trouve ça incroyable. Ils accumulent des diplômes, font plein de stages sans trouver de poste. Ça ne doit pas être drôle."},{"type":"document","q":"Question 20. Qu'annonce le directeur à l'employé ?","c":["Il est possible qu'il soit renvoyé.","Il est renvoyé définitivement.","Il va commencer sa période d'essai.","Il va être embauché définitivement."],"a":0,"k":"Il est possible qu'il soit renvoyé.","transcript":"– Vous avez vu l'heure ?\n– Oui, je sais. Il n'est pas si tard.\n– C'est la troisième fois que vous arrivez en retard cette semaine. Je m'excuse.\n– Écoutez-moi bien. Votre période d'essai se termine dans 15 jours. Dorénavant, veuillez arriver à l'heure si vous voulez être embauché."},{"type":"document","q":"Question 21. Pourquoi le client n'obtient-il pas le transfert de sa ligne téléphonique ?","c":["Le promoteur a oublié de prévenir la compagnie de téléphone.","Le réseau téléphonique du nouvel immeuble est déjà saturé.","Les travaux nécessaires ne sont pas encore achevés.","La compagnie de téléphone manque de personnel pour le faire."],"a":2,"k":"Les travaux nécessaires ne sont pas encore achevés.","transcript":"– Bonjour monsieur, je viens transférer ma ligne téléphonique. J'emménage demain dans les logements neufs de la rue du Pradau.\n– Oh là là, ça ne sera pas fini avant 26 jours. Les drapeaux ne sont pas encore terminés. Le promoteur a eu du retard. Nous attendons son autorisation pour installer le réseau.\n– 10 jours. Mais comment je fais sans téléphone ? Moi, j'en ai besoin pour mon travail.\n– Je suis désolé monsieur, mais vous n'êtes pas le seul dans ce cas et on ne peut pas aller plus vite que les travaux."},{"type":"document","q":"Question 22. Quelle est la réaction de la femme ?","c":["Elle accepte de garder le chien.","Elle refuse de garder le chien.","Elle propose de trouver une autre solution.","Elle demande des excuses."],"a":1,"k":"Elle refuse de garder le chien.","transcript":"– Au fait, est-ce que je peux compter sur toi pour garder Moki pendant les vacances ? Promis, c'est la dernière fois que je te demande un tel service.\n– Jamais de la vie, c'est hors de question cette fois-ci. La dernière fois que je l'ai gardé, il a été insupportable.\n– Oh non ! Comment je vais faire ? Je croyais pouvoir compter sur toi."},{"type":"document","q":"Question 23. Qu'est-ce qui fait rire la femme ?","c":["Que l'homme soit parti seul en vacances.","Que l'homme ait progressé au golf.","Que l'homme lui ait envoyé une carte.","Que l'homme se soit mis à faire du sport."],"a":3,"k":"Que l'homme se soit mis à faire du sport.","transcript":"– Allô Denis, c'est Joël. Merci pour ta carte. Alors ces vacances en célibataire, tu es parti tout seul vers du golf, c'est ça ?\n– Oui, j'avais envie de connaître le golf. C'était super. Pas facile mais super.\n– Ah bon ? Mais tu n'es pas vraiment sportif toi ? Le golf, quand j'ai lu ta carte, j'en revenais pas.\n– Non mais j'ai bien l'intention de recommencer. Pas toute l'année hein. Un stage l'été c'est suffisant.\n– Et bien, à ce rythme, tu ne vas pas progresser très vite.\n– Qu'est-ce que tu crois ? Je ne suis pas si mauvais."},{"type":"document","q":"Question 24. Sur quel aspect travaillent les concepteurs des voitures autonomes ?","c":["L'écologie.","La puissance.","La sécurité.","Les équipements."],"a":3,"k":"Les équipements.","transcript":"Différents modèles de véhicules sans conducteur étaient à essayer dans les rues de Las Vegas la semaine dernière. Pour le moment, il s'agit seulement d'expérimentation. En attendant une réglementation, le secteur s'intéresse à ce que l'on fera dans ces voitures quand elles conduiront vraiment toutes seules. Persuadés que c'est l'intérieur de la voiture et les services proposés qui feront la différence demain, bien plus que le moteur, plusieurs concepts d'habitacle futuriste étaient présentés sur le salon. Des voitures avec des écrans partout intégrés dans les vitres faisant toute la largeur du tableau de bord. Des véhicules qui se personnalisent en fonction de leur passager."},{"type":"document","q":"Question 25. Pourquoi les parents doivent-ils passer du temps avec leurs enfants ?","c":["Pour limiter le temps passé devant la télévision.","Pour améliorer les performances scolaires de l'enfant.","Pour respecter les obligations légales de parentalité.","Pour façonner la personnalité de l'enfant."],"a":3,"k":"Pour façonner la personnalité de l'enfant.","transcript":"Ce que vous dites, c'est que le temps passé par un parent avec son enfant, ça fait partie aujourd'hui des besoins psychiques essentiels à la construction de l'enfant.\n– Le temps ? Oui, vraiment. Parce qu'il faut dire tout de suite que le temps passé par les enfants devant la télévision, notamment plusieurs heures par jour, on sait que plus tard ce sont des failles de concentration, ce sont des problématiques à l'école. Donc savoir avoir ce temps-là, c'est d'abord regarder son enfant comme un être à part, comme un être en développement, et c'est donc regarder le type de tempérament qui est là, le type de caractère."},{"type":"document","q":"Question 26. Pourquoi le client demande-t-il la résiliation de son abonnement ?","c":["Il trouve que cela lui coûte trop cher.","Il pense que cela ne lui est plus utile.","Il trouve que l'augmentation est injustifiée.","Il pense qu'il aurait dû être prévenu."],"a":3,"k":"Il pense qu'il aurait dû être prévenu.","transcript":"– Allô ! Bonjour madame, c'est monsieur. J'ai reçu mon relevé bancaire et je vois que mon abonnement au service en ligne a augmenté de 5 %. Ce n'est pas beaucoup certes, mais est-ce normal ?\n– Oui, je vous rassure, c'est bien normal. Tous nos tarifs ont subi une augmentation au 1er janvier.\n– Peut-être mais je ne reçois aucun courrier pour m'avertir.\n– Vous avez raison mais nos conditions tarifaires sont affichées à l'agence.\n– Cela ne justifie pas que vous n'avertissez pas vos clients. Je vous demande de résilier cet abonnement au plus vite."},{"type":"document","q":"Question 27. Quel est le point commun entre l'écrivain et le réalisateur ?","c":["Leur intérêt pour les méthodes minimalistes.","Leur participation à la même émission de radio.","Leur processus créatif pour développer des projets.","Les avis qu'ils partagent au sujet de l'école."],"a":3,"k":"Les avis qu'ils partagent au sujet de l'école.","transcript":"– Comment est né votre film ?\n– Ça faisait longtemps que je voulais faire un film sur l'école. Rester entre les murs et montrer par des moments d'école ce que vivent les élèves. Le jour de la sortie de mon précédent film, j'ai participé à une émission de radio à laquelle était également invité François Rufus qui venait de sortir son livre. Et au cours de l'émission, je me suis aperçu qu'il traitait tous les thèmes que je voulais aborder de la manière dont je voulais le faire, sans sortir du collège avec une démarche minimaliste et très descriptive. Dans l'ascenseur, je lui ai demandé s'il était intéressé par une adaptation. Il m'a donné son livre et 3 jours après, je signais."},{"type":"document","q":"Question 28. Quelle est l'attitude à adopter par le personnel ?","c":["Être insistant pour augmenter les ventes.","Ignorer les clients pour leur donner de l'espace.","Assister de façon discrète le client.","Se concentrer sur l'arrangement des produits."],"a":2,"k":"Assister de façon discrète le client.","transcript":"Bonjour à tous. Vous avez tous passé les tests avec succès et le monde enchanté est heureux de vous accueillir parmi son personnel. La période des fêtes voit notre magasin littéralement envahi d'enfants venus repérer les jouets à commander. Vous devez être attentifs, agréables, sans insistance. Toutefois, faites la démarche d'aller conseiller les clients sur les produits, mais sachez vous effacer afin de leur permettre d'être à l'aise et donc de consommer en toute tranquillité. Je compte sur vous pour véhiculer une bonne image du magasin. Pas d'acharnement donc. Bonne journée."},{"type":"document","q":"Question 29. Selon le chroniqueur, que permet la course par rapport à la marche ?","c":["De maigrir plus rapidement.","De manger sans compter.","De s'entraîner moins souvent.","De vivre plus longtemps."],"a":0,"k":"De maigrir plus rapidement.","transcript":"Marcher ou courir ? Ça dépend, c'est ce qui ressort de quelques études récentes qui ont opposé les deux exercices et mesuré leurs effets. L'une d'elles a été publiée le mois dernier dans la revue Medicine and Science in Sports and Exercise. Conclusion en ce qui concerne la perte de poids, c'est la course qui l'emporte haut la main. Les coureurs sont plus minces, moins de surcharge pondérale que les marcheurs et passé l'âge de 55 ans, c'est encore plus vrai. Même si le nombre de kilomètres parcourus à la course par semaine est minime, il y a une différence entre les coureurs et les marcheurs. Et la cause pourrait être l'effet de la course sur l'appétit."},{"type":"document","q":"Question 30. Qu'est-ce qui différencie les moins de 30 ans des générations précédentes ?","c":["Ils habitent plus longtemps en location.","Ils perçoivent un salaire plus élevé.","Ils s'investissent dans des associations.","Ils sont tentés par les dépenses."],"a":3,"k":"Ils sont tentés par les dépenses.","transcript":"Les moins de 30 ans ne représentent que 10 % des locataires. Pourtant, ils dépensent plus pour se loger, en moyenne 6 000 € par an, soit 42 % de plus que les autres. Ils ont également des revenus plus faibles que leurs parents au même âge, alors qu'ils sont nettement plus diplômés. Et la différence en France est nettement plus importante que dans les pays européens comparables. Mais ça ne freine pas leur envie de consommer. Leur appétit de consommation est plus important que celui de leurs aînés, d'autant plus que, peu intéressés par les structures sociales existantes, les jeunes s'identifient à des groupes dont le point commun est justement la consommation. C'est le règne de la consommation symbole et le triomphe du marketing."},{"type":"document","q":"Question 31. À quel moment cet entraîneur préfère-t-il intervenir en général ?","c":["Pendant le match, sur le terrain.","Ils préfèrent intervenir après la fin du match.","À chaque pause de jeu.","Exclusivement à la mi-temps."],"a":1,"k":"Ils préfèrent intervenir après la fin du match.","transcript":"– En tant qu'entraîneur d'une équipe de football, comment réagissez-vous pendant un match ?\n– Ben moi, je suis toujours très attendu.\n– Et vous intervenez quand auprès des joueurs ?\n– Pas sur le terrain pendant le match, mais de temps en temps à la mi-temps, j'essaie d'expliquer les problèmes. Ça dépend du match, mais enfin la plupart du temps, je préfère attendre que le match soit fini.\n– Le résultat d'un match, ce n'est pas un peu de chance ?\n– Non, non, il n'y a pas de hasard. Au football, pour gagner, il faut savoir se battre."},{"type":"document","q":"Question 32. Quel est l'acte de piraterie dans ce débat ?","c":["L'utilisation de la musique dans les programmes télévisés.","Les copies gratuites sur internet.","La diffusion non autorisée en radio.","Le partage de CD entre particuliers."],"a":1,"k":"Les copies gratuites sur internet.","transcript":"– Les maisons de disque se plaignent des téléchargements de fichiers musicaux sur internet. Qu'en pensez-vous ?\n– Nous enregistrons en effet une baisse des ventes parce qu'avec internet on peut tout enregistrer, c'est-à-dire piller les droits d'auteur et le travail des artistes.\n– Pourtant la piraterie a toujours existé.\n– Certes, mais les gens achètent moins depuis que ce nouveau moyen existe. Si ce phénomène continue à augmenter, le déficit sera ingérable. Pourtant, un certain nombre de produits musicaux issus d'émissions de télévision sont très à la mode et font monter les ventes de disques.\n– Oui, bien sûr, mais ce sont des produits marketing éphémères et cela ne comble pas le manque financier dû à la piraterie."},{"type":"document","q":"Question 33. Qu'affirme-t-on au sujet du réchauffement climatique ?","c":["Il affecte uniquement les régions polaires.","Il change notre quotidien et menace des saisons entières.","Il est un phénomène lointain sans impact direct.","Il peut être complètement évité si on agit maintenant."],"a":1,"k":"Il change notre quotidien et menace des saisons entières.","transcript":"On voulait parler autrement des changements climatiques. On voulait pas seulement des chiffres qui font ça commence à créer des impacts chez nous, près de nous, dans des choses qui nous tiennent à cœur. Par exemple, ce qui fond dans la région, dans le sud du Québec, dans la région de Montréal — si on continue avec un réchauffement tel qu'on le prévoit, l'hiver va disparaître complètement et donc c'est toute une culture qui se perd. Ben moi je pense que plus on rapproche les impacts de ce qui est près des gens, on dit voici ce que nous aimons l'hiver et voici pourquoi nous allons agir pour les changements climatiques. Tout d'un coup, on n'est plus en train de parler d'une catastrophe qui est en cours, on est en train de parler d'un monde à construire."},{"type":"document","q":"Question 34. Quelles sont les réactions des Parisiens installés à Montpellier ?","c":["Ils sont satisfaits de l'espace de leur nouvelle habitation.","Ils ont un souci de l'intégration.","Ils regrettent le manque de culture à Montpellier.","Ils se plaignent du climat."],"a":1,"k":"Ils ont un souci de l'intégration.","transcript":"Le département de l'Hérault attire de nombreux nouveaux habitants chaque année et notamment de plus en plus de Parisiens qui s'installent dans le 34. Fuyant le stress et la grisaille de la capitale, Montpellier semble une destination de rêve. Mais qui sont ces nouveaux arrivants ?\n– Nous, on a quitté Paris parce qu'on n'aurait jamais pu devenir propriétaire. On vivait dans un 40 m² et pour le même prix, on a trouvé une petite maison avec patio dans les quartiers ouest de Montpellier.\n– Alors, qu'est-ce que vous trouvez à Montpellier ?\n– Ici, on a du soleil tous les jours. Franchement, je dois dire que ce que j'apprécie, c'est la qualité des rapports humains. Les gens sont plus posés, moins stressés. Pour une ville de province, la vie culturelle se révèle quand même assez riche avec beaucoup de festivals. Après, pour ce qui est de la vie sociale, c'est un peu délicat. On se sent étranger et les gens du pays nous considèrent comme des Parisiens, ça c'est sûr. Ils nous le disent."},{"type":"document","q":"Question 35. À quelle conclusion arrive ce représentant de l'industrie forestière québécoise ?","c":["Le lien avec la forêt n'est pas encore rétabli.","Le lien avec la forêt est bien établi grâce aux efforts continus.","Les associations forestières sont suffisamment réparties pour couvrir les besoins de sensibilisation.","La population urbaine est totalement engagée avec l'industrie forestière."],"a":0,"k":"Le lien avec la forêt n'est pas encore rétabli.","transcript":"– Est-ce que vous pensez que la population s'est réappropriée ses forêts ou renoue un lien de conscience avec l'industrie forestière ?\n– Moi je dirais que le lien n'est pas encore refait à l'heure actuelle. On a beaucoup de travail à faire et on met beaucoup d'espoir sur nos associations forestières régionales dans chacune des régions. Mais le gros point c'est que la moitié de la population est autour de Montréal, la couronne de Montréal. Il y a même pas d'association forestière ici. Donc on a presque aucun moyen de sensibiliser la population sur les valeurs écologiques, les valeurs économiques du milieu forestier comme tel et de vivre aussi de cette forêt."},{"type":"document","q":"Question 36. Quel est le projet de cet organisme ?","c":["Installer des fontaines d'eau purifiée dans les villages.","Encadrer les projets locaux pour créer des activités économiques.","Distribuer gratuitement de l'eau potable.","Construire des infrastructures de santé."],"a":1,"k":"Encadrer les projets locaux pour créer des activités économiques.","transcript":"L'origine de notre projet, c'est cette rencontre avec un ingénieur cambodgien qui m'a raconté sa guide dans ce village où chacun a des rizières mais où il n'y a aucune infrastructure. Je lui ai demandé ce qu'il buvait et il m'a dit « On boit l'eau de la mort ». Avec tout le cortège de maladie que vous pouvez imaginer. Donc j'ai fait le tour des grandes ONG. J'ai consulté diverses organisations et l'idée qu'on a obtenu, c'est qu'au lieu de poser la fontaine au bord de la route, de purifier l'eau et dire aux gens voilà, on va proposer à un groupe d'individus de devenir entrepreneurs. Ils vont créer leur propre activité de distribution de boisson et vont ainsi générer un chiffre d'affaires qui va leur permettre d'améliorer leur niveau de vie."},{"type":"document","q":"Question 37. De qui parle la journaliste ?","c":["D'un citadin original.","D'un cuisinier renommé.","D'un historien passionné.","D'un homme préhistorique."],"a":0,"k":"D'un citadin original.","transcript":"Il est comme les autres sauf que lui, pour dire les choses, a l'âme d'un Cro-Magnon. Il vit en mode paléo, comme dans Paléolithique, une époque où les hommes vivaient principalement de chasse et de cueillette. Les adeptes du paléo font des exercices intensifs et se nourrissent uniquement d'aliments crus — fruits, légumes, poissons et viandes — selon eux plus adaptés à l'homme que les graines ou les céréales. Il achète uniquement bio et très important pour lui, il aime sa viande extrêmement fraîche."},{"type":"document","q":"Question 38. D'après le journaliste, en quoi les bons résultats européens en matière d'écologie sont-ils contestables ?","c":["Ils font l'objet de manipulations douteuses par les pollueurs.","Ils répondent à des critères insuffisamment exigeants.","Ils sont destinés à justifier les politiques économiques.","Ils sont publiés par des organismes liés aux entreprises."],"a":1,"k":"Ils répondent à des critères insuffisamment exigeants.","transcript":"Les pays européens sont presque tous d'excellents élèves de l'écologie. Mais est-ce une bonne nouvelle ? S'interroge le Figaro. Pas si sûr. L'Europe ne paraît vertueuse que parce que son double décimètre était truqué. Les quotas de rejet de CO2 fixés à l'avance ont été calculés de manière à ne pas trop effaroucher les industriels. Du coup, il ne servaient à rien. Mais il serait tout aussi erroné, à l'inverse, d'avoir des exigences drastiques mais irréalistes. Les industriels savent d'ailleurs agiter un épouvantail efficace. La méthode la plus simple pour arriver à une absence complète de pollution, c'est de fermer une usine et de la délocaliser sous d'autres cieux. Ce n'est pas toujours une menace en l'air."},{"type":"document","q":"Question 39. Que cherche à faire cette entreprise ?","c":["Améliorer la présentation des produits.","Augmenter le nombre de clients.","Multiplier les points de vente.","Maintenir des tarifs compétitifs."],"a":3,"k":"Maintenir des tarifs compétitifs.","transcript":"La qualité, vous savez, de très grande qualité, tout ça, ça a un prix. Si on veut se trouver une place sur le marché, il faut donc — et c'est tout un exercice — arriver à produire des aliments à des coûts qui sont quand même abordables. Et c'est l'exercice qui occupe en ce moment Sophie, gérante de Caroline. C'est une petite fabrique de pâtes et de sauce qui est installée à Saint-des-Régies."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 2/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test34_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 34</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 2 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 2</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
