<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 16 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

t très bon.", "transcript": "– Vous avez choisi ?\n– Non. Qu'est-ce que vous me conseillez ?"}, {"type": "extrait", "q": "", "c": ["Oui, mais la salle est sombre.", "Oui, mais le cinéma est près d'ici.", "Oui, mais le film se passe en plein air.", "Oui, mais les places sont chères."], "a": 1, "k": "Oui, mais le cinéma est près d'ici.", "transcript": "– Il est 19 heures. Si on veut arriver au cinéma avant le début du film et trouver une place dans la salle, il faut partir maintenant.\n– Partir maintenant ? Mais regarde, il pleut !"}, {"type": "extrait", "q": "", "c": ["À tout de suite.", "C'est très rapide.", "Dans une demi-heure.", "Il est déjà temps."], "a": 2, "k": "Dans une demi-heure.", "transcript": "– À quelle heure vas-tu au rendez-vous ?"}, {"type": "extrait", "q": "", "c": ["Ce jouet est beaucoup trop cher.", "C'est un très joli prénom.", "Pose la question à ses parents.", "Pourquoi pas, c'est une bonne idée."], "a": 2, "k": "Pose la question à ses parents.", "transcript": "– Mon neveu vient d'avoir 5 ans. Quel cadeau est-ce que je peux lui offrir ?"}, {"type": "document", "q": "Que veut faire cet homme ?", "c": ["Acheter un plan.", "Prendre un train.", "Trouver un hôtel.", "Visiter un musée."], "a": 1, "k": "mon train part en 5 minutes", "transcript": "– Excusez-moi madame, mais je suis complètement perdu. Je ne trouve pas la gare et mon train part en 5 minutes. À l'hôtel, on m'a dit de passer par là."}, {"type": "document", "q": "Que propose Nourdine à Faustine ?", "c": ["La publication de son CV en ligne.", "Un remplacement dans son entreprise.", "Une formation gratuite à l'université.", "Une rencontre avec son patron."], "a": 3, "k": "Viens avec moi ce soir et je te le présenterai.", "transcript": "– Salut Faustine, ça va ?\n– Ça va, mais je cherche toujours un job après les cours pour gagner un peu d'argent.\n– Ah mince. Moi, je livre des courses à domicile deux soirs par semaine. Je pourrais parler avec mon chef. Je crois qu'il veut recruter quelqu'un. Viens avec moi ce soir et je te le présenterai.\n– Oui, merci Nourdine, ce serait super. J'ai vu que la fac organisait un forum pour l'emploi cette semaine. Ça peut être utile aussi.\n– Parfait, je vais y aller."}, {"type": "document", "q": "Qu'est-ce qui est difficile pour Léo ?", "c": ["La communication avec ses clients.", "La recherche d'un nouveau travail.", "L'achat d'un nouveau téléphone fixe.", "L'utilisation de son ordinateur portable."], "a": 0, "k": "sans Internet, je ne peux pas travailler et contacter mes clients", "transcript": "– Léo, comment ça va depuis que tu es dans ta nouvelle maison ?\n– Ça va, ça va, mais je n'ai pas encore Internet.\n– Mince alors. Et est-ce que ton téléphone fixe marche au moins ?\n– Oui, mais je n'en ai pas vraiment besoin. Je viens de m'acheter un ordinateur tout neuf, mais sans Internet, je ne peux pas travailler et contacter mes clients.\n– Je comprends. Tu as vu quelqu'un pour arranger ça ?"}, {"type": "document", "q": "Quel est le problème de Lydie ?", "c": ["Elle a oublié un objet important.", "Elle a raté son bus ce matin.", "Elle doit s'absenter du bureau.", "Elle est en retard à une réunion."], "a": 0, "k": "J'ai laissé mes clés de voiture dans la salle de conférence", "transcript": "– Allô, Paul, tu peux m'aider ?\n– Qu'est-ce qui t'arrive, Lydie ?\n– J'ai laissé mes clés de voiture dans la salle de conférence et elle est occupée jusqu'à 20h.\n– Je peux te ramener si tu veux.\n– Oh, merci, ça m'arrange. Je dois être chez moi à 18h30. Demain, je viendrai en transport."}, {"type": "document", "q": "Quel bilan Alex tire-t-il de sa première journée de travail ?", "c": ["Il a été très agréablement surpris.", "Il préfère attendre pour se prononcer.", "Il aurait aimé se mettre déjà au travail.", "Il a trouvé son supérieur peu disponible."], "a": 0, "k": "Je n'en revenais pas.", "transcript": "– Alors, comment s'est passée cette première journée dans la vie active ?\n– Plutôt bien. Les collègues ont été très accueillants.\n– Et avec ton chef ? Tu m'avais dit qu'il était un peu froid.\n– Ben, en fait, il a été très sympa. Il m'a présenté à toute l'équipe, fait visiter les locaux et montré mon bureau, qui est très grand. Je n'en revenais pas.\n– Bienvenue dans le monde professionnel, Alex. Tu n'es pas au bout de tes découvertes."}, {"type": "document", "q": "Qu'est-ce que Marie va faire à Vienne ?", "c": ["Manger des plats typiques.", "Rencontrer sa famille.", "Travailler toute la journée.", "Voir une exposition."], "a": 2, "k": "Je serais occupée du matin au soir par des réunions et des rendez-vous avec des clients.", "transcript": "– Alors, Marie, prête pour le départ ?\n– Oui.\n– Tu as le guide touristique de Vienne ? Tu pourrais visiter la ville et goûter les spécialités locales ?\n– Oh, je ne sais pas. Je serais occupée du matin au soir par des réunions et des rendez-vous avec des clients.\n– Ah, et tu vas voir tes amis autrichiens ?\n– Non, pas cette fois."}, {"type": "document", "q": "Pourquoi Pierre refuse-t-il ce poste ?", "c": ["La mission est sans intérêt.", "La société est loin de chez lui.", "Le contrat est temporaire.", "Le salaire est insuffisant."], "a": 0, "k": "le poste ne m'attire pas", "transcript": "– Alors Pierre, qu'est-ce que tu as décidé ? Tu vas accepter cette offre d'emploi ?\n– Ah non, j'ai déjà refusé. Honnêtement, je préfère continuer à chercher.\n– Je pense que tu fais une bêtise. C'est très bien payé et puis les horaires te conviennent, non ?\n– Oui, mais ce n'est pas une raison pour accepter le poste. Ce qui est important pour moi, c'est le travail lui-même. Et de ce point de vue, le poste ne m'attire pas.\n– J'espère que tu ne vas pas regretter ta décision."}, {"type": "document", "q": "Pourquoi MarcIto veut-il rencontrer M. Huercos ?", "c": ["Pour lui présenter un produit.", "Pour organiser un voyage.", "Pour suivre une formation.", "Pour visiter Lyon avec lui."], "a": 0, "k": "le nouveau logiciel de ma société, Infolog", "transcript": "– Bonjour, MarcIto à Paris. Je voudrais parler à M. Huercos.\n– Il est en formation cette semaine. Je peux lui laisser un message ?\n– Je vous écoute.\n– J'aimerais lui faire découvrir le nouveau logiciel de ma société, Infolog. Vous pourriez le rencontrer la semaine prochaine ?\n– Bien sûr, je dois justement avoir des clients à Lyon jeudi et vendredi.\n– Disons jeudi matin alors.\n– C'est parfait. Merci mademoiselle."}, {"type": "document", "q": "Qu'est-ce que ces deux amis reprochent au film ?", "c": ["L'histoire est compliquée.", "La musique est ennuyeuse.", "Le réalisateur est mauvais.", "Les acteurs sont inconnus."], "a": 0, "k": "J'ai eu du mal à suivre l'histoire.", "transcript": "– Alors, comment as-tu trouvé le film ?\n– Assez moyen. Les acteurs jouent bien, mais je n'ai pas réussi à croire à cette histoire, pas un mot.\n– C'est mon avis aussi. J'ai eu du mal à suivre l'histoire. En revanche, j'ai apprécié la musique et la façon de filmer.\n– En effet, le réalisateur a du talent. On continue cette discussion dans un café ?\n– Avec plaisir !"}, {"type": "document", "q": "Que manque-t-il à ce client ?", "c": ["Le bon de garantie.", "Le chèque cadeau.", "Le justificatif d'achat.", "Le mode d'emploi."], "a": 2, "k": "Avez-vous une preuve d'achat ?", "transcript": "– Service après-vente, bonjour.\n– Bonjour madame. Voilà, je vous téléphone parce que mon lecteur DVD ne fonctionne pas. Il est sous garantie.\n– J'espère bien qu'il est tout neuf. Avez-vous une preuve d'achat ?\n– En fait, c'est un cadeau.\n– Dans ce cas, monsieur, je ne peux malheureusement rien faire. Il faudra demander la facture à la personne qui vous l'a offert."}, {"type": "document", "q": "Pourquoi cette personne laisse-t-elle un message ?", "c": ["Pour confirmer un rendez-vous.", "Pour demander un entretien.", "Pour proposer un service.", "Pour signaler un retard."], "a": 2, "k": "Nous avons un technicien qui pourrait vous dépanner", "transcript": "– Bonjour, c'est un message de CRD Solutions pour monsieur Lalande.\n– Je vous appelle au sujet du problème que vous avez rencontré en installant notre logiciel de paysages.\n– Nous avons un technicien qui pourrait vous dépanner et venir sur site rapidement. Vous pouvez me recontacter jusqu'à 18h30 au 01-28-12-87-43. Bonne journée !"}, {"type": "document", "q": "Quel est le problème de Clément dans sa recherche d'un emploi ?", "c": ["Il a peu de diplômes.", "Il est déjà trop âgé.", "Il est mauvais en langues.", "Il manque d'expérience."], "a": 3, "k": "ils cherchaient un professionnel confirmé", "transcript": "– Alors Clément, ta recherche d'emploi. Ça avance ?\n– Pas vraiment. Et ce n'est pas faute de chercher.\n– Mais attends, avec ta formation d'architecte, décorateur et tous ces stages, c'est incroyable.\n– J'avais une piste dans un cabinet de Montréal, mais ils m'ont répondu qu'ils cherchaient un professionnel confirmé.\n– Ah, et qui soit au moins bilingue comme toi. J'espère que ce n'est pas le problème, mais à 25 ans, je ne peux pas avoir travaillé 10 ans dans la même entreprise."}, {"type": "document", "q": "Que dit cette intervenante au sujet du travail à Londres ?", "c": ["Le recrutement se fonde sur l'expérience.", "Les salaires à l'embauche sont très élevés.", "L'évolution professionnelle est très lente.", "L'obtention d'un premier emploi est aisée."], "a": 0, "k": "On va surtout regarder les postes que vous avez déjà occupés.", "transcript": "– On dit souvent qu'à Londres, on peut changer de job quasiment comme de chemise. Est-ce que c'est toujours vrai ?\n– Il est toujours facile de passer d'un job à l'autre. Le diplôme a beaucoup moins d'importance.\n– On va surtout regarder les postes que vous avez déjà occupés. On va aussi tenir compte de vos motivations.\n– C'est vrai qu'on vous donne aussi la possibilité d'augmenter assez, enfin, comment dire, de franchir les étapes beaucoup plus rapidement.\n– On retrouve assez régulièrement des personnes vers 22-23 ans et déjà managers, tandis qu'en France, c'est quand même un petit peu plus compliqué."}, {"type": "document", "q": "Quel est le projet de Régis Olives et de ses élèves ?", "c": ["Interviewer un réalisateur.", "Participer à un festival.", "Tourner un film.", "Visiter des studios de cinéma."], "a": 2, "k": "participer à la réalisation d'un film", "transcript": "– Régis Olives. Bonjour, bonjour.\n– Bonjour Régis, vous lancez avec vos lycéens dans une aventure assez incroyable qui est de participer à la réalisation d'un film, un film avec un réalisateur professionnel avec des professionnels du cinéma.\n– Et il s'appelle François Chailloux.\n– Oui, à l'occasion du festival de Luchon, j'ai rencontré François. J'ai dit que je voulais faire un film."}, {"type": "document", "q": "Qu'aurait souhaité cette personne en allant chez Georges Brassens ?", "c": ["Visiter des studios de cinéma.", "Lui apporter un livre.", "Lui présenter son travail.", "Lui proposer une interview."], "a": 2, "k": "j'aimerais bien vous en parler", "transcript": "– Quand j'étais adolescent, j'avais écrit un long poème à Georges Brassens.\n– J'avais fini de le recopier. Enfin, c'était une espèce de chanson que j'avais fini de recopier, et j'étais allé la lui porter dans le bistrot en face de l'impasse Florimont où il habitait, sauf qu'il n'habitait plus là depuis des années. J'étais assez rassuré qu'il n'habite plus là, parce que je ne sais pas ce que je lui aurais raconté, mais je l'avais écrite.\n– Et je me dis que si un jour j'avais reçu un petit mot de Brassens me disant : « J'ai lu vos chansons et j'aimerais bien vous en parler », ça m'aurait intéressé."}, {"type": "document", "q": "Quelles difficultés les créateurs de musique rencontrent-ils ?", "c": ["Leur public est en diminution.", "Leur salaire est insuffisant.", "Leur savoir est peu transmis.", "Leur talent est dévalorisé."], "a": 1, "k": "ne leur permet pas d'avoir suffisamment de rémunération", "transcript": "– Et donc les compositeurs ont un autre métier.\n– C'est-à-dire que oui, ils sont chefs d'orchestre ou ils sont directeurs de conservatoire ou ils sont enseignants, chercheurs, directeurs artistiques, parfois parce que leur métier de compositeur ne leur permet pas d'avoir suffisamment de rémunération pour vivre correctement.\n– Je pense qu'il doit d'ailleurs y avoir à peu près deux ou 3 % de compositeurs aujourd'hui qui vivent réellement de leur musique. C'est très, très peu."}, {"type": "document", "q": "Pour quelles raisons ce psychologue a-t-il interrompu ses consultations ?", "c": ["Il a répondu à une demande de ses patients.", "Il consacre son temps à son nouveau métier.", "Il s'est remis en question suite à un échec.", "Il veut éviter toute publicité personnelle."], "a": 3, "k": "je ne veux pas donner l'image de quelqu'un qui va plus vite que les autres", "transcript": "– Psychologue, vous animez une émission télévisée. Comment faites-vous pour jongler entre vos consultations et vos émissions ?\n– J'ai suspendu mes consultations privées dans un souci éthique.\n– Je ne veux pas utiliser cette émission comme fonds de commerce, comme une manière de rabattre de la clientèle.\n– Je suis un thérapeute ordinaire et je ne veux pas donner l'image de quelqu'un qui va plus vite que les autres."}, {"type": "document", "q": "Quel est l'objectif de ces deux scientifiques ?", "c": ["Augmenter le nombre des surfaces exploitables.", "Développer la production des fruits et légumes.", "Diffuser des procédés en accord avec la nature.", "Introduire la plantation de nouvelles espèces."], "a": 2, "k": "invitent les paysans à mieux connaître leur champ ou leur vigne et à les travailler autrement", "transcript": "– Souvent, on les surnomme « les médecins de la terre ». Claude et Lydia Bourguignon auscultent les sols. Ils tentent de leur rendre la santé.\n– Quand les méthodes agressives de l'agriculture intensive ont fortement abîmé les terres cultivables au point, parfois, de faire disparaître toute trace de vie, engrais chimiques et pesticides ne sont pas les amis de ce couple de scientifiques.\n– Claude et Lydia Bourguignon invitent les paysans à mieux connaître leur champ ou leur vigne et à les travailler autrement sans pour autant compromettre les rendements.\n– De cette révolution verte qu'ils défendent dépend, selon eux, la qualité de l'offre faite aux consommateurs, ainsi que la survie des agriculteurs et des terres qu'ils cultivent."}, {"type": "document", "q": "D'après Camille, quel est le point fort de l'immobilier à Québec ?", "c": ["La recherche d'un appartement est rapide.", "Le système de la colocation est encouragé.", "Les habitations proposées sont de qualité.", "Les logements sont bon marché en banlieue."], "a": 0, "k": "C'est très simple de trouver un logement ici. Ça se fait en quelques jours.", "transcript": "– Camille, à ton arrivée à Québec, dans quel type de logement résidais-tu ?\n– J'ai d'abord habité un appartement en colocation dans le quartier de Montcalm. Au bout de six mois à peine, j'ai emménagé à deux pas du centre-ville.\n– C'est très simple de trouver un logement ici. Ça se fait en quelques jours.\n– Hum, comment as-tu trouvé ton premier appartement ? Avant de quitter la France, sur un site internet regroupant les annonces de colocation ? Mais je conseille de chercher sur place.\n– Il y a tout ce qu'il faut pour trouver facilement. On peut découvrir le quartier, voir si les pièces sont spacieuses, lumineuses et surtout bien insonorisées. Ce n'était pas le cas de mon premier logement, malgré le nom du quartier."}, {"type": "document", "q": "De quoi se plaint Géraldine ?", "c": ["De ses difficultés à se réveiller le matin.", "De son dernier salaire qui est insuffisant.", "De son emploi du temps professionnel.", "De son manque d'organisation habituel."], "a": 2, "k": "je commence à 6h du matin et à 1h de chez moi en plus", "transcript": "– Salut Géraldine, ça va ?\n– Non, pas trop. Tu sais que je cherchais du travail. Eh bien, maintenant que je l'ai trouvé, je ne suis pas très contente.\n– Pourquoi ? Tu ne touches pas assez d'argent ?\n– Non, c'est que deux fois par semaine, je commence à 6h du matin et à 1h de chez moi en plus.\n– Oh, c'est tôt ! Et comment tu vas faire pour les enfants ?\n– Oh, Gilles va s'en occuper. Mais moi, imagine, je ne sais pas comment je vais faire pour récupérer.\n– Tu vas dormir les week-ends ?"}, {"type": "document", "q": "Comment la jeune fille a-t-elle passé sa soirée ?", "c": ["Elle est sortie en boîte de nuit.", "Elle a dîné avec sa famille.", "Elle est restée toute seule.", "Elle a vu un mauvais film."], "a": 2, "k": "Alors je suis rentrée. Je me suis couchée.", "transcript": "– Salut Marie. Alors finalement, qu'est-ce que tu as fait samedi soir ?\n– Je n'avais pas le moral. J'étais invitée chez ma sœur. Je n'y suis pas allée.\n– Il y a des amis qui m'ont appelée pour aller danser au dernier moment. Je n'ai pas eu envie.\n– Tu as fait quoi ?\n– Alors finalement, j'ai voulu aller au cinéma. La séance était annulée pour raisons techniques. Alors je suis rentrée. Je me suis couchée.\n– Si j'avais su, je serais venu te chercher. On est allés jouer au bowling. On a passé une super soirée."}, {"type": "document", "q": "Qu'est-ce que Patrick était le seul à vouloir faire ?", "c": ["Jouer aux cartes.", "Aller se promener.", "Regarder la télévision.", "Visiter la région."], "a": 1, "k": "Il n'y a que moi qui voulais encore marcher malgré la pluie.", "transcript": "– Alors, Patrick, ce stage d'informatique à la Tulipe ?\n– Oh, ne m'en parle pas. Horrible ! Je suis ravi d'être au boulot.\n– D'abord, il a plu toute la semaine, avec une tempête, t'aurais vu ça. On pensait pouvoir faire des balades en fin de journée.\n– Il n'y a que moi qui voulais encore marcher malgré la pluie. Les autres se retrouvaient au bord pour jouer aux cartes ou refaire le monde.\n– D'autres ont passé leur temps devant la télé.\n– Eh bien, bravo ! Pour prendre le bon air, c'est réussi. Et je ne te décris pas le trou que c'était. Rien à voir à des kilomètres à la ronde."}, {"type": "document", "q": "Que dit cet homme sur ce logiciel de traduction ?", "c": ["Il a besoin d'être perfectionné.", "Il fonctionne pour les romans.", "Il peut adapter la ponctuation.", "Il sert aux spécialistes du métier."], "a": 0, "k": "le travail qu'on a réalisé a dû aussi être amélioré, confirmé, valorisé et vérifié", "transcript": "– En mathématiques, les mots sont redondants. C'est l'ordre des mots qui fait tout le sens.\n– Mais dans le monde littéraire, on peut avoir une petite virgule, un point qui peut être l'objet de nombreux commentaires.\n– Et ça, aujourd'hui, il vaut mieux faire confiance à la main humaine et à sa traduction manuelle qu'à l'algorithme et à l'intelligence artificielle.\n– Donc le logiciel ne peut pas, aujourd'hui, et n'est pas prêt.\n– Si on veut nous comprendre remplacer des traducteurs humains, il n'est absolument pas prêt, ni pour la littérature ni pour les mathématiques, puisque le travail qu'on a réalisé a dû aussi être amélioré, confirmé, valorisé et vérifié par une équipe de traducteurs qui sont des professionnels de la traduction scientifique de l'anglais vers le français."}, {"type": "document", "q": "Quel est l'objectif de l'activité actuelle de Fatoumata ?", "c": ["Comparer les mouvements des galaxies.", "Étudier les trajectoires des déchets cosmiques.", "Prévenir les risques de chute de météorites.", "S'entraîner pour des voyages interplanétaires."], "a": 1, "k": "je simule des collisions dans l'espace", "transcript": "– Oui, Fatoumata. À 29 ans, elle termine actuellement son doctorat en astronomie et prévoit de passer un an au Japon pour se préparer à son futur métier d'astronome.\n– Fatoumata veut devenir « femme de ménage de l'espace ». Les objets qui sont réellement retombés sur Terre, au Zimbabwe et en Arabie saoudite...\n– Plusieurs entreprises et l'agence ont proposé des solutions pour l'espace, mais aucune n'a vraiment été testée dans les conditions réelles.\n– Donc, en fait, je simule des collisions dans l'espace. Quand deux objets entrent en collision, cela crée 40 débris.\n– Regardez comment ces 40 débris vont évoluer avec le temps autour de la Terre."}, {"type": "document", "q": "Que déplore cet homme à propos de l'individu dans le monde actuel ?", "c": ["L'absence de formes d'altruisme.", "La place accordée à l'apparence.", "La superficialité des relations.", "Le manque d'estime de soi."], "a": 3, "k": "nous ne nous autorisons pas à être nous-mêmes, à nous écouter, à nous respecter", "transcript": "– Et je me suis rendu compte que nous vivions dans un monde où nous ne nous autorisons pas à être nous-mêmes, à nous écouter, à nous respecter.\n– Et c'est surtout de cette manière dont nous sommes pris par une forme d'auto-exploitation qui entraîne tant de gens jusqu'à l'épuisement, jusqu'au burn-out.\n– Cela me donne envie de dire : « juste, sauvez votre peau ». Devenez narcissique.\n– Et je crois que ce que signifie être narcissique, c'est pouvoir s'écouter, se rencontrer, se respecter. Et je crois que cela, c'est vraiment important aujourd'hui, crucial."}, {"type": "document", "q": "Comment la personne interviewée envisage-t-elle le métier d'actrice ?", "c": ["Comme la possibilité de s'évader dans d'autres vies.", "Comme la réalisation d'un rêve d'enfance.", "Comme le moyen d'être le centre de l'attention.", "Comme le reflet d'un caractère authentique."], "a": 3, "k": "j'essaie toujours de trouver un écho à ma propre histoire ou personnalité", "transcript": "– Lorsque je joue un personnage, j'essaie toujours de trouver un écho à ma propre histoire ou personnalité, mais j'ai envie d'être la plus sincère possible.\n– Jouer la comédie, c'est être dans la vérité de chaque instant. Je ne veux pas créer un personnage médiatique. Beaucoup d'artistes le font.\n– Je ne veux pas vivre dans le mensonge ou la séduction. J'aime les rapports simples. J'aime rigoler, faire l'imbécile sans me soucier de mon image.\n– Lorsque j'étais enfant, je rêvais d'avoir une vie ordinaire, être mariée à un homme normal, avoir des enfants et un peu d'argent aussi. Bref, tout ce que je n'avais pas à la maison. Je ne pensais pas du tout devenir actrice."}, {"type": "document", "q": "En quoi les projets financés par ce type d'épargne sont-ils particuliers ?", "c": ["Ils concernent des investissements à long terme.", "Ils impliquent des associations à but non lucratif.", "Ils offrent des opportunités de bénéfices élevés.", "Ils prennent en considération le facteur social."], "a": 3, "k": "embaucher des personnes handicapées, embaucher des chômeurs de longue durée", "transcript": "– La finance solidaire, c'est un compromis entre une recherche de rentabilité du placement que l'on fait et une recherche de sens.\n– Donc, si vous voulez, on va avoir un peu moins de rentabilité, mais peut-être un peu plus de sens.\n– Du sens, c'est faire un geste vis-à-vis d'autres, vis-à-vis d'entrepreneurs qui vont, par exemple, embaucher des personnes handicapées, embaucher des chômeurs de longue durée, s'endetter pour acheter du matériel, économiser de l'énergie.\n– C'est tout un ensemble de démarches et d'outils d'épargne. Il y a un peu moins de rentabilité, peut-être un petit peu plus de sens."}, {"type": "document", "q": "Quelle est l'opinion de cet intervenant ?", "c": ["L'action politique doit s'appuyer sur les conclusions scientifiques.", "La criminalité est en baisse dans les agglomérations modernes.", "La croissance urbaine est un danger pour l'écologie.", "La violence est indépendante de la densité humaine."], "a": 3, "k": "Le Japon, hautement industrialisé et urbanisé, a néanmoins un taux de criminalité très faible", "transcript": "– Nous vivons dans des nations urbaines, mais nous avons peur des villes.\n– La concentration des hommes et des activités, répète-t-on à l'envie, est en soi criminogène, et on cite invariablement les mêmes expériences sur les rats de laboratoire dont l'agressivité augmente avec le nombre, la densité.\n– Mais on ignore volontiers l'histoire humaine. Le Japon, hautement industrialisé et urbanisé, a néanmoins un taux de criminalité très faible, le plus faible du monde industriel.\n– Il faut se garder de tirer trop vite des enseignements pour la politique criminelle en prenant comme une panacée le retour à un habitat moins dense."}, {"type": "document", "q": "Quel est l'intérêt pour les personnes âgées de jouer ?", "c": ["Elles réapprennent certains gestes.", "Elles rencontrent d'autres joueurs.", "Elles se réintègrent à la communauté.", "Elles stimulent leurs facultés cérébrales."], "a": 3, "k": "jouer peut-être pour maintenir ses aspects cognitifs", "transcript": "– Il y a une qualité de vie qui n'est pas toujours excellente chez nos personnes âgées.\n– Alors on se disait : comme la population du Québec joue à des jeux, pourquoi ne pas utiliser ces jeux-là pour améliorer leur qualité de vie ?\n– Ça présente quand même des difficultés. Le jeu, pour les personnes qui sont plus âgées, présente parfois des difficultés de divers ordres.\n– On pourrait, à la limite, être une personne complètement inactive et pouvoir encore jouer, jouer peut-être pour maintenir ses aspects cognitifs. Donc, maintenir la vivacité d'esprit."}, {"type": "document", "q": "Pourquoi l'intervenant a-t-il accepté de travailler chez JP Morgan ?", "c": ["Pour mettre en pratique ses connaissances.", "Pour opérer une reconversion professionnelle.", "Pour pouvoir rembourser son emprunt.", "Pour vivre quelques années à l'étranger."], "a": 2, "k": "je m'étais endetté pour financer cette école de commerce", "transcript": "– Je suis recruté chez JP Morgan à Londres pour bosser sur le pétrole, en fusion-acquisition, et c'était payé vraiment une fortune, 38 000 francs par mois.\n– Je ne savais pas du tout ce que c'était, la finance n'était vraiment pas mon domaine, mais bon, j'y suis allé par appât du gain, malgré tout, l'appât du gain.\n– Pourquoi ? Parce que je m'étais endetté pour financer cette école de commerce. Voilà, je découvrais anscript": "– Peut-être aurais-je dû, moi aussi, faire l'acquisition de l'un de ces nombreux manuels du bonheur proposés par la librairie Errol.\n– Cela m'aurait peut-être aidé à positiver, à voir les choses autrement, comme le prônent justement ces ouvrages.\n– Ainsi, je ne serais pas rentrée avec la sensation un peu déprimante, je dois le dire, que pour être heureux, il faut faire des efforts.\n– Le bonheur n'est pas inné, nous disent les spécialistes, il s'apprend.\n– Et donc, au rayon bonheur de la librairie — je n'invente pas, il y a bien une étiquette « bonheur » sur un rayon —, les manuels proposent leur aide à grands coups d'exercices, de conseils, rédigés généralement à l'impératif. On y lit : « Ne vous souciez pas du regard des autres. »"}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 16/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test16_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 16</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
