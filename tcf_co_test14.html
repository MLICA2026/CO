<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 14 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

n changer aussi."], "a": 2, "k": "Regarde dans mon carnet.", "transcript": "– Peux-tu me donner le numéro de téléphone de Gisèle, s'il te plaît ?"}, {"type": "document", "q": "Que doit faire la femme ?", "c": ["Elle doit laisser un message.", "Elle doit rappeler plus tard.", "Elle doit renvoyer son CV.", "Elle doit revenir à 14h."], "a": 1, "k": "Vous pouvez l'appeler à partir de 14 heures.", "transcript": "Bonjour, monsieur. Je vous appelle concernant l'offre d'emploi de standardiste que vous avez publiée cette semaine dans le journal Le Monde.\n– Oui. Vous avez de l'expérience ?\n– Oui. J'ai travaillé deux ans dans un cabinet médical et plus récemment dans une grande entreprise. Je vous ai envoyé mon CV à l'adresse indiquée.\n– Très bien. Je vous donne le poste direct de ma collègue qui s'occupe du recrutement : 6723. Vous pouvez l'appeler à partir de 14 heures."}, {"type": "document", "q": "Que fait la personne qui vient voir M. Bernard cet après-midi ?", "c": ["S'entretenir avec un enseignant.", "Assister à un colloque.", "S'inscrire à l'université.", "Suivre un stage."], "a": 3, "k": "Je suis en stage toute la journée", "transcript": "– Bonjour, vous cherchez qui ?\n– Bonjour, je souhaiterais rencontrer monsieur Bernard.\n– Ah, je crois qu'il n'est pas à l'université aujourd'hui. Attendez, je regarde son planning de la semaine. C'est cela, il est absent cet après-midi, il assiste à un colloque. Je peux vous donner un rendez-vous pour demain, si vous voulez ?\n– Demain, ce n'est pas possible. Je suis en stage toute la journée. Alors lundi ?\n– Lundi, oui. Ce serait bien. Dans la matinée, ce serait possible ?"}, {"type": "document", "q": "Pourquoi Anne-Marie se trouve-t-elle en Auvergne ?", "c": ["Elle passe ses congés dans la région.", "Elle réside là depuis son enfance.", "D'un trafic de documents.", "Elle vient participer à un concours."], "a": 0, "k": "vous êtes en vacances ici en Auvergne", "transcript": "– Bonjour, Annemarie.\n– Bonjour, Nicolas. Vous êtes ame. Oui.\n– Alors, nous serons déjà partis quand vous arriverez. Donc on ne se verra pas, mais les clefs seront chez la voisine du deuxième étage. Je vous ai préparé des draps et serviettes et un petit repas froid vous attendra au frigo. Nous avons aussi laissé une liste d'activités à faire ici et des adresses pour sortir dîner.\n– Merci beaucoup. C'est très clair.\n– De rien. Bon séjour."}, {"type": "document", "q": "Qu'est-ce qui dérange le jeune homme ?", "c": ["Devoir annuler son voyage.", "Devoir visiter les musées.", "Devoir écourter leur séjour.", "Devoir partir en voiture."], "a": 3, "k": "Oui, mais en voiture comme ça, on pourra s'arrêter", "transcript": "– Alors, c'est toujours d'accord qu'on part à Londres ce week-end en Eurostar ?\n– Oui, mais en voiture comme ça, on pourra s'arrêter dans le sud de l'Angleterre.\n– Je ne connais pas.\n– Attends, tu rigoles. On n'a qu'un week-end. En train, ça va. Mais Londres et ses alentours en voiture, c'est plus facile, non ?\n– Mais non, pas pour visiter les musées de Londres. Non.\n– Eh bien, on n'y va pas ce week-end, mais quand on aura un pont… parce que moi, le musée…\n– Tu gagnes toujours."}, {"type": "document", "q": "Pourquoi la mère refuse-t-elle d'avoir un lave-vaisselle ?", "c": ["Parce qu'elle trouve ça trop bruyant.", "Parce que c'est inadapté à ses besoins.", "Parce que ça consomme trop d'eau.", "Parce que ses enfants font la vaisselle."], "a": 1, "k": "Je suis seule, même avec un petit appareil", "transcript": "– Maman, tu sais, avec Julie, on a décidé d'acheter un lave-vaisselle avec les deux enfants. Il y a beaucoup de vaisselle, mais j'ai peur que ça consomme beaucoup d'eau et que ça soit bruyant.\n– Détrompe-toi, il paraît qu'on utilise moins d'eau avec un lave-vaisselle qu'en lavant à la main, et les nouveaux appareils sont vraiment silencieux. Et toi, tu n'en veux pas un ?\n– Je suis seule, même avec un petit appareil. Il faudrait que j'attende plusieurs jours avant qu'il soit rempli."}, {"type": "document", "q": "Qu'ont fait ces personnes ?", "c": ["Elles ont assisté à un concert.", "Elles ont lu le même livre.", "Elles ont rencontré une célébrité.", "Elles ont vu un film au cinéma."], "a": 3, "k": "je ne suis pas très fan de l'acteur principal", "transcript": "– Alors, ça t'a plu ?\n– Oui, j'ai trouvé le scénario original et la fin surprenante, mais je ne suis pas très fan de l'acteur principal. Je trouve qu'ils auraient pu choisir quelqu'un d'autre pour ce rôle. Et la musique était insupportable."}, {"type": "document", "q": "Qu'annonce le directeur à l'employé ?", "c": ["Il est possible qu'il soit renvoyé.", "Il est renvoyé définitivement.", "Il va commencer sa période d'essai.", "Il va être embauché définitivement."], "a": 0, "k": "il arrive à l'heure si vous voulez être embauché", "transcript": "– Vous avez vu l'heure ?\n– Oui, je sais. Il est un peu tard.\n– C'est la troisième fois que vous arrivez en retard cette semaine. Je m'excuse, écoutez-moi. Bien. Notre période d'essai se termine dans 15 jours. Dorénavant, il arrive à l'heure si vous voulez être embauché."}, {"type": "document", "q": "Que fait cette femme ?", "c": ["Elle organise des fêtes au village.", "Elle travaille chez un fleuriste.", "Elle se marie le lendemain.", "Elle travaille dans un restaurant."], "a": 3, "k": "vous serez complet", "transcript": "– Bonjour.\n– Ah, c'est joli. Toutes ces fleurs.\n– Oui, je suis en train de préparer des bouquets pour demain.\n– Ah bon ? Il y a une fête en ville demain ?\n– Non, nous avons un repas de mariage. Il faut que tout soit prêt pour 12h.\n– Ah, alors vous serez complet, je suppose. On voulait vous réserver une table.\n– Je ne sais pas. Il faut voir avec la patronne."}, {"type": "document", "q": "Pourquoi Jeanne évite-t-elle de se baigner ?", "c": ["Elle déteste les bains de mer.", "Elle développe des allergies cutanées.", "Elle est angoissée par le risque de se noyer.", "Elle est terrorisée par les animaux aquatiques."], "a": 3, "k": "je n'ose même pas aller me baigner par peur de ce qu'il y a dans l'eau", "transcript": "– Et vous, Jeanne, avez-vous des phobies ?\n– Peut-être la même que vous, les requins — en réalité, la vie sous-marine dans son ensemble. Parfois, je n'ose même pas aller me baigner par peur de ce qu'il y a dans l'eau.\n– Et si on vous disait qu'il y a des prédateurs dans toutes les mers et même ici au Canada ?\n– J'éviterai les mers et j'irai dans les lacs.\n– Mais la menace est la même dans les lacs, d'autres espèces aquatiques qui grouillent. Ça ne vous gêne pas ?\n– C'est vrai. Je crois que je vais me contenter des piscines."}, {"type": "document", "q": "Pourquoi cette personne aime-t-elle lire ?", "c": ["Pour comprendre la société.", "Pour enrichir sa culture.", "Pour passer le temps.", "Pour plonger dans l'imaginaire."], "a": 3, "k": "la lecture est pour moi le plaisir du récit qui construit de nouveaux mondes", "transcript": "Je me souviens très bien du premier livre — pas du premier livre lu, mais du premier à avoir provoqué en moi la joie de la lecture. Celui qui fait que je ne lis plus que des romans parce que la lecture est pour moi le plaisir du récit qui construit de nouveaux mondes. C'était un volume du Club des Cinq. Je ressens encore dans mon corps la qualité et l'intensité de cette lecture. Je m'absorbais totalement dans le texte, devenant sourde et aveugle au monde. Vivre l'action, voir la vie pétiller et se teinter de nouvelles couleurs, nommer des sensations inconnues, entrevoir des passions nouvelles, refermer le livre avec bonheur et regret, et attendre le prochain avec une fiévreuse impatience."}, {"type": "document", "q": "Pourquoi cette musicienne a-t-elle choisi le violoncelle ?", "c": ["Elle a été habituée très tôt par ses parents à écouter des œuvres pour violoncelle.", "Elle a été impressionnée par le son des cordes qu'on peut faire vibrer longtemps.", "Elle a privilégié un instrument qu'elle pouvait transporter plus facilement qu'un piano.", "Elle a rencontré des amis musiciens de ses parents qui l'ont convaincue."], "a": 1, "k": "je recherchais en fait un instrument avec lequel je puisse faire durer le son", "transcript": "– Ève Pansky, vous êtes musicienne. Est-ce que vous avez toujours voulu jouer du violoncelle ?\n– Quand j'étais petite, il y avait un piano chez des amis sur lequel je pianotais. Ensuite, j'ai essayé le banjo, la guitare — je m'approchais des cordes et je recherchais en fait un instrument avec lequel je puisse faire durer le son. Un jour, je jouais avec mes copains d'école chez moi et j'ai mis un disque au hasard. C'était du violoncelle. Et là, ça m'a totalement aimantée. J'ai arrêté de jouer. J'étais aspirée par ce son."}, {"type": "document", "q": "D'après le directeur de la revue, pourquoi l'ouverture des magasins le dimanche aurait-elle peu d'influence sur l'économie française ?", "c": ["Parce que la consommation dépend avant tout du pouvoir d'achat.", "Parce que la création d'emploi restera rare dans ce secteur d'activité.", "Parce que les commerces font des bénéfices sur les ventes en semaine.", "Parce que les Français ne sont pas habitués à consommer le dimanche."], "a": 0, "k": "Les consommateurs dépensent d'abord en fonction de leurs revenus", "transcript": "Autoriser les magasins à ouvrir le dimanche en France serait-ce la solution pour développer la croissance et l'emploi ? Le directeur de la revue « 60 000 000 de consommateurs » s'explique : « Le secrétaire d'État à la consommation relevait, en visitant un dimanche un centre commercial de la région parisienne, que les boutiques y réalisent sur ce seul jour plus du tiers du chiffre d'affaires de toute la semaine. Oui, mais voilà : ce qu'on achète le dimanche, on ne l'achète pas les autres jours, et vice versa. Attention aux illusions d'optique. Les consommateurs dépensent d'abord en fonction de leurs revenus et non en fonction des jours d'ouverture des magasins. C'est simplement une autre répartition du temps d'achat. Donc, quel impact pour la croissance et l'emploi en général ? Je crains que ça ne change pratiquement rien. »"}, {"type": "document", "q": "Que veut Loïc Le Meur ?", "c": ["Avoir la liberté d'être son propre patron.", "Innover dans le domaine informatique.", "Mener un projet aux États-Unis.", "Mieux réussir que ses parents."], "a": 0, "k": "Je n'ai jamais eu vraiment envie de travailler pour quelqu'un d'autre que moi", "transcript": "Élu récemment par le magazine Business Week parmi les 25 personnes les plus influentes du web, Loïc Le Meur vit désormais à San Francisco, en Californie, au cœur de la Silicon Valley, où il a créé sa nouvelle société Sismique. Ce diplômé de l'École des Hautes Études Commerciales de Paris est devenu au fil du temps une célébrité entre hi-tech et innovation.\n« Mon père était entrepreneur et mon grand-père aussi. Je n'ai jamais eu vraiment envie de travailler pour quelqu'un d'autre que moi. Je pense que je serais volontiers indépendant. J'ai toujours voulu créer ma propre entreprise dans l'internet. Donc c'est les deux, les deux passions. »"}, {"type": "document", "q": "Quel est le rôle d'un oiseau de tête dans un vol groupé ?", "c": ["Il diminue les efforts de ceux qui le suivent.", "Il est le seul à connaître la direction à prendre.", "Il guide ses congénères en cas de tempête.", "Il protège les plus faibles durant la migration."], "a": 0, "k": "profitent des turbulences qu'il a créées et font des économies", "transcript": "On s'est rendu compte que quand les oiseaux sont en V, celui qui est à la pointe dépense beaucoup d'énergie parce qu'il est le premier et qu'il doit persévérer. Mais les autres, qui sont tous derrière lui, bien alignés, un peu décalés, profitent des turbulences qu'il a créées et font des économies. Et l'idée, c'est que plus on est nombreux, plus on peut partager chacun son tour. Le premier, au bout d'un certain temps, quand il en a assez, se décale et se met en bout de chaîne pour prendre la place de celui qui était derrière. Et c'est un nouveau qui va prendre sa place et qui fera l'effort initial."}, {"type": "document", "q": "Quelles conclusions le savant a-t-il tirées en observant les abeilles ?", "c": ["Elles ont la notion du temps chronologique.", "Elles redoutent de s'approcher des humains.", "Elles sont attirées par la lumière du soleil.", "Elles sont un cas à part chez les animaux."], "a": 0, "k": "elles sont quand même venues la chercher à l'heure habituelle", "transcript": "Elle est la première indication que les organismes, et en particulier les animaux, avaient une horloge interne. On doit cela à un biologiste — en fait un médecin suisse — qui observait les abeilles pendant son petit déjeuner à la terrasse de son chalet. Elles venaient, elles étaient attirées par la confiture. Et puis un jour, il faisait mauvais. Il a pris son petit déjeuner à l'intérieur. Donc les abeilles ne pouvaient pas sentir la confiture, mais elles sont quand même venues la chercher à l'heure habituelle. C'est une indication qu'il y avait non seulement un rythme, mais un mécanisme de mesure du temps."}, {"type": "document", "q": "Quel est le but de ce communiqué ?", "c": ["Annoncer la diffusion exceptionnelle, en direct, d'un festival de musique.", "Dire pourquoi des journalistes et des techniciens ont cessé le travail.", "Expliquer pourquoi on entend de la musique au lieu des programmes habituels.", "Rappeler les changements de programme dus à la nouvelle grille horaire."], "a": 2, "k": "l'ensemble de nos journaux et de nos émissions de la journée sera remplacé par un programme musical continu", "transcript": "Nous informons nos auditeurs qu'en raison d'un arrêt de travail observé par certaines catégories de personnel, l'ensemble de nos journaux et de nos émissions de la journée sera remplacé par un programme musical continu. Deux bulletins d'information assurés par des personnels non grévistes seront diffusés à 13 heures et à 20 heures. Nous prions nos auditeurs de nous excuser de cette situation. C'était un communiqué de la direction de la station."}, {"type": "document", "q": "À quel type d'entreprise appartient ce service ?", "c": ["Un groupe de centres d'appels téléphoniques.", "Un service de livraison express du courrier.", "Un spécialiste de la création de sites internet.", "Un fournisseur pour la restauration à domicile."], "a": 1, "k": "nous acheminons chaque jour plus de 75 000 000 de plis", "transcript": "Colis Com, toujours à votre service, nous acheminons chaque jour plus de 75 000 000 de plis. Si, malgré tous nos efforts, un envoi n'est pas parvenu à son destinataire, des professionnels sont à votre disposition pour réaliser les recherches nécessaires et s'engagent à vous tenir informé dans les plus brefs délais. Pour ce faire, connectez-vous à notre site www.coliscom.com ou appelez le 08 67 35 35. Nous serons toujours à votre écoute."}, {"type": "document", "q": "Quelle est l'hypothèse de la police sur les œuvres volées ?", "c": ["Elles ont été revendues.", "Elles seront abandonnées.", "Elles sont stockées à l'étranger.", "Elles vont être falsifiées."], "a": 0, "k": "les enquêteurs pensent que la revente était déjà conclue", "transcript": "C'est l'un des plus importants vols jamais réalisés dans une galerie de peinture en Europe. Il concerne quatre tableaux de certains des plus grands maîtres de la peinture européenne : Manet, Renoir, Sisley et Chaal. Le montant du préjudice s'élève à plusieurs centaines de millions d'euros. Ces tableaux sont tellement connus que les enquêteurs pensent que la revente était déjà conclue avant que les trafiquants ne passent à l'acte. Il faut faire vite car ces œuvres sont fragiles. Toutes les polices européennes coopèrent afin de retrouver les malfaiteurs et les tableaux dans les plus brefs délais."}, {"type": "document", "q": "Quel est le public particulièrement visé par cette publicité ?", "c": ["Les jeunes chefs d'entreprises.", "Les responsables de petites entreprises.", "Les directeurs d'entreprises publiques.", "Les sociétés des secteurs tertiaires."], "a": 1, "k": "dans mon entreprise, moi, je suis tout seul à m'occuper de tout", "transcript": "« C'est vrai que de temps en temps, on entend parler de nouvelles mesures pour l'emploi des jeunes. C'est bien, mais dans mon entreprise, moi, je suis tout seul à m'occuper de tout. Et franchement, je n'ai pas le temps de remplir toute cette paperasse. »\n« Oui, mais il y a du nouveau avec le contrat jeune en entreprise. Si on emploie un jeune peu ou pas diplômé de 16 à 22 ans, c'est zéro charge pour l'entreprise pendant deux ans et 50 % la troisième année, avec une simple déclaration à remplir auprès de l'État. Plus de souci pour les petits patrons, c'est pas mal, non ? »"}, {"type": "document", "q": "Comment la personne interviewée envisage-t-elle le métier d'actrice ?", "c": ["Comme la possibilité de s'évader dans d'autres vies.", "Comme la réalisation d'un rêve d'enfance.", "Comme le moyen d'être le centre de l'attention.", "Comme le reflet d'un caractère authentique."], "a": 3, "k": "j'ai envie d'être le plus sincère possible", "transcript": "« Lorsque je joue un personnage, j'essaie toujours de trouver un écho à ma propre histoire ou personnalité, mais j'ai envie d'être le plus sincère possible selon moi. Jouer la comédie, c'est être dans la vérité de chaque instant. Je ne veux pas créer un personnage médiatique. Beaucoup d'artistes le font. Je ne veux pas vivre dans le mensonge ou la séduction. J'aime les rapports simples. J'aime rigoler, faire l'imbécile sans me soucier de mon image. Lorsque j'étais enfant, je rêvais d'avoir une vie ordinaire, être mariée à un homme normal, avoir des enfants et un peu d'argent aussi. Bref, tout ce que je n'avais pas à la maison — je ne pensais pas du tout devenir actrice. »"}, {"type": "document", "q": "En quoi les projets financés par ce type d'épargne sont-ils particuliers ?", "c": ["Ils concernent des investissements à long terme.", "Ils impliquent des associations à but non lucratif.", "Ils offrent des opportunités de bénéfices élevés.", "Ils prennent en considération le facteur social."], "a": 3, "k": "embaucher des handicapés, embaucher les chômeurs de longue durée", "transcript": "« La finance solidaire. C'est un compromis entre une recherche de rentabilité du placement que l'on fait et une recherche de sens. Si on veut, on va avoir un peu moins de rentabilité, mais un peu plus de sens. Du sens, c'est faire un geste vis-à-vis d'autres, vis-à-vis d'entrepreneurs qui vont par exemple embaucher des handicapés, embaucher les chômeurs de longue durée, s'endetter pour acheter du matériel, économiser de l'énergie. C'est tout un ensemble de démarches et d'outils d'épargne. Il y a un peu moins de rentabilité, peut-être un petit peu plus de sens. »"}, {"type": "document", "q": "Quelle est l'opinion de cet intervenant ?", "c": ["L'action politique doit s'appuyer sur les conclusions scientifiques.", "La criminalité est en baisse dans les agglomérations modernes.", "La croissance urbaine est un danger pour l'écologie.", "La violence est indépendante de la densité humaine."], "a": 3, "k": "Le Japon, hautement industrialisé et urbanisé, a néanmoins un taux de criminalité très faible", "transcript": "Nous vivons dans des nations urbaines, mais nous avons peur des villes. La concentration des hommes et des activités, répète-t-on, est en soi génante, et on cite invariablement les mêmes expériences sur les rats de laboratoire dont l'agressivité augmente avec le nombre et la densité. Mais on ignore volontiers l'histoire humaine. Le Japon, hautement industrialisé et urbanisé, a néanmoins un taux de criminalité très faible — le plus faible du monde industriel. Il faut se garder de tirer trop vite des enseignements pour la politique criminelle en prônant, comme une panacée, le retour à un habitat moins dense."}, {"type": "document", "q": "Quel est l'intérêt pour les personnes âgées de jouer ?", "c": ["Elles réapprennent certains gestes.", "Elles rencontrent d'autres joueurs.", "Elles se réintègrent à la communauté.", "Elles stimulent leurs facultés cérébrales."], "a": 3, "k": "jouer peut-être pour maintenir ses aspects cognitifs, donc maintenir la vivacité d'esprit", "transcript": "« Il y a une qualité de vie qui n'est pas toujours excellente chez nos personnes âgées. Alors on se disait : comme la population du Québec joue à des jeux, pourquoi n'utiliserait-on pas ces jeux-là pour améliorer leur qualité de vie ? Ça présente quand même des difficultés. Le jeu pour les personnes qui sont plus âgées, quelquefois ils ont des difficultés de divers ordres. Comment est-ce que vous essayez de prévenir le fait qu'ils ne puissent pas jouer ? On pourrait à la limite être une personne complètement inactive et pouvoir encore jouer — jouer peut-être pour maintenir ses aspects cognitifs, donc maintenir la vivacité d'esprit. »"}, {"type": "document", "q": "Selon cette personne, qu'est-ce que l'utilisation d'internet apporte au processus de recrutement ?", "c": ["Une diminution de la longueur des entretiens.", "Une meilleure diffusion des offres d'emploi.", "Une plus grande équité entre les candidats.", "Une protection accrue des données personnelles."], "a": 2, "k": "il réduit les discriminations, car l'entretien peut être enregistré", "transcript": "« Dans mon cabinet de recrutement, internet est devenu un outil indispensable, non seulement pour repérer des candidats potentiels sur la toile, mais également pour la phase d'entretien. Grâce au logiciel de visioconférence, les cadres ne doivent plus se déplacer et parfois faire des centaines de kilomètres pour s'entendre dire après 10 minutes d'entretien qu'ils n'ont pas le profil. De plus, l'utilisation de tels logiciels offre un autre avantage considérable : il réduit les discriminations, car l'entretien peut être enregistré aussi bien par le candidat que par le recruteur. Cela évite les questions déplacées. Enfin, les enregistrements peuvent être visionnés autant de fois qu'on souhaite ou encore être transmis à nos clients pour plus de transparence et de professionnalisme. »"}, {"type": "document", "q": "Comment les médias utilisent-ils les faits divers ?", "c": ["Comme un prétexte pour éviter de traiter les questions significatives.", "Comme une occasion de commenter ce qui ne va pas dans notre société.", "Comme un moyen de sensibiliser le public aux problèmes des individus.", "Comme une façon de distraire les individus de leurs petits soucis quotidiens."], "a": 0, "k": "pour détourner de ce qui est plus général et plus important", "transcript": "Les faits divers sont bien des faits, des événements, des choses qui arrivent. Mais pourquoi diable sont-ils divers ? On peut les trouver monotones : toujours des meurtres, des accidents, des catastrophes, des séquestrations. Chocs, en tout cas, de ce qui ne va pas dans notre société. En effet, alors qu'il arrive 100 000 choses heureuses et agréables, l'information s'attache à l'horrible et à l'imprévu. Les faits divers racontent l'horreur qui atteint quelques individus, mais qui masque les maladies d'une société tout entière — à leur donner tant d'importance sans les commenter, les médias contournent gaillardement les problèmes majeurs collectifs. À se demander si ces catastrophes si diverses ne sont pas mises en avant, sans qu'on en tire aucune leçon, pour faire diversion — non pas pour divertir au sens de récréer, mais pour détourner de ce qui est plus général et plus important, les problèmes qui concernent des millions d'humains, mais qui paraissent en effet plus triviaux."}, {"type": "document", "q": "Que représente la musique dans la vie de cet artiste ?", "c": ["Un désir d'enfance satisfait spontanément.", "Un moyen de devenir rapidement célèbre.", "Un souhait de ses parents qu'il a assumé.", "Une passion née du hasard de rencontres."], "a": 2, "k": "ça faisait partie de l'éducation", "transcript": "« Pourquoi vous avez choisi la musique ? » « Je pense que ce n'était pas vraiment un choix. J'ai commencé la musique très tôt. Bien sûr, à la maison, c'était que de la musique, tout le temps. Le piano à six ans — j'ai jamais dit que je voulais faire du piano, mais ça faisait partie de l'éducation. Et voilà, c'était la voie naturelle. J'avais peut-être des envies à l'adolescence de faire d'autres choses, mais ce n'était pas très sérieux. »"}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 14/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test14_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 14</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`

        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
</html>
