<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 7 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

 recherche d'emploi.", "D'une séance de sport."], "a": 1, "k": "la ligne 6 était arrêtée", "transcript": "– Tu as pris le métro ce matin ?\n– Je n'ai pas travaillé aujourd'hui. Je suis allée au cinéma. Et bien, tu as de la chance, la ligne 6 était arrêtée. J'ai dû marcher pendant 1 heure."}, {"type": "document", "q": "Que vont faire ces amis le mercredi soir ?", "c": ["Dîner au restaurant.", "Faire des courses.", "Travailler tard.", "Voir une exposition."], "a": 3, "k": "d'accord pour l'exposition", "transcript": "– Tu voudrais aller à l'exposition Matisse au musée d'Orsay demain soir ?\n– Quelle bonne idée ! Mais après le travail, je voulais aller en ville pour faire des courses.\n– Tu ne peux pas les faire jeudi ?\n– Mais si ! Alors d'accord pour l'exposition et après on dînera chez moi."}, {"type": "document", "q": "Pour quelle raison le jeune homme hésite-t-il à s'inscrire ?", "c": ["Le test de niveau est difficile.", "L'école est loin de son bureau.", "Les cours ont lieu en journée.", "Les tarifs sont chers pour lui."], "a": 2, "k": "ne propose pas de cours le soir", "transcript": "– Tu t'es renseigné sur la formation en informatique ?\n– Oui, j'ai appelé ce matin.\n– Et alors, tu penses t'inscrire ?\n– Je ne sais pas encore. Le centre de formation ne propose pas de cours le soir, sinon les tarifs sont raisonnables. D'après ce que Julien m'a dit, le prof est très bien.\n– C'est important.\n– Oui, en plus c'est à côté du bureau. Le test d'entrée a lieu la semaine prochaine. Il faut que je parle avec mon responsable. J'espère qu'il sera d'accord pour que je m'absente 4 heures par semaine."}, {"type": "document", "q": "Pour ces personnes, qui est Daniel ?", "c": ["Leur client.", "Leur collègue.", "Leur directeur.", "Leur professeur."], "a": 1, "k": "Le service semblera vide sans lui", "transcript": "– Est-ce que tu veux participer au cadeau pour Daniel ?\n– Un cadeau ? Pourquoi ?\n– Il part à la retraite à la fin du mois.\n– Il part déjà ? Le service semblera vide sans lui. Et comment va faire le chef sans son secrétaire ?\n– Ça, il essaie de trouver quelqu'un pour le remplacer mais je crois qu'il va avoir du mal à trouver un aussi bon employé que lui.\n– Si le remplaçant doit plaire au chef, aux collègues et aux clients, c'est sûr, ça va être dur."}, {"type": "document", "q": "Qu'est-ce qu'il faut acheter pour recevoir un cadeau ?", "c": ["Un chapeau de soleil.", "Un maillot de foot.", "Un sac de sport.", "Un vêtement de plage."], "a": 3, "k": "Pour l'achat d'un maillot de bain", "transcript": "Le soleil revient, c'est bientôt les vacances dans votre magasin Sport Plus. Pour l'achat d'un maillot de bain, un tube de crème en cadeau. Rendez-vous au rayon article de plage jusqu'au 30 juin."}, {"type": "document", "q": "Quel est le thème du sondage ?", "c": ["L'intérêt pour le cinéma.", "Les activités de loisirs.", "Les habitudes de transport.", "L'utilisation des médias."], "a": 3, "k": "les informations à la télévision et sur internet", "transcript": "– Bonjour madame. Auriez-vous quelques minutes pour répondre à un sondage ?\n– Rapidement ? Oui.\n– Parfait. Suivez-vous l'actualité ?\n– Oui, un peu. Mais je n'ai pas toujours le temps.\n– Vous lisez les journaux ?\n– Un peu dans le métro, mais je regarde plutôt les informations à la télévision et sur internet. Oui, parfois des amis postent des actualités sur les réseaux sociaux. J'aime ceux qui parlent des grands réalisateurs de films, des acteurs, parce que je suis actrice, vous savez.\n– Très bien. Merci madame. Vos réponses nous seront très utiles."}, {"type": "document", "q": "Que souhaite faire l'étudiant ?", "c": ["Obtenir une aide financière.", "Récupérer un dossier.", "Remettre un devoir.", "S'inscrire à l'université."], "a": 0, "k": "je voudrais déposer une demande de bourse", "transcript": "– Bonjour, je suis étudiant ici à l'université de Montréal et je voudrais déposer une demande de bourse.\n– Avez-vous apporté tous les documents ?\n– Euh, je crois.\n– Je ne vois pas votre passeport. Il faut une photocopie du passeport pour enregistrer votre demande."}, {"type": "document", "q": "Pourquoi l'homme se rend-il dans une banque ?", "c": ["Pour retirer le chéquier arrivé une semaine avant.", "Pour vérifier le renouvellement de son chéquier.", "Pour savoir quand il aura son carnet de chèques.", "Pour corriger l'orthographe de son nom sur son chéquier."], "a": 2, "k": "je n'ai pas bien compris quand je recevrai le chéquier", "transcript": "– Bonjour madame, je suis venu hier ouvrir un compte mais je n'ai pas bien compris quand je recevrai le chéquier commandé par vos soins.\n– Pouvez-vous me rappeler votre nom et votre numéro de compte ?\n– Bien sûr, je m'appelle Cloutier, Pierre Cloutier. Voici mon numéro de compte ouvert hier dans cette agence.\n– Très bien. Pour un premier chéquier, comptez au moins une petite semaine. Puis on le commande automatiquement et ça prend 48h. Il sera à votre disposition soit au guichet, soit envoyé à votre domicile avec accusé de réception. Que souhaitez-vous ?\n– Et bien, je préfère passer le prendre en fin de semaine. Je serai sûr de l'avoir.\n– Très bien. À bientôt, monsieur."}, {"type": "document", "q": "Que propose Martin à Laurent ?", "c": ["D'assister à une rencontre sportive.", "De fêter leur victoire entre copains.", "De jouer au basket-ball sans payer.", "De s'inscrire dans un nouveau club."], "a": 2, "k": "on peut y essayer tous les sports et c'est gratuit", "transcript": "Salut Laurent, c'est Martin. Dis, il y a un gymnase qui vient d'ouvrir à côté de chez moi. Il y a plusieurs salles en ce moment. On peut y essayer tous les sports et c'est gratuit. Ça te dirait de venir faire une partie de basketball avec les copains demain soir ? Réponds-moi vite pour que j'appelle le club pour réserver le terrain. À plus tard."}, {"type": "document", "q": "Que déplore cette intervenante ?", "c": ["L'inadéquation entre l'université et le monde du travail.", "La baisse de qualité des formations professionnelles.", "La compétition pour entrer dans les grandes écoles.", "Le coût de l'inscription dans l'enseignement supérieur."], "a": 0, "k": "les opportunités offertes par les entreprises ne sont pas suffisantes", "transcript": "Et ça, qu'est-ce que ça dit de notre société ? Cette dévalorisation des diplômes, c'est un message terrible à une époque où on ne jure que par la société de la connaissance et l'éducation de masse. Notre économie s'est mal adaptée aux nouveaux enjeux. En effet, les opportunités offertes par les entreprises ne sont pas suffisantes pour absorber les nouvelles cuvées de master ou de doctorants. Trop de diplômés, pas assez de jobs d'envergure. La langueur qui frappe la croissance de notre pays depuis des années se traduit en fin de compte par des emplois perdus, des salaires moins généreux. Résultat, c'est la course à l'échalote. Pour qu'un diplôme ait de la valeur, il faut qu'il soit encore plus prestigieux."}, {"type": "document", "q": "Que préconise Nicolas Pinel pour les mathématiques ?", "c": ["De créer des groupes de recherche scientifique.", "De reculer l'âge de début de leur apprentissage.", "De réviser les méthodes pédagogiques actuelles.", "De sélectionner les meilleurs élèves des écoles."], "a": 2, "k": "les enseigner comme un outil de réflexion ancré dans le quotidien", "transcript": "Comment réconcilier donc les élèves et les maths ? Les maths apparaissent beaucoup trop techniques et déconnectées du monde qui nous entoure, alors qu'il faudrait les enseigner comme un outil de réflexion ancré dans le quotidien, affirme Nicolas Pinel. Il suggère de montrer que les maths sont à la portée de tous en revenant à des choses très concrètes, justement en mettant les enfants dans des situations de réussite afin qu'ils prennent du plaisir et retrouvent un sentiment de compétence. Les tout-petits peuvent par exemple apprendre à rejouer au jeu de la marchande, car figurez-vous que beaucoup d'enfants aujourd'hui ne savent plus rendre la monnaie. La place du jeu est essentielle pour combattre l'anxiété qui naît de l'échec et de la mésestime de soi."}, {"type": "document", "q": "Qu'apprend-t-on sur Corine ?", "c": ["Elle est en congé.", "Elle est tombée malade.", "Elle travaille la nuit.", "Elle voyage souvent."], "a": 3, "k": "elle repart pour une conférence au Canada la semaine prochaine", "transcript": "– Stéphane, est-ce que Corine est rentrée de sa mission au Japon ?\n– Oui, elle était au bureau hier et aujourd'hui, mais elle est très fatiguée.\n– La pauvre, sa mission a été plus difficile que d'habitude.\n– Oui, elle a eu des réunions dans plusieurs villes. Elle n'a pas arrêté de circuler.\n– C'est sympa. Elle a pu découvrir plein de lieux différents.\n– Pas du tout. Elle terminait très tard le soir. Elle devrait prendre des vacances.\n– Impossible. Elle repart pour une conférence au Canada la semaine prochaine."}, {"type": "document", "q": "Que conseille cette intervenante aux parents ?", "c": ["D'attribuer à la lecture le statut de loisir.", "De favoriser la lecture en autonomie.", "De limiter la lecture d'histoires illustrées.", "De sélectionner des lectures classiques."], "a": 0, "k": "la lecture est avant tout un plaisir", "transcript": "Je crois que les difficultés en matière de lecture ont des causes à la fois individuelles et sociales. Les parents, par exemple, parce qu'ils sont angoissés par l'avenir de leurs enfants, leur présentent souvent la lecture comme une obligation, une démarche indispensable pour réussir. Et c'est une erreur, parce que la lecture est avant tout un plaisir. Un livre, c'est un voyage, une découverte, une aventure, et il faudrait faire découvrir la lecture aux enfants comme on leur fait découvrir la cuisine chinoise ou les jeux dans la neige. Et puis les parents refusent aussi souvent à leurs enfants des lectures qu'ils considèrent comme mineures, les bandes dessinées par exemple. Et ça aussi, c'est une erreur. Lire une bande dessinée, c'est lire, et ça permet souvent d'ailleurs de découvrir ensuite d'autres formes de littérature."}, {"type": "document", "q": "Qu'est-ce que cette personne cherche à savoir ?", "c": ["Comment protéger ses végétaux.", "Comment recycler son sapin.", "Comment replanter un arbre.", "Comment scier une branche."], "a": 1, "k": "vous sauriez ce que je dois faire de mon arbre de Noël pour qu'il soit ramassé", "transcript": "– Bonjour, je suis nouveau à Charlebourg. Vous sauriez ce que je dois faire de mon arbre de Noël pour qu'il soit ramassé ?\n– Vous n'avez qu'à déneiger devant chez vous et puis le laisser dans la rue. La collecte a lieu demain matin.\n– Il est grand votre arbre ?\n– Regardez, je l'ai mis dans le jardin. Il fait bien 3 m de haut.\n– Alors il faut le couper en deux et aussi enlever tout ce qui est dessus."}, {"type": "document", "q": "En quoi cette plateforme est-elle utile aux femmes qui voyagent ?", "c": ["Elle fournit une carte de lieux dangereux à éviter.", "Elle leur enseigne des techniques d'autodéfense.", "Elle leur permet de se loger en toute sécurité.", "Elle propose une liste de numéros d'urgence."], "a": 2, "k": "une plateforme d'hébergement réservée aux femmes qui hébergent d'autres femmes", "transcript": "Votre chronique s'adresse aux globe-trotteuses ce matin, à toutes les femmes qui parcourent le monde en solitaire. Une toute nouvelle plateforme vient d'être créée exprès pour elles. Et oui, voyager seule a ses avantages, Mathilde, mais peut aussi faire un peu peur quand on est une femme. Du moins, c'est ce qu'a pu constater Christina Boisière, habituée au voyage en solo depuis 17 ans. Son expérience lui a appris que dormir chez l'habitant était la meilleure façon de découvrir la culture d'un pays. Toutefois, cette formule n'est pas forcément de tout repos, pour ne pas dire sans risque. C'est pourquoi elle a eu l'idée de monter une plateforme d'hébergement réservée aux femmes qui hébergent d'autres femmes."}, {"type": "document", "q": "Selon la directrice de cette école, quel est l'objectif de la pédagogie active ?", "c": ["Amener l'élève à participer à sa propre formation.", "Axer principalement l'apprentissage sur le jeu.", "Initier les élèves à des activités parascolaires.", "Responsabiliser les élèves encore immatures."], "a": 0, "k": "c'est une pédagogie qui implique l'élève dans son apprentissage", "transcript": "Malgré les apparences, vous n'êtes pas dans une salle de danse, mais dans une école pour le moins innovante et unique à Marseille. Ici, on enseigne bien sûr les matières essentielles, mais aussi la comédie musicale, la cuisine ou bien l'électricité. Cette école parie surtout depuis 5 ans sur la pédagogie active de remotivation dans l'intérêt de l'enfant. On écoute la directrice de l'établissement.\n– La pédagogie active, c'est une pédagogie qui implique l'élève dans son apprentissage, il est acteur, c'est-à-dire qu'on va le familiariser tout seul avec un texte ou avec n'importe quel support d'information. Il s'autonomise tout en prenant plaisir à apprendre."}, {"type": "document", "q": "Qu'explique cet arbitre ?", "c": ["Elle a décidé d'adopter une attitude agressive.", "Elle a eu des problèmes pour se faire une place.", "Elle est harcelée par des plaisanteries sexistes.", "Elle est respectée pour son professionnalisme."], "a": 3, "k": "on n'est plus venu me voir comme la femme mais bien comme l'arbitre", "transcript": "J'ai toujours été bien intégrée, que ça soit par les clubs, par les dirigeants ou par les joueurs. L'objectif, c'était de prendre les bonnes décisions. Donc une fois qu'on a vu que j'avais les compétences, voilà, on n'est plus venu me voir comme la femme mais bien comme l'arbitre. Les joueurs ne sont pas forcément surpris parce que ce sont des compétiteurs, donc ce qu'ils veulent, c'est qu'on siffle juste. Après, c'est peut-être souvent, on m'appelle monsieur l'arbitre, mais bon, voilà, c'est plus dans la boutade et on en rigole après sur le terrain. Mais eux, ils veulent qu'on siffle juste, qu'on soit une femme ou un homme."}, {"type": "document", "q": "D'après ce professeur, qu'est-ce que le débat apporte aux élèves ?", "c": ["Ils apprennent à communiquer.", "Ils développent leur créativité.", "Ils s'ouvrent à d'autres cultures.", "Ils sont dynamiques en cours."], "a": 0, "k": "faire débattre les élèves entre eux, c'est leur faire parler d'eux", "transcript": "Le débat dans la classe s'organise généralement autour d'un prétexte, généralement une œuvre littéraire, un album en classe de CP ou un conte ou une histoire traditionnelle. Et je parle de prétexte parce qu'en fait, faire débattre les élèves entre eux, c'est leur faire parler d'eux. C'est les sortir de leur individualité, c'est les faire échanger entre eux, accepter la différence, accepter la parole de l'autre, accepter le désaccord. Et comme je leur dis souvent, l'objectif c'est qu'ils se mettent à se disputer, mais à se disputer avec les bons arguments."}, {"type": "document", "q": "Quel est le but de miammiam.fr ?", "c": ["Conseiller gratuitement des régimes minceur.", "Faciliter la consommation de produits sains.", "Livrer des spécialités régionales à domicile.", "Proposer une émission de cuisine sur Internet."], "a": 1, "k": "miammiam.fr va vous y aider", "transcript": "Manger cinq fruits et légumes par jour, c'est bon pour la santé, on le sait, mais on ne le fait pas. Avouez, vous avez essayé mais vous n'y arrivez pas. Miammiam.fr va vous y aider. Ce site propose des paniers avec des produits frais et de saison. Le tout livré gratuitement partout dans le pays, chez vous ou sur votre lieu de travail."}, {"type": "document", "q": "De quoi parle ce journaliste ?", "c": ["D'un ancien événement protestataire.", "D'un nouveau code vestimentaire.", "D'une fête scolaire traditionnelle.", "D'une sensibilisation aux injustices."], "a": 3, "k": "pour dénoncer les inégalités entre les hommes et les femmes", "transcript": "Dans votre cabinet de curiosités ce matin, Éric Belvaux, la journée de la jupe.\n– Oui, ça concerne <script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 7/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test7_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 7</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 7 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 7</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
