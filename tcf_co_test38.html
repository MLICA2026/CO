<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 38 – Compréhension orale</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}

</style>
</head>

 a des pays, notamment en Afrique, où ils utilisent la langue des signes américaine, l'ASL, tout simplement parce que les Américains sont arrivés là-bas, ont vu qu'ils n'avaient pas de langue des signes, donc ils leur ont apporté la leur."},{"type":"document","q":"Question 10 : Qu'est-ce qui est difficile pour Léo ?","c":["Travailler et contacter ses clients.","Trouver un nouveau logement.","Acheter un ordinateur.","Réparer son téléphone fixe."],"a":0,"k":"je ne peux pas travailler et contacter mes clients","transcript":"– Léo, comment ça va depuis que tu es dans ta nouvelle maison ? — Ça va, ça va, mais je n'ai pas encore Internet. — Mais alors, et est-ce que ton téléphone fixe marche au moins ? — Oui, mais je n'en ai pas vraiment besoin. Je viens de m'acheter un ordinateur tout neuf mais sans Internet, je ne peux pas travailler et contacter mes clients. — Je comprends, tu as vu quelqu'un pour arranger ça ?"},{"type":"document","q":"Question 11 : Sur quoi est-ce que ces 2 personnes ont des goûts différents ?","c":["Les activités sportives.","Les boissons chaudes.","Les saisons de l'année.","Les vêtements de mode."],"a":2,"k":"je préfère l'été, les vêtements légers","transcript":"– Salut Hayat, il est beau ton manteau ! — Merci, il est parfait pour l'automne et le froid qui arrive. — Oui, moi j'adore cette époque, les couleurs des arbres sont magnifiques, c'est super pour se promener en forêt, et on peut sortir son beau manteau, comme toi. — Mais moi en fait, je préfère l'été, les vêtements légers, être dehors. — Eh bien, on n'a pas les mêmes goûts, mais bon, c'est vrai qu'il fait un peu froid, on va boire un café ?"},{"type":"document","q":"Question 12 : Qu'apprend-on sur la chanteuse Cœur de Pirate ?","c":["Elle a arrêté sa carrière musicale.","Elle prépare sa première tournée.","Elle sort un nouvel album.","Elle quitte la France pour l'étranger."],"a":2,"k":"voici l'album du retour","transcript":"– Bonjour, Cœur de Pirate ! Que s'est-il passé depuis ce 1er album ? — Un triomphe en France, 600 000 albums vendus et voici l'album du retour. Est-ce un grand plaisir pour retrouver le public ? — Oui, en fait, ça me fait du bien, je sais que je vais pouvoir retourner en concert, vraiment montrer ce que j'ai appris de ma dernière tournée, et puis aussi de présenter des chansons qui sont quand même assez près de moi, c'est un album dont je suis très, très, très fière. — Et pourquoi la 1ère chanson s'appelle Adieu ? — Ça n'a pas vraiment de lien particulier, en fait, c'est la seule chanson qui parle de la phase d'une rupture où t'as vraiment envie que l'autre personne disparaisse."},{"type":"document","q":"Question 13 : Quel bilan Alex tire-t-il de sa 1ère journée de travail ?","c":["Il a vécu une très bonne première journée.","Il a trouvé ses collègues peu sympathiques.","Il n'a pas pu rencontrer son supérieur.","Il a été déçu par les conditions de travail."],"a":0,"k":"les collègues ont été très accueillants","transcript":"– Alors, comment s'est passé cette 1ère journée dans la vie active ? — Plutôt bien, les collègues ont été très accueillants. — Et avec ton chef, tu m'avais dit qu'il était un peu froid. — Ben, en fait, il a été très sympa, il m'a présenté à toute l'équipe, fait visiter les locaux et montré mon bureau, qui est très grand, je n'en revenais pas. — Bienvenu dans le monde professionnel, Alex, tu n'es pas au bout de tes découvertes."},{"type":"document","q":"Question 14 : Que décident de faire les 2 amis pour leurs vacances ?","c":["Partir séparément dans des destinations différentes.","Partir ensemble à l'étranger.","Rester en France dans le sud.","Visiter Marseille avec des amis communs."],"a":1,"k":"c'était toi qui venais avec moi en Irlande","transcript":"– Où pars-tu en vacances cet été ? — Sûrement dans le sud. J'aime la pêche, et mes amis de Marseille m'ont proposé leur appartement. — Moi, je supporte très mal les fortes chaleurs, ça me rend malade. — Dommage, tu aurais pu venir avec moi, il y a de la place chez mes amis. — Et si c'était toi qui venais avec moi en Irlande, c'est beau l'Irlande, là-bas aussi on peut pêcher. — Oui, tiens, c'est une idée, je ne connais pas du tout ce pays, pourquoi pas ?"},{"type":"document","q":"Question 15 : Pour quelle raison Rafika intervient-elle ?","c":["Pour parler de la faune américaine.","Pour donner son avis sur la France.","Pour présenter sa ville d'origine.","Pour promouvoir le tourisme au Canada."],"a":2,"k":"Totalement à l'ouest de l'État de New York","transcript":"– Rafika de Buffalo, bienvenue dans La terre est belle. — Bonjour Marc. — Alors, nous sommes ravis de vous avoir à l'antenne parce qu'on n'a jamais eu personne de Buffalo, vous allez nous apprendre des choses, ça se trouve où déjà ? — Totalement à l'ouest de l'État de New York, c'est limitrophe du Canada. — C'est drôle comme nom, il n'y a pas spécialement de buffles ou de choses comme ça. — Non, d'après la légende, ça vient de Beau fleuve, un nom donné par les explorateurs français, enfin, c'est l'histoire qu'on raconte."},{"type":"document","q":"Question 16 : Qu'explique cet homme ?","c":["Les causes de la surpopulation mondiale.","Pourquoi la population mondiale a augmenté.","Les problèmes liés à la mortalité infantile.","L'impact du progrès économique sur la santé."],"a":1,"k":"une augmentation de la population","transcript":"Pourquoi, en si peu de temps, on est venu à 7 milliards sur Terre ? Parce que la mortalité a diminué, notamment la mortalité des enfants, grâce au progrès de l'hygiène, de la médecine, au progrès économique. Résultat, les décès sont devenus moins nombreux, il est apparu un excédent des naissances sur les décès, qui a entraîné une augmentation de la population."},{"type":"document","q":"Question 17 : Pourquoi cette personne a-t-elle choisi la colocation ?","c":["Parce qu'elle ne trouvait pas d'appartement abordable.","Pour ne pas vivre seule dans une grande ville.","Pour partager les frais avec des amis.","Parce que la cité universitaire était trop bruyante."],"a":0,"k":"trouver de l'espace pour un loyer modéré","transcript":"Ça fait 3 ans que je vis à Laval, après avoir habité une chambre en cité universitaire, j'ai voulu vivre dans mon propre appartement, mais trouver de l'espace pour un loyer modéré, c'est pas facile. Finalement, j'ai opté pour la colocation, nous sommes 2 colocataires. Au début, la vie en colocation n'est pas simple, surtout quand on ne se connaît pas, il faut savoir faire des compromis et s'organiser."},{"type":"document","q":"Question 18 : Quelle est la condition pour répondre à cette annonce ?","c":["Avoir de l'expérience dans le commerce.","Habiter près de Sainton-les-Tonges.","Pratiquer un sport régulièrement.","Avoir un diplôme en marketing."],"a":2,"k":"des vendeurs qui soient en même temps des sportifs","transcript":"Et maintenant, les annonces de Radio Saintonge. Vous faites du sport dans un club et avez toujours rêvé de faire de votre passion votre métier ? Les magasins Sportez-vous-bien recherchent des vendeurs qui soient en même temps des sportifs pour l'ouverture de leur nouvelle boutique à Sainton-les-Tonges. Si vous êtes intéressé, veuillez déposer votre CV et votre lettre de motivation dans la boutique la plus proche de chez vous ou en ligne sur notre site internet."},{"type":"document","q":"Question 19 : Quel est le problème de Clément dans sa recherche d'emploi ?","c":["Il ne parle pas assez de langues.","Sa formation n'est pas reconnue.","Il habite trop loin des entreprises.","Il n'a pas assez d'expérience professionnelle."],"a":3,"k":"ils cherchaient un professionnel confirmé","transcript":"– Alors, Clément, ta recherche d'emploi, ça avance ? — Pas vraiment, et ce n'est pas faute de chercher. — Mais attends, avec ta formation d'architecte-décorateur et tous tes stages, c'est incroyable ! — J'avais une piste dans un cabinet de Montréal, mais ils m'ont répondu qu'ils cherchaient un professionnel confirmé. — Ah ! Et qu'ils soient au moins bilingues comme toi, j'espère ? — Ça, ce n'est pas le problème, mais à 25 ans, je ne peux pas avoir travaillé 10 ans dans la même entreprise."},{"type":"document","q":"Question 20 : Que dit cette intervenante au sujet du travail à Londres ?","c":["Il est facile d'évoluer rapidement dans sa carrière.","Les diplômes sont très importants pour être recruté.","Les salaires y sont bien supérieurs à ceux de France.","Il est difficile de trouver un premier emploi."],"a":0,"k":"franchir les étapes beaucoup plus rapidement","transcript":"On dit souvent qu'à Londres on peut changer de job quasiment comme de chemise. Est-ce que c'est toujours vrai ? — Il est toujours facile de passer d'un job à l'autre, le diplôme a beaucoup moins d'importance, on va surtout regarder les postes que vous avez déjà occupés, on va aussi tenir compte de vos motivations, c'est vrai qu'on vous donne aussi la possibilité d'augmenter assez, enfin, comment dire, de franchir les étapes beaucoup plus rapidement. On retrouve assez régulièrement des personnes vers 22, 23 ans et déjà managers, tandis qu'en France, c'est quand même un petit peu plus compliqué."},{"type":"document","q":"Question 21 : Pour quelle raison la fille refuse-t-elle de jouer au volley ?","c":["Elle préfère faire de la natation.","Elle n'aime pas le volley.","Elle trouve le vent trop fort.","Elle se sent fatiguée."],"a":2,"k":"Vous avez vu ce vent, vous n'attraperez jamais le ballon","transcript":"– Venez, on va faire un volley, et après on ira nager. Tu viens, Véro ? — Mais ce n'est pas possible par ce temps. Vous avez vu ce vent, vous n'attraperez jamais le ballon. — N'exagère pas, ce n'est pas grave. Allez, viens, tu adores ça. — Non, allez-y sans moi, j'aime mieux aller me baigner."},{"type":"document","q":"Question 22 : Que se passe-t-il dans la région ?","c":["Les écologistes ont élu un nouveau maire.","Un projet d'autoroute suscite des oppositions.","L'Union européenne finance une réserve naturelle.","Le maire a annulé un projet de construction."],"a":1,"k":"le maire veut faire construire une autoroute","transcript":"– Tu as entendu les informations ? Il paraît que le maire veut faire construire une autoroute qui passe par la réserve naturelle de la région. — Ah bon ? Et il va vraiment le faire ? — Pour l'instant, il est obligé d'affronter les écologistes et même l'Union européenne."},{"type":"document","q":"Question 23 : Qu'apprécie la femme dans son nouveau travail ?","c":["L'ambiance détendue.","Les horaires flexibles.","La proximité du lieu de travail.","Les perspectives d'évolution."],"a":3,"k":"je n'avais pas de possibilité d'évolution","transcript":"– Malheureusement, je n'ai pas de vacances, je viens de changer de travail. — Ah bon, tu ne te plaisais pas là où tu étais ? — Si, l'ambiance était vraiment bonne, et j'avais un bon emploi du temps. — Oui, je me souviens, et tu as trouvé encore mieux. — En fait, c'était sympa, mais je n'avais pas de possibilité d'évolution, alors que là les perspectives sont bonnes, enfin, si je survis aux horaires imposés, et l'ambiance est aussi bonne qu'avant, oui, je pense que ça va aller, mais je ne connais pas encore beaucoup de monde. — Il faut du temps."},{"type":"document","q":"Question 24 : Pourquoi les pêcheurs utilisent-ils une cabane ?","c":["Pour conserver le poisson au frais.","Pour ranger leur matériel de pêche.","Pour se protéger du froid.","Pour se reposer entre deux pêches."],"a":2,"k":"chaque pêcheur se protège du froid","transcript":"– Dis-moi, Paul, c'est quoi la pêche blanche au Québec ? — On l'appelle blanche parce qu'on pêche l'hiver à la ligne en creusant des trous dans la glace des lacs et des rivières gelées. — Mais vous, vous devez geler et attendre le poisson sans bouger. — Non, car chaque pêcheur se protège du froid en installant une cabane en bois au-dessus des trous. C'est une pêche d'intérieur. — Oh, que c'est ça ! En tout cas, le poisson est bien frais."},{"type":"document","q":"Question 25 : Les journalistes évoquent une tendance qui concerne les Français. Laquelle ?","c":["Ils apprennent de plus en plus l'anglais.","Ils sont de plus en plus nombreux à partir à l'étranger.","Ils ont du mal à trouver du travail en France.","Ils préfèrent s'installer dans les pays francophones."],"a":1,"k":"partir à la conquête du monde","transcript":"Gros plan sur les Français qui partent pour réussir. Oui, tous ces Français que l'on dit nuls en anglais, ils n'ont plus peur de partir à la conquête du monde. En fait, il est toujours un peu difficile de cerner leur motivation profonde entre ceux qui franchissent les frontières pour monter un business, ceux qui cherchent un job, ceux qui s'exilent pour fuir une fiscalité asphyxiante, ou bien ceux qui veulent tout simplement profiter d'une retraite au soleil."},{"type":"document","q":"Question 26 : De quoi cette femme accuse-t-elle les entreprises agroalimentaires ?","c":["De pratiquer des prix trop élevés.","De vouloir vendre des produits de mauvaise qualité.","De polluer l'environnement.","De ne pas respecter les règles d'hygiène."],"a":1,"k":"nous voulons des denrées de bonne qualité","transcript":"– Le Parlement européen a également voté contre certaines pratiques qui peuvent faire peur, je pense notamment à cette colle à viande qui était réclamée par l'industrie agroalimentaire. — Oui, l'industrie agroalimentaire, elle voudrait pouvoir tout vendre comme étant de la viande, et nous sommes arrivés à les en empêcher. Nous avons dit très clairement non, ce n'est pas possible, nous voulons des denrées de bonne qualité."},{"type":"document","q":"Question 27 : Qu'apprend-on sur l'attitude des jeunes Français face à leur avenir ?","c":["Ils sont majoritairement pessimistes.","Ils sont globalement confiants malgré les difficultés.","Ils ne s'intéressent pas aux questions économiques.","Ils comptent surtout sur le soutien de leur famille."],"a":1,"k":"les jeunes ont plutôt confiance en l'avenir","transcript":"Comment les jeunes Français envisagent-ils leur avenir ? La réponse est à lire dans le sondage publié aujourd'hui par le tout nouvel observatoire des jeunes et des familles. 1 000 jeunes de 18 à 25 ans et 1 000 familles ont été interrogés. 1ère surprise, les jeunes ont plutôt confiance en l'avenir à 52 %, et même si les difficultés économiques, les angoisses, 8 sur 10 estiment qu'ils obtiendront ce qu'ils veulent, mais les principaux obstacles seront le travail et le logement."},{"type":"document","q":"Question 28 : Quelle information le chef de train donne-t-il aux voyageurs ?","c":["Les passagers peuvent obtenir le remboursement de leur billet.","Le train s'arrêtera en gare de Valence en raison d'une panne.","Les passagers doivent rester assis jusqu'à l'arrêt du train.","Le trajet sera annulé en raison d'un incident technique."],"a":0,"k":"vous virer la somme correspondant au prix de votre billet","transcript":"Mesdames, Messieurs, suite à un incident technique, notre train arrive en gare de Valence TGV avec un retard de 45 minutes. Nous invitons tous les voyageurs qui descendent à se rapprocher du personnel de gare, il vous remettra une enveloppe et un document à remplir et à retourner à l'adresse indiquée pour que la SNCF puisse vous virer la somme correspondant au prix de votre billet de train à titre de dédommagement. Nous vous prions de bien vouloir nous excuser pour la gêne occasionnée. Assurez-vous de n'avoir rien oublié à vos places, bonne fin de journée."},{"type":"document","q":"Question 29 : Selon le chroniqueur, que permet la course par rapport à la marche ?","c":["De mieux contrôler son poids.","De renforcer ses muscles plus vite.","De réduire le risque de blessures.","D'améliorer son endurance."],"a":0,"k":"la perte de poids, c'est la course qui l'emporte","transcript":"Et on termine avec vous, Jeannie, qui nous pose une grande question existentielle, marcher ou courir ? — Ça dépend, c'est ce qui ressort de quelques études récentes qui ont opposé les 2 exercices et mesuré leurs effets. L'une d'elles a été publiée le mois dernier dans la revue Medicine and Science in Sports and Exercise. Conclusion, en ce qui concerne la perte de poids, c'est la course qui l'emporte haut la main. Les coureurs sont plus minces, moins de surcharge pondérale que les marcheurs, et passé l'âge de 55 ans, c'est encore plus vrai. Même si le nombre de kilomètres parcourus à la course par semaine est minime, il y a une différence entre les coureurs et les marcheurs, et la cause pourrait être l'effet de la course sur l'appétit."},{"type":"document","q":"Question 30 : Que dénonce cette journaliste ?","c":["L'absence d'éducation financière à l'école.","Le manque d'intérêt des jeunes pour l'argent.","La difficulté à obtenir un crédit bancaire.","Les dépenses excessives des familles."],"a":0,"k":"aucune séance de travail n'est dédiée à cette question","transcript":"Apprendre à gérer son argent n'est pas une priorité éducative, alors que l'argent nous accompagne toute notre vie. Construire un budget, ça s'apprend, mais trop souvent le sujet est considéré tabou par les adultes, donc pas question d'en parler avec les enfants. Dans la sphère de l'école, aucune séance de travail n'est dédiée à cette question, pourtant chacun est concerné dans sa vie professionnelle et personnelle par les principales notions que sont les coûts, les crédits, les prêts, les taux d'intérêt, l'endettement. L'économie à l'échelle de l'individu, voilà un domaine qui touche chaque Français sans que jamais celui-ci y soit vraiment initié."},{"type":"document","q":"Question 31 : Qu'apprend-on sur le site historique de Pompéi ?","c":["Il est menacé par le trop grand nombre de visiteurs.","Il vient d'être inscrit au patrimoine mondial de l'UNESCO.","Il fait l'objet d'importants travaux de restauration.","Il est fermé au public depuis plusieurs années."],"a":0,"k":"l'inconscience des visiteurs","transcript":"C'est le plus grand site archéologique du monde, sur une superficie de 44 hectares, il accueille chaque année 2 millions et demi de visiteurs. C'est sa chance, mais c'est aussi son malheur, car Pompéi, à une vingtaine de kilomètres de Naples, est en péril. L'Italie, qui se présente comme l'héritière du plus grand patrimoine de l'humanité, a bien tenté d'en prendre soin, mais ces dernières années, des effondrements à répétition nous montrent que l'on a franchi la frontière de l'urgence. C'est l'Europe qui s'émeut de l'état de quasi-abandon dans lequel se retrouve le site. Tout concourt à un laisser-aller dramatique, sans oublier l'inconscience des visiteurs qui se conduisent souvent dans ces ruines millénaires comme dans un vulgaire parc d'attractions."},{"type":"document","q":"Question 32 : Selon ce journaliste, quel risque peut avoir la neige pour les plantes ?","c":["Elle peut casser les branches sous son poids.","Elle peut empêcher la photosynthèse.","Elle peut geler les racines des plantes.","Elle peut provoquer des maladies fongiques."],"a":0,"k":"le poids ne casse les branches","transcript":"Encore une question qui est liée au temps. Pauline habite dans le sud et la neige est tombée en grosse quantité, elle a peur que le poids ne casse les branches de ses arbres et de ses arbustes, elle voudrait savoir donc s'il est conseillé de les agiter pour faire tomber la neige. — À une condition, une seule, qu'il ne gèle pas, c'est-à-dire que si vraiment la température était un petit peu comme ce matin, le bois est extrêmement cassant, on attend donc le redoux des températures et l'on peut effectivement agiter pour laisser tomber la neige et éviter que le poids ne casse les branches. Malheureusement, quantité de plantes, je pense aux gros cèdres, vont souffrir du poids de la neige, car la neige représente un poids énorme qui risque de causer quantité de dommages."},{"type":"document","q":"Question 33 : Que font les jeunes Parisiens dont parle ce reportage ?","c":["Ils se baignent dans un canal de Paris.","Ils organisent des fêtes en plein air.","Ils pratiquent un sport nautique.","Ils se retrouvent dans un parc municipal."],"a":0,"k":"le canal de l'Ourcq est devenu notre espace de baignade","transcript":"En fait, comme on habite tous le 19ème arrondissement de Paris, le canal de l'Ourcq est devenu notre espace de baignade quotidienne. Après une journée de travail, généralement on se retrouve au bord du canal, tous ensemble, et on se baigne. Aujourd'hui, on est entre 15 et 20 à se baigner régulièrement dans le canal de l'Ourcq. On est des jeunes étudiants fauchés, qui ont envie de s'amuser, qui n'ont pas forcément les moyens aussi de partir de Paris."},{"type":"document","q":"Question 34 : De quoi parle cet artiste ?","c":["D'un film qu'il vient de tourner.","D'une chanson qu'il admire.","D'un concert mémorable.","D'un roman qu'il a lu."],"a":1,"k":"une des plus grandes chansons qui a été faite","transcript":"C'est une des plus grandes chansons qui a été faite dans toute l'histoire de la chanson francophone. C'est, on a accès, c'est un court métrage, en fait, c'est même un long métrage en quelques minutes, et d'arriver à dépeindre tout un univers où on comprend la complexité du personnage, où on peut le mettre dans un contexte social, où on peut... on a même presque des parfums, on a tout dans cette chanson-là."},{"type":"document","q":"Question 35 : Dans quel but a été fait ce reportage photo ?","c":["Pour documenter la vie quotidienne à Montréal.","Pour comparer l'architecture de Chicago et Montréal.","Pour conserver la mémoire des bâtiments menacés de démolition.","Pour promouvoir le tourisme dans les quartiers historiques."],"a":2,"k":"c'est voué, on va le démolir","transcript":"– Quand vous revenez de Chicago, vous fondez d'abord Héritage Montréal. Pourquoi ? — Vous savez, quand je suis revenu de Chicago, j'étais là pendant quelques années à prendre des photographies des bâtiments en pierre grise à Montréal. Oui, parce que je trouvais ça formidable et ça délimitait, c'était une façon de marquer chaque quartier de Montréal. Alors, je faisais ça avec un photographe, très bien. Et puis, quand nous étions dans, par exemple, un des couvents, on nous a dit : mais pourquoi est-ce que vous êtes dans ce bâtiment, c'est voué, on va le démolir, ainsi, comme ça, partout. Alors finalement, on a compris qu'il fallait vraiment s'en occuper, surtout que je venais de Chicago et puis toutes les villes autour — Cincinnati, un peu partout — il y avait peut-être un bâtiment qui restait debout, le bâtiment victorien, et puis tout était aplati, c'était la période féroce."},{"type":"document","q":"Question 36 : Qu'a-t-on découvert sur le sommeil ?","c":["Il améliore la concentration pendant la journée.","Il réduit le stress et l'anxiété.","Il renforce le système immunitaire.","Il favorise la résolution de problèmes."],"a":3,"k":"rôle essentiel dans l'inventivité et dans la résolution des problèmes","transcript":"Petit dicton au rayon du bon sens près de chez nous : quand on a un problème, eh bien, dormons dessus. Rien de tel qu'une bonne nuit de sommeil pour y voir plus clair. Eh bien, cette vérité, sachez-le, les chercheurs américains de l'université de Californie l'ont démontrée scientifiquement. Le sommeil permet de résoudre des problèmes sans que vous fassiez quoi que ce soit. Quand on dort, vous le savez, on alterne les périodes de sommeil profond et de sommeil paradoxal. Eh bien, cette phase paradoxale, riche en rêves, jouerait un rôle essentiel dans l'inventivité et dans la résolution des problèmes. Vous avez donc compris le message : il faut dormir."},{"type":"document","q":"Question 37 : Sur quoi porte l'intervention ?","c":["La relation artistique entre Camille Claudel et Rodin.","La carrière de Rodin au musée qui lui est dédié.","Les difficultés de la vie de Camille Claudel.","Les techniques de sculpture utilisées par Rodin."],"a":0,"k":"elle s'en est servie pour créer une œuvre totalement différente","transcript":"Camille Claudel restera pour la postérité une élève de Rodin, elle est exposée dans le musée Auguste-Rodin, elle est connue comme telle, elle a beaucoup reçu de Rodin, mais elle s'en est servie pour créer une œuvre totalement différente. On connaît évidemment la fameuse phrase : « Je lui ai montré où trouver de l'or, mais l'or qu'elle trouvait était bien à elle. » C'est très flagrant quand on compare plusieurs œuvres. À côté du Penseur, qui est, c'est vrai, une puissance ramassée, toute en muscles, et qui dégage une force presque brute, l'Homme penché, lui, est construit comme presque un arbre dont on voit les nervures, dont on saisit les muscles, les nerfs, l'attitude, et presque plus la pensée que chez le Penseur."},{"type":"document","q":"Question 38 : Qu'explique l'intervenant à propos de la pénibilité au travail ?","c":["La pénibilité physique reste le principal problème.","La souffrance s'est déplacée du physique vers le psychologique.","Le temps de travail a augmenté dans tous les secteurs.","Les travailleurs du secteur privé souffrent davantage."],"a":1,"k":"le malaise s'est déplacé","transcript":"Alors, aussi bien dans le public que dans le privé, ce mal-être au travail résulte, selon vous, d'une mutation sociale profonde et structurelle du marché du travail, de notre rapport au travail ? — Ce que l'on constate, c'est que, pour essayer de résumer ça, le travail était issu étymologiquement du tripalium, le poteau de torture, tu gagneras ta vie à la sueur de ton front, etc. C'est-à-dire la pénibilité physique. Or, on constate, et c'est un paradoxe, qu'en fait, le temps de travail dans la vie a plutôt diminué, et la pénibilité physique a considérablement diminué dans la plupart des métiers. Mais ça a été compensé par, ou transformé par une charge psychique, une mobilisation psychique et une pénibilité subjective, et donc le malaise s'est déplacé."},{"type":"document","q":"Question 39 : Qu'est-ce qui empêche l'essor de l'économie verte ?","c":["Le manque de technologies disponibles.","L'opposition des gouvernements.","Le coût trop élevé des énergies renouvelables.","Notre dépendance culturelle aux énergies fossiles."],"a":3,"k":"du mal à sortir d'un imaginaire et d'une culture montée sur les énergies fossiles","transcript":"Les solutions, les outils pour lancer une économie verte, a priori, ils existent. Alors pourquoi est-ce que ça coince aujourd'hui ? Mais je crois qu'il y a plusieurs raisons. Un, on a vécu depuis un siècle et demi autour des énergies fossiles, ça a été le charbon et puis évidemment le pétrole, le gaz, et au fond, ça a complètement forgé notre économie, toute notre industrie, de la chimie, beaucoup de choses en dépendent, y compris les pesticides pour l'agriculture, et puis ça a forgé notre imaginaire. Donc on a évidemment du mal à sortir d'un imaginaire et d'une culture montée sur les énergies fossiles."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 38/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test38_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 38</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
