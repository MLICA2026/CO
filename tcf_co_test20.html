<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 20 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

"a": 3, "k": "Quelle bonne idée.", "transcript": "– Pour les vacances d'été, je voudrais partir au Japon avec Céline. Qu'est-ce que tu en penses ?"}, {"type": "extrait", "q": "", "c": ["Bien. Asseyez-vous.", "Entendu. Allongez-vous.", "Pardon. Taisez-vous.", "Silence. Levez-vous."], "a": 0, "k": "Bien. Asseyez-vous.", "transcript": "– Bonjour madame. Est-ce que je peux vous aider ?\n– Bonjour. Oui, j'ai rendez-vous avec madame Cadre à 10h pour un poste de vendeuse."}, {"type": "document", "q": "Pourquoi est-ce que le jeune homme repart sans billet ?", "c": ["La représentation est annulée.", "Le spectacle est complet.", "Les places sont trop chères.", "Les réservations sont terminées."], "a": 2, "k": "je ne voudrais pas payer plus de 20 euros", "transcript": "– Bonjour madame. Je voudrais réserver des places pour le spectacle de danse du 18 décembre. A cette date, il reste des places à 30 euros.\n– Ah, je ne voudrais pas payer plus de 20 euros. Et pour la représentation du 17 ?\n– Désolée, c'est pareil."}, {"type": "document", "q": "Pourquoi est-ce que cet homme téléphone à l'hôtel ?", "c": ["Pour annuler sa réservation.", "Pour changer sa date d'arrivée.", "Pour connaître l'heure d'ouverture.", "Pour savoir le prix d'une chambre."], "a": 1, "k": "Je voudrais arriver plus tôt", "transcript": "– Hôtel du Centre, bonjour.\n– Bonjour. J'ai réservé une chambre pour deux nuits le week-end prochain. Je voudrais arriver plus tôt.\n– Est-ce que la chambre est libre dès le jeudi soir à 20h ?\n– Attendez, je vérifie. Non, elle est prise. Nous avons une autre chambre disponible, mais elle coûte 50 euros de plus.\n– Ah, d'accord. Je vais réfléchir. Merci madame."}, {"type": "document", "q": "Que décide de faire l'homme ?", "c": ["De consulter un médecin.", "De regarder la météo.", "De s'acheter des vêtements.", "De s'habiller chaudement."], "a": 3, "k": "Je prends mon manteau", "transcript": "– La météo a annoncé de la neige sur Montréal.\n– Je me méfie des prévisions, tu sais.\n– Ne me reproche rien si tu attrapes froid.\n– Bon, d'accord. Pour une fois, je vais t'écouter. Je prends mon manteau."}, {"type": "document", "q": "Qu'est-ce qui est difficile pour Léo ?", "c": ["La communication avec ses clients.", "La recherche d'un nouveau travail.", "L'achat d'un nouveau téléphone fixe.", "L'utilisation de son ordinateur portable."], "a": 0, "k": "Je ne peux pas travailler et contacter mes clients", "transcript": "– Léo, comment ça va depuis que tu es dans ta nouvelle maison ?\n– Ça va, ça va, mais je n'ai pas encore Internet.\n– Mince alors ! Et est-ce que ton téléphone fixe marche au moins ?\n– Oui, mais je n'en ai pas vraiment besoin. Je viens de m'acheter un ordinateur tout neuf, mais sans Internet. Je ne peux pas travailler et contacter mes clients.\n– Je comprends. Tu as vu quelqu'un pour arranger ça ?"}, {"type": "document", "q": "Quel est le problème de Lydie ?", "c": ["Elle a oublié un objet important.", "Elle a raté son bus ce matin.", "Elle doit s'absenter du bureau.", "Elle est en retard à une réunion."], "a": 0, "k": "J'ai laissé mes clés de voiture dans la salle de conférence", "transcript": "– Allô, Paul ? Tu peux m'aider ?\n– Qu'est-ce qui t'arrive, Lydie ?\n– J'ai laissé mes clés de voiture dans la salle de conférence et elle est occupée jusqu'à 20h.\n– Je peux te ramener si tu veux.\n– Oh, merci. Ça m'arrange. Je dois être chez moi à 18h30. Demain, je viendrai en transport."}, {"type": "document", "q": "Qu'est-ce que Perrine va faire ce soir ?", "c": ["Dîner avec un ami.", "Regarder un film.", "Rentrer chez elle.", "Travailler tard."], "a": 0, "k": "j'ai rendez-vous au restaurant avec Paul", "transcript": "– Perrine, tu viens au cinéma avec nous ?\n– Quand ? Aujourd'hui ?\n– Ce soir. La séance est à 20h. Il passe une comédie romantique.\n– Non, j'ai une réunion au bureau jusqu'à 18h. Et après, j'ai rendez-vous au restaurant avec Paul."}, {"type": "document", "q": "Qu'est-ce que Thomas propose à Marion ?", "c": ["D'aller dans un bar.", "De faire les courses.", "De préparer un voyage.", "De travailler ensemble."], "a": 0, "k": "On prend un verre quelque part", "transcript": "– Salut Marion.\n– Salut Thomas. Ça va ?\n– J'ai eu une journée difficile au bureau. On prend un verre quelque part et tu me racontes ton week-end ?\n– D'accord. Mais avant, je dois passer à la pharmacie.\n– Ce n'est pas loin. Je suis fatigué, moi."}, {"type": "document", "q": "Qu'apprécie Pascale dans son métier ?", "c": ["La répartition des horaires.", "Le contact avec les élèves.", "Les activités pédagogiques.", "L'organisation des leçons."], "a": 1, "k": "les relations avec les enseignants et les enfants", "transcript": "Je m'appelle Pascale. Ça fait 4 ans que je travaille dans une école maternelle. Je suis chargée d'aider les enseignants dans la classe. Alors, le plus dans le métier pour moi, c'est les relations avec les enseignants et les enfants. Ça, on a vraiment beaucoup de chance à ce niveau-là. Surtout avec les enfants. Les côtés négatifs du métier… Je dirais peut-être les journées un peu longues dans le bruit parce que les enfants sont quand même en général bruyants."}, {"type": "document", "q": "Pourquoi Rachida appelle-t-elle son frère ?", "c": ["Pour l'inviter au restaurant.", "Pour le remercier de son accueil.", "Pour lui conseiller un logement.", "Pour lui donner des informations."], "a": 3, "k": "Nous vous avons aussi laissé une liste d'activités à faire ici et des adresses", "transcript": "– Allô ? Salut, c'est Rachida.\n– Salut, petite soeur. Je t'appelle pour qu'on s'organise.\n– Tu te souviens qu'on sera déjà partis quand vous arriverez ?\n– Ah, c'est vrai. J'avais complètement oublié. Comment on fait pour les clés ?\n– Je les laisserai chez la voisine d'en face. On vous a préparé des draps, des serviettes et le frigo est plein. Nous vous avons aussi laissé une liste d'activités à faire ici et des adresses pour sortir dîner.\n– Merci beaucoup. Je te dois combien ?\n– Rien, tu plaisantes. C'est normal, tu es mon frère."}, {"type": "document", "q": "Qu'est-ce que explique cette personne nouvellement installée à Québec ?", "c": ["Elle aimerait que ses amis lui rendent visite.", "Elle apprécie beaucoup sa nouvelle ville.", "Elle souhaite repartir dans sa région.", "Elle voudrait que sa famille déménage."], "a": 1, "k": "c'est si agréable de vivre ici au Québec que je pense y rester quelques années", "transcript": "Samira, tu viens de Matagami depuis ton installation à Québec. Qu'est-ce qui te manque le plus ? Il y a les parents, ma soeur, les copains, mais entre les mails et le téléphone, ça ne me pose pas plus de problèmes que ça. Bien sûr, il me manque, mais c'est si agréable de vivre ici au Québec que je pense y rester quelques années."}, {"type": "document", "q": "Que regrette la femme ?", "c": ["Elle aurait aimé faire du tourisme.", "Elle aurait préféré se coucher tôt.", "Elle espérait avoir plus d'interlocuteurs.", "Elle s'attendait à un accueil plus favorable."], "a": 0, "k": "Pas vraiment. Je suis assez déçue", "transcript": "– Alors ton voyage en Allemagne.\n– Super. J'ai pu rencontrer les responsables de programme et leur proposer nos produits. Dans l'ensemble, ils étaient assez intéressés. C'est plutôt encourageant pour la suite.\n– Génial. Tu as pu visiter un peu la ville en dehors du quartier de l'hôtel ?\n– Pas vraiment. Je suis assez déçue, mais je n'ai pas eu le temps. Je ne suis restée que trois jours et j'avais beaucoup de personnes à rencontrer. On mangeait tout le temps au restaurant de l'entreprise. Les journées se terminaient tard."}, {"type": "document", "q": "Qu'annonce Sarah à Tom ?", "c": ["Elle a mal compris son message.", "Elle accepte son invitation.", "Elle achètera les billets à l'avance.", "Elle est déjà occupée ce soir."], "a": 1, "k": "Je te rejoins au cinéma à 20 h", "transcript": "Tom, c'est Sarah. Je viens d'avoir ton sms, mais je ne peux pas te répondre. Je suis en réunion en ce moment. Pour ce soir, pas de problème, je te rejoins au cinéma à 20 h et j'achète le pop-corn."}, {"type": "document", "q": "Que propose Martin à Laurent ?", "c": ["D'assister à une rencontre sportive.", "De fêter leur victoire entre copains.", "De jouer au basket-ball sans payer.", "De s'inscrire dans un nouveau club."], "a": 2, "k": "et c'est gratuit", "transcript": "Salut Laurent. C'est Martin, dit il y a un gymnase qui vient d'ouvrir à côté de chez moi. Il y a plusieurs salles en ce moment. On peut y essayer tous les sports et c'est gratuit. Ça te dirait de venir faire une partie de basketball avec les copains demain soir. Réponds-moi vite pour que j'appelle le club pour réserver le terrain. A plus tard."}, {"type": "document", "q": "Que constate cet employé ?", "c": ["Les conditions de recrutement sont plus difficiles aujourd'hui.", "Les étudiants ignorent le fonctionnement de l'entreprise.", "Les jeunes étaient préparés plus sérieusement dans le passé.", "Les patrons actuels ont un degré d'exigence trop élevé."], "a": 0, "k": "On n'embauche plus si facilement", "transcript": "– Oh, j'ai commencé dans l'entreprise. Cela fait quand même 30 ans à l'époque où on ne s'embarrassait pas avec le recrutement. Je me souviens dès le soir où j'ai fini ma formation. Mon patron de stage m'a proposé de rester. Et pour mes copains de formation, pareil.\n– Ah, c'est sûr. On n'embauche plus si facilement. Maintenant, je suis un ancien. Je dois recruter des jeunes qui arrivent et je trouve ça incroyable. Ils accumulent les diplômes. On fait plein de stages dans 50 à postulés. Cela ne doit pas être drôle."}, {"type": "document", "q": "Qu'apprend-on sur Corinne ?", "c": ["Elle est en congé.", "Elle est tombée malade.", "Elle travaille la nuit.", "Elle voyage souvent."], "a": 3, "k": "Elle repart pour une conférence au Canada la semaine prochaine", "transcript": "– Stéphane, est-ce que Corinne est rentrée de sa mission au Japon ?\n– Oui, elle était au bureau hier et aujourd'hui, mais elle est très fatiguée. La pauvre, sa mission a été plus difficile que d'habitude. Oui, elle a eu des réunions dans plusieurs villes. Elle n'a pas arrêté de circuler. C'est sympa. Elle a pu découvrir plein de lieux différents, mais pas du tout. Elle terminait très tard le soir. Elle devrait prendre des vacances. Impossible. Elle repart pour une conférence au Canada la semaine prochaine."}, {"type": "document", "q": "Que conseille cet intervenant aux parents ?", "c": ["D'attribuer à la lecture le statut de loisir.", "De favoriser la lecture en autonomie.", "De limiter la lecture d'histoires illustrées.", "De sélectionner des lectures classiques."], "a": 0, "k": "la lecture est avant tout un plaisir", "transcript": "Mais je crois que les difficultés en matière de lecture ont des causes à la fois individuelles et sociales. Les parents, par exemple, parce qu'ils sont angoissés par l'avenir de leurs enfants, leur présentent souvent la lecture comme une obligation, une démarche indispensable pour réussir. Et c'est une erreur parce que la lecture est avant tout un plaisir, un livre. C'est un voyage, une découverte, une aventure, et il faudrait faire découvrir la lecture aux enfants comme on leur fait découvrir la cuisine chinoise ou les jeux dans la neige. Et puis les parents refusent aussi souvent à leurs enfants des lectures qu'ils considèrent comme mineures, les bandes dessinées, par exemple. Et ça aussi, c'est une erreur. Lire une bande dessinée, c'est lire et ça permet souvent d'ailleurs de découvrir ensuite d'autres formes de littérature."}, {"type": "document", "q": "Qu'apprécie la femme dans son nouveau travail ?", "c": ["L'atmosphère détendue.", "La souplesse des horaires.", "L'efficacité de son équipe.", "Les opportunités de carrière."], "a": 3, "k": "les perspectives sont bonnes", "transcript": "– Malheureusement, je n'ai pas de vacances. Je viens de changer de travail.\n– Ah bon ? Tu ne te plaisais pas là où tu étais ?\n– Si, l'ambiance était vraiment bonne et j'avais un bon emploi du temps.\n– Oui, je me souviens et tu as trouvé encore mieux.\n– En fait, c'était sympa, mais je n'avais pas de possibilité d'évolution alors que là, les perspectives sont bonnes. Enfin, si je survis aux horaires imposés. Et l'ambiance est aussi bonne qu'avant. Oui, je pense que ça va aller, mais je ne connais pas encore beaucoup de monde. Il faut du temps."}, {"type": "document", "q": "Pourquoi la personne cherche-t-elle du travail à Montréal ?", "c": ["Pour mettre en pratique ses connaissances.", "Pour opérer une reconversion professionnelle.", "Pour se rapprocher de sa famille.", "Pour suivre son compagnon."], "a": 3, "k": "mon petit ami a été muté à Montréal", "transcript": "– Bonjour monsieur. J'ai vu votre annonce. Vous cherchez toujours une vendeuse ?\n– Oui, cela vous intéresse. Vous avez de l'expérience.\n– J'ai été vendeuse pendant 15 ans à Québec, mais mon petit ami a été muté à Montréal. Alors j'ai dû démissionner.\n– Vous habitez encore là-bas ?\n– Non, nous sommes chez mes parents en attendant de trouver un logement.\n– Vous parlez anglais ?\n– Bien sûr.\n– Bien. Vous pouvez revenir demain pour un essai.\n– Avec plaisir."}, {"type": "document", "q": "Selon cet homme, qu'est-ce qui permet d'apprécier pleinement ce que l'on mange ?", "c": ["Écouter de la musique classique.", "Parler des plats que l'on savoure.", "Partager un repas en famille.", "Avoir une table bien décorée."], "a": 1, "k": "on discute avec quelqu'un", "transcript": "De manière de ne pas goûter les aliments, c'est de manger en silence. On les trouve moins bons ou de manger avec un bruit sonore de la musique constamment ou un bruit de fond continu qui altère le goût des aliments. La dimension sonore est adaptée au goût des aliments. C'est la parole. Il faut commenter tout ce que l'on déguste, commenter les aliments. Et à ce moment-là, on éprouve mieux leur goût. On éprouve mieux leur saveur quand on discute avec quelqu'un, alors que lorsque l'on est seul dans le silence, le plaisir de manger et de boire est bien moins grand."}, {"type": "document", "q": "Que veut Loïc Le Meur ?", "c": ["Avoir la liberté d'être son propre patron.", "Innover dans le domaine informatique.", "Mener un projet aux Etats-Unis.", "Mieux réussir que ses parents."], "a": 0, "k": "Je n'ai jamais eu vraiment envie de travailler pour qui que ce soit d'autre que moi", "transcript": "Élu récemment par le magazine Business Week parmi les 25 personnes les plus influentes du web, Loïc Le Meur vit désormais à San Francisco, en Californie, au cœur de la Silicon Valley. C'est là qu'il a créé sa nouvelle société Sismique qui n'est pas un coup d'essai. Ce diplômé de l'École des Hautes Études Commerciales de Paris est devenu au fil du temps un expert dans le domaine.\n– Mon père était entrepreneur et mon grand-père aussi, il était commerçant. Je n'ai jamais eu vraiment envie de travailler pour qui que ce soit d'autre que moi, y compris, peu importe la taille de ce que je faisais. Je pense que je serais volontiers indépendant. J'ai toujours voulu créer ma propre entreprise dans l'internet. Donc, ce sont les deux passions qui m'ont toujours motivé."}, {"type": "document", "q": "De quoi parlent les deux jeunes filles ?", "c": ["De la préparation des vacances.", "Des révisions d'un examen.", "D'un anniversaire surprise.", "D'un projet de visites culturelles."], "a": 1, "k": "j'ai un examen lundi prochain", "transcript": "– Tu viens à l'anniversaire de Bertrand samedi.\n– Je ne sais pas encore, j'ai un examen lundi prochain.\n– Tu es prête ?\n– Plus ou moins. Mes cousins de Toulouse sont venus passer une partie des vacances à la maison et j'ai dû leur faire visiter les monuments et les musées de Paris.\n– Tu as pu travailler un peu ?\n– Oui, mais je dois encore étudier les maths."}, {"type": "document", "q": "Quel est le but de Miami FR ?", "c": ["Conseiller gratuitement des régimes minceur.", "Faciliter la consommation de produits sains.", "Livrer des spécialités régionales à domicile.", "Proposer une émission de cuisine sur internet."], "a": 1, "k": "Ce site propose des paniers avec des produits frais et de saison", "transcript": "Manger cinq fruits et légumes par jour. C'est bon pour la santé, on le sait, mais on ne le fait pas. Avouez, vous avez essayé, mais vous n'y arrivez pas. Miami est là pour vous aider. Ce site propose des paniers avec des produits frais et de saison, le tout livré gratuitement partout dans le pays, chez vous ou sur votre lieu de travail."}, {"type": "document", "q": "Qu'est-ce que Patrick était le seul à vouloir faire ?", "c": ["Jouer aux cartes.", "Aller se promener.", "De découvrir des adresses d'hôtel à l'étranger.", "Visiter la région."], "a": 1, "k": "Il n'y a que moi qui voulais encore marcher malgré la pluie", "transcript": "– Alors, Patrick, ce stage d'informatique à la Tulipe ?\n– Oh, ne m'en parle pas. Horrible ! Je suis ravi d'être au boulot. D'abord, il a plu toute la semaine, avec une tempête, t'aurais vu ça. On pensait pouvoir faire des balades en fin de journée. Il n'y a que moi qui voulais encore marcher malgré la pluie. Les autres se retrouvaient au bord pour jouer aux cartes ou refaire le monde. D'autres ont passé leur temps devant la télé.\n– Eh bien, bravo ! Pour prendre le bon air, c'est réussi. Et je ne te décris pas le trou que c'était. Rien à voir à des kilomètres à la ronde."}, {"type": "document", "q": "Que dit cet homme sur ce logiciel de traduction ?", "c": ["Il a besoin d'être perfectionné.", "Il fonctionne pour les romans.", "Il peut adapter la ponctuation.", "Il sert aux spécialistes du métier."], "a": 0, "k": "le logiciel ne peut pas aujourd'hui et n'est pas prêt", "transcript": "En mathématiques, les mots sont redondants. C'est l'ordre des mots qui fait tout le sens. Mais dans le monde littéraire, on peut avoir une petite virgule, un point qui peut être l'objet de nombreux commentaires. Et ça, aujourd'hui, il vaut mieux faire confiance à l'âme humaine et à sa traduction manuelle qu'à l'algorithme et à l'intelligence artificielle. Donc, le logiciel ne peut pas aujourd'hui et n'est pas prêt. Si on vous comprend bien, pour remplacer des traducteurs humains, il n'est absolument pas prêt ni pour la littérature ni pour les mathématiques, puisque le travail qu'on a réalisé a dû aussi être amélioré, confirmé, valorisé et vérifié par une équipe de traducteurs qui sont des professionnels de la traduction scientifique de l'anglais vers le français."}, {"type": "document", "q": "Selon Hubert Reeves, pourquoi cette première observation d'un trou noir est-elle importante ?", "c": ["Elle annonce de futures découvertes.", "Elle confirme une théorie ancienne.", "Elle illustre les progrès du matériel scientifique.", "Elle permet la poursuite des travaux d'Einstein."], "a": 1, "k": "C'est une confirmation de la valeur de la science en général", "transcript": "– Là, on vient très récemment d'observer pour la première fois un trou noir.\n– Quelle a été votre réaction ?\n– C'est le moment où on découvre une chose pour la première fois et surtout le fait que cette idée des trous noirs, qui a été inventée par Einstein dans les années 1910-15, je ne me souviens pas, c'était au départ une théorie, et de trouver que le comportement de ces trous noirs existe. C'est une confirmation de la valeur de la science en général, qui sont par exemple, des idées des trous noirs. Ça vous donne confiance dans la science."}, {"type": "document", "q": "Que constate ce journaliste sur la gastronomie à Toronto ?", "c": ["Elle est dans l'innovation constante.", "Elle est tournée vers l'exotisme.", "Elle fait la part belle à la tradition.", "Elle nécessite un service très rapide."], "a": 0, "k": "c'est impossible d'y manger la même chose", "transcript": "Des commentaires sur la gastronomie de Toronto ? On y mange très bien, mais c'est impossible d'y manger la même chose. Quatre ans plus tard, comme à Québec, la gastronomie est très tendance. Qu'est-ce qui se passe aujourd'hui ? Qu'est-ce qui se passera demain ? Mais qu'est-ce qui s'est passé hier ? On ne veut plus rien savoir. Qu'est-ce qu'un restaurateur doit faire si sa cuisine n'est pas tendance, mais tout aussi bonne à Toronto ? Il doit la changer. C'est différent. À Québec, j'ai l'impression qu'à Toronto, la capitale des affaires, on gère tout aux dépens des valeurs sûres."}, {"type": "document", "q": "Qu'apprend-on sur la mise en place des circuits courts ?", "c": ["Elle se heurte aux systèmes existants.", "Elle est complexe à développer en Europe.", "Elle est soutenue par les grandes surfaces.", "Elle représente une solution d'avenir."], "a": 3, "k": "une alternative crédible à l'agriculture mondialisée", "transcript": "Au moment où l'on semble découvrir qu'il faut pour fabriquer un plat cuisiné, un traîneur aux Pays-Bas et un autre à Chypre, un atelier de découpe de viande en Roumanie, un grossiste des Pyrénées, une usine au Luxembourg, ne serait-il pas tant d'examiner d'un peu plus près ces fameux circuits courts ?\n– Les quoi ?\n– Les circuits courts des modes de distribution alimentaire qui limitent les intermédiaires et les distances parcourues entre le producteur et le consommateur. Réseau d'achat groupé et vente à commerce local. Et si le circuit court court-circuitait notre modèle agricole et si la consommation de proximité devenait une alternative crédible à l'agriculture mondialisée ?"}, {"type": "document", "q": "Dans quel but a été fait ce reportage photo ?", "c": ["Pour accélérer la rénovation d'anciennes constructions.", "Pour comparer les styles des maisons nord-américaines.", "Pour conserver la trace du patrimoine architectural.", "Pour dénoncer la dégradation des logements urbains."], "a": 2, "k": "il fallait vraiment faire réagir les gens", "transcript": "– Quand vous revenez de Chicago, vous fondez d'abord Héritage Montréal. Pourquoi ? Vous savez ?\n– Et quand je suis revenu de Chicago, j'étais là pendant quelques années à prendre des photographies des bâtiments, pierre grise à Montréal. Oui, parce que j'ai trouvé ça formidable et ça délimite. C'était une façon de marquer chaque quartier de Montréal. Alors je fais ça avec un photographe.\n– Très bien.\n– Et puis quand nous étions dans, par exemple, un des couvents, on a dit : « mais pourquoi ce qui est dans ce bâtiment, c'est et on va le démolir comme ça partout. » Alors finalement, on a compris qu'il fallait vraiment faire réagir les gens, surtout que je venais de Chicago. Et puis toutes les villes autour des trois années, un peu partout, il y avait peut-être un bâtiment qui restait debout, le bâtiment Victoria. Et puis tout était aplati. C'était une période féroce."}, {"type": "document", "q": "Quel problème est associé au développement des festivals ?", "c": ["Ils desservent l'image des vedettes.", "Ils génèrent des profits insuffisants.", "Ils programment les mêmes musiciens.", "Ils sont tous organisés pendant l'été."], "a": 2, "k": "des têtes d'affiche sont pratiquement toujours les mêmes", "transcript": "Le problème des festivals, c'est très bien que les festivals se développent. Mais moi, j'ai l'impression qu'il y a beaucoup de festivals, mais en même temps, il n'y a pas plus de groupes qui jouent sur scène. C'est-à-dire qu'on assiste en fait à un phénomène où des têtes d'affiche sont pratiquement toujours les mêmes. Et puis ensuite, on fait appel à des groupes locaux et les artistes qui ne sont pas considérés comme des stars ont plutôt du mal à trouver des festivals parce qu'il y a un peu la course aujourd'hui. Je crois que j'ai l'impression que le festival, c'est un peu aussi la course aux chiffres et on fait passer au second plan l'artistique."}, {"type": "document", "q": "Qui est lésé d'après l'intervenant ?", "c": ["Les acheteurs.", "Les commerçants.", "Les entreprises.", "Les pouvoirs publics."], "a": 0, "k": "les consommateurs vont peut-être jeter des produits", "transcript": "Il y a le manque de clarté au niveau de la politique des dates de péremption au Canada, parce que souvent les consommateurs vont  "k": "calculés de manière à ne pas trop effaroucher les industriels", "transcript": "Les pays européens sont presque tous d'excellents élèves de l'écologie, mais une bonne nouvelle s'interroge de Figaro, pas si sûr. L'Europe, dit Gérard Dupuis dans Libération, ne paraît vertueuse que parce que son double déciment a été truqué. Les quotas de rejet de CO2 fixés à l'avance ont été calculés de manière à ne pas trop effaroucher les industriels. Du coup, ils ne servaient à rien, mais, reconnaît Gérard Dupuis, il serait tout aussi erroné, à l'inverse, d'avoir des exigences drastiques, mais irréalistes. Les industriels savent d'ailleurs agiter un épouvantail efficace. La méthode la plus simple pour arriver à une absence complète de pollution, c'est de fermer une usine et de la délocaliser sous d'autres cieux. Ce n'est pas toujours une menace en l'air."}, {"type": "document", "q": "Que cherche à étudier cette personne à propos des algues ?", "c": ["Le processus d'attractivité des cellules femelles.", "Les différences avec la reproduction des plantes terrestres.", "La constitution de certains organismes aquatiques.", "L'influence de la météorologie sur leur fécondation."], "a": 0, "k": "attirent les cellules mâles pour les féconder", "transcript": "– Tes recherches sur les algues ? Ça avance, oui, pas mal.\n– Mais tu étudies quoi au juste ?\n– Leur système de reproduction dans un milieu aquatique, le vent ou les insectes ne jouent évidemment aucun rôle. En fait, ce sont des petites boules au bout des tiges qui se fendent et attirent les cellules mâles pour les féconder.\n– Et à quoi te serviront ces découvertes ?\n– Par la suite, on pourra multiplier ces algues et les utiliser dans la composition des produits pharmaceutiques."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 20/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test20_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 20</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 20 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 20</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
