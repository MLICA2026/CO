<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 4 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

"}, {"type": "document", "q": "Question 8. Où est-ce que ces personnes vont se retrouver à 16h ?", "c": ["À la piscine.", "Au cinéma.", "À la poste.", "Au supermarché."], "a": 0, "k": "À la piscine.", "transcript": "On pourrait aller voir un film cet après-midi, ça te dit ?\n– Tu sais, je dois faire des courses, le frigidaire est vide. Et je dois chercher un paquet et des timbres. Et puis je préférerais aller nager.\n– Pourquoi pas ? Je prépare les maillots et les serviettes, et on se retrouve à 16h."}, {"type": "document", "q": "Question 9. Qu'est-ce que cet homme veut faire ?", "c": ["Visiter la ville.", "Choisir un sport.", "Trouver un logement.", "Rencontrer des gens."], "a": 1, "k": "Choisir un sport.", "transcript": "– Bonjour madame, j'habite à Québec depuis 2 mois. Je cherche une activité sportive à faire dans le quartier Montcalm. Pouvez-vous m'aider ?\n– Certainement, monsieur. Voici un catalogue avec de nombreuses informations utiles."}, {"type": "document", "q": "Question 10. Que fait Nicolas ?", "c": ["Il accepte la proposition de son ami.", "Il propose d'aller à la bibliothèque.", "Il annule ses projets du week-end.", "Il invite son ami à la piscine."], "a": 0, "k": "Il accepte la proposition de son ami.", "transcript": "– Nicolas, tu as des projets pour ce week-end ?\n– Non, pas vraiment. Et toi ?\n– Ben oui, j'ai bien envie d'aller à la piscine samedi après-midi. Ça te dit de venir avec moi ?\n– Pourquoi pas ? J'ai besoin de me détendre après mes examens. On se retrouve devant l'université avant et on fait le trajet ensemble. On dit 14h.\n– Oui, d'accord."}, {"type": "document", "q": "Question 11. Pour quelle raison la femme hésite-t-elle à louer la maison ?", "c": ["Elle est trop petite.", "La peinture est à refaire.", "Elle est située dans une rue bruyante.", "Le loyer est trop élevé."], "a": 2, "k": "Elle est située dans une rue bruyante.", "transcript": "– Alors, que pensez-vous de la maison ?\n– Elle me plaît. Elle correspond à ce que je recherche. Un lieu de vie clair et spacieux.\n– Vous pourrez refaire la peinture si vous voulez, elle est un peu vieille.\n– Oui, peut-être. Pour l'instant, je préférerais changer les fenêtres. On entend beaucoup les voitures dehors.\n– En effet, il y a un supermarché à l'angle de la rue.\n– C'est embêtant. Je rêvais d'un endroit calme. Prenez le temps de réfléchir."}, {"type": "document", "q": "Question 12. Quel bilan Alex tire-t-il de sa première journée de travail ?", "c": ["Il a été agréablement surpris.", "Il a trouvé ses collègues froids.", "Il n'a pas aimé son bureau.", "Il était déçu par son chef."], "a": 0, "k": "Il a été agréablement surpris.", "transcript": "– Alors, comment s'est passé cette première journée dans la vie active ?\n– Plutôt bien. Les collègues ont été très accueillants.\n– Et avec ton chef ? Tu m'avais dit qu'il était un peu froid.\n– Ben, en fait, il a été très sympa. Il m'a présenté à toute l'équipe, fait visiter les locaux et montré mon bureau qui est très grand. Je n'en revenais pas.\n– Bienvenue dans le monde professionnel, Alex. Tu n'es pas au bout de tes découvertes."}, {"type": "document", "q": "Question 13. Que veulent faire ces personnes samedi s'il ne pleut pas ?", "c": ["Aller chez Pierre.", "Cuisiner ensemble.", "Visiter une véranda.", "Manger en plein air."], "a": 3, "k": "Manger en plein air.", "transcript": "– Alors, c'est d'accord, nous faisons un pique-nique samedi prochain.\n– Oui, mais cela dépendra aussi du temps. S'il pleut, Pierre a proposé d'aller chez lui. Il a une maison de campagne avec une grande véranda qui s'ouvre sur le jardin.\n– Ah oui ? Alors, c'est d'accord, tu apportes les salades ?\n– Oui. Et toi des fruits. Pierre s'occupera des boissons et du pain. Bon, espérons qu'il fera beau."}, {"type": "document", "q": "Question 14. Pourquoi le jeune homme ne trouve-t-il pas la pharmacie Bollet ?", "c": ["Elle n'existe plus depuis un moment.", "Elle a déménagé dans une autre rue.", "Elle est fermée le week-end.", "Son adresse a changé récemment."], "a": 0, "k": "Elle n'existe plus depuis un moment.", "transcript": "– Bonjour monsieur, je cherche la pharmacie Bollet. C'est dans le coin, je crois.\n– Oh mon garçon, ça fait longtemps que c'est plus une pharmacie. C'est une laverie automatique maintenant. Monsieur Bollet, il est mort il y a 5 ans.\n– Ah bon ? Mais c'est ma mère qui me l'a indiqué. Vous êtes sûr qu'elle n'est plus là ?\n– Bien sûr, ça fait 20 ans que j'habite le quartier. Il y en a une autre mais dans deux rues à droite. C'est pas loin."}, {"type": "document", "q": "Question 15. Pour quelle raison Rafika intervient-elle ?", "c": ["Pour donner une recette.", "Pour parler de son métier.", "Pour parler de sa ville.", "Pour décrire une fête locale."], "a": 2, "k": "Pour parler de sa ville.", "transcript": "– Rafika de Buffalo, bienvenue dans « La Terre est belle ».\n– Bonjour Marc. Alors, nous sommes ravis de vous avoir à l'antenne parce qu'on n'a jamais eu personne de Buffalo. Vous allez nous apprendre des choses. Ça se trouve où déjà ?\n– Totalement à l'ouest de l'État de New York. C'est limitrophe du Canada.\n– C'est drôle comme nom. Il n'y a pas spécialement de bufflles ou de choses comme ça ?\n– Non. D'après la légende, ça vient de Beau Fleuve, un nom donné par les explorateurs. Enfin, c'est l'histoire qu'on raconte."}, {"type": "document", "q": "Question 16. Que demande Olivier ?", "c": ["À quel moment il pourra poser des congés.", "Une augmentation de salaire.", "Un changement de poste.", "Un remboursement de frais."], "a": 0, "k": "À quel moment il pourra poser des congés.", "transcript": "– Bonjour Monique.\n– Bonjour Olivier. Que puis-je pour vous ?\n– Je viens vous voir au sujet de mes vacances. Je voudrais les prendre en juillet. Je sais que certains collègues seront en formation et d'autres en extérieur pour les présentations de nos produits sur les marchés d'Europe. Est-ce que cela sera possible ?\n– Nous aurons peut-être besoin de vous. Effectivement, je vais y réfléchir et je vous donne ma réponse cette semaine.\n– Permettez-moi juste de vous rappeler que l'été dernier, j'ai travaillé tout le mois d'août."}, {"type": "document", "q": "Question 17. Pourquoi l'homme se rend-il dans une banque ?", "c": ["Pour ouvrir un nouveau compte.", "Pour faire un virement.", "Pour savoir quand il aura son carnet de chèques.", "Pour demander un prêt."], "a": 2, "k": "Pour savoir quand il aura son carnet de chèques.", "transcript": "– Bonjour madame, je suis venu hier ouvrir un compte mais je n'ai pas bien compris quand je recevrai le chéquier commandé par vos soins.\n– Pouvez-vous me rappeler votre nom et votre numéro de compte ?\n– Bien sûr, je m'appelle Cloutier, Pierre Cloutier. Voici mon numéro de compte ouvert hier dans cette agence.\n– Très bien. Pour un premier chéquier, comptez au moins une petite semaine. On le commande automatiquement et ça prend 48h. Il sera à votre disposition soit au guichet, soit envoyé à votre domicile avec accusé de réception. Que souhaitez-vous ?\n– Je préfère passer le prendre en fin de semaine. Je serai sûr de l'avoir."}, {"type": "document", "q": "Question 18. Pourquoi cette personne laisse-t-elle un message ?", "c": ["Pour signaler une livraison.", "Pour confirmer un rendez-vous.", "Pour proposer un service.", "Pour demander un remboursement."], "a": 2, "k": "Pour proposer un service.", "transcript": "Bonjour, c'est un message de GRD Solution pour monsieur Lalande. Je vous appelle au sujet du problème que vous avez rencontré en installant notre logiciel d'IP image. Nous avons un technicien qui pourrait vous dépanner et venir sur site rapidement. Vous pouvez me recontacter jusqu'à 18h30 au 01 28 12 87 43. Bonne journée."}, {"type": "document", "q": "Question 19. Que fera Marc ce week-end ?", "c": ["Il ira au cinéma.", "Il mangera au restaurant.", "Il restera chez lui.", "Il se rendra au théâtre."], "a": 3, "k": "Il se rendra au théâtre.", "transcript": "– Bonjour Marc, c'est Marie. Tu viens au cinéma ce soir ?\n– Non, je suis désolé, je suis trop fatigué. Je vais rester chez moi.\n– Quel dommage. Et pour le théâtre ce week-end ?\n– Oui, je viendrai. Par contre, je ne pourrai pas manger au restaurant."}, {"type": "document", "q": "Question 20. Quel problème cette mère rencontre-t-elle ?", "c": ["Ses enfants refusent de jouer.", "Les jeux sont trop coûteux.", "Ses enfants se disputent pour les jouets.", "Un de ses enfants a du mal à respecter les règles du jeu."], "a": 3, "k": "Un de ses enfants a du mal à respecter les règles du jeu.", "transcript": "Lucy a trois enfants et pour Noël, ils ont reçu des jeux de société. Ces jeux les passionnent. Ils jouent beaucoup avec leurs copains ou encore avec leurs cousins. Mais nous dit Lucy, mon fils de 6 ans provoque régulièrement des drames parce qu'il triche. Une situation à laquelle tous les parents de jeunes enfants sont un jour ou l'autre confrontés."}, {"type": "document", "q": "Question 21. Que conseille l'animateur radio aux automobilistes ?", "c": ["D'éviter l'autoroute.", "D'écouter la radio en conduisant.", "De se montrer prudent.", "De participer à un concours."], "a": 2, "k": "De se montrer prudent.", "transcript": "Chers auditeurs, au volant, restez vigilant. L'hiver peut vous surprendre. Que vous soyez expérimenté ou non, surtout quand il neige beaucoup comme aujourd'hui, ralentissez et avant de prendre la route, n'oubliez pas de consulter Québec 511 sur le web. Et pour les jeunes conducteurs, nous rappelons que le concours « Des routes l'hiver » vous offre la possibilité de gagner un cours de conduite préventive en conditions hivernales. N'hésitez pas à participer."}, {"type": "document", "q": "Question 22. Quel est le phénomène évoqué ?", "c": ["La disparition des abeilles à la campagne.", "L'interdiction des pesticides en agriculture.", "La mutation de l'habitat des abeilles.", "La production de miel en ville."], "a": 2, "k": "La mutation de l'habitat des abeilles.", "transcript": "Parmi les victimes de la folie destructrice de l'homme, les abeilles. En cause, l'utilisation dans l'agriculture de pesticides très puissants qui sont des poisons mortels pour les essaims d'abeilles, et conséquence inattendue, c'est finalement en ville que les abeilles finissent par trouver refuge. C'est le monde à l'envers. Aujourd'hui, les abeilles préfèrent la ville à la campagne car sur les toits, l'apiculteur n'a pas à craindre les effets des pesticides. En ville, les abeilles meurent moins vite et elles produisent du miel en grande quantité. Paradoxe assez incroyable, on perd moins d'essaims et les apiculteurs demandent au gouvernement d'interdire tous les pesticides qui peuvent nuire à la santé des abeilles."}, {"type": "document", "q": "Question 23. Quelle est la qualité dont le travailleur moderne doit faire preuve ?", "c": ["La créativité.", "La ponctualité.", "La mobilité.", "La spécialisation."], "a": 2, "k": "La mobilité.", "transcript": "Bienvenue à tous. Ce colloque est intitulé « Travail et modernité » car nous devons changer notre manière d'appréhender le travail au sein d'une société en pleine mutation. Nous entrons en effet dans l'ère de la communication interplanétaire. Nul ne peut se contenter d'évoluer à l'intérieur des frontières de son pays. Il faut étudier, voyager, communiquer et surtout savoir changer de métier, de pays avec souplesse."}, {"type": "document", "q": "Question 24. Qu'apprend-on sur le camping ?", "c": ["Il est de moins en moins populaire.", "Il offre des services de qualité supérieure.", "Il est réservé aux personnes à faibles revenus.", "Il se pratique uniquement en été."], "a": 1, "k": "Il offre des services de qualité supérieure.", "transcript": "Les Français sont de plus en plus nombreux à rechercher les loisirs de plein air et le camping n'est plus seulement choisi pour de simples raisons économiques puisque l'on trouve des terrains 5 étoiles qui proposent même des restaurants gastronomiques et des salles de bain privées. Le mot camping commence d'ailleurs à laisser la place à « hôtellerie de plein air »."}, {"type": "document", "q": "Question 25. Que nous apprend l'intervenante sur l'économie circulaire ?", "c": ["C'est une pratique récente.", "Elle concerne uniquement le secteur alimentaire.", "Elle est coûteuse à mettre en place.", "Elle permet la réduction du gaspillage."], "a": 3, "k": "Elle permet la réduction du gaspillage.", "transcript": "L'économie circulaire, c'est le réemploi, la réparation, le partage, la location et le recyclage des matériaux. Lorsque la matière redevient matière, la boucle, le cercle est bouclé. Et c'est le cas du secteur textile. Depuis 30 ans, l'entreprise Le Relais collecte et trie les vêtements que vous ne voulez plus porter et depuis 30 ans elle fait de l'économie circulaire en fait, sans le savoir, car à l'origine, il s'agissait surtout de réinsérer des personnes en difficulté."}, {"type": "document", "q": "Question 26. Pourquoi changer de prénom peut-il s'avérer difficile ?", "c": ["Les délais administratifs sont très longs.", "Il faut prouver la nécessité de la démarche.", "Les avocats refusent souvent de s'en charger.", "La loi l'interdit dans la plupart des cas."], "a": 1, "k": "Il faut prouver la nécessité de la démarche.", "transcript": "Le prénom que vos parents vous ont donné vous rebute ? Vous pouvez en changer mais ce n'est pas une simple formalité. Il faut obligatoirement faire appel à un avocat qui dépose le dossier auprès du tribunal de grande instance du lieu de naissance ou du domicile du demandeur. La principale difficulté est de parvenir à convaincre les juges du bien-fondé de sa requête. On peut changer de prénom à condition de justifier d'un intérêt légitime : la francisation par exemple, ou des personnes qui souhaitent mettre en adéquation leur prénom avec leur conviction religieuse. Et puis il y a des cas beaucoup plus atypiques."}, {"type": "document", "q": "Question 27. Pourquoi le client demande-t-il la résiliation de son abonnement bancaire ?", "c": ["Les frais ont trop augmenté.", "Il change de banque.", "Il n'utilise plus ce service.", "Il pense qu'il aurait dû être prévenu."], "a": 3, "k": "Il pense qu'il aurait dû être prévenu.", "transcript": "– Allô ! Bonjour madame, c'est monsieur Étienne. J'ai reçu mon relevé bancaire et je vois que mon abonnement au service en ligne a augmenté de 5 %. C'est pas beaucoup certes, mais est-ce normal ?\n– Oui, je vous rassure, c'est bien normal. Tous nos tarifs ont subi une augmentation au 1er janvier.\n– Peut-être, mais je n'ai reçu aucun courrier pour m'avertir.\n– Vous avez raison, mais nos conditions tarifaires sont affichées à l'agence.\n– Cela ne justifie pas que vous n'avertissez pas vos clients. Alors, je vous demande de résilier cet abonnement au plus vite."}, {"type": "document", "q": "Question 28. Qu'explique la personne interrogée à propos de cette université sénégalaise ?", "c": ["Les critères de sélection sont particulièrement stricts.", "Elle manque de financement.", "Les étudiants viennent uniquement de la région.", "Le taux d'échec y est élevé."], "a": 0, "k": "Les critères de sélection sont particulièrement stricts.", "transcript": "On est aujourd'hui à Saint-Louis du Sénégal à l'université Gaston Berger. C'est la deuxième université du pays avec 10 fois moins d'étudiants qu'à Dakar. Elle a échappé à l'arrivée en masse d'étudiants pour une raison simple : l'université a été créée pour développer l'excellence. Nous avons mis en place la sélection pour assurer la réussite des étudiants que nous recrutons sur la base des résultats du bac qui doit être obtenu avec mention. Du coup, le recrutement n'est pas seulement local. On vient de partout pour s'inscrire ici. Et comme les étudiants ont un encadrement fort, les taux de réussite sont très élevés."}, {"type": "document", "q": "Question 29. Selon le chroniqueur, que permet la course par rapport à la marche ?", "c": ["De maigrir plus rapidement.", "De renforcer les articulations.", "De réduire le stress.", "D'améliorer la mémoire."], "a": 0, "k": "De maigrir plus rapidement.", "transcript": "Marcher ou courir ? Ça dépend. C'est ce qui ressort de quelques études récentes qui ont opposé les deux exercices et mesuré leurs effets. L'une d'elles a été publiée le mois dernier dans la revue Medicine and Science in Sports and Exercise. Conclusion : en ce qui concerne la perte de poids, c'est la course qui l'emporte haut la main. Les coureurs sont plus minces, moins de surcharge pondérale que les marcheurs. Et passé l'âge de 55 ans, c'est encore plus vrai. Même si le nombre de kilomètres parcourus à la course par semaine est minime, il y a une différence entre les coureurs et les marcheurs. Et la cause pourrait être l'effet de la course sur l'appétit."}, {"type": "document", "q": "Question 30. Quelle est l'idée avancée par la journaliste ?", "c": ["La mode est une perte de temps.", "Il faut suivre les tendances actuelles.", "L'apparence ne compte pas.", "La tenue vestimentaire influence l'état psychologique."], "a": 3, "k": "La tenue vestimentaire influence l'état psychologique.", "transcript": "Je n'ai rien à me mettre. Avez-vous déjà prononcé cette phrase devant votre armoire pleine de vêtements ? Ces questions semblent futiles. La mode nous paraît parfois un luxe superflu et on oppose souvent l'être et le paraître. Mais faites l'expérience. Si vous êtes femme, quel que soit votre gabarit, enfilez une robe qui vous met en valeur, de jolies chaussures, une touche de rouge à lèvres peut-être. Vous vous sentirez sans aucun doute plus sûre de vous. Votre caractère en sera peut-être même transformé."}, {"type": "document", "q": "Question 31. Qu'est-ce qui différencie les moins de 30 ans des générations précédentes ?", "c": ["Ils gagnent plus que leurs parents.", "Ils épargnent davantage.", "Ils sont moins diplômés.", "Ils sont tentés par les dépenses."], "a": 3, "k": "Ils sont tentés par les dépenses.", "transcript": "Les moins de 30 ans ne représentent que 10 % des locataires. Pourtant, ils dépensent plus pour se loger, en moyenne 6 000 € par an, soit 42 % de plus que les autres. Ils ont également des revenus plus faibles que leurs parents au même âge, alors qu'ils sont nettement plus diplômés. Mais ça ne freine pas leur envie de consommer. Leur appétit de consommation est plus important que celui de leurs aînés. D'autant plus que, peu intéressés par les structures sociales existantes, les jeunes s'identifient à des groupes dont le point commun est justement la consommation. C'est le règne de la consommation symbole et le triomphe du marketing."}, {"type": "document", "q": "Question 32. Qu'est-ce qui pousse les jeunes à travailler dans les métiers des métaux ?", "c": ["Les salaires attractifs.", "L'aspect magique de la métamorphose de la matière.", "La sécurité de l'emploi.", "La simplicité des techniques."], "a": 1, "k": "L'aspect magique de la métamorphose de la matière.", "transcript": "Je sais que vous allez fréquemment à la rencontre des jeunes au sein de l'association qui tente de promouvoir les métiers des métaux. Est-ce que ce sont des métiers qui font rêver aujourd'hui les jeunes ?\n– Il y a une dimension mystique autour de ces artisanats du fer. La transformation de la barre de métal au feu a toujours fasciné le profane. L'alchimie qui permet de voir la transformation d'un lingot de métal en une œuvre finie a toujours émerveillé. Et donc on attire assez facilement les jeunes vers ces savoir-faire, notamment en ce qui concerne la ferronnerie d'art. Il y a une dimension artistique de créativité en plus."}, {"type": "document", "q": "Question 33. Que doit faire cette personne pour vendre ses légumes ?", "c": ["Donner des conseils de préparation.", "Baisser ses prix.", "Vendre uniquement des légumes connus.", "Ouvrir un marché local."], "a": 0, "k": "Donner des conseils de préparation.", "transcript": "Il y a certains légumes qui sont moins bien connus que d'autres. La courge, entre autres, c'est quelque chose qui… vraiment, les gens la regardent avec un point d'interrogation. Qu'est-ce que je vais faire avec ça ? Donc il faut être imaginatif comme producteur pour tenter les gens de le cuisiner. Puis on comprend que le temps est tellement précieux, les gens n'ont pas le temps. Donc il faut essayer de leur trouver des trucs."}, {"type": "document", "q": "Question 34. Qu'est-ce qui explique le comportement des enfants en matière de vêtements ?", "c": ["L'influence des publicités télévisées.", "Les conseils de leurs parents.", "Le besoin de ressembler aux autres.", "Le goût pour les vêtements de luxe."], "a": 2, "k": "Le besoin de ressembler aux autres.", "transcript": "Déjà à l'âge de 4-5 ans, on peut dire, ils sont attirés par des marques, ils veulent avoir leur look. C'est quand même terrible de s'apercevoir que tout petit déjà, on est sous influence. L'âge à partir duquel les enfants commencent à s'intéresser à cette notion de marque a diminué. Le phénomène n'est pas nouveau, mais l'âge décroît sensiblement. Évidemment, la socialisation joue un rôle puisque l'enfant vit toujours sous l'influence de ses pairs. Il va vouloir faire comme les autres parce qu'il y a l'effet de groupe. On ne veut pas être mis à l'écart."}, {"type": "document", "q": "Question 35. Qu'est-ce qui a décidé Daniel Desmoulins à démarrer son activité ?", "c": ["La qualité croissante des résultats.", "L'aide financière du gouvernement.", "La demande des consommateurs.", "Le conseil d'un ami vigneron."], "a": 0, "k": "La qualité croissante des résultats.", "transcript": "Depuis quelques années, des vignerons ont investi des sommes importantes au Québec pour se lancer dans une nouvelle culture, comme Daniel Desmoulins qui a ouvert le vignoble L'Ange Gardien en face du fleuve Saint-Laurent. Faire du vin au Québec, c'est un challenge. Je serais peut-être pas parti là-dessus il y a 20 ans, mais je trouvais que les produits étaient de mieux en mieux, et c'est pour ça qu'il y a 10 ans avec ma femme, on a dit « On va se lancer dans le vin. » Je pense que l'on a des produits extrêmement intéressants parce qu'il y a un petit peu d'acidité. Puis il y a toujours le vin de glace. On a la température pour ça. On cueille le raisin fin décembre début janvier."}, {"type": "document", "q": "Question 36. Que recherche la cliente ?", "c": ["Un cours de musique à petit prix.", "Une école de danse pluridisciplinaire.", "Un professeur particulier.", "Un abonnement à une salle de sport."], "a": 1, "k": "Une école de danse pluridisciplinaire.", "transcript": "– Alors ce cours avec François, j'ai adoré. Il a vraiment le chic pour nous faire ressentir la musique. Ça m'a vraiment donné envie de continuer. Du coup, combien coûte le trimestre ?\n– C'est 15 € l'heure, mais si vous prenez un abonnement, ça vous reviendra moins cher.\n– Et quelles sont les conditions ?\n– Il faut prendre au moins 10 cours dans les 3 mois à venir ou 25 dans les 6 mois. Après, vous avez aussi la formule sur l'année qui revient à 8 € le cours.\n– Ah oui, c'est intéressant parce que je viens à la fois pour le classique et pour les claquettes. En même temps, il faut que je sois sûre de pouvoir m'engager.\n– À vous de voir. Cela dit, vous pouvez changer de formule à tout moment."}, {"type": "document", "q": "Question 37. De quoi s'étonne le premier interlocuteur ?", "c": ["De la mise en vente libre de jouets sans contrôle sanitaire.", "Du prix élevé des jouets.", "De l'absence de jouets éducatifs.", "Du manque de réglementation sur les matériaux."], "a": 0, "k": "De la mise en vente libre de jouets sans contrôle sanitaire.", "transcript": "Bonjour à tous. Noël est passé et bien maintenant on va s'intéresser aux jouets et à leur conception. Je pensais qu'on ne pouvait pas mettre un jouet sur le commerce s'il n'était pas sain pour les enfants et pour les grands aussi, parce qu'il y a des grands qui jouent aussi un petit peu normal. Alors il est vrai que pour les jouets, il existe des réglementations qui s'appliquent notamment sur l'interdiction de certaines substances chimiques qui ne doivent pas être présentes dans les jouets ou alors avec une limite de concentration à ne pas dépasser. Après, comme tous les produits de consommation mis sur le marché, il n'y a pas d'autorisation de mise sur le marché comme ça existe pour les médicaments."}, {"type": "document", "q": "Question 38. Selon le chroniqueur, pourquoi l'expression « États-Unis d'Europe » est-elle taboue ?", "c": ["Elle est incompréhensible pour les citoyens.", "Elle est utilisée par des partis extrémistes.", "Elle fait ressurgir des rivalités ou des antagonismes oubliés.", "Elle est contraire aux traités européens."], "a": 2, "k": "Elle fait ressurgir des rivalités ou des antagonismes oubliés.", "transcript": "Avant-hier, dans une tribune officielle, une élue française a brisé un tabou et sans doute heureusement. En parlant des États-Unis d'Europe comme de l'objectif ultime du processus d'unification européenne, elle a d'un coup redonné une clarté à cette entreprise si complexe qu'elle en est devenue obscure à tant d'Européens. De crainte de passer pour de doux rêveurs romantiques, même les plus déterminés des partisans de l'unité de l'Europe n'osaient plus employer l'expression de Victor Hugo. « On ne peut pas », dit-on. « Ce serait briser net un consensus, ce serait rompre avec certaines nations, susciter de nouvelles querelles bien plus violentes encore que celle du traité constitutionnel. »"}, {"type": "document", "q": "Question 39. Quelle conclusion la journaliste tire-t-elle de sa visite dans cette librairie ?", "c": ["Les manuels de bonheur sont trop chers.", "Le bonheur s'achète facilement.", "Les librairies manquent de diversité.", "L'accès au bonheur nécessite du travail."], "a": 3, "k": "L'accès au bonheur nécessite du travail.", "transcript": "Peut-être aurais-je dû moi aussi faire l'acquisition de l'un de ces nombreux manuels du bonheur proposés par la librairie ? Cela m'aurait peut-être aidée à positiver, à voir les choses autrement comme le prônent justement ces ouvrages. Ainsi, je ne serais pas rentrée avec la sensation un peu déprimante, je dois le dire, que pour être heureux, eh bien il faut faire des efforts. Le bonheur n'est pas inné, nous disent les spécialistes. Il s'apprend. Et donc au rayon bonheur de la librairie — je n'invente pas, il y a bien une étiquette « bonheur » sur un rayon — les manuels proposent leur aide à grand coup d'exercices, de conseils rédigés généralement à l'impératif. On lit : « Ne vous souciez pas du regard des autres. »"}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 4/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test34_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 4</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 4 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 4</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
</html>
