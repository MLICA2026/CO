<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 18 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

 le début du film et trouver une place dans la salle, il faut partir maintenant.\n– Partir maintenant? Mais regarde, il pleut!"}, {"type": "extrait", "q": "Question 6. Choisissez la bonne réponse.", "prompt": "Oh, des skis! C'est un super cadeau! Comment vous avez eu l'idée?", "c": ["On a demandé à ton frère.", "On a fait ton gâteau préféré.", "On a invité tes amis et ta famille.", "On a réservé une salle."], "a": 0, "k": "On a demandé à ton frère.", "transcript": "– Oh, des skis! C'est un super cadeau! Comment vous avez eu l'idée?"}, {"type": "extrait", "q": "Question 7. Choisissez la bonne réponse.", "prompt": "Si tu veux, je t'emmène à la piscine cet après-midi. Qu'est-ce que tu en penses?", "c": ["J'ai cassé ma raquette.", "J'ai oublié mon ballon.", "J'ai perdu mon maillot.", "J'ai trouvé mes chaussures."], "a": 2, "k": "J'ai perdu mon maillot.", "transcript": "– Si tu veux, je t'emmène à la piscine cet après-midi. Qu'est-ce que tu en penses?"}, {"q": "Question 8. Qu'est-ce que le vendeur peut proposer à cette cliente ?", "c": ["Un film", "Un livre", "Un vêtement", "Un voyage"], "a": 1, "transcript": "Bonjour, Madame.\n– Bonjour. Je cherche un cadeau pour mon fils. C'est son anniversaire.\n– Très bien. Il a quel âge ? Et qu'est-ce qu'il aime ?\n– Il va avoir 19 ans demain. Il est étudiant en histoire. Il adore la poésie. Les romans policiers et historiques, bien sûr.", "type": "document", "k": "Un livre"}, {"q": "Question 9. Que propose Nourdine à Faustine ?", "c": ["La publication d'un CV en ligne", "Un remplacement dans son entreprise", "Une formation gratuite à l'université", "Une rencontre avec son patron"], "a": 3, "transcript": "Salut, Faustine. Ça va ?\n– Ça va. Mais je cherche toujours un job après les cours pour gagner un peu d'argent.\n– Ah, mince. Moi, je livre des courses à domicile deux soirs par semaine. Je pourrais parler avec mon chef. Je crois qu'il veut recruter quelqu'un. Viens avec moi ce soir et je te le présenterai.\n– Oui, merci, Nourdine. Ce serait super.\n– Et j'ai vu que la fac organisait un forum pour l'emploi cette semaine. Ça peut être utile aussi.\n– Parfait, je vais y aller.", "type": "document", "k": "Une rencontre avec son patron"}, {"q": "Question 10. Qu'est-ce qui est difficile pour Léo ?", "c": ["La communication avec ses clients", "La recherche d'un nouveau travail", "L'achat d'un nouveau téléphone", "L'utilisation de son ordinateur portable"], "a": 0, "transcript": "Léo, comment ça va depuis que tu es dans ta nouvelle maison ?\n– Ça va, ça va. Mais je n'ai pas encore Internet.\n– Mince, alors. Et est-ce que ton téléphone fixe marche, au moins ?\n– Oui, mais je n'en ai pas vraiment besoin. Je viens de m'acheter un ordinateur tout neuf, mais sans Internet. Je ne peux pas travailler et contacter mes clients.\n– Je comprends. Tu as vu quelqu'un pour arranger ça ?", "type": "document", "k": "La communication avec ses clients"}, {"q": "Question 11. Quel est le problème de Lydie ?", "c": ["Elle a oublié un objet important", "Elle a raté son bus ce matin", "Elle doit s'absenter du bureau", "Elle est en retard à une réunion"], "a": 0, "transcript": "Allô, Paul ? Tu peux m'aider ?\n– Qu'est-ce qui t'arrive, Lydie ?\n– J'ai laissé mes clés de voiture dans la salle de conférence. Et elle est occupée jusqu'à 20h.\n– Je peux te ramener, si tu veux.\n– Oh, merci, ça m'arrange. Je dois être chez moi à 18h30. Demain, je viendrai en transport.", "type": "document", "k": "Elle a oublié un objet important"}, {"q": "Question 12. Que conseille Mathieu à son ami ?", "c": ["D'apprendre une langue", "D'arrêter ses études", "De partir à l'étranger", "De rencontrer du monde"], "a": 2, "transcript": "Mathieu, j'aurais besoin d'un conseil. Est-ce que tu penses que je devrais aller aux Etats-Unis pour finir mon master ?\n– C'est très personnel comme décision. Est-ce que tu crois que ce sera une bonne opportunité pour ta carrière ?\n– Oui, d'après mes profs, si j'y vais, j'aurai un meilleur niveau d'anglais et je pourrai plus facilement obtenir un poste dans une entreprise bilingue.\n– Alors fais-le. Et en plus, tu feras de nouvelles connaissances.", "type": "document", "k": "De partir à l'étranger"}, {"q": "Question 13. Qu'est-ce qui pose problème aux clients ?", "c": ["La date de départ", "La durée du voyage", "La situation de l'hôtel", "Le prix du séjour"], "a": 3, "transcript": "Bonjour, je voudrais réserver un séjour au Seychelles.\n– Alors, j'ai plusieurs formules de voyage à vous proposer. J'ai notamment quelque chose de très intéressant. Un combiné avion plus hôtel 4 étoiles sur l'île principale à 1300 euros la semaine. Départ entre le 10 et le 15 décembre.\n– C'est au-dessus de mes moyens. Auriez-vous d'autres à me proposer ?\n– J'ai aussi des hôtels de catégorie inférieure.\n– Oui, je préférerais.", "type": "document", "k": "Le prix du séjour"}, {"q": "Question 14. Quel est le thème du sondage ?", "c": ["L'intérêt pour le cinéma", "Les activités de loisirs", "Les habitudes de transport", "L'utilisation des médias"], "a": 3, "transcript": "Bonjour, madame. Auriez-vous quelques minutes pour répondre à un sondage ?\n– Rapidement, oui.\n– Parfait. Suivez-vous l'actualité ?\n– Oui, un peu. Mais je n'ai pas toujours le temps.\n– Vous lisez les journaux ?\n– Un peu, dans le métro. Mais je regarde plutôt les informations à la télévision.\n– Et sur Internet ?\n– Oui, parfois des amis postent des actualités sur les réseaux sociaux. J'aime ce qui parle des grands réalisateurs de films, des acteurs. Parce que je suis actrice, vous savez.\n– Très bien. Merci, madame. Vos réponses nous seront très utiles.", "type": "document", "k": "L'utilisation des médias"}, {"q": "Question 15. Qu'apprécie Pascale dans son métier ?", "c": ["La répartition des horaires", "Le contact avec les élèves", "Les activités pédagogiques", "L'organisation des leçons"], "a": 1, "transcript": "Je m'appelle Pascale. Ça fait 4 ans que je travaille dans une école maternelle. Je suis chargée d'aider les enseignants dans la classe. Alors, le plus dans le métier, pour moi, c'est les relations avec les enseignants et les enfants. Ça, on a vraiment beaucoup de chance à ce niveau-là. Surtout avec les enfants. Les côtés négatifs du métier… Je dirais peut-être les journées un peu longues, dans le bruit. Parce que les enfants sont quand même en général bruyants.", "type": "document", "k": "Le contact avec les élèves"}, {"q": "Question 16. Pourquoi Rachida appelle-t-elle son frère ?", "c": ["Pour l'inviter au restaurant", "Pour le remercier de son accueil", "Pour lui conseiller un logement", "Pour lui donner des informations"], "a": 3, "transcript": "Allô ? Salut, c'est Rachida.\n– Salut, petite sœur.\n– Je t'appelle pour qu'on s'organise. Tu te souviens qu'on sera déjà partis quand vous arriverez ?\n– Ah, c'est vrai. J'avais complètement oublié. Comment on fait pour les clés ?\n– Je les laisserai chez la voisine d'en face. On vous a préparé des draps, des serviettes, et le frigo est plein.\n– Nous vous avons aussi laissé une liste d'activités à faire ici et des adresses pour sortir dîner.\n– Merci beaucoup. Je te dois combien ?\n– Ah ben rien, tu plaisantes. C'est normal, tu es mon frère.", "type": "document", "k": "Pour lui donner des informations"}, {"q": "Question 17. Qu'est-ce que ces deux amis reprochent au film ?", "c": ["L'histoire est compliquée", "La musique est ennuyeuse", "Le réalisateur est mauvais", "Les acteurs sont inconnus"], "a": 0, "transcript": "Alors, comment as-tu trouvé le film ? Assez moyen ? Les acteurs jouaient bien, mais je n'ai pas réussi à croire à ce scénario.\n– C'est mon avis aussi. J'ai eu du mal à suivre l'histoire. En revanche, j'ai apprécié la musique et la façon de filmer.\n– En effet, le réalisateur a du talent. On continue cette discussion dans un café ?\n– Avec plaisir.", "type": "document", "k": "L'histoire est compliquée"}, {"q": "Question 18. Pourquoi cette personne laisse-t-elle un message ?", "c": ["Pour confirmer un rendez-vous", "Pour demander un entretien", "Pour proposer un service", "Pour signaler un retard"], "a": 2, "transcript": "Bonjour, c'est un message de RD Solutions pour monsieur Lalande. Je vous appelais au sujet du problème que vous avez rencontré en installant notre logiciel des paysages. Nous avons un technicien qui pourrait vous dépanner et venir sur site rapidement. Vous pouvez me recontacter jusqu'à 18h au 1287 43. Bonne journée.", "type": "document", "k": "Pour proposer un service"}, {"q": "Question 19. Que dit cette intervenante au sujet du travail à Londres ?", "c": ["Le recrutement se fonde sur l'expérience", "Les salaires à l'embauche sont très élevés", "L'évolution professionnelle est très lente", "L'obtention d'un premier emploi est aisée"], "a": 0, "transcript": "On dit souvent qu'à Londres, on peut changer de job quasiment comme de chemise. Est-ce que c'est toujours vrai ? Il est toujours facile de passer d'un job à l'autre. Le diplôme a beaucoup moins d'importance. On va surtout regarder les postes que vous avez déjà occupés. On va aussi tenir compte de vos motivations. C'est vrai qu'on vous donne aussi la possibilité d'augmenter assez ...... Comment dire, de franchir les étapes beaucoup plus rapidement. On retrouve assez régulièrement des personnes vers 22, 23 ans et déjà manager, tandis qu'en France, c'est quand même un petit peu plus compliqué.", "type": "document", "k": "Le recrutement se fonde sur l'expérience"}, {"q": "Question 20. Pour quelle raison la fille refuse-t-elle de jouer au volley ?", "c": ["Elle veut faire du vélo", "Elle a horreur du volley", "Elle trouve le vent trop fort", "Elle se sent fatiguée"], "a": 2, "transcript": "Vous venez, on va faire un volley. Et après on ira nager. Tu viens, Véro ?\n– Mais ce n'est pas possible. Par ce temps, vous avez vu ce vent. Vous n'attraperez jamais le ballon.\n– N'exagère pas. Ce n'est pas grave. Allez, viens. Tu adores ça.\n– Non, allez-y sans moi. J'aime mieux aller me baigner.", "type": "document", "k": "Elle trouve le vent trop fort"}, {"q": "Question 21. De quoi parlent ces personnes ?", "c": ["D'un projet de voyage", "D'un changement de travail", "D'un futur déménagement", "D'une sortie au cinéma"], "a": 0, "transcript": "Salut, ça va ?\n– Ça va, mais mon petit ami est parti pour trois mois pour réaliser un documentaire sur la Gaspésie, une région assez sauvage du Québec.\n– Ah oui, je connais, quelle chance ! J'adorais y retourner et tu vas y aller aussi ?\n– J'aimerais bien, mais j'ai des missions prévues prochainement, mais bon, je vais voir mon patron demain. Je lui demanderai si je peux prendre des vacances.\n– Bonne chance ! Tu m'écriras pour me raconter ton expérience là-bas et préviens-moi quand le film sortira.", "type": "document", "k": "D'un projet de voyage"}, {"q": "Question 22. Quelles difficultés les créateurs de musique rencontrent-ils ?", "c": ["Leur public est en diminution", "Leur salaire est insuffisant", "Leur savoir est peu transmis", "Leur talent est dévalorisé"], "a": 1, "transcript": "Et donc les compositeurs ont un autre métier. C'est à dire que oui, ils sont chefs d'orchestre ou ils sont directeurs de conservatoire ou ils sont enseignants, chercheurs, directeur artistique, parfois parce que leur métier de compositeur ne leur permet pas de pouvoir avoir suffisamment de rémunération pour vivre correctement. Je pense qu'il doit d'ailleurs y avoir à peu près que deux ou 3 % de compositeurs aujourd'hui qui vivent réellement de leur musique. C'est très, très peu.", "type": "document", "k": "Leur salaire est insuffisant"}, {"q": "Question 23. Sur quel aspect travaillent les concepteurs des voitures autonomes ?", "c": ["L'écologie", "La puissance", "La sécurité", "Les équipements"], "a": 3, "transcript": "Les différents modèles de véhicules sans conducteurs étaient à essayer dans les rues de Las Vegas la semaine dernière. Pour le moment, il s'agit seulement d'expérimentation. En attendant une réglementation, le secteur s'intéresse à ce que l'on fera dans ces voitures quand elles conduiront vraiment toute seule, persuadé que c'est l'intérieur de la voiture et les services proposés qui feront la différence demain, bien plus que le moteur. Plusieurs concepts d'habitacle futuristes étaient présentés sur scène des voitures avec des écrans partout intégrées dans les vitres, faisant toute la largeur du tableau bord des véhicules qui se personnalise en fonction de leurs passagers.", "type": "document", "k": "Les équipements"}, {"q": "Question 24. Pour quelles raisons ce psychologue a-t-il interrompu ses consultations ?", "c": ["Il a répondu à une demande de ses patients", "Il consacre son temps à son nouveau métier", "Il s'est remis en question suite à un échec", "Il veut éviter toute publicité personnelle"], "a": 3, "transcript": "Psychologue, vous animez une émission télévisée. Comment faites-vous pour jongler entre vos consultations et vos émissions ?\n– J'ai suspendu mes consultations privées dans un souci éthique. Je ne veux pas utiliser cette émission comme fond de commerce, comme une manière de rabattre de la clientèle. Je suis un thérapeute ordinaire et je ne veux pas donner l'image de quelqu'un qui va plus vite que les autres.", "type": "document", "k": "Il veut éviter toute publicité personnelle"}, {"q": "Question 25. Quel est l'objectif de ces deux scientifiques ?", "c": ["Augmenter le nombre des surfaces exploitables", "Développer la production des fruits et légumes", "Diffuser des procédés en accord avec la nature", "Introduire la plantation de nouvelles espèces"], "a": 2, "transcript": "Souvent, on les surnomme « les médecins de la terre ». Claude et Lydia Bourguignon auscultent les sols. Ils tentent de leur rendre la santé. Quand les méthodes agressives de l'agriculture intensive ont fortement abîmé les terres cultivables au point, parfois, d'en faire disparaître toute trace de vie, engrais chimiques et pesticides ne sont pas les amis de ce couple de scientifiques. Claude et Lydia Bourguignon invitent les paysans à mieux connaître leur champ ou leur vigne et à les travailler autrement sans pour autant compromettre les rendements. De cette révolution verte qu'ils défendent, dépend selon eux la qualité de l'offre faite aux consommateurs, ainsi que la survie des agriculteurs et des terres qui cultivent.", "type": "document", "k": "Diffuser des procédés en accord avec la nature"}, {"q": "Question 26. De quoi parlent les deux jeunes filles ?", "c": ["De la préparation des vacances", "Des révisions d'un examen", "D'un anniversaire surprise", "D'un projet de visites culturelles"], "a": 1, "transcript": "Tu viens à l'anniversaire de Bertrand samedi.\n– Je ne sais pas encore, j'ai un examen lundi prochain.\n– Tu es prête ?\n– Plus ou moins. Mes cousins de Toulouse sont venus passer une partie des vacances à la maison et j'ai dû leur faire visiter les monuments et les musées de Paris.\n– Tu as pu travailler un peu ?\n– Oui, mais je dois encore étudier les maths.", "type": "document", "k": "Des révisions d'un examen"}, {"q": "Question 27. Que souhaite la jeune fille ?", "c": ["Revendre des livres d'occasion auprès des finissants", "Rencontrer les étudiants nouvellement inscrits", "Se rendre à une vente de livres universitaires d'occasion à la faculté", "Aller acheter des livres pour réviser avec son ami avant leurs examens"], "a": 3, "transcript": "Tu as vu les fiches dans le hall de l'université ce week-end. Les finissants organisent une bourse au livre sur les programmes qu'ils ont étudiés. On y va.\n– Tu sais, ce genre de vente ne m'intéresse pas parce que les manuels changent tous les ans, surtout en économie. Il faut se tenir au courant de tout.\n– Non ? Vas-y toute seule. Tu me déçois. On va rencontrer des étudiants qui ont déjà travaillé sur notre futur programme. C'est aussi important. Pouvoir discuter sur ce que l'on va rencontrer l'an prochain. Le cursus, les profs, le diplôme. Allez, viens.\n– Non, je n'ai pas envie. Je dois revoir mes cours pour mes partiels.", "type": "document", "k": "Aller acheter des livres pour réviser avec son ami avant leurs examens"}, {"q": "Question 28. Comment la jeune fille a-t-elle passé sa soirée ?", "c": ["Elle est sortie en boîte de nuit", "Elle a dîné avec sa famille", "Elle est restée toute seule", "Elle a vu un mauvais film"], "a": 2, "transcript": "Salut Marie. Alors finalement, qu'est-ce que tu as fait samedi soir ?\n– Je n'avais pas le moral. J'étais invitée chez ma sœur. Je n'y suis pas allée. Il y a des amis qui m'ont appelée pour aller danser au dernier moment. J'ai pas eu envie.\n– Tu as fait quoi ?\n– Alors finalement, j'ai voulu aller au cinéma. La séance était annulée pour raisons techniques. Alors je suis rentrée. Je me suis couchée.\n– Si j'avais su, je serais venue te chercher. On est allé jouer au bowling. On a passé une super soirée.", "type": "document", "k": "Elle est restée toute seule"}, {"q": "Question 29. Que désirent les jeunes en commençant leur carrière ?", "c": ["Une ascension professionnelle accompagnée de revenus confortables", "Une nomination à un premier poste valorisant au sein de l'entreprise", "Une opportunité de multiplier les contrats dans différentes entreprises", "Une reconnaissance rapide au sein de l'entreprise"], "a": 0, "transcript": "Quels sont les objectifs de carrière des étudiants ? Vous savez, hommes et femmes aspirent à utiliser salaire et promotion, non seulement pour pouvoir utiliser une entreprise comme un nom sur un CV, mais aussi pour obtenir un réel accélérateur de carrière et plus simplement ce qui attire hommes et femmes, c'est d'envisager de pouvoir gagner beaucoup plus. Les kilos de leur premier salaire ne sauraient donc être un frein à leur entrée dans une société. Tant que ces jeunes diplômés peuvent se projeter dans une globalité liant augmentation salariale et promotion interne.", "type": "document", "k": "Une ascension professionnelle accompagnée de revenus confortables"}, {"q": "Question 30. Que recherchent les habitants de ces oasis ?", "c": ["Adopter un mode de vie collectif responsable", "Construire un réseau d'assainissement des eaux", "Faire la promotion de logements écologiques", "Mener une politique d'aménagement des villes"], "a": 0, "transcript": "Si demain vous viviez dans une oasis, je ne vous parle pas d'un lac avec des petits palmiers au milieu du désert, mais d'une communauté, d'une petite communauté en France, en ville ou à la campagne où vos voisins seraient comme vous décidés à vivre de façon plus écolo. C'est ça les oasis, 500 petits groupes aujourd'hui, des familles qui vivent côte à côte, mais aussi ensemble et c'est peut-être avant-gardiste. Prenez par exemple au Nord-et-Loir, l'écho à mot du Plessis, 28 familles, soit 60 personnes qui vivent dans des bâtiments bioclimatiques, dont le chauffage, pour faire simple, ne pollue pas. Elles ont toutes renoncé à se brancher au tout-à-l'égout. Leurs eaux grises sont traitées dans des bassins plantés de roseaux qui dépolluent. C'est parfaitement légal et ça marche.", "type": "document", "k": "Adopter un mode de vie collectif responsable"}, {"q": "Question 31. De quoi traite ce reportage ?", "c": ["D'un appel à projet imaginaires", "D'un examen de fin d'études", "D'un nouveau plan d'urbanisme", "D'une rénovation d'un monument"], "a": 0, "transcript": "La vieille dame de fer dans tous ses états, où, comment les jeunes, sont complexes, se sont mesurés à cette forme unique qu'est la Tour Eiffel pour ce concours organisé par la fondation Eiffel adressé aux élèves des écoles d'architecture ? La consigne était de rêver. Concevoir un édifice de très grande hauteur sur le Champ-de-Mars à Paris, à distance accolée ou à la place de la Tour Eiffel. Trois étudiants suppriment donc carrément la tour. À la place, ils y construisent un aéroport vertical où creuse un puits de lumière avec de vastes plateaux, d'autres choisissent de la rendre habitable en comblant ses vides par des baies de couleur ou la doter d'un jardin suspendu.", "type": "document", "k": "D'un appel à projet imaginaires"}, {"q": "Question 32. Que constate ce journaliste sur la gastronomie à Toronto ?", "c": ["Elle est dans l'innovation constante", "Elle est tournée vers l'exotisme", "Elle fait la part belle à la tradition", "Elle nécessite un service très rapide"], "a": 0, "transcript": "Des commentaires sur la gastronomie de Toronto ? On y mange très bien, mais c'est impossible d'y manger la même chose. Quatre ans plus tard, comme à Québec, la gastronomie est très tendance. Qu'est-ce qui se passe aujourd'hui ? Qu'est-ce qui se passera demain ? Mais qu'est-ce qui s'est passé hier ? On ne veut plus rien savoir. Qu'est-ce qu'un restaurateur doit faire si sa cuisine n'est pas tendance, mais tout aussi bonne à Toronto, il doit la changer. C'est différent. À Québec, j'ai l'impression qu'à Toronto, la capitale des affaires, on gère tout aux dépens des valeurs sûres.", "type": "document", "k": "Elle est dans l'innovation constante"}, {"q": "Question 33. Que doit faire cette personne pour vendre ses légumes ?", "c": ["Donner des conseils de préparation", "Éviter de faire attendre les acheteurs", "Faire connaitre des aliments oubliés", "Respecter le goût des consommateurs"], "a": 0, "transcript": "Et certains légumes qui sont moins bien connus que d'autres. Oui, la courge, entre autres, c'est quelque chose qui… Vraiment, les gens la regardent avec un point d'interrogation. Qu'est-ce que je vais faire avec ça ? Donc, il faut être imaginatif comme producteur pour tenter les gens de le cuisiner. Puis on comprend que le temps est tellement précieux. Les gens n'ont pas le temps. Donc, il faut essayer de leur trouver des trucs…", "type": "document", "k": "Donner des conseils de préparation"}, {"q": "Question 34. Que dit cet intervenant sur la langue française ?", "c": ["Elle crée des discriminations", "Elle enrichit les rapports", "Elle est utile pour le droit", "Elle varie selon les contextes"], "a": 1, "transcript": "Mais c'est important, la langue que l'on parle aujourd'hui en 2018, alors que l'on a du traducteur sur tous les téléphones.\n– Ah oui, c'est important parce que la langue véhicule autre chose, la langue véhicule une manière de regarder le monde, véhicule aussi des solidarités des gens qui ont fait leurs études en France, qui se sont imprégnés des systèmes, par exemple, juridiques français, non pas la même façon de raisonner et vont créer avec nous un espace très important. Et puis j'ajoute que la francophonie, ce n'est pas seulement la France. On voit bien que les membres de l'organisation internationale de la francophonie viennent de très nombreux horizons de continents différents.", "type": "document", "k": "Elle enrichit les rapports"}, {"q": "Question 35. Qu'est-ce qui a décidé Daniel Desmoulins à démarrer son activité ?", "c": ["La qualité croissante des résultats", "Les aménagements hydrauliques", "L'expérience de ses collègues", "L'importation de pieds de vigne"], "a": 0, "transcript": "Depuis quelques années, des vignerons ont investi des sommes importantes au Québec pour se lancer dans une nouvelle culture, comme Daniel Desmoulins, qui a ouvert le vignoble « L'Ange Gardien » en face du fleuve Saint-Laurent. Faire du vin au Québec, c'est un challenge. Je ne me serais peut-être pas lancé dans cette aventure, il y a 20 ans, mais je trouvais que les produits devenaient de mieux en mieux. C'est pour cela qu'il y a 10 ans, avec ma femme, nous avons décidé de nous lancer dans le vin. Je pense que nous avons des produits extrêmement intéressants parce qu'ils ont un petit peu d'acidité. Et puis, il y a toujours le vin de glace. Nous avons la température adéquate pour cela. Nous récoltons le raisin fin décembre, début janvier.", "type": "document", "k": "La qualité croissante des résultats"}, {"q": "Question 36. De quel type de bateau est-il question ?", "c": ["De voiliers destinés à des particuliers", "De navires pour la marine marchande", "De paquebots adaptés au tourisme de masse", "De bateaux de pêches traditionnels"], "a": 0, "transcript": "Alors, un chantier de construction navale ici pour qui ? Pour l'export, principalement en raison de la politique sénégalaise, qui depuis quelques années, avec le changement de gouvernement, favorise l'implantation d'investisseurs étrangers. Cela nous permet d'exporter et d'importer hors taxes, sans douane. Nos bateaux sont évidemment des bateaux de plaisance et notre clientèle est à l'étranger. Nous travaillons donc uniquement pour l'exportation.\n– Qu'est-ce que vous construisez comme bateau ?\n– Un catamaran de 12 mètres dessiné par Éric, le rouge, en collaboration avec les ateliers du Cap Vert, pour un couple de Français qui partira voyager pendant un an et demi pour faire un tour du monde avec.", "type": "document", "k": "De voiliers destinés à des particuliers"}, {"q": "Question 37. Selon cette personne, qu'est-ce que l'utilisation d'internet apporte au processus de recrutement ?", "c": ["Une diminution de la longueur des entretiens", "Une meilleure diffusion des offres d'emploi", "Une plus grande équité entre les candidats", "Une protection accrue des données personnelles"], "a": 2, "transcript": "Dans mon cabinet de recrutement, internet est devenu un outil indispensable, non seulement pour repérer des candidats potentiels sur la toile, mais également pour la phase d'entretien. Grâce au logiciel de visioconférence, les cadres ne doivent plus se déplacer et parfois faire des centaines de kilomètres pour s'entendre dire après 10 minutes d'entretien qu'ils n'ont pas le profil. De plus, l'utilisation de tels logiciels offre un autre avantage considérable. Il réduit les discriminations comme l'entretien, qui peut être enregistré aussi bien par le candidat que par le recruteur. Cela évite les questions déplacées. Enfin, les enregistrements peuvent être visionnés autant de fois qu'on le souhaite ou encore être transmis à nos clients. Pour plus de transparence et de professionnalisme.", "type": "document", "k": "Une plus grande équité entre les candidats"}, {"q": "Question 38. Que souhaitent les grandes écoles ?", "c": ["Devenir plus attrayantes aux yeux des étrangers", "Diminuer le nombre d'inscrits d'origine française", "Diversifier les nationalités au sein de chaque cursus", "Intégrer de préférence des étudiants anglophones"], "a": 0, "transcript": "Les grandes écoles accueillent plus de 360 étudiants étrangers, soit 17 % de leurs effectifs. Ce chiffre est en progression avec une hausse très importante en provenance de deux régions du monde. La première, c'est la zone Asie-Pacifique. La deuxième région d'origine, c'est le Maghreb. La conférence des grandes écoles fait quelques propositions pour que la France soit plus attractive. Elle propose par exemple la possibilité d'enseigner en anglais. Mais là, on se heurte à la loi de défense de la langue française. Une autre idée est que le niveau de français de l'étranger ne soit plus une cause d'inadmissible dans une école, mais que l'on exige plutôt un niveau minimum de français.", "type": "document", "k": "Devenir plus attrayantes aux yeux des étrangers"}, {"q": "Question 39. Quelle réserve le sociologue Renaud Epstein émet-il ?", "c": ["Les bâtiments restaurés sont en nombre insuffisant", "Les cités réaménagées sont surtout résidentielles", "Les municipalités privilégient les projets coûteux", "Les réhabilitations ont une portée limitée"], "a": 3, "transcript": "La rénovation urbaine est aujourd'hui plébiscitée par les élus locaux et les habitants des banlieues. Mais ce programme a aussi eu des effets pervers. Selon Renaud Epstein, sociologue et spécialiste des politiques urbaines, la mobilisation de milliards d'euros pour changer le bâti et changer l'urbanisme s'est faite aux dépens d'autres domaines d'intervention dans ces mêmes quartiers. Parfois, on a pu rebâtir des écoles, mais cela ne change pas nécessairement les moyens qui sont mis à disposition de ces écoles pour leur mission. Il en va de même pour les équipements sociaux et culturels. Dans ces quartiers, la priorité ne devrait-elle pas plutôt être d'améliorer la qualité des services dans ces quartiers ?", "type": "document", "k": "Les réhabilitations ont une portée limitée"}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 18/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test34_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 18</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 18 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 18</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
</html>
