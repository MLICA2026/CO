<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 22 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

.", "Super. Je connais bien cette ville."], "a": 1, "k": "Bonne idée. J'adore la neige.", "transcript": "– Cette année, c'est décidé. Nous allons faire du ski pendant les vacances de Noël. Tu nous accompagnes ?"}, {"type": "extrait", "q": "Question 8. Choisissez la bonne réponse.", "prompt": "Je m'appelle Albert. J'ai 36 ans. Je viens de Versailles et je suis traducteur en anglais et chinois. Et toi, qu'est-ce que tu viens étudier à Montréal ?", "c": ["J'ai choisi les cours de littérature.", "J'ai habité à Bruxelles et à Paris.", "J'ai trouvé une chambre d'étudiant.", "J'ai voyagé pendant deux ans."], "a": 0, "k": "J'ai choisi les cours de littérature.", "transcript": "– Je m'appelle Albert. J'ai 36 ans. Je viens de Versailles et je suis traducteur en anglais et chinois. Et toi, qu'est-ce que tu viens étudier à Montréal ?"}, {"type": "document", "q": "Question 9. De quoi est-ce que ces deux personnes parlent ?", "c": ["D'un atelier de cuisine.", "D'une recette familiale.", "Des courses pour un repas.", "Des horaires d'un magasin."], "a": 2, "k": "Tu peux en acheter une avant de rentrer à la maison ?", "transcript": "Je dois aller au supermarché avant la fermeture. Qu'est-ce que tu veux manger ce soir ?\n– Je ne sais pas. Des pizzas, c'est possible ?\n– Oui, mais elles sont meilleures au restaurant italien. Tu peux en acheter une avant de rentrer à la maison ?\n– Bien sûr."}, {"type": "document", "q": "Question 10. De quoi discutent les deux femmes ?", "c": ["D'un prochain déménagement.", "De sport pour le week-end.", "De vacances en famille.", "D'un problème de santé."], "a": 2, "k": "mon mari vient de réserver un appartement à la montagne pour 15 jours", "transcript": "Ça ne va pas ? Tu es malade ?\n– Non, mais mon mari vient de réserver un appartement à la montagne pour 15 jours. Au programme, randonnée, vélo et escalade.\n– C'est génial !\n– C'est affreux, tu veux dire. Moi, je rêvais de deux semaines de repos et de lecture."}, {"type": "document", "q": "Question 11. Qu'est-ce que cet étudiant veut ?", "c": ["Changer de propriétaire.", "Louer un appartement.", "Partager un logement.", "Partir vivre à l'étranger."], "a": 1, "k": "j'aimerais un studio", "transcript": "Association vie étudiante, bonjour.\n– Bonjour madame. Je suis un étudiant étranger et je cherche un logement.\n– Est-ce que vous voulez une chambre en cité universitaire ?\n– Non.\n– Est-ce que vous voulez une éducation ?\n– Non, mais j'aimerais un studio.\n– Bien. Je vous envoie des adresses de propriétaires par courriel."}, {"type": "document", "q": "Question 12. Quel renseignement donne l'homme ?", "c": ["La distance à parcourir.", "L'adresse d'un garage.", "Le bus à emprunter.", "Le chemin à suivre."], "a": 3, "k": "Allez tout droit et passez deux carrefours", "transcript": "Pardon monsieur, pourriez-vous m'indiquer où se trouve la bibliothèque, s'il vous plaît ?\n– Oui, bien sûr. Elle n'est pas très loin. Enfin, si vous êtes en voiture.\n– Hélas, je suis à pied.\n– Il vous faudra marcher 20 minutes. Allez tout droit et passez deux carrefours. Vous verrez la bibliothèque sur votre droite."}, {"type": "document", "q": "Question 13. Qu'est-ce qui pose problème aux clients ?", "c": ["La date de départ.", "La durée du voyage.", "La situation de l'hôtel.", "Le prix du séjour."], "a": 3, "k": "C'est au-dessus de mes moyens", "transcript": "Bonjour, je voudrais réserver un séjour au Seychelles.\n– Alors, j'ai plusieurs formules de voyage à vous proposer. J'ai notamment quelque chose de très intéressant. Un combiné avion plus hôtel 4 étoiles sur l'île principale à 1300 euros la semaine. Départ entre le 10 et le 15 décembre.\n– C'est au-dessus de mes moyens. Auriez-vous d'autres à me proposer ?\n– J'ai aussi des hôtels de catégorie inférieure.\n– Oui, je préférerais."}, {"type": "document", "q": "Question 14. Pourquoi le voyageur est-il en colère ?", "c": ["Parce que la file d'attente est très longue.", "Parce qu'il manque d'information.", "Parce que les conducteurs sont en grève.", "Parce que les guichets sont fermés."], "a": 1, "k": "je n'en sais pas plus que vous", "transcript": "Bonjour, Madame. Je viens de voir à l'affichage que le train pour Londres a une heure de retard. Pourquoi ? C'est encore des cheminots qui ne sont pas contents ?\n– Non, pas cette fois. Mais malheureusement, je n'en sais pas plus que vous.\n– Alors là, c'est un comble. Pour une fois que ce n'est pas un arrêt de travail, il n'y a personne qui puisse nous renseigner.\n– Ben, non. C'est peut-être une panne. Je ne sais pas non plus. Il faut attendre et continuer à consulter le panneau. C'est tout."}, {"type": "document", "q": "Question 15. Qu'est-ce que Marie va faire à Vienne ?", "c": ["Manger des plats typiques.", "Rencontrer sa famille.", "Travailler toute la journée.", "Voir une exposition."], "a": 2, "k": "Je serai occupée du matin au soir par des réunions et des rendez-vous avec des clients", "transcript": "Alors Marie, prête pour le départ ?\n– Oui. Tu as le guide touristique de Vienne ? Tu pourrais visiter la ville et goûter les spécialités locales.\n– Oh, je ne sais pas. Je serai occupée du matin au soir par des réunions et des rendez-vous avec des clients.\n– Ah, et tu vas voir tes amis autrichiens ?\n– Non, pas cette fois."}, {"type": "document", "q": "Question 16. Qu'apprend-on à propos du test de Julie ?", "c": ["Il aura lieu plus tard dans le semestre.", "Il évaluera le chapitre des maladies.", "Il se fera dans le grand amphithéâtre.", "Il sera corrigé par un enseignant extérieur."], "a": 0, "k": "Le prof préfère le faire dans deux semaines", "transcript": "Tiens Julie, qu'est-ce que tu fais là ? Je viens pour le test de biologie.\n– Tu ne sais pas qu'il a été annulé ?\n– Non, j'étais absente au dernier cours. Pourquoi ce changement ? À cause de la grippe ?\n– Il y a eu beaucoup d'absence cette semaine. Le prof préfère le faire dans deux semaines, mais puisque tu es là, accompagne-moi en salle B14. Il y a une conférence intéressante."}, {"type": "document", "q": "Question 17. Que demande-t-on à Pascal ?", "c": ["Une contribution financière.", "Une formation artistique.", "Une intervention télévisée.", "Une participation bénévole."], "a": 3, "k": "nous proposons à différents artistes de se produire ce soir-là, gratuitement", "transcript": "Bonjour, vous êtes la chanteuse Pascal Lune, n'est-ce pas ?\n– Oui, c'est moi. Bonjour.\n– Voilà. Nous sommes une association et nous organisons chaque année une grande soirée, une fête solidaire au profit d'un programme de lutte contre la malnutrition au Burkina Faso. Et nous proposons à différents artistes de se produire ce soir-là, gratuitement, bien entendu. Et donc on a pensé à vous cette année, on vous invite à participer à ce moment de solidarité. Chaque artiste invité dispose de 20 minutes sur scène et on met à votre disposition une équipe de techniciens pour vous aider. On espère ainsi récolter suffisamment de fonds pour poursuivre cette action. Cela vous intéresse."}, {"type": "document", "q": "Question 18. Que propose Malo à son ami ?", "c": ["De participer à un match.", "De préparer une épreuve sportive.", "De tester un nouveau jeu.", "De voir une compétition mondiale."], "a": 3, "k": "On pourrait regarder le championnat du monde de jeux vidéo", "transcript": "Malo ? Tu veux venir chez moi ? On pourrait regarder le championnat du monde de jeux vidéo.\n– Oui, je sais que tu es fan, mais je trouve que ce sport n'a rien à voir avec le vrai sport. Les participants ne font pas vraiment d'effort physique. Ce n'est pas très impressionnant.\n– Tu as tort. Certains champions de sport électronique ressemblent aux autres champions. Ils signent un contrat, s'entraînent beaucoup, sont suivis par des médecins pour éviter des douleurs au dos ou à la main."}, {"type": "document", "q": "Question 19. Qu'est-ce que le commerçant accepte de prendre ?", "c": ["L'affiche.", "Le carton.", "Les billets.", "Les jouets."], "a": 0, "k": "Je vais la mettre sur la porte", "transcript": "Bonjour monsieur. Vous voulez bien accrocher cette affiche dans votre magasin ? Mon école organise une collecte de jouets pour financer notre voyage en Europe.\n– On organisera ensuite une tombola, les billets seront vendus à deux euros. C'est une très bonne idée.\n– Je vais la mettre sur la porte ou est-ce que les gens doivent déposer les jeux qu'ils veulent donner dans un coin de votre boutique ?\n– Si ça vous dérange pas, je peux vous laisser ce carton. J'ai pas tellement de place pour le carton.\n– Demander à la pharmacie juste à côté."}, {"type": "document", "q": "Question 20. Pourquoi l'employé conseille-t-il au client de choisir une formule tout compris ?", "c": ["C'est meilleur marché.", "C'est plus simple.", "C'est plus rapide.", "C'est trop tard."], "a": 1, "k": "le plus facile", "transcript": "Bonjour, je souhaiterais passer quelques jours à Paris. J'espère qu'il est encore temps de réserver. Qu'est-ce que vous me conseillez ?\n– Oh, pour Paris, ce n'est pas un problème. Vous avez le temps, mais il vaut mieux une formule tout compris. C'est ce qu'il y a de moins cher à cette époque, pas forcément le moins cher, mais en tout cas, le plus facile."}, {"type": "document", "q": "Question 21. Qu'est-ce que Frédéric a trouvé difficile pendant son voyage ?", "c": ["Le comportement des habitants.", "Le sentiment de solitude.", "Les conditions météorologiques.", "Les obstacles linguistiques."], "a": 2, "k": "par 40 degrés à l'ombre", "transcript": "Alors Frédéric, ce voyage en Inde, très intéressant. Mais c'était dur. J'ai traversé des paysages magnifiques et des régions très pittoresques, mais par 40 degrés à l'ombre. Je ne recommencerai pas. Et puis ce n'est pas vraiment prévu pour un voyage à vélo. Beaucoup de circulation sur les routes et pratiquement pas de voies cyclables. Par contre, l'accueil des gens a été partout très chaleureux, même s'ils avaient du mal à comprendre pourquoi je voulais traverser leur pays à vélo et seul en plus."}, {"type": "document", "q": "Question 22. Que regrette Nathalie ?", "c": ["Elle a perdu aux jeux de société.", "Elle est restée près de chez elle.", "La météo était très mauvaise.", "Le logement était mal situé."], "a": 2, "k": "il a plu tout le temps", "transcript": "Salut Nathalie. Alors, comment s'est passé le week-end à la montagne ?\n– L'endroit était complètement vide, mais le séjour a été gâché parce qu'il a plu tout le temps. On n'a pas pu faire de randonnée comme prévu. C'est dommage.\n– Qu'est-ce que vous avez fait alors ?\n– On a sorti les dominos et les cartes. On aurait pu faire ça chez nous. Ça nous aurait coûté moins cher. On a fait beaucoup de routes pour rester enfermés."}, {"type": "document", "q": "Question 23. De quoi parle le journaliste ?", "c": ["De conservation des plantes.", "De nettoyage d'espaces verts.", "De procédés de recyclage.", "De techniques de culture."], "a": 2, "k": "elles sont triées dans l'usine de méthanisation", "transcript": "Oh, Eh bien, Amiens, les aspirateurs des agents de la voirie avalent 500 tonnes de feuilles chaque année. Celles-ci, une fois ramassées, sont d'abord stockées dans plusieurs lieux de la ville, puis elles sont triées dans l'usine de méthanisation picarde Index Environnement. Elles ne vont pas toutes subir le même sort. Toutes ne sont pas traitées de la même manière. Les feuilles les plus propres, généralement celles ramassées dans les parkings jardins, sont transformées en compost."}, {"type": "document", "q": "Question 24. Selon l'intervenant, pourquoi accumulons-nous des objets ?", "c": ["Pour afficher notre niveau de vie.", "Pour affirmer notre personnalité.", "Pour améliorer notre quotidien.", "Pour imiter notre entourage."], "a": 1, "k": "notre objet nous permet de nous construire une identité", "transcript": "Pourquoi accumulons-nous des objets ? Avant tout, l'objet, en fait, nous signale l'objet. C'est un peu nous. Je suis ce que j'ai. Je suis ce que je porte. Je suis ce que je possède. Et en fait, l'objet via le regard d'autrui sur notre objet nous permet de nous construire une identité qui est notre intérêt. Tout ça passe effectivement par la médiation des objets, que ce soit les vêtements, que ce soit une voiture, que ce soit un lieu de résidence, des chaussures. Je ne sais quoi. Donc, l'objet est très important."}, {"type": "document", "q": "Question 25. Quelle est l'originalité des instruments de musique du spectacle ?", "c": ["C'est le jeune public qui les crée.", "Ce sont des outils de jardinage transformés.", "Ils sont confectionnés sur scène.", "Ils sont réalisés avec des objets recyclés."], "a": 3, "k": "il fabriquait des instruments de musique avec des matériaux de récupération", "transcript": "Bruno Blandy a appris la musique en autodidacte en écoutant du jazz, de la musique brésilienne ou les Beatles. Avec sa guitare, il a intégré des groupes de rock, de blues ou de chansons françaises, composé un album de musique métissée et est parti en tournée. Puis, il est devenu chef d'orchestre. Durant son temps libre, il fabriquait des instruments de musique avec des matériaux de récupération : vibraphone en piqué de tente, flûte en tuyaux d'arrosage. La difficulté, c'est de produire des notes justes. J'utilise des sons qu'on ne trouve pas ailleurs. Ça donne une couleur particulière, récupère tout en un seul mot. Et avec un cas, c'est le nom du spectacle pour enfants tiré de ce concept. Un concert aura lieu le 20 mai à La Citrouille."}, {"type": "document", "q": "Question 26. Pourquoi M. Durand appelle-t-il ?", "c": ["Pour annoncer une nouvelle.", "Pour annuler une livraison.", "Pour faire une réclamation.", "Pour obtenir une information."], "a": 3, "k": "Avez-vous bien reçu le colis", "transcript": "Bonjour Tom, c'est Monsieur Durand. Avez-vous bien reçu le colis que nous a envoyé notre client japonais ?\n– Toutes mes excuses, monsieur. J'ai oublié de vous le dire. J'ai contacté le bureau de poste hier. Ils ont pris beaucoup de retard à cause de la neige et ne pourront pas distribuer le courrier avant vendredi.\n– D'accord ? N'oubliez pas de me prévenir car c'est vraiment urgent. J'espère avoir ce colis d'ici vendredi matin."}, {"type": "document", "q": "Question 27. Comment favorise-t-on l'innovation chez les jeunes dans cet institut ?", "c": ["En les incitant à travailler de manière collaborative.", "En les poussant à prendre des risques importants.", "En leur offrant des formations personnalisées.", "En leur proposant de participer à des compétitions."], "a": 0, "k": "conduire des projets innovants dans le cadre d'équipes diversifiées", "transcript": "Delphine Manau en tant que directrice de l'institut pour l'innovation et la compétitivité, pensez-vous que tout le monde peut être innovant ?\n– On croit souvent que l'innovation survient par hasard et qu'il s'agit d'un don individuel, mais être innovant et créatif, ça s'apprend. Alors comment rend-on un étudiant innovant ? Par exemple, il faut différencier l'innovation individuelle et la capacité à être innovant collectivement. Nous avons donc mis en place des programmes pour apprendre aux jeunes à conduire des projets innovants dans le cadre d'équipes diversifiées."}, {"type": "document", "q": "Question 28. De quoi est-il question ?", "c": ["Des besoins énergétiques des jeunes.", "Des bons réflexes pour les repas.", "Des comportements alimentaires.", "Des conseils de préparation culinaire."], "a": 2, "k": "les enfants mangent principalement par plaisir", "transcript": "Si les enfants ne mangent pas assez de fruits et légumes, c'est peut-être parce qu'ils n'aiment pas ça. En fait, les enfants mangent principalement par plaisir, et c'est une fonction que ne remplissent pas les fruits et légumes. Certes, tout le monde est d'accord pour dire que c'est bon à la santé, que c'est nécessaire, que c'est souvent contraignant à préparer, que cela ne remplit pas l'estomac, voire que ce n'est pas bon. Mais on trouve rarement la notion de plaisir associée aux fruits et légumes."}, {"type": "document", "q": "Question 29. Quels principes retrouve-t-on dans l'architecture haussmannienne ?", "c": ["L'absence d'éléments ornementaux.", "La limitation du nombre d'étages.", "Le respect d'obligations légales.", "L'utilisation d'un matériau unique."], "a": 3, "k": "vous devez utiliser de la pierre pour les façades", "transcript": "Monsieur Rhon, vous êtes architecte et vous allez nous présenter une avenue à Paris datant de la fin du XIXe siècle. La façade haussmann est-elle toujours en pierre ?\n– Oui, c'était une obligation qui figurait dans l'acte de vente. C'était la manière finalement dont Osman légiféra, puisqu'il n'y avait pas de loi.\n– Pourquoi le permis de construire n'existait-il pas ?\n– Le permis de construire en effet viendra plus tard. Donc, on leur disait simplement : vous devez utiliser de la pierre pour les façades ?\n– C'est ça. Quand les propriétaires achètent le terrain pour construire, on leur impose une pierre de taille. Dans les belles avenues comme celles de l'opéra, on indiquait aussi que les lignes devaient filer pour donner une certaine harmonie, une certaine homogénéité, une certaine monotonie pour ceux qui n'apprécient pas cette esthétique. L'idée d'Osman, c'était qu'à partir du moment où on construisait un immeuble dans une avenue, les immeubles suivants devaient le prendre comme modèle."}, {"type": "document", "q": "Question 30. De quoi dépend le montant du pourboire au Québec ?", "c": ["De la législation en vigueur.", "De la paye des employés.", "Du bon vouloir du client.", "Du type d'établissement."], "a": 2, "k": "on doit laisser entre 15 et 20 % de la somme indiquée sur la facture", "transcript": "Bonjour, alors voilà ma question. Je voudrais savoir comment fonctionne le système des pourboires au Québec, car cela varie beaucoup d'un pays à l'autre et est-ce obligatoire ou non.\n– Eh bien, c'est une chose courante chez nous de laisser une somme d'argent à quelqu'un pour le remercier de ses bons services, car le service n'est pas inclus dans le salaire du personnel.\n– Et comment calcule-t-on la somme d'argent qu'on doit laisser ?\n– En général, on doit laisser entre 15 et 20 % de la somme indiquée sur la facture. C'est une vraie gymnastique.\n– Alors, au moment de payer, non, pas vraiment, nous autres Québécois, on est habitués à ce système, ça se fait presque automatiquement."}, {"type": "document", "q": "Question 31. Selon Hubert Reeve, pourquoi cette première observation d'un trou noir est-elle importante ?", "c": ["Elle annonce de futures découvertes.", "Elle confirme une théorie ancienne.", "Elle illustre les progrès du matériel scientifique.", "Elle permet la poursuite des travaux d'Einstein."], "a": 1, "k": "C'est une confirmation de la valeur de la science", "transcript": "Là, on vient très récemment d'observer pour la première fois un trou noir. Quelle a été votre réaction ?\n– C'est le moment où on découvre une chose pour la première fois et surtout le fait que cette idée des trous noirs qui a été inventée par Einstein dans les années 1910-15, je ne me souviens pas, c'était au départ une théorie et de trouver que le comportement de ces trous noirs existe. C'est une confirmation de la valeur de la science en général qui sont par exemple, des idées des trous noirs. Ça vous donne confiance dans la science."}, {"type": "document", "q": "Question 32. Quelle mesure a été prise dans les années 80 ?", "c": ["Il a accepté les articles de presse dans les livres scolaires.", "Il a créé un journal quotidien dédié à l'éducation publique.", "Il a distribué des journaux aux établissements scolaires.", "Il a intégré l'étude de la presse à ses programmes."], "a": 3, "k": "le ministère de l'éducation nationale ne se décide à administrer l'enseignement de la presse à l'école", "transcript": "Les articles de journaux en tant qu'objets d'études dans les manuels scolaires existent depuis le XIXe siècle. En revanche, l'actualité des journaux est restée très longtemps interdite d'entrer dans les écoles. Ce n'est qu'en 1957 que le gouvernement a offert aux journaux quotidiens le droit de pénétrer tels quels dans les établissements scolaires. Ainsi, l'idée que la presse et l'école avaient quelque chose à faire ensemble, que la presse pouvait constituer un objet pédagogique, faisait son chemin. Il a fallu attendre 1983 pour que le ministère de l'éducation nationale ne se décide à administrer l'enseignement de la presse à l'école. C'est la création du CLEMI, le centre de liaison pour l'enseignement des moyens d'information."}, {"type": "document", "q": "Question 33. Selon ce journaliste, comment s'explique l'enrichissement des Escoffier ?", "c": ["Des recettes ont été baptisées en l'honneur de clients réputés.", "La promotion de son restaurant a été confiée à des personnalités.", "Un accueil chaleureux et généreux était réservé aux habitués.", "Un partenariat inédit entre hôtel et restaurant a été mis en place."], "a": 0, "k": "en dédiant par exemple, les nouveaux plats inventés par Escoffier aux convives célèbres", "transcript": "Auguste Escoffier, c'est le roi des cuisiniers, le cuisinier des rois, qui est connu pour ses innovations culinaires et son habitude de présenter à ses hôtes ses plats en salle. Une belle amitié et une incroyable complicité avec César Ritz ont, pendant l'hôtellerie, fait de leur association un des plus grands succès de la fin du 19ème siècle. Leur idée de séduire la clientèle et de lui offrir le rêve. En dédiant par exemple, les nouveaux plats inventés par Escoffier aux convives célèbres comme la pêche Melba ou la timbale Garibaldi a assuré leur fortune."}, {"type": "document", "q": "Question 34. Que pense-t-on de l'obligation d'éteindre les portables ?", "c": ["Elle doit servir d'exemple aux enfants.", "Elle est automatique en cas de réunion.", "Elle répond à un besoin des employés.", "Elle s'applique très rarement au travail."], "a": 3, "k": "très peu de patrons demandent à leurs employés d'éteindre leurs portables", "transcript": "Interdire les téléphones de tous les lieux de travail permettrait d'être plus productifs et peut-être même de devenir plus joyeux. À ce jour, très peu de patrons demandent à leurs employés d'éteindre leurs portables quand ils entrent en salle de réunion. Pourtant, ce ne serait pas difficile à mettre en place si nos enfants sont capables de le faire quand ils vont à l'école. Cela devrait être identique pour la majorité des adultes."}, {"type": "document", "q": "Question 35. Pour l'auteur, de quoi les gens cultivés doivent-ils se rendre compte ?", "c": ["De l'absurdité qu'il y a à valoriser leur manque de culture scientifique.", "De la nécessité de mieux défendre les acquis de la culture classique.", "Du besoin qu'ont les mathématiciens d'avoir une culture générale.", "Du refus des valeurs humanistes par les milieux scientifiques."], "a": 0, "k": "en se vantant de rien connaître aux mathématiques", "transcript": "On l'a dit, la culture générale a toutes sortes de défauts, mais en plus, c'est le défaut d'ignorer les sciences. Ça c'est assez facile à faire comme constat. Oui, assez facile à faire comme constat. Mais ce qui est déplorable, c'est que ce n'est pas incorporé à cette idée-là. Il me semble qu'on peut très bien aujourd'hui se prétendre cultivé. Et les gens qui parlent de culture générale sont très souvent ou typiquement des humanistes qui ont une culture littéraire, est cultivé sans avoir de connaissance scientifique. Et j'irais même jusqu'à dire pire en méprisant ou en trouvant que ça pose absolument pas problème de ne pas avoir de culture scientifique ou pour prendre un exemple que j'aime beaucoup en se vantant de rien connaître aux mathématiques. Et là, je pense que c'est une profonde erreur. Et le livre se veut une défense passionnée. J'oserais dire l'importance d'incorporer une notion de culture scientifique."}, {"type": "document", "q": "Question 36. Quelle est la particularité de ces interventions ?", "c": ["Elles abordent les traitements des enfants.", "Elles s'appuient sur la complicité des parents.", "Elles sont animées par le personnel hospitalier.", "Elles tiennent compte de l'avis des médecins."], "a": 3, "k": "ces clowns professionnels prennent le temps de discuter avec l'équipe médicale du cas de chaque enfant", "transcript": "Et ces clowns travaillent Bruno en étroite collaboration avec les équipes soignantes.\n– Oui, parce qu'ils ne peuvent pas débarquer dans la chambre d'un enfant sans connaître précisément son état. Alors, avant d'enfiler leurs costumes, ces clowns professionnels prennent le temps de discuter avec l'équipe médicale du cas de chaque enfant. C'est un moment indispensable pour préparer la journée car selon l'humeur, l'état de santé de chaque enfant, ces acteurs qui sont rompus à l'improvisation, vont adapter leur intervention dans un but, permettre à un enfant, mais aussi à ses parents d'oublier pendant quelques minutes l'hôpital de retrouver l'envie de rire."}, {"type": "document", "q": "Question 37. Qui est à l'aise selon l'intervenant ?", "c": ["Les acheteurs.", "Les commerçants.", "Les entreprises.", "Les pouvoirs publics."], "a": 0, "k": "les consommateurs vont peut-être jeter des produits quand la date meilleure avant est passée", "transcript": "Il y a le manque de clarté au niveau de la politique des dates de péremption au Canada, parce que souvent les consommateurs vont peut-être jeter des produits quand la date meilleure avant est passée. Mais ça n'a pas nécessairement dire que le produit est insalubre. Le produit peut être encore bon. Il y a des forces démographiques qui jouent contre l'industrie. Il y a une soif de profit au sein de l'industrie. Pourquoi ? Parce que les gens mangent moins, les gens vieillissent au Canada. Donc, comment fait-on pour atteindre nos objectifs de vente ? Quand les gens mangent moins, il faut trouver des différents moyens pour augmenter ses recettes."}, {"type": "document", "q": "Question 38. Que peut offrir un propriétaire de gîte rural ?", "c": ["De la tranquillité et de l'intimité.", "Des facilités de réservation.", "Un contact privilégié avec son hôte.", "Un tarif intéressant toute l'année."], "a": 0, "k": "le vacancier va séjourner en toute autonomie", "transcript": "Ouvrir une chambre d'hôte, c'est d'abord opter pour un mode de vie bien particulier, où vous partagez l'avis de votre quotidien avec des gens de passage, soit toute l'année ou une partie de l'année. Et c'est une formule conviviale qui a du succès puisqu'on en compte plus de 110 000 en France. Est-ce qu'il y a moins de contraintes pour les gîtes ruraux ?\n– Oui, tout à fait. Si vous êtes moins disponible, le gîte rural pour cela, il vous suffit d'être là à l'arrivée au départ des vacanciers. Et en fait, il suppose au contraire un logement qui est vraiment indépendamment du vôtre, qui est généralement situé à proximité de celui du propriétaire, mais où le vacancier va séjourner en toute autonomie pendant la semaine ou pour le week-end."}, {"type": "document", "q": "Question 39. Quelles sont les limites du recours au médiateur lors d'un conflit avec sa banque ?", "c": ["Le nombre de médiateurs est insuffisant pour répondre à la demande.", "Les banques influencent les décisions prises par les médiateurs.", "Les demandeurs trouvent que la procédure est trop longue et compliquée.", "Quelle que soit la nature du litige, le médiateur n'a qu'un pouvoir consultatif."], "a": 3, "k": "Le médiateur a deux mois pour un avis, ce n'est qu'un avis", "transcript": "Effectivement, la loi de 2001 a fait obligation aux banques de désigner un médiateur qui est là pour justement tenter de régler les problèmes. Et la FUB a fait voter à l'époque que les modalités pour saisir le médiateur doivent être précisées dans le relevé de banque et dans le contrat. Donc, pour savoir comment saisir le médiateur, il faut lire le relevé de banque ou le contrat. On doit y avoir toutes les précisions. Le médiateur a deux mois pour un avis, ce n'est qu'un avis. Entendons-nous bien. Et là, disons qu'il y a parfois un petit problème. C'est d'abord, peu de clients ont recours aux médiateurs. Il faudrait être beaucoup plus, disons, nombreux. Et deuxièmement, ce sont parfois des renvois de balles. C'est-à-dire, ceux qui s'adressent à eux ont le sentiment de ne pas être compris ni entendus."}]</script>

}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 22/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test22_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 22</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 22 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 22</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
</html>
