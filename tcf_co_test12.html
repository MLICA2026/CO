<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 12 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

rd ?"}, {"type": "extrait", "q": "", "c": ["Chaque jour.", "Il y a trois mois.", "Pendant tout l'été.", "Pour quelques semaines."], "a": 1, "k": "Il y a trois mois.", "transcript": "– Quand êtes-vous arrivé en France ?"}, {"type": "extrait", "q": "", "c": ["J'ai choisi les cours de littérature.", "J'ai habité à Bruxelles et à Paris.", "J'ai trouvé une chambre d'étudiant.", "J'ai voyagé pendant deux ans."], "a": 0, "k": "J'ai choisi les cours de littérature.", "transcript": "Je m'appelle Albert. J'ai 36 ans. Je viens de Versailles et je suis traducteur en anglais et chinois.\n– Et toi, qu'est-ce que tu viens étudier à Montréal ?"}, {"type": "extrait", "q": "", "c": ["Bien sûr, je déteste les animaux.", "D'accord, le spectacle est complet.", "Non, la réservation est obligatoire.", "Pourquoi pas, c'est un beau cadeau."], "a": 3, "k": "Pourquoi pas, c'est un beau cadeau.", "transcript": "– Ma nièce Camille va avoir 10 ans vendredi prochain. J'aimerais l'emmener au cirque. Tu en penses quoi ?"}, {"type": "document", "q": "Question 10. Que doit-on faire pour participer ?", "c": ["Écrire", "Téléphoner", "Lire", "Écouter"], "a": 1, "k": "Composez le 01 40 00 01 01", "transcript": "À 20h50 sur notre chaîne, participez à notre émission. Composez le 01 40 00 01 01 pour choisir la meilleure chanson francophone de l'année."}, {"type": "document", "q": "Question 11. Sur quoi est-ce que ces deux personnes ont des goûts différents ?", "c": ["La mode", "La nature.", "Les saisons.", "Les vacances."], "a": 2, "k": "je préfère l'été, les vêtements légers, être dehors", "transcript": "Salut, il est beau ton manteau. Merci. Il est parfait pour l'automne et le froid qui arrive. Oui, moi, j'adore cette époque. Les couleurs des arbres sont magnifiques. C'est super pour se promener en forêt et on peut sortir son beau manteau comme toi, mais moi en fait, je préfère l'été, les vêtements légers, être dehors. Eh bien, on n'a pas les mêmes goûts, mais bon, c'est vrai qu'il fait un peu froid. On va boire un café."}, {"type": "document", "q": "Question 12. Pour ces personnes, qui est Daniel ?", "c": ["Leur client", "Leur collègue", "Leur directeur", "Leur professeur"], "a": 1, "k": "Il part à la retraite à la fin du mois", "transcript": "Est-ce que tu veux participer au cadeau pour Daniel ? Un cadeau ? Pourquoi ? Il part à la retraite à la fin du mois. Il part déjà ? Le service semblait vide sans lui. Et comment va faire le chef sans son secrétaire ? Ah ça. Il essaye de trouver quelqu'un pour le remplacer, mais je crois qu'il va avoir du mal à trouver un aussi bon employé que lui. Si le remplaçant doit plaire aux chefs, aux collègues et aux clients, c'est sûr. Ça va être dur."}, {"type": "document", "q": "Question 13. Quel est le sujet de cette interview ?", "c": ["La création d'un réseau de médiateurs", "Le financement nécessaire aux médiateurs", "Le partage d'expérience entre médiateurs", "Le rôle des médiateurs en milieu scolaire"], "a": 3, "k": "Mais qu'est-ce qu'un médiateur ? À quoi sert-il dans un collège lycée ?", "transcript": "Votre association Génération Médiateur réunit en cette fin de semaine près de 150 jeunes médiateurs à la Grande Arche de la Défense. Ils sont collégien, lycéen ou étudiant. Mais qu'est-ce qu'un médiateur ? À quoi sert-il dans un collège lycée ? C'est un jeune qui a suivi une formation particulière. Il est ensuite au service de ses camarades dans son établissement. Il peut intervenir si ses camarades le lui demandent. Ou bien il propose lui-même son aide. Quand il y a des copains qui sont en conflit, qui connaissent une rivalité. Souvent le médiateur va pouvoir intervenir avant que le conflit ne se mette à dégénérer et à se transformer en violence."}, {"type": "document", "q": "Question 14. Que souhaite faire la femme ?", "c": ["Féliciter les acteurs dans leur loge", "Remettre un vêtement au vestiaire", "Retourner à la salle de spectacle", "S'informer sur la programmation"], "a": 1, "k": "Puis-je déposer mon manteau ?", "transcript": "Puis-je déposer mon manteau ? Certainement madame, c'est à votre gauche cette année. C'est gratuit pour les abonnés au théâtre. Voilà une bonne nouvelle pour débuter la saison. Je vous souhaite une agréable soirée."}, {"type": "document", "q": "Question 15. Pour quelle raison Raffia intervient-elle ?", "c": ["Pour conseiller un livre.", "Pour discuter d'écologie.", "Pour parler de sa ville.", "Pour raconter un voyage."], "a": 2, "k": "Bienvenue dans La Terre est belle", "transcript": "Raffia de Buffalo ? Bienvenue dans La Terre est belle. Bonjour, Marc. Alors nous sommes ravis de vous avoir à l'antenne parce qu'on n'a jamais eu personne de Buffalo. Vous allez nous apprendre des choses. Ça se trouve déjà totalement à l'ouest de l'État de New York. C'est limitrophe du Canada. C'est drôle comme nom. Il n'y a pas spécialement de buffle ou de choses comme ça, non ? D'après la légende, ça vient du beau fleuve. Un nom donné par les explorateurs français. Enfin, c'est l'histoire qu'on raconte."}, {"type": "document", "q": "Question 16. Qu'explique cet homme ?", "c": ["La crise de l'économie mondiale.", "L'accroissement de la population.", "Les nouvelles règles d'hygiène.", "Les récentes découvertes médicales."], "a": 1, "k": "un excédent des naissances sur les décès, qui a entraîné une augmentation de la population", "transcript": "Pourquoi si peu de temps. On est venu cette manière sur terre parce que la mortalité a diminué, notamment la mortalité des enfants grâce aux progrès de l'hygiène de la médecine au progrès économique. Résultat, les décès sont devenus moins nombreux et est apparu un excédent des naissances sur les décès, qui a entraîné une augmentation de la population."}, {"type": "document", "q": "Question 17. Pourquoi la secrétaire doit-elle appeler Monsieur Demers ?", "c": ["Pour annuler une réunion", "Pour convoquer un collègue", "Pour changer un rendez-vous", "Pour annoncer un retard"], "a": 3, "k": "il vaut mieux que je l'appelle pour le prévenir", "transcript": "Pouvez-vous envoyer un courriel pour la réunion de cet après 12 h, mademoiselle ? Oui, bien sûr. Mais n'oubliez pas votre rendez-vous de 16 h avec Monsieur Demers. Ah oui, c'est vrai. Mais il faudra le faire patienter. Je ne pense pas que la réunion sera terminée à 16 heures. Je le verrai plus tard. Très bien, Monsieur, il vaut mieux que je l'appelle pour le prévenir."}, {"type": "document", "q": "Question 18. Qu'est-ce qui déplaît à la jeune femme dans les achats en ligne ?", "c": ["Le prix élevé des produits", "Les détails pour être livrée", "Les difficultés en cas d'échange", "Les tailles de vêtements différents"], "a": 2, "k": "J'ai réussi à le rendre, mais c'était compliqué", "transcript": "Est-ce que tu achètes des vêtements sur internet ? Oui. Souvent, les prix sont vraiment intéressants. Moi, j'ai eu une mauvaise expérience l'autre jour. Qu'est-ce qui s'est passé ? J'ai commandé un pantalon, mais ils ont fait une erreur et ils m'ont envoyé un modèle complètement différent. J'ai réussi à le rendre, mais c'était compliqué. Finalement, je préfère les boutiques. Au moins, on sait ce qu'on achète. Tu n'as pas eu de chance."}, {"type": "document", "q": "Question 19. Que propose chaque semaine cette radio à ses auditeurs ?", "c": ["De déjeuner ensemble", "De faire une soirée", "De participer à un jeu", "De rencontrer un invité"], "a": 0, "k": "on partage en commun le repas", "transcript": "Tout le monde rêve de faire de la proximité, d'être proche des auditeurs. Alors, quand on est une radio associative locale, on a plus de facilité. Vous, chaque vendredi, vous ouvrez le local à 13 h. On peut venir avec son panier et on partage en commun le repas. Tout à fait. Et là, pour la fin de l'année, on a donc lancé une invitation à tous ceux qui voudraient venir manger avec nous et réaliser une émission collective de fin d'année. Un petit peu festive."}, {"type": "document", "q": "Question 20. Qu'est-ce que le commerçant accepte de prendre ?", "c": ["L'affiche installe en plein Paris pour 10 jours. Oui, oui, bien sûr. Mais il y a plein d'autres choses intéressantes à faire à Paris, bien sûr, mais il faut y aller. Vous allez voir les animaux par exemple. C'est incroyable. Vous pourrez les caresser et je ne vous parlerai pas des spécialités gastronomiques, un régal. Vous savez, moi, les animaux, cependant, vous avez éveillé ma curiosité, mais il faudra venir avec moi."}, {"type": "document", "q": "Question 23. Qu'est-ce que Sara regrette ?", "c": ["De disposer d'une petite surface", "De partager sa salle de bain", "De payer un loyer excessif", "De prendre ses repas seule"], "a": 1, "k": "une seule douche pour quatre", "transcript": "Alors Sarah, comment se passe la vie en colocation ? Écoute, tu sais, une seule douche pour quatre. Ça n'est vraiment pas commode, surtout le matin, mais bon pour s'organiser un peu, c'est tout. C'est toujours mieux que la chambre de bonne que tu avais avant. Non, t'as raison, neuf mètres carrés pour 750 euros. C'est exagéré. Même avec une vue sur la tour Eiffel, au moins maintenant, le loyer est divisé par quatre. Et pour les courses, vous faites aussi caisse commune ? Ah non. Là c'est chacun pour soi. Et c'est aussi bien d'ailleurs, sinon le frigo serait toujours vide."}, {"type": "document", "q": "Question 24. Quel phénomène apparaît chez les seniors ?", "c": ["Ils choisissent de partager leur habitation avec des jeunes", "Ils recherchent des appartements aménagés selon leurs besoins", "Ils refusent de laisser leurs biens à des locataires sans emploi", "Ils s'organisent pour faire valoir leur droit au logement"], "a": 0, "k": "La colocation entre différentes générations commence donc à se développer", "transcript": "Aujourd'hui, de plus en plus de Français ont recours à la colocation comme mode d'hébergement. Pourquoi un tel engouement face aux pénuries des petites surfaces et à l'augmentation des loyers ? La colocation est la solution idéale. Elle permet d'accéder à de grands appartements sa ue tu es passionné d'art contemporain. La prochaine fois, je te demanderai de m'accompagner."}, {"type": "document", "q": "Question 27. D'après son ami, à quoi Didier s'était-il engagé ?", "c": ["Partir en voyage en province", "Acheter les bougies d'anniversaire", "Acheter le cadeau pour leur amie", "S'occuper du gâteau d'anniversaire"], "a": 3, "k": "Tu devais même apporter le dessert", "transcript": "Salut Didier. Tu te souviens qu'on dîne chez Xavier samedi soir ? Mais non, je pars en Normandie avec mon frère. Oh non, pas de Normandie, en fait, l'anniversaire de Martine. Elle serait très déçue que tu ne viennes pas. Ben non, c'était même pas sûr. Arrête. Tu avais promis. Tu devais même apporter le dessert, mais as-tu te débrouilles. On sera 12. Tu choisis un dessert sur lequel on peut mettre 25 bougies. Je m'occupe du cadeau et des bougies. Bon, je vais essayer de, non, non, pas essayer."}, {"type": "document", "q": "Question 28. Que désirent les jeunes en commençant leur carrière ?", "c": ["Une ascension professionnelle accompagnée de revenus confortables", "Une nomination à un premier poste valorisant au sein de l'entreprise", "Une opportunité de multiplier les contrats dans différentes entreprises", "Une reconnaissance rapide de leurs supérieurs sur les résultats obtenus"], "a": 0, "k": "hommes et femmes aspirent à utiliser salaire et promotion", "transcript": "Quels sont les objectifs de carrière des étudiants ? Vous savez, hommes et femmes aspirent à utiliser salaire et promotion, non seulement pour pouvoir utiliser une entreprise comme un nom sur un CV, mais aussi pour obtenir un réel accélérateur de carrière et plus simplement ce qui attire hommes et femmes, c'est d'envisager de pouvoir gagner beaucoup plus. Les kilos de leur premier salaire ne sauraient donc être un frein à leur entrée dans une société. Tant que ces jeunes diplômés peuvent se projeter dans une globalité liant augmentation salariale et promotion interne."}, {"type": "document", "q": "Question 29. Quelle est la raison du déplacement de ce couple ?", "c": ["Un mariage", "Un anniversaire", "Une naissance", "Une promotion"], "a": 2, "k": "J'ai le cadeau pour le petit Romain", "transcript": "Bon, je suis prête. J'ai le cadeau pour le petit Romain. Tu as pris la carte et le plan d'Arnaud ? La carte est dans la voiture, mais c'est toi qui as le faire-part maintenant. Je te l'ai donné avec le faire-part. T'es sûr ? Je ne sais pas ce que j'en ai fait. Bon, ça fait rien. On va bien trouver. Oui, j'espère. La maternité est juste derrière le restaurant près de la rivière, c'est celui où on a fêté l'anniversaire de mariage de mes parents. Ah oui. J'y suis retourné avec mes collègues pour fêter ma nomination comme directeur."}, {"type": "document", "q": "Question 30. De quoi traite ce reportage ?", "c": ["D'un appel à projets imaginaires", "D'un examen de fin d'études", "D'un nouveau plan d'urbanisme", "D'une rénovation d'un monument"], "a": 0, "k": "la consigne était de rêver", "transcript": "La vieille dame de fer, dans tous ses états, ou comment les jeunes sont complexes, se sont mesurés à cette forme unique qu'est la Tour Eiffel. Pour ce concours organisé par la Fondation Eiffel, adressée aux élèves des écoles d'architecture, la consigne était de rêver. Concevoir un édifice de très grande hauteur sur le champ de Mars à Paris, à distance, à coller ou à la place de la Tour Eiffel. Trois étudiants suppriment donc carrément la tour. À la place, ils y construisent un aéroport vertical ou creusent un puits de lumière avec de vastes plateaux. D'autres choisissent de la rendre habitable en comblant les vides par des baies de couleurs ou la dote d'un jardin suspendu."}, {"type": "document", "q": "Question 31. De quoi parle cet intervenant ?", "c": ["D'une compétition sportive", "D'une croisière maritime", "D'une histoire familiale", "D'une rencontre amoureuse"], "a": 2, "k": "essayer de trouver une trace de nos ancêtres", "transcript": "On fait un petit tour de France, c'est-à-dire qu'on est parti vers le sud et on s'est arrêté à la Rochelle parce que nos ancêtres viennent de la Rochelle. Ils sont partis au XVIIe siècle pour le Québec du port de la Rochelle. Donc on est venu voir le port et essayer de trouver une trace de nos ancêtres. Ce qu'on a commencé par trouver, c'est que c'était plutôt compliqué d'avoir des traces écrites, surtout quand notre ancêtre n'était pas un capitaine de bateau ou quelque chose comme ça."}, {"type": "document", "q": "Question 32. Que font les jeunes parisiens, dont parle ce reportage ?", "c": ["Ils nagent en plein air dans la capitale", "Ils s'amusent dans un parc d'attractions", "Ils se retrouvent à la piscine municipale", "Ils sont en vacances au bord de la mer"], "a": 0, "k": "on se baigne", "transcript": "En fait, comme on habite tout l'arrondissement de Paris, le canal de l'eau est devenu notre espace de baignade quotidien après une journée de travail. Généralement, on se retrouve au bord du canal tous ensemble et on se baigne. Aujourd'hui, on est entre 15 et 20 à se baigner régulièrement dans le canal de l'eau. On est déjà étudiant, fauché, qu'on vit de s'amuser, qu'on n'a forcément les moyens aussi partir de Paris."}, {"type": "document", "q": "Question 33. Sur quoi s'opposent François Legault et Simon Tremblay Pépin ?", "c": ["Sur l'amplitude de l'effet de la dette sur la croissance", "Sur l'utilisation des recettes fiscales pour régler la dette", "Sur l'acquittement de la dette par la vente du patrimoine de l'État", "Sur le montant de la dette contractée par la province québécoise"], "a": 1, "k": "investir 100 % des redevances tirées des ressources naturelles pour rembourser la dette", "transcript": "Et Jean-Philippe, la coalition pour l'avenir du Québec veut aussi réduire la dette. Ce que propose François Legault, c'est d'investir 100 % des redevances tirées des ressources naturelles pour rembourser la dette plus tôt. On pourrait ainsi récupérer environ 200 000 000 de dollars par année. Mais pour Simon Tremblay Pépin, de l'institut de recherche et d'informations socio-économiques, ce n'est pas du tout une bonne idée. Au lieu d'investir dans des services publics qui, évidemment, sont dynamiques, et qui aident à favoriser la croissance de l'économie et donc à réduire la dette, on décide de retirer ces fonds du secteur économique. Donc ça semble être une très mauvaise idée de se lancer là-dedans."}, {"type": "document", "q": "Question 34. Qu'est-ce qui intéresse le plus cette femme dans son métier ?", "c": ["Avoir un bon salaire en fabriquant de beaux objets", "Exercer une activité intellectuellement enrichissante", "Rencontrer des célébrités et travailler avec elles", "Travailler avec ses collègues et développer des projets"], "a": 1, "k": "C'est vraiment la possibilité d'être dans une recherche artistique qui me motive", "transcript": "J'aime bien cet aspect du travail qui est le travail en équipe, c'est plus agréable que le travail en atelier où on est tout seul sur ces plans et qui a un côté plus calme, plus cérébral là, ça bouge partout. Il y a du monde partout. Souvent, on travaille la nuit, ça a des côtés sympas, mais ça peut être franchement fatigant. Et puis dans ce métier, les perspectives d'évolution sont diverses. On peut entrer dans une carrière, type star système où on va devenir très connu et gagner beaucoup d'argent. Moi, ce n'est pas trop mon cas. C'est vraiment la possibilité d'être dans une recherche artistique qui me motive."}, {"type": "document", "q": "Question 35. Que reproche l'ONG française à l'agence européenne ?", "c": ["De contester les bienfaits des aliments naturels", "De protéger les fabricants de produits de synthèse", "De rejeter les résultats des dernières recherches", "De valoriser les qualités nutritionnelles du sucre"], "a": 2, "k": "L'agence européenne n'a pas tenu compte des études scientifiques récentes", "transcript": "Faut-il se méfier de l'aspartame, cet édulcorant utilisé à la place du sucre ? Oui, crie le réseau environnement santé, non, estime l'EFSA, l'autorité européenne de sécurité des aliments. Dans un rapport préliminaire publié début janvier, sa conclusion est que l'édulcorant ne présente aucun danger pour la santé. C'est faux, estime l'ONG française qui conteste la méthode d'expertise. Valérie Barbin et les reproches sont nombreux pour le réseau environnement santé. L'agence européenne n'a pas tenu compte des études scientifiques récentes alors que ses études montrent toutes un lien entre l'aspartame et un risque accru de cancer, de naissance prématurée et de pathologies comme le diabète."}, {"type": "document", "q": "Question 36. Qu'est-ce qu'on apprend sur l'humour ?", "c": ["Il est commun à toutes les cultures", "Il est le propre des êtres humains", "Il est lié à une grande intelligence", "Il est reproductible artificiellement"], "a": 1, "k": "le dernier refuge pour l'humanité", "transcript": "Fait, les algorithmes ne sont pas drôles. Ils ne comprennent ni les jeux de mots ni les sarcasmes, ni le deuxième degré. L'humour est un domaine qui leur échappe complètement et sans doute encore pour longtemps. Est-ce que vous saviez qu'il y a tout un champ de la recherche en intelligence artificielle qui essaye de trouver la formule mathématique de l'humour ? Mais pour l'instant, ce que montrent ces recherches et surtout leur échec, c'est que l'humour est un phénomène extrêmement complexe, plein de références culturelles hautement relatives. L'humour se traduit mal. Il fait appel à toutes sortes de ressorts psychologiques inconscients. Bref, l'humour, c'est l'ultime frontière pour les algorithmes et peut-être le dernier refuge pour l'humanité."}, {"type": "document", "q": "Question 37. Que préconise ce spécialiste face à l'engouement des jeunes pour les jeux vidéo ?", "c": ["De consulter un médecin psychothérapeute", "D'attendre que le temps ait fait son œuvre", "De prescrire un traitement médicamenteux", "D'informer les utilisateurs sur leurs dangers"], "a": 1, "k": "99 % arrêtent de jouer à 17 ou 18 ans", "transcript": "La question principale, c'est de savoir si on va médicaliser la crise d'adolescence ou pas, sachant qu'aujourd'hui le symptôme principal de la crise d'adolescence chez le garçon, c'est le jeu vidéo excessif ou l'internet excessif. Donc, si on dit addiction, on le médicalise, et ça veut dire tôt ou tard pas seulement des psychothérapies, mais des chimiothérapies pour tous les adolescents joueurs. Alors qu'on sait, encore une fois d'expérience, que 99 % arrêtent de jouer à 17 ou 18 ans parce qu'ils ont fini leur adolescence, qui sont plus en révolte contre les parents, qui sont soucieux de s'intégrer à la société et d'avoir une activité professionnelle. Donc, à l'adolescence, on l'accompagne. Voilà la pathologie, pas. Et je suis bien content que l'académie de médecine appuie cette position."}, {"type": "document", "q": "Question 38. Comment réagissent les populations indigènes concernées par ce projet ?", "c": ["Elles demandent un nouveau statut juridique", "Elles exigent des garanties réelles et tangibles", "Elles mettent en doute la viabilité du projet", "Elles veulent que les terres restent intactes"], "a": 1, "k": "milite pour que son peuple et le gouvernement du Québec signent une entente", "transcript": "Le plan nord mise aussi sur l'appui des populations locales, notamment celui des inuits et des amérindiens, que l'on va former aux nouveaux emplois. Certaines nations, comme celles des innus, ont des réticences. Ce conseiller juridique milite pour que son peuple et le gouvernement du Québec signent une entente pour sortir les autochtones de leurs dépendances économiques. De toute évidence, les retombées économiques pour les communautés autochtones ne seront pas là tout simplement. Mais je pense que c'est une responsabilité du gouvernement de l'état québécois également de s'assurer qu'il y ait les jeunes innus soient formés et qu'ils aient accès à des jobs valorisants encore des projets miniers. Certains environnementalistes ont des réserves face à ce plan qui va faciliter l'exploitation de zones jusqu'à leur vierge."}, {"type": "document", "q": "Question 39. D'après les chercheurs dont parle le journaliste, qu'est-ce qui est bénéfique pour la santé ?", "c": ["Pratiquer des exercices mentaux", "Exprimer ses sentiments.", "Se montrer chaleureux.", "Se retirer régulièrement au calme."], "a": 2, "k": "plus nous manifestons d'amabilité et plus nous sécrétons de sérotonine", "transcript": "D'après les chercheurs, plus nous manifestons d'amabilité et plus nous sécrétons de sérotonine, l'hormone de la bonne humeur. De plus, l'altruisme aurait des effets positifs sur le cerveau en activant des connexions qui sont moins vivaces quand la compassion est absente, les pensées hostiles ou agressives augmentent le rythme cardiaque et la pression artérielle. Alors que la gentillesse abaisse le niveau de stress et apaise la tension, on a vu des gens mourir de méchanceté. L'agressivité pratiquée au quotidien augmente les risques cardiaques et conduit à une solitude qui aggrave tous les problèmes."}]</script>

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 12/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test12_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 12</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 12 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 12</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
</html>
