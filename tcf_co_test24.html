<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 24 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

à cette expérience, je pourrais changer de poste à mon retour. Je vais l'appeler ce soir pour le lui dire."}, {"type": "document", "q": "Pourquoi l'un des interlocuteurs n'a-t-il pas apprécié l'exposition ?", "c": ["Il n'aime pas l'œuvre de ce peintre.", "La présentation des tableaux lui a déplu.", "Il a trouvé qu'il y avait trop de visiteurs.", "Il s'est ennuyé en faisant la queue."], "a": 2, "k": "dans cette foule, il faut se battre pour les voir", "transcript": "– Tu as vu l'exposition Matisse ?\n– Oui, je suis allé pendant les vacances. Il y avait 2h30 d'attente avant de pouvoir entrer. Heureusement, j'avais un bon livre. Mais c'est souvent comme ça. Vu la disposition des tableaux, l'organisation de l'espace, la lumière, c'est superbe. Il y a un très bel éclairage et bien les toiles en valeur. Mais dans cette foule, il faut se battre pour les voir. Sincèrement, j'aurais été plus tranquille chez moi à feuilleter une revue d'art contemporain."}, {"type": "document", "q": "Que veulent organiser ces deux personnes ?", "c": ["Un repas entre collègues.", "Un voyage en Italie.", "Une fête d'anniversaire.", "Une formation d'équipe."], "a": 0, "k": "restaurant italien", "transcript": "– Tu sais que le départ en retraite de Natalie approche. On pourrait fêter ça. Qu'est-ce que tu en penses ?\n– Bonne idée. Il faudrait préparer quelque chose avec l'équipe et lui faire un petit cadeau. Ce serait sympa.\n– Et si on proposait aux collègues de retourner dans ce restaurant italien où nous avions fêté la promotion de Julien ?\n– Pourquoi pas ? Je leur en parle cet après-midi."}, {"type": "document", "q": "Pourquoi ce client est-il mécontent ?", "c": ["La commande est arrivée en retard.", "L'attente en caisse est longue.", "Le service après-vente est payant.", "Les techniciens sont incompétents."], "a": 2, "k": "les réparations seront à vos frais", "transcript": "– Bonjour, je vous apporte ce lecteur MP3, il fait un bruit bizarre.\n– Oui, vous avez la facture et le certificat de garantie ?\n– Voilà.\n– Merci. Votre lecteur sera prêt dans 10 jours. Ah… vous avez vu que la garantie a expiré il y a une semaine ?\n– Vraiment ?\n– Oui. Donc les réparations seront à vos frais.\n– Quoi ? À une semaine près, vous ne pouvez rien faire ?\n– Je regrette, monsieur. C'est la même chose pour tout le monde.\n– C'est incroyable. Je vais vous faire une mauvaise publicité sur internet, croyez-moi."}, {"type": "document", "q": "Pourquoi cet homme appelle-t-il ?", "c": ["Il veut obtenir des renseignements.", "Il cherche à joindre la directrice.", "Il désire visiter les locaux disponibles.", "Il souhaite participer à un congrès."], "a": 0, "k": "Je voudrais louer une salle de conférence", "transcript": "– Centre d'affaires de la cité, bonjour.\n– Bonjour madame. Je voudrais louer une salle de conférence. Quels sont les tarifs et les services proposés ?\n– C'est mon collègue, madame Martineau, qui s'occupe de la réservation de salle et je vous la passe. Ne quittez pas.\n– Merci, madame. Au revoir."}, {"type": "document", "q": "Que va faire le propriétaire ?", "c": ["Elle va appeler le locataire.", "Elle va attendre un petit peu.", "Elle va refuser le paiement.", "Elle va revenir une autre fois."], "a": 1, "k": "dans deux ou trois jours", "transcript": "– Allô ? Bonjour madame Tremblay.\n– Bonjour.\n– Je suis désolé. Il y a eu un problème informatique. Je ne peux pas retirer d'argent. Ou bien je vous règle mon loyer dans deux ou trois jours. Ou bien je vous apporte exactement la somme si vous préférez.\n– Non, ce n'est pas la peine. Dans trois jours. Merci beaucoup."}, {"type": "document", "q": "De quoi traite le reportage de Yann Gallic ?", "c": ["D'un projet de recrutement.", "D'une campagne d'action sociale.", "D'une formation professionnelle.", "D'une opération publicitaire."], "a": 1, "k": "offre des soins gratuits aux femmes isolées", "transcript": "Et le grand-angle nous emmène ce matin à bord d'un bus transformé en salon de beauté. Il sillonne actuellement les communes rurales et les quartiers défavorisés de l'Île-de-France et de l'Oise. Il offre des soins gratuits aux femmes isolées ou en situation de précarité. Reportage de Yann Gallic à Ferté-sous-Jouarre, dans la Seine-et-Marne. Avec cinq enfants, Brigitte n'est pas une habituée des salons de beauté, faute de temps et de moyens. Mais aujourd'hui, elle va pouvoir prendre soin d'elle pendant une heure, confortablement installée devant un grand miroir entouré de lumières métalliques. – On a appris à se masser au niveau du visage, à nettoyer, à faire un gommage, juste à prendre soin de notre peau. À vrai dire, c'est la première fois que je m'occupe de moi, parce qu'entre le ménage et les enfants, on n'a pas trop de temps."}, {"type": "document", "q": "Que va faire la cliente ?", "c": ["Elle va repartir avec sa voiture.", "Elle va revenir dans dix minutes.", "Elle va revenir le lendemain.", "Elle va repartir sans sa voiture."], "a": 3, "k": "laissez-la-moi toute l'après-midi", "transcript": "– Bonjour madame Lévesque. Qu'est-ce qui vous amène aujourd'hui ?\n– Eh bien, ma voiture a un problème au démarrage depuis hier. Elle démarre assez bien, puis elle s'arrête brusquement au bout de 10 minutes. Vous pouvez voir ce qui se passe ?\n– Maintenant, ce n'est pas possible. Demain peut-être.\n– Ah, c'est dommage. J'en ai vraiment besoin demain.\n– Attendez, je regarde mon agenda… Écoutez, laissez-la-moi toute l'après-midi et vous la reprendrez ce soir, elle sera prête.\n– C'est vraiment très gentil de votre part. Alors, à ce soir. Merci."}, {"type": "document", "q": "Que dit la journaliste des grand-mères modernes ?", "c": ["Elles assument leurs désirs malgré leur âge.", "Elles participent au maintien des traditions.", "Elles s'impliquent dans l'éducation des enfants.", "Elles sont à la pointe des tendances de la mode."], "a": 0, "k": "trop occupée à refaire sa vie", "transcript": "– Et dans la famille des héroïnes ordinaires, vous voulez nous présenter la grand-mère Laure.\n– Et oui. Je ne vous l'apprends pas : dans les sociétés occidentales modernes, l'archétype de la grand-mère est de moins en moins la mamie gâteau, garante de la transmission des recettes autant que de l'histoire de la famille. Mais la grand-mère voyageuse, engagée, dynamique, dont l'espérance de vie est de plus en plus longue, toujours dispos pour garder les petits-enfants… car trop occupée à refaire sa vie. Et même quand elle porte des robes à la mode et qu'elle a l'air d'une jeune femme, elle s'éclate à faire des blagues."}, {"type": "document", "q": "Qu'est-ce que Gérard regrette de ne pas avoir fait ?", "c": ["Acquérir son logement.", "Épargner de l'argent.", "Exercer un autre métier.", "Fonder un foyer."], "a": 3, "k": "je n'ai jamais été marié", "transcript": "– Bonjour, Gérard. Nous écoutons votre témoignage.\n– Eh bien, moi, j'ai passé la plus grande partie de ma vie à travailler. J'ai placé ma vie sous le signe de cette phrase d'un philosophe : « On existe parce que l'on fait. » Mais aujourd'hui, à 62 ans, je me dis que le bilan n'est peut-être pas aussi positif que ça. J'ai une jolie maison, un train de vie élevé… je n'ai jamais été marié, je n'ai jamais eu d'enfant, vie amoureuse un peu désastreuse. On existe parce que l'on fait, certes, mais le prix n'est-il pas trop élevé ?"}, {"type": "document", "q": "Que retient-on sur le transport maritime ?", "c": ["Les accidents peuvent être très graves.", "Les navires sont inadaptés aux besoins.", "Les passagers se sentent en insécurité.", "Les profils économiques sont en baisse."], "a": 0, "k": "les accidents se transforment donc en catastrophe", "transcript": "C'est une des richesses de la France : elle possède la deuxième façade maritime du monde, derrière les États-Unis. C'est une chance économique de première importance. Plus de 80 % du trafic mondial de marchandises passe par la mer. Aujourd'hui, les plus gros navires peuvent transporter des quantités colossales — les super pétroliers, un demi-million de mètres cubes de pétrole — et les accidents se transforment donc en catastrophe. Le sable breton se souvient encore des naufrages de l'Amoco Cadiz et de l'Erika. Le gigantisme a aussi gagné le transport des passagers depuis longtemps. Le drame du Costa Concordia vient de le rappeler."}, {"type": "document", "q": "Qu'est-ce qui est important pour Christelle Nolo ?", "c": ["L'organisation d'ateliers vidéo.", "La présence de réalisateurs étrangers.", "La projection de documentaires.", "La variété de la programmation."], "a": 3, "k": "un maximum de diversité", "transcript": "Christelle Nolo, directrice d'une salle de cinéma, nous parle du festival le Printemps du Cinéma. Je décide moi-même des films que nous présentons. Le but est de proposer un maximum de diversité. C'est l'occasion de mettre en avant des films qui ont bien marché, mais qui n'ont pas été suffisamment exploités. Il y a aussi une sélection de 15 films, ce qui est déjà significatif."}, {"type": "document", "q": "Qu'est-ce que le jeune homme regrette ?", "c": ["D'avoir choisi d'y aller seul.", "D'avoir attendu dans une file.", "D'avoir manqué quelques œuvres.", "D'avoir suivi le conseil de son amie."], "a": 0, "k": "j'y suis allé jeudi en soirée", "transcript": "– Je suis allé voir l'exposition. Tu me l'avais conseillée. Qu'en as-tu pensé ?\n– C'était sympa, mais il y a beaucoup d'œuvres que je n'ai pas comprises. Et puis j'y suis allé jeudi en soirée. Il y avait du monde. Tu aurais dû attendre que j'y retourne — j'aurais pu t'expliquer pas mal de choses.\n– C'est vrai que tu es passionné d'art contemporain. La prochaine fois, je te demanderai de m'accompagner."}, {"type": "document", "q": "Pourquoi l'entreprise Facebook a-t-elle modifié son code de conduite ?", "c": ["Pour améliorer la cohésion des équipes.", "Pour empêcher la diffusion de rumeurs.", "Pour éviter les sollicitations abusives.", "Pour limiter les distractions au travail."], "a": 2, "k": "on ne peut pas l'inviter une seconde fois", "transcript": "Une affaire révélée par le Wall Street Journal fait beaucoup de bruit dans la presse anglo-saxonne. Désormais, chez Facebook, on ne peut proposer à un ou une collègue de sortir, de boire un verre, qu'une seule fois. Si il ou elle refuse, on ne peut pas l'inviter une seconde fois. Cela figure désormais dans le code de conduite de l'entreprise. Aller plus loin peut exposer à des sanctions disciplinaires. La direction de Facebook est entrée dans les détails : un refus n'a pas à être totalement explicite. Si vous entendez « Je suis occupé ce soir » ou « Je ne suis pas disponible », cela suffit. Vous n'avez pas le droit de réitérer votre invitation."}, {"type": "document", "q": "Qu'est-ce que Léonard a de particulier ?", "c": ["Sa mémoire exceptionnelle.", "Ses aptitudes au jardinage.", "Ses origines sociales modestes.", "Son parcours d'apprentissage."], "a": 3, "k": "à l'école de la nature", "transcript": "Léonard reçoit une éducation relativement libre, comme l'était celle de la plupart des villageois de son âge. On imagine Léonard aujourd'hui comme un puits de science, une sorte de grand sage qui, très jeune, aurait été formé à la culture humaniste traditionnelle. Évidemment, ce n'est pas le cas. C'est un enfant qui s'est mis en quelque sorte à l'école de la nature, qui scrute, qui observe tout. Il est passionné par tout ce qui l'entoure. Et il s'aperçoit vite que le sens de l'observation est peut-être le meilleur des enseignements."}, {"type": "document", "q": "Quelle est la raison du déplacement de ce couple ?", "c": ["Un mariage.", "Un anniversaire.", "Une naissance.", "Une promotion."], "a": 2, "k": "cadeau pour le petit Romain", "transcript": "– Bon, je suis prête. J'ai le cadeau pour le petit Romain.\n– Tu as pris la carte et le plan d'Arnaud ?\n– La carte est dans la voiture, mais c'est toi qui as le plan. Je te l'ai donné avec le faire-part.\n– T'es sûr ? Je ne sais pas ce que j'en ai fait.\n– Bon, ça fait rien. On va bien trouver.\n– Oui, j'espère. La maternité est juste derrière le restaurant près de la rivière — c'est celui où on a fêté l'anniversaire de mariage de mes parents.\n– Ah oui. J'y suis retourné avec mes collègues pour fêter ma nomination comme directeur."}, {"type": "document", "q": "Qu'ose cette association ?", "c": ["D'équiper des bris pour pique-niquer les zones urbaines.", "De partager un déjeuner avec des personnes sans ressources.", "De proposer aux cheminots de participer à une manifestation culturelle.", "D'organiser des repas collectifs dans un lieu inhabituel."], "a": 3, "k": "dans un endroit qui n'est pas fait pour ça", "transcript": "L'Association des Urbanités vous invite à pique-niquer en ville. C'est une tendance, et surtout une manière différente et festive de vivre la ville. Marcel est un inconditionnel des pique-niques urbains.\n– Comment organisez-vous ce genre de manifestation ?\n– Ici, on est près d'une gare. On pourrait imaginer un pique-nique sur les rails ?\n– Exactement, mais sur les quais, avec plaisir. L'idée, c'est de faire quelque chose dans un endroit qui n'est pas fait pour ça."}, {"type": "document", "q": "Quel est l'objectif de l'activité actuelle de Fatoumata ?", "c": ["Comparer les mouvements des galaxies.", "Étudier les trajectoires des déchets cosmiques.", "Prévenir des risques de chute de météorites.", "S'entraîner pour des voyages interplanétaires."], "a": 1, "k": "je simule des collisions dans l'espace", "transcript": "Fatoumata. À 29 ans, elle termine actuellement son doctorat en astronomie et prévoit de passer un an au Japon pour se préparer à son futur métier d'astronome. Fatoumata veut devenir astronome — « femme de ménage de l'espace ». Des objets sont réellement retombés sur Terre, au Zimbabwe et en Arabie Saoudite. Plusieurs entreprises et agences ont proposé des solutions, mais aucune n'a vraiment été testée dans les conditions réelles. Tout le monde se prépare à l'espace parce que la NASA prévoit qu'à l'horizon de 2025, l'espace sera tellement encombré de débris qu'il faudra agir. Donc, en fait, je simule des collisions dans l'espace : quand deux objets entrent en collision, ça crée des milliers de débris. Je regarde comment ces débris vont évoluer avec le temps autour de la Terre."}, {"type": "document", "q": "Quel est le point développé par cet intervenant ?", "c": ["L'essor de langues internationales appauvrit la variété des langues.", "L'initiation à plusieurs langues étrangères est indispensable.", "La francophonie doit s'élargir à de nouvelles nations pour perdurer.", "Le français a trouvé sa place au carrefour du pluralisme linguistique."], "a": 3, "k": "le symbole de la diversité", "transcript": "– Vous êtes, d'un côté, un champion de la francophonie. Et, d'un autre côté, vous êtes partisan du plurilinguisme. Vous trouvez qu'il est très bon de pratiquer deux langues dès la petite enfance. N'est-ce pas contradictoire ?\n– Car le fait même que soient adhérents à la francophonie un certain nombre de pays extrêmement divers, qui représentent autant de langues, montre que ceux qui se regroupent autour de la francophonie se regroupent en fait au nom de la diversité. Le français est certes un point commun de ralliement entre eux. Mais le français n'ayant plus le moyen d'être une langue imposée aux gens comme autrefois, il est vite devenu, paradoxalement, le symbole de la diversité. C'est pourquoi je ne vis pas comme une contradiction le fait de défendre à la fois les deux."}, {"type": "document", "q": "Quel est le problème exposé ?", "c": ["Les jeunes diplômés privilégient le travail en milieu urbain.", "Les lauréats aux concours vétérinaires sont trop peu nombreux.", "Les soins aux animaux de ferme demandent une spécialisation.", "Les vétérinaires en activité refusent de former les nouveaux."], "a": 0, "k": "peu de jeunes diplômés sont attirés par le travail à la campagne", "transcript": "Bonjour et bienvenue à France Québec TV. On commence par les opportunités au Québec : figurez-vous qu'on recherche plus de 300 vétérinaires pour faire face à une certaine pénurie. Chaque année, 90 diplômés sortent des écoles vétérinaires, mais seulement 10 à 15 se consacrent aux soins des animaux de ferme. C'est que la pratique auprès des animaux d'élevage est particulièrement exigeante. Le travail demande beaucoup de déplacements, une bonne forme physique et une disponibilité 24 heures sur 24, 7 jours sur 7. Pour ces raisons, peu de jeunes diplômés sont attirés par le travail à la campagne, et les vétérinaires d'un certain âge continuent souvent parce qu'ils n'ont personne pour les remplacer."}, {"type": "document", "q": "Qu'est-ce qui a décidé Daniel Desmoulins à démarrer son activité ?", "c": ["La qualité croissante des résultats.", "Les aménagements hydrauliques.", "L'expérience de ses collègues.", "L'importation de pieds de vigne."], "a": 0, "k": "les produits devenaient de mieux en mieux", "transcript": "Depuis quelques années, des vignerons ont investi des sommes importantes au Québec pour se lancer dans une nouvelle culture, comme Daniel Desmoulins, qui a ouvert le vignoble « L'Ange Gardien » en face du fleuve Saint-Laurent.\n– Faire du vin au Québec, c'est un challenge. Je ne me serais peut-être pas lancé dans cette aventure il y a 20 ans, mais je trouvais que les produits devenaient de mieux en mieux. C'est pour cela qu'il y a 10 ans, avec ma femme, nous avons décidé de nous lancer dans le vin. Je pense que nous avons des produits extrêmement intéressants parce qu'ils ont un petit peu d'acidité. Et puis, il y a toujours le vin de glace. Nous avons la température adéquate pour cela. Nous récoltons le raisin fin décembre, début janvier."}, {"type": "document", "q": "Que constatent ces journalistes culinaires ?", "c": ["La gastronomie moderne reprend d'anciennes recettes.", "De nouvelles herbes sont commercialisées.", "Il y a un réel manque d'originalité chez les chefs actuels.", "On multiplie l'utilisation de parfums artificiels."], "a": 3, "k": "l'industrie qui maintenant crée des milliers d'arômes", "transcript": "Les arômes dans la cuisine, ce n'est pas vraiment une nouveauté. Non, ce n'est pas une chose nouvelle, puisque la cuisine a toujours été aromatisée. Avant, on était aux fleurs d'oranger. Et maintenant encore — le gingembre, d'ailleurs dans l'Antiquité, on savait déjà extraire des arômes naturels des plantes. Donc ce n'est pas une chose nouvelle. Mais ce qui est nouveau, en revanche, c'est l'industrie qui maintenant crée des milliers d'arômes pour répondre aux besoins de l'industrie agroalimentaire, qui va donc aromatiser tous les produits que vous trouvez dans vos rayons."}, {"type": "document", "q": "Qu'affirme cette spécialiste au sujet des écrans dans la vie des enfants ?", "c": ["Ils favorisent les interactions avec les adultes.", "Ils permettent d'apprendre de façon ludique.", "Ils peuvent compenser les absences des parents.", "Ils sont utiles pour l'accompagnement scolaire."], "a": 1, "k": "ils peuvent apprendre des choses", "transcript": "Dire que les écrans sont un poison pour les enfants, c'est vraiment excessif. Il ne faut pas voir les choses de cette façon. Il faut être un peu plus nuancé. Évidemment, un usage excessif, ça n'est absolument pas constructif pour l'enfant. Un usage pondéré et accompagné par les parents, c'est différent. Les écrans ont un impact sur les enfants : ils peuvent apprendre des choses, ils peuvent jouer — ça, c'est l'impact positif. Et l'impact négatif, c'est quand il y a trop d'écran, quand on se ferme aux interactions, quand on est passif à recevoir l'information — ça, c'est plutôt négatif."}, {"type": "document", "q": "Selon cette personne, qu'est-ce que l'utilisation d'internet apporte au processus de recrutement ?", "c": ["Une diminution de la longueur des entretiens.", "Une meilleure diffusion des offres d'emploi.", "Une plus grande équité entre les candidats.", "Une protection accrue des données personnelles."], "a": 2, "k": "réduit les discriminations", "transcript": "Dans mon cabinet de recrutement, internet est devenu un outil indispensable, non seulement pour repérer des candidats potentiels sur la toile, mais également pour la phase d'entretien. Grâce au logiciel de visioconférence, les cadres ne doivent plus se déplacer, et parfois faire des centaines de kilomètres, pour s'entendre dire après 10 minutes d'entretien qu'ils n'ont pas le profil. De plus, l'utilisation de tels logiciels offre un autre avantage considérable : il réduit les discriminations, car l'entretien peut être enregistré aussi bien par le candidat que par le recruteur. Cela évite les questions déplacées. Enfin, les enregistrements peuvent être visionnés autant de fois qu'on le souhaite, ou encore être transmis à nos clients pour plus de transparence et de professionnalisme."}, {"type": "document", "q": "Selon cette analyse, qu'est-ce qui nuit à la lecture dans le monde contemporain ?", "c": ["L'effervescence continuelle.", "La vie de couple fusionnelle.", "Le côté désuet des livres.", "Le manque de temps."], "a": 0, "k": "saturé de bruit", "transcript": "À mes yeux, les méthodes de lecture n'ont rien à voir avec la désertion du livre par les adolescents, mais tout à voir avec un univers qui est désormais saturé de bruit. Or, on peut écouter de la musique ensemble. On ne peut pas lire ensemble. On peut lire côte à côte — c'est même un très grand plaisir quand on découvre la personne avec laquelle on peut lire côte à côte. Et c'est une activité quand même solitaire, comme la solitude et le silence, qui sont désormais devenus des biens luxueux dans ce monde agité. Il est normal que la lecture passe au profit d'autres loisirs ou d'autres occupations."}, {"type": "document", "q": "Comment réagissent les populations indigènes concernées par ce projet ?", "c": ["Elles demandent un nouveau statut juridique.", "Elles exigent des garanties réelles et tangibles.", "Elles mettent en doute la viabilité du projet.", "Elles veulent que les terres restent intactes."], "a": 1, "k": "sortir les autochtones de leurs dépendances économiques", "transcript": "Le plan Nord mise aussi sur l'appui des populations locales, notamment celui des Inuits et des Amérindiens, que l'on va former aux nouveaux emplois. Certaines nations, comme celles des Innus, ont des réticences. Ce conseiller juridique milite pour que son peuple et le gouvernement du Québec signent une entente pour sortir les autochtones de leurs dépendances économiques. De toute évidence, les retombées économiques pour les communautés autochtones ne seront pas là simplement. Mais je pense que c'est une responsabilité du gouvernement québécois de s'assurer que les jeunes Innus soient formés et qu'ils aient accès à des emplois valorisants dans les projets miniers. Certains environnementalistes ont des réserves face à ce plan qui va faciliter l'exploitation de zones jusqu'ici vierges."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 24/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test24_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 24</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 24 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
