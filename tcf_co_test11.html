<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 11 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

tions hôtes qui décident de l'arrivée des pandas. En fait, c'est parce qu'en Chine, le panda est un animal vénéré par la population et par les Chinois. C'est le trésor national chinois. Le président doit lui-même donner son accord pour que les pandas puissent sortir de Chine. Parce que pour eux, c'est un animal extrêmement important."}, {"type": "document", "q": "Question 11. Quel est le problème de Vincent ?", "c": ["Il déteste les plats végétariens.", "Il est absent à la date du dîner.", "Il est malade avec les crevettes.", "Il est stressé par les Blanchard."], "a": 2, "k": "Vincent est allergique aux crevettes.", "transcript": "Marie, je voudrais vous inviter à dîner jeudi prochain avec les Blanchards. Vous aimez ça ? Les frites ? Moi, oui. Mais Vincent est allergique aux crevettes. Ah bon ? Je fais un plat végétarien. Alors oui, c'est mieux. Et pour le dessert, on mange de tout. Super. Je fais une tarte aux pommes."}, {"type": "document", "q": "Question 12. Que demande cette dame ?", "c": ["Demander une facture détaillée.", "Faire reprendre son automobile.", "Prendre rendez-vous au garage.", "Savoir si son véhicule est prêt."], "a": 3, "k": "quand je pourrais récupérer ma voiture", "transcript": "Allo ? Bonjour. Je vous appelle pour savoir quand je pourrais récupérer ma voiture, une peu ouverte et laissée chez vous depuis une semaine, un instant s'il vous plaît, madame, je me renseigne. La pièce qui manque pour la boîte de vitesse devrait être livrée ce matin. La réparation devrait être terminée en fin d'après-midi, pourriez-vous nous rappeler vers 17h volontiers ? Pourriez-vous m'indiquer à ce moment-là la somme à payer à tout à l'heure."}, {"type": "document", "q": "Question 13. De quoi parlent ces deux personnes ?", "c": ["De l'actualité européenne.", "Du dernier film qu'elles ont vu.", "D'un trafic de documents.", "D'un vieil ami commun."], "a": 1, "k": "Tu t'es endormi pendant la séance ?", "transcript": "Alors tu as aimé ? Bof. Je n'ai pas très bien compris la fin. Ah oui. Mais enfin, le héros quitte secrètement la France, et par où ? Je ne sais pas, en Espagne, il est espagnol. Alors pourquoi le vois-tu ? On rentre dans cette maison pour aller chercher un faux passeport. Tu t'es endormi pendant la séance ? Toi ? Non."}, {"type": "document", "q": "Question 14. Que dit Pascal sur son métier ?", "c": ["La répartition des horaires.", "Le contact avec les élèves.", "Les activités pédagogiques.", "L'organisation des leçons."], "a": 1, "k": "les relations avec les enseignants et les enfants", "transcript": "Je m'appelle Pascal. Ça fait quatre ans que je travaille dans une école maternelle. Je suis chargé d'aider les enseignants dans la classe. Alors le plus dans le métier, pour moi, c'est les relations avec les enseignants et les enfants. Ça, on a vraiment beaucoup de chance à ce niveau-là, surtout avec les enfants. Les côtés négatifs du métier, je dirais, peut-être les journées un peu longues dans le bruit parce que les enfants sont quand même en général bruyants."}, {"type": "document", "q": "Question 15. Qu'est-ce qui empêche cet homme de dormir ?", "c": ["Les conducteurs qui klaxonnent au feu rouge.", "Les motards qui s'amusent sur le parking.", "Les ouvriers qui travaillent sur l'autoroute.", "Les véhicules qui circulent près de chez lui."], "a": 3, "k": "une moto qui passe ou une voiture qui passe à 200 à l'heure", "transcript": "Que ce qui gère à la retraite. Le bruit est aussi une source de fatigue et de tension. Moi, le bruit, je ne le supporte absolument pas et j'arrive à un âge où on a peut-être besoin de points de sommeil, mais il est évident que je n'arrive pas à supporter ce niveau sonore qui est permanent, entre autres. Il faut aussi ne pas oublier que même si l'intensité routière diminue la nuit, on est réveillé par des bruits un peu exceptionnels, une moto qui passe ou une voiture qui passe à 200 à l'heure. C'est ce qu'on constate régulièrement."}, {"type": "document", "q": "Question 16. Qu'est-ce que ces deux amis reprochent au film ?", "c": ["L'histoire est compliquée.", "La musique est ennuyeuse.", "Le réalisateur est mauvais.", "Les acteurs sont inconnus."], "a": 0, "k": "J'ai eu du mal à suivre l'histoire.", "transcript": "Alors, comment as-tu trouvé le film ? Assez moyen. Les acteurs jouaient bien, mais je n'ai pas réussi à croire à ce scénario. C'est mon avis aussi. J'ai eu du mal à suivre l'histoire. En revanche, j'ai apprécié la musique et la façon de filmer. En effet, le réalisateur a du talent, on continue cette discussion dans un café avec plaisir."}, {"type": "document", "q": "Question 17. Que manque-t-il à ce client ?", "c": ["Le bon de garantie.", "Le chèque-cadeau.", "Le justificatif d'achat.", "Le mode d'emploi."], "a": 2, "k": "demandez la facture à la personne qui vous l'a offert", "transcript": "Service à présence ? Bonjour. Bonjour madame. Voilà, je vous téléphone parce que mon lecteur DVD ne fonctionne pas. Il est sous garantie. J'espère bien qu'il est tout neuf. Avez-vous une preuve d'achat ? En fait, c'est un cadeau. Dans ce cas, monsieur, je ne peux malheureusement rien pour vous, demandez la facture à la personne qui vous l'a offert."}, {"type": "document", "q": "Question 18. Quel sera le premier sujet développé au cours de ce journal d'informations radiophoniques ?", "c": ["L'état de la recherche mondiale sur le cancer.", "Une rencontre des ministres européens de l'écologie.", "La lutte contre le réchauffement climatique en Asie.", "Un reportage sur les lieux d'un tremblement de terre."], "a": 3, "k": "Le premier titre, c'est le tremblement de terre.", "transcript": "10 h 30 à Gaspé, merci d'être fidèle à Radio du Monde. On commence par les titres de l'actualité de ce jeudi comme hier. Le premier titre, c'est le tremblement de terre. La communauté internationale se mobilise pour aider la population. Le reportage de notre envoyé spécial dans un instant à Ottawa, les premiers ministres des provinces évoquant justement les conséquences du réchauffement climatique. Enfin, samedi soir auront lieu des concerts géants simultanément dans cinq grandes villes du monde afin de récolter des fonds pour lutter contre le cancer."}, {"type": "document", "q": "Question 19. Que propose Martin à Laurent ?", "c": ["D'assister à une rencontre sportive.", "De fêter leur victoire entre copains.", "De jouer au basket-ball sans payer.", "De s'inscrire dans un nouveau club."], "a": 2, "k": "On peut y essayer tous les sports et c'est gratuit.", "transcript": "Salut Laurent. Ce matin, j'ai dit qu'il y a le gymnase qui vient d'ouvrir à côté de chez moi. Il y a plusieurs salles en ce moment. On peut y essayer tous les sports et c'est gratuit. Ça te dirait de venir faire une partie de basket-ball avec les copains demain soir ? Réponds-moi vite pour que j'appelle le club pour réserver le terrain à plus tard."}, {"type": "document", "q": "Question 20. Qu'apprend-on selon lui ?", "c": ["Il a besoin de beaucoup de sommeil.", "Il déteste tous les types de sport.", "Il travaille pour plusieurs entreprises.", "Il va souvent danser en discothèque."], "a": 2, "k": "vous êtes cuisinier le jour et vous travaillez dans une discothèque la nuit", "transcript": "Rémi, vous avez deux activités. Ce n'est pas trop difficile ? Non, ça va, vous savez, 35h, ce n'est pas pour moi. Alors vous êtes cuisinier le jour et vous travaillez dans une discothèque la nuit. Vous arrivez à tout faire sans problème ? Oui, mais je dois préciser que pour me sentir bien, quatre heures de sommeil suffisent et je fais du sport dès que je peux."}, {"type": "document", "q": "Question 21. Que recommande Cédric Oriol pour développer la consommation d'insectes en Europe ?", "c": ["Des déclarations rassurantes des autorités sanitaires.", "Des études de spécialistes sur leur apport nutritionnel.", "L'implication des professionnels de la gastronomie.", "Une mise en valeur par les producteurs eux-mêmes."], "a": 2, "k": "des chefs vont être capables d'adapter les insectes à la cuisine européenne", "transcript": "C'est que justement, micro, vous élevez deux types d'insectes. Qu'est-ce que vous pensez de ces chefs qui, justement, se mettent à introduire ces insectes dans leur menu ? Alors moi, déjà, je pense que c'est très intéressant que des chefs commencent à réfléchir sur comment pouvoir incorporer des insectes dans l'alimentation des Européens. La condition, c'est que les insectes comestibles aient du sens pour entrer dans l'alimentation des Européens et qu'on ne puisse pas les consommer comme on les consomme par ailleurs, en Asie, en Afrique, en Amérique du Sud, où vraiment des créatifs, des chefs vont être capables d'adapter les insectes à la cuisine européenne."}, {"type": "document", "q": "Question 22. Qu'est-ce qui fait rire la femme ?", "c": ["Que l'homme soit parti seul en vacances.", "Que l'homme ait progressé au golf.", "Que l'homme lui ait envoyé une carte.", "Que l'homme se soit mis à faire du sport."], "a": 3, "k": "j'ai bien l'intention de recommencer", "transcript": "Allo Béni, c'est Noé. Merci pour la carte. Alors ces vacances en célibataire, t'es parti tout seul vers le golf. C'est ça ? Oui, j'avais envie de connaître le golf. C'était super, pas facile, mais super. Ah bon ! Je ne suis pas vraiment sportif. Le golf, quand même, je ne reviens pas, non, mais j'ai bien l'intention de recommencer. Pas toute l'année, un stage l'été, c'est suffisant. Eh bien, tu vas pas être un bon rythme. Qu'est-ce que tu crois ? Je ne suis pas si mauvaise."}, {"type": "document", "q": "Question 23. Quel objectif poursuit-elle en enseignant le français langue étrangère ?", "c": ["La diffusion d'une langue qui exprime les nuances des sentiments.", "La multiplication des actions pour la défense des droits de l'homme.", "La promotion d'un moyen d'échanges entre les différentes nationalités.", "La reconnaissance d'un patrimoine culturel unique par sa richesse."], "a": 2, "k": "l'apprentissage des langues est une passerelle entre les peuples et les cultures", "transcript": "C'est lui. Qu'est-ce qu'il vous plaît ? Plus particulièrement dans votre travail. En tant que responsable multimédia, je suis également formatrice de formateurs et enseignante de français langue étrangère. C'est ce dernier point qui m'attire. Un de mes centres d'intérêt en français langue étrangère concerne le développement d'une politique linguistique en faveur du français comme langue de communication et pas seulement comme symbole d'une certaine culture et du pays des droits de l'homme ou comme langue de l'amour. Et j'essaie de montrer que l'apprentissage des langues est une passerelle entre les peuples et les cultures."}, {"type": "document", "q": "Question 24. Quelle est l'attitude des jeunes face au don du sang ?", "c": ["Ils déplorent un manque d'information.", "Ils refusent de participer à la collecte.", "Ils s'inquiètent de la sécurité sanitaire.", "Ils souhaitent rencontrer des soignants."], "a": 0, "k": "ils déclarent ne pas donner parce qu'ils ne sont pas sollicités", "transcript": "La question du jour : Valérie Tier, pourquoi l'établissement français du sang en appelle-t-il aux étudiants ? Les jeunes donnent plus facilement leur sang. Il faut savoir qu'ils voient ça comme un premier acte de citoyenneté, un acte solidaire, un geste utile. C'est ce qui ressort des sondages : un sur cinq a entre 18 et 24 ans en France. Mais souvent, ils déclarent ne pas donner parce qu'ils ne sont pas sollicités. Pas assez en tout cas. Ou bien parce qu'ils ne savent pas où aller. Du coup, la semaine prochaine, l'établissement français du sang lance une campagne pour mobiliser les étudiants. Le slogan : « On est plus qu'amis. On est donneur de sang. »"}, {"type": "document", "q": "Question 25. Selon l'intervenant, qu'est-ce qu'un poète ?", "c": ["Quelqu'un qui invente de nouveaux termes.", "Quelqu'un qui utilise un langage complexe.", "Quelqu'un qui joue avec les sonorités.", "Quelqu'un qui idéalise le monde."], "a": 0, "k": "Le mot signifie créateur, un fabricant.", "transcript": "Vous savez sans doute ce que signifie le mot poète. Le mot poète est apparu assez rapidement, et il désignait une sorte de référent qui parle d'une certaine manière avec un cœur, disons, une imagination. Je ne sais pas… Non, non, le mot ne signifie pas cela. Le mot signifie créateur, un fabricant. C'est ça, le fabricant, le fabricant de langue. Et lorsqu'on parle de fabricant de langue, je pense aux hommes que j'ai vus tout à l'heure. L'un a créé dans le domaine du tourisme, par exemple, et d'autres qui font tout."}, {"type": "document", "q": "Question 26. Pourquoi le visiteur ne peut-il pas accéder à cette salle du musée ?", "c": ["Parce que la salle est en travaux aujourd'hui.", "Parce qu'un vol a eu lieu dans cette salle.", "Parce que le personnel procède au nettoyage.", "Parce qu'il manque du personnel aujourd'hui."], "a": 3, "k": "nous ne sommes pas assez nombreux pour ouvrir toutes les salles", "transcript": "Est, monsieur ? Vous voyez bien qu'il vient de vous dire que vous ne pouvez pas aller voir ces tableaux-là. En plus, il y a une alarme qui peut se mettre à sonner. Euh, oui, mais je ne voulais rien voler. Excusez-moi. Habituellement, on peut visiter cette salle. Vous êtes en train de le faire. Non, non, mais aujourd'hui, euh, nous ne sommes pas assez nombreux pour ouvrir toutes les salles. Il y a une épidémie de grippe. Ah, très bien, je comprends mieux, mais au moins, il n'y aura pas besoin d'y faire le ménage aujourd'hui."}, {"type": "document", "q": "Question 27. Quelle relation le père entretenait-il avec sa fille ?", "c": ["Il avait du mal à accepter ses choix.", "Il essayait souvent de rivaliser avec elle.", "Il était attentif à ses centres d'intérêt.", "Il lui interdisait les activités intellectuelles."], "a": 0, "k": "il pensait que j'étais malheureuse", "transcript": "Quel rapport aviez-vous avec votre père ? Je ne lui parlais plus de mes études. Il avait toujours la peur ou peut-être le désir que je n'y arrive pas. Il s'énervait de me voir en longueur de journée dans les livres. Je crois qu'il pensait que j'étais malheureuse. Comment se comportait-il avec vous face aux extérieurs, devant la famille des clients ? De la jeunesse, presque de la route, que je ne gagne pas encore ma vie à 17 ans, il craignait qu'on ne me prenne pour une paresseuse et lui, pour un entraîneur. Il disait que j'apprenais bien, mais jamais que je travaillais bien. Quelle était pour lui la définition du mot travail ? Travailler, c'était seulement travailler, seulement."}, {"type": "document", "q": "Question 28. Selon la personne interrogée, pour quelle raison les entreprises québécoises doivent-elles continuer leurs efforts pour l'intégration des immigrés ?", "c": ["Parce qu'elles ont beaucoup à apprendre d'eux.", "Parce qu'elles s'implanteront mieux ensuite à l'étranger.", "Parce qu'elles sont en manque de main-d'œuvre.", "Parce qu'elles y sont contraintes par la mondialisation."], "a": 0, "k": "on apprend sur la nôtre, on apprend sur les autres", "transcript": "Les entreprises québécoises m'ont fait beaucoup pour l'intégration des immigrés, mais elles doivent faire davantage. Je pense qu'on peut toujours faire mieux, qu'on a encore besoin d'être sensibilisés, d'être ouverts. Donc je pense que c'est un défi de tous les jours. Si on ne le fait pas, on y perd, parce qu'il y a tellement de gains à l'immigration. On n'a pas parlé de s'ouvrir vers d'autres cultures, on y gagne, on apprend sur la nôtre, on apprend sur les autres. Et pour le milieu du travail également, toute la richesse, la diversité que d'autres cultures peuvent nous apporter. Quand on parle d'un contexte de globalisation, on travaille à l'échelle de la planète. Il faut avoir un regard beaucoup plus large."}, {"type": "document", "q": "Question 29. Que fait cette intervenante ?", "c": ["Elle annonce la fin prochaine d'un projet.", "Elle félicite des collègues pour un travail.", "Elle prépare une opération commerciale.", "Elle présente une nouveauté à des clients."], "a": 2, "k": "pendant la période de vente", "transcript": "Après deux années de recherche, nous avons lancé le dernier modèle de notre garde et votre rôle va être essentiel. Le marché sur lequel votre équipe va intervenir est en pleine croissance. C'est pourquoi nous avons besoin de personnes prêtes à prendre leur fonction rapidement. Nous allons maintenant examiner les étapes que vous devrez suivre pour être les meilleures pendant la période de vente."}, {"type": "document", "q": "Question 30. De quoi fait le médecin ?", "c": ["Conseiller des médicaments.", "Établir un certificat médical.", "Examiner une radiographie.", "Traiter un problème de poids."], "a": 1, "k": "j'ai besoin de votre autorisation pour m'inscrire dans un club de sport", "transcript": "Bonjour docteur. Je voudrais faire de l'escalade et j'ai besoin de votre autorisation pour m'inscrire dans un club de sport. L'escalade, mais c'est très mauvais pour votre dos. Je vous conseille plutôt de faire de la natation. La natation, ce n'est pas bon pour ma peau. Et puis j'adore la montagne. Eh bien, faites plutôt de la randonnée. Ah oui, donné c'est une idée, c'est de l'aider à maigrir."}, {"type": "document", "q": "Question 31. Que dénonce cette liste ?", "c": ["L'absence de formation sur l'élaboration d'un budget.", "Le désintérêt des jeunes pour les questions financières.", "Le manque de cours d'économie à l'université.", "Le peu d'informations des banques sur les crédits."], "a": 0, "k": "aucune séance de travail n'est dédiée à cette question", "transcript": "Apprendre à gérer son argent n'est pas une priorité éducative. Alors que l'argent nous accompagne toute notre vie, construire un budget, ça, ça s'apprend, mais trop souvent, le sujet est considéré tabou par les adultes. Donc la question d'en parler avec les enfants dans la sphère de l'école, aucune séance de travail n'est dédiée à cette question. Pourtant chacun est concerné dans sa vie professionnelle et personnelle par les principales notions que sont les coûts, les crédits, les prêts et tout l'intérêt, l'endettement, l'économie à l'échelle de l'individu. Voilà un domaine qui touche chaque Français sans que jamais celui-ci y soit vraiment initié."}, {"type": "document", "q": "Question 32. Quelle est la conclusion de cette intervenante sur les femmes au foyer ?", "c": ["Elles garantissent l'épanouissement des enfants.", "Elles permettent à la société de fonctionner.", "Elles profitent du système qui les soutient.", "Elles représentent une charge pour leur famille."], "a": 1, "k": "tout le système ne tient que par le travail invisible", "transcript": "Vous bien, un peu ces femmes au foyer qui ne vivent que par et pour leurs enfants, diriez-vous que ce sont des poids morts économiques entre guillemets pour la société ou qu'elles contribuent à leur façon à l'économie du pays ? Et je manque des femmes humiliées par leurs enfants au poids de pensée qui sont le centre du monde et au point de faire l'impasse sur leur propre désir. Cela dit, les femmes au foyer ne sont pas des poids morts. Au contraire, tout le système ne tient que par le travail invisible, donc non rémunéré de personnes, souvent des femmes qui s'occupent des enfants, des vieux, des malades, etc."}, {"type": "document", "q": "Question 33. D'après ces journalistes, quel aspect du jeu les créateurs de la chouette d'or ont-ils mal évalué ?", "c": ["La lassitude du public pour ce genre de quête.", "Le manque d'attractivité de la récompense.", "Le temps nécessaire pour découvrir la cachette.", "Les distances à parcourir pour trouver des indices."], "a": 2, "k": "pensaient que l'énigme allait être résolue dans un délai de huit à 14 mois", "transcript": "Prenez les bottes, la carte, la boussole. Je vous emmène à la chasse au trésor, à la recherche de la chouette d'or et une sculpture qui vaut aujourd'hui 150 000 euros. Et les inventeurs de ce jeu diabolique ont concocté 11 énigmes bien difficiles du genre, le bon sens, c'est le sens du contresens et inversement, suivi d'une série de chiffres et d'un dessin et pensaient que l'énigme allait être résolue dans un délai de huit à 14 mois. Et 15 ans plus tard, malgré l'engouement suscité par le jeu, la chouette d'or n'a toujours pas été retrouvée. Enfin, du moins sa réplique en terre cuite. L'original, en effet, dans le coffre d'une banque."}, {"type": "document", "q": "Question 34. Que reproche le comité ministériel pour la ville aux clubs sportifs ?", "c": ["Leur habitude de privilégier les sports de combat au détriment des autres.", "Leur manque d'investissement dans des actions à caractère social.", "Leur nombre restreint dans les zones urbaines réputées difficiles.", "Leur réticence à travailler en collaboration avec le système éducatif."], "a": 1, "k": "le peu d'implication des clubs sportifs dans les réalités sociales des quartiers", "transcript": "Cette association qui se définit elle-même comme militante, s'est fixée comme objectif de favoriser l'éducation et l'insertion par le biais du sport, en particulier dans le quartier difficile. Elle défend l'idée que le sport est social et citoyen et qu'il peut s'inscrire dans un projet collectif d'éducation et d'insertion sociale et professionnelle. Elle est généreuse, mais elle ne va pas forcément de soi. Dans une étude menée avec le soutien de ce comité ministériel pour la ville, un groupe de chercheurs a mis en évidence le peu d'implication des clubs sportifs dans les réalités sociales des quartiers où ils sont pourtant implantés. Seules les minorités de ces clubs sous mot dirigés par des passionnés combatifs, cherchent à utiliser le sport comme un outil d'apprentissage de compétences sociales et professionnelles."}, {"type": "document", "q": "Question 35. Pourquoi le baccalauréat devrait-il être réformé selon celui qui s'exprime ?", "c": ["L'intérêt principal de sa mise en place a disparu.", "Le ministère manque de moyens pour l'organiser.", "Le taux de réussite des candidats est en baisse.", "Le nombre de fraudes constatées augmente."], "a": 0, "k": "il n'apporte plus aujourd'hui les garanties de sélection", "transcript": "Est-ce qu'il est irréformable ce baccalauréat ou on arrivera bien un jour à le réformer ? C'est obligatoire de toute façon, ce qu'on voit bien. C'est un examen qui est coûteux. Cher ça, tout le monde sait qu'il y a beaucoup d'inconvénients. En plus, il n'apporte plus aujourd'hui les garanties de sélection, parce qu'au fond, c'est ça le bac. C'est un examen. C'est bien pour sélectionner ceux qui ont de ceux qui ne sont pas jugés capables par l'éducation nationale, de sortir de ce système et d'aller vers l'enseignement supérieur. Donc, à partir du moment où il n'y a plus cette garantie-là, il faut le faire."}, {"type": "document", "q": "Question 36. Que révèle l'enquête sur le comportement des patients français ?", "c": ["Ils attendent la dernière minute avant de consulter.", "Ils consomment de plus en plus de médicaments.", "Ils pratiquent majoritairement l'automédication.", "Ils s'en remettent trop à l'autorité du praticien."], "a": 3, "k": "c'est au médecin de se débrouiller", "transcript": "Nous avons interrogé les Français, monsieur et médecin, afin de voir la première sur la santé collectée, s'il ne fait qu'un résultat qui vous a paru surprenant. Éventuellement, ce serait vous, des médecins qui considèrent que pour que la santé soit efficace, il faut que le patient intervienne le plus possible pour ses soins et pas ceux qui considèrent le médecin comme le sachant unique. Des côtés positifs à savoir. Alors les Français nous disent que c'est au médecin de se débrouiller."}, {"type": "document", "q": "Question 37. Que cherche à faire cette entreprise ?", "c": ["Améliorer la présentation des produits.", "Augmenter le nombre de clients.", "Multiplier les points de vente.", "Maintenir des tarifs compétitifs."], "a": 3, "k": "arriver à produire des aliments à des coûts qui sont quand même abordables", "transcript": "La qualité, vous savez, la qualité, surtout la très grande qualité, tout ça, ça a un prix. Si on veut trouver une place sur le marché, il faut donc, et c'est tout un exercice, arriver à produire des aliments à des coûts qui sont quand même abordables. Et c'est l'exercice qui occupe en ce moment Sophie de Caroline. C'est une petite fabrique de pâtes et de sauces qui s'installe à Sabrevoix à Montérégie."}, {"type": "document", "q": "Question 38. Qu'est-ce qui fait progresser la santé publique, selon la chronique médicale de ce journaliste ?", "c": ["Les médicaments de référence parce qu'ils sont plus efficaces que les génériques.", "Les génériques parce qu'ils compensent le coût élevé des nouveaux médicaments.", "Les médicaments de référence parce qu'ils financent les nouveaux médicaments.", "Les génériques parce qu'ils sont plus innovants que les médicaments de référence."], "a": 1, "k": "ils font faire des économies à la collectivité", "transcript": "Bien sûr, ce ne sont pas les médicaments génériques qui font directement progresser la santé puisqu'ils ont la même efficacité thérapeutique que les médicaments de référence et sont fabriqués avec les mêmes molécules. Ceci dit, ils coûtent 30 % moins chers que les médicaments de référence qui eux sont référés. Ils font faire des économies à la collectivité et les économies ainsi réalisées permettent à la collectivité de prendre en charge le remboursement des nouveaux médicaments qui sont innovants. Donc chers, les médicaments génériques ont ainsi une vocation de santé publique. Ils permettent en quelque sorte de constituer une réserve de fonds donnant accès à tous et sans description au traitement innovant de demain."}, {"type": "document", "q": "Question 39. Quel jugement cette personne porte-t-elle sur les milieux culturels ?", "c": ["Elle déplore le manque de structures pour accueillir et réunir les jeunes.", "Elle désapprouve la disparition d'endroits consacrés aux pratiques culturelles.", "Elle estime insuffisantes les tentatives des cinémas de mélanger les publics.", "Elle regrette le désintérêt des publics pour les espaces et échanges culturels."], "a": 0, "k": "les parties culturelles sont très, très séparées", "transcript": "Les pratiques culturelles sont privées, malheureusement aujourd'hui, au niveau de la jeunesse qui pourrait être fédérée par phénomène générationnel, les parties culturelles sont très, très séparées. Je reste qu'il y a plus de qui permettent de se retrouver sur des terrains festifs. Ça, c'est vrai que ce sont des moments où l'on se retrouve ensemble dans une posture d'affrontement. Et ça, celle de cinéma, même les salles de cinéma et pièces, on boxe selon les films, les ne sont pas les mêmes que effectivement. Cela permet à des gens de se retrouver, mais ce sont les gens qui vont pratiquer."}]</script>

  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 11/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test11_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 11</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 11 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 11</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
</html>
