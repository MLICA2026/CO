<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 17 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

pt": "– Oh là là, cette valise est lourde et le train va partir. Est-ce que tu peux m'aider ?"}, {"type": "extrait", "q": "Question 4. Choisissez la bonne réponse.", "prompt": "Je ne trouve pas la clé de la voiture. Tu l'as vue quelque part ?", "c": ["Oui, tu l'as garée devant la maison.", "Oui, tu l'as posée sur la table.", "Oui, tu peux en racheter une au marché.", "Oui, tu peux sûrement la prendre."], "a": 1, "k": "Oui, tu l'as posée sur la table.", "transcript": "– Je ne trouve pas la clé de la voiture. Tu l'as vue quelque part ?"}, {"type": "extrait", "q": "Question 5. Choisissez la bonne réponse.", "prompt": "Pouvez-vous garder ma valise, s'il vous plaît ?", "c": ["Bien sûr, sans problème.", "D'accord, j'y vais.", "Désolé, il est absent.", "Merci, ça va très bien."], "a": 0, "k": "Bien sûr, sans problème.", "transcript": "– Pouvez-vous garder ma valise, s'il vous plaît ?"}, {"type": "extrait", "q": "Question 6. Choisissez la bonne réponse.", "prompt": "Pardon madame, vous pouvez m'aider ? Je cherche des vêtements de sport.", "c": ["C'est au deuxième étage.", "Ils existent dans ces deux couleurs.", "Les soldes commencent demain.", "Vous pouvez payer par chèque."], "a": 0, "k": "C'est au deuxième étage.", "transcript": "– Pardon madame, vous pouvez m'aider ? Je cherche des vêtements de sport."}, {"type": "extrait", "q": "Question 7. Choisissez la bonne réponse.", "prompt": "Cette année, c'est décidé. Nous allons faire du ski pendant les vacances de Noël. Tu nous accompagnes ?", "c": ["Avec plaisir. Je suis libre demain.", "Bonne idée, j'adore la neige.", "D'accord, je pars tout seul.", "Super, je connais bien cette ville."], "a": 1, "k": "Bonne idée, j'adore la neige.", "transcript": "– Cette année, c'est décidé. Nous allons faire du ski pendant les vacances de Noël. Tu nous accompagnes ?"}, {"type": "extrait", "q": "Question 8. Choisissez la bonne réponse.", "prompt": "Vous avez reçu la commande de madame Cordier ?", "c": ["Oui, bientôt.", "Oui, ce matin.", "Oui, d'accord.", "Oui, pourquoi pas."], "a": 1, "k": "Oui, ce matin.", "transcript": "– Vous avez reçu la commande de madame Cordier ?"}, {"type": "extrait", "q": "Question 9. Choisissez la bonne réponse.", "prompt": "Maxime propose de faire du camping dans le sud de la France pour les prochaines vacances. Qu'est-ce que tu en penses ?", "c": ["Bien sûr, je réserve l'hôtel.", "D'accord, on reste à la maison.", "Non, l'appartement est trop cher.", "Pourquoi pas, les enfants vont adorer."], "a": 3, "k": "Pourquoi pas, les enfants vont adorer.", "transcript": "– Maxime propose de faire du camping dans le sud de la France pour les prochaines vacances. Qu'est-ce que tu en penses ?"}, {"type": "extrait", "q": "Question 10. Choisissez la bonne réponse.", "prompt": "Salut Yann, je fais une fête samedi, tu viens ? — Ouais, super, avec plaisir. Comment on fait pour aller chez toi ?", "c": ["Tu apportes quelque chose à boire.", "Tu arrives vers 20h30.", "Tu descends au dernier arrêt du bus 78.", "Tu peux venir avec ta sœur si tu veux."], "a": 2, "k": "Tu descends au dernier arrêt du bus 78.", "transcript": "– Salut Yann, je fais une fête samedi, tu viens ? — Ouais, super, avec plaisir. Comment on fait pour aller chez toi ?"}, {"type": "document", "q": "Question 11. De quoi discutent les deux femmes ?", "c": ["D'un prochain déménagement.", "De sport pour le week-end.", "De vacances en famille.", "D'un problème de santé."], "a": 2, "k": "réserver un appartement à la montagne pour 15 jours", "transcript": "– Ça ne va pas ? Tu es malade ?\n– Non, mais mon mari vient de réserver un appartement à la montagne pour 15 jours. Au programme, randonnée, vélo et escalade.\n– C'est génial !\n– C'est affreux, tu veux dire. Moi, je rêvais de deux semaines de repos et de lecture."}, {"type": "document", "q": "Question 12. De quoi parlent les deux personnes ?", "c": ["De la météo du jour.", "D'une visite familiale.", "De la préparation d'un repas.", "D'un plan de voyage."], "a": 1, "k": "ma petite fille est venue", "transcript": "– Allô ? Bonsoir Gillette, c'est Maryse. Alors, comment ça va ?\n– Ça va. Aujourd'hui, ma petite fille est venue. J'étais très contente. Elle est tellement dynamique, ça me rajeunit toujours de la voir.\n– Elle a déjeuné avec toi ?\n– Oui, j'avais préparé un poulet avec des petits légumes. Après, on a regardé des photos ensemble et on s'est promenés un peu, il faisait beau.\n– Ça avait l'air super. Et si on déjeunait aussi ensemble cette semaine pour parler du bon vieux temps ?"}, {"type": "document", "q": "Question 13. Qu'est-ce que Perrine va faire ce soir ?", "c": ["Dîner avec un ami.", "Regarder un film.", "Rentrer chez elle.", "Travailler tard."], "a": 0, "k": "j'ai rendez-vous au restaurant avec Paul", "transcript": "– Perrine, tu viens au cinéma avec nous ?\n– Quand ? Aujourd'hui ?\n– Ce soir, la séance est à 20 heures. Ils passent une comédie romantique.\n– Non, j'ai une réunion au bureau jusqu'à 18 heures. Et après, j'ai rendez-vous au restaurant avec Paul."}, {"type": "document", "q": "Question 14. Pourquoi Pierre refuse-t-il ce poste ?", "c": ["La mission est sans intérêt.", "La société est loin de chez lui.", "Le contrat est temporaire.", "Le salaire est insuffisant."], "a": 0, "k": "le poste ne m'attire pas", "transcript": "– Alors Pierre, qu'est-ce que tu as décidé ? Tu vas accepter cette offre d'emploi ?\n– Ah non, j'ai déjà refusé. Honnêtement, je préfère continuer à chercher.\n– Je pense que tu fais une bêtise. C'est très bien payé et puis les horaires te conviennent, non ?\n– Oui, mais ce n'est pas une raison pour accepter le poste. Ce qui est important pour moi, c'est le travail lui-même et de ce point de vue, le poste ne m'attire pas.\n– J'espère que tu ne vas pas regretter ta décision."}, {"type": "document", "q": "Question 15. Que décident de faire les deux amis pour leurs vacances ?", "c": ["Partir dans le sud de la France pour pêcher.", "Partir dans un autre pays ensemble.", "Rester à la maison à cause de la chaleur.", "Aller à Marseille pour rejoindre des amis."], "a": 1, "k": "venais avec moi en Irlande", "transcript": "– Où partons-nous en vacances cet été ?\n– Sûrement dans le sud. J'aime la pêche et mes amis de Marseille m'ont proposé leur appartement.\n– Moi, je supporte très mal les fortes chaleurs, ça me rend malade.\n– Dommage. Tu aurais pu venir avec moi. Il y a de la place chez mes amis.\n– Et si c'était toi qui venais avec moi en Irlande ? C'est beau l'Irlande là-bas. Si on peut pêcher.\n– Oui, tiens, c'est une idée. Je ne connais pas du tout ce pays. Pourquoi pas ?"}, {"type": "document", "q": "Question 16. Qu'explique cet homme ?", "c": ["La crise de l'économie.", "L'accroissement de la population.", "Les nouvelles règles d'hygiène.", "Les récentes découvertes médicales."], "a": 1, "k": "une augmentation de la population", "transcript": "– Pourquoi en si peu de temps sommes-nous devenus un milliard sur Terre ?\n– Parce que la mortalité a diminué, notamment la mortalité des enfants grâce au progrès de l'hygiène, de la médecine et au progrès économique. Résultat, les décès sont devenus moins nombreux et un excédent des naissances sur les décès a entraîné une augmentation de la population."}, {"type": "document", "q": "Question 17. Qu'espère cet étudiant ?", "c": ["Obtenir une bourse d'études pour l'université.", "Se réunir avec sa famille au Canada.", "Régler un problème administratif à l'université.", "Voyager au Niger pour rejoindre sa femme."], "a": 1, "k": "souhaite que sa femme vienne vivre avec lui", "transcript": "– Est-ce que vous pouvez nous rappeler en quelques mots la situation ?\n– Oui, c'est un fait divers. Heureusement, très rare. Un étudiant de l'université d'Ottawa, originaire du Niger, souhaite que sa femme vienne vivre avec lui et il se bat avec l'administration pour qu'elle puisse entrer dans le pays. Mais où vit sa femme ? Au Niger ? Le couple est actuellement séparé en raison d'erreurs administratives."}, {"type": "document", "q": "Question 18. Qu'explique la journaliste ?", "c": ["Les causes de la dépression saisonnière.", "Pourquoi le sommeil est de bonne qualité.", "Comment la saison influence sur la santé.", "En hiver, le corps humain est résistant."], "a": 0, "k": "font la fameuse dépression saisonnière", "transcript": "– Février est l'un des mois les plus maussades au niveau de la météo. C'est souvent le mois le plus gris et le plus froid de l'année. Du coup, les gens ont tendance, d'une part, à surchauffer leur chambre et aussi à moins l'aérer. Or, tous les spécialistes le disent, une température intérieure au-dessus de 19 degrés et le manque d'air frais sont néfastes à la qualité du sommeil. Et cette fatigue au mois de février serait uniquement due au problème de sommeil, non ?\n– Il se trouve qu'en février, enfin, en hiver, l'organisme est plus vulnérable, d'autant qu'il est mis à rude épreuve, notamment avec tous les virus qui circulent. Et puis il y a aussi le manque de lumière, un peu comme en octobre, novembre où de nombreuses personnes font la fameuse dépression saisonnière."}, {"type": "document", "q": "Question 19. Quelle était la motivation de cet homme pour devenir pêcheur ?", "c": ["La passion pour la mer.", "La nécessité de subvenir à ses besoins.", "Le désir de suivre les traces d'un proche.", "L'intérêt pour l'économie locale."], "a": 1, "k": "Il fallait bien que je gagne ma vie", "transcript": "– Depuis les années 80, j'ai commencé à exercer le métier de marin.\n– À 15 ans et demi, on m'a dit que c'était la seule option.\n– Non, non. J'ai commencé dans les années 81 à la pêche et puis on m'a rapporté qu'il y avait de l'emploi ici.\n– C'était le hasard. Vous êtes ici.\n– Oui, je suis d'ici, ça aide. Mais bon, je ne suis vraiment pas attiré par la mer.\n– C'est vrai. Et pourtant vous avez franchi le pas pour devenir pêcheur.\n– Je n'avais pas le choix. Il fallait bien que je gagne ma vie et j'avais arrêté mes études. À part la pêche, il n'y a pas grand-chose que nous voulions. L'économie, c'est pratiquement que la pêche."}, {"type": "document", "q": "Question 20. Qu'apprend-on sur Corinne ?", "c": ["Elle est en congé.", "Elle est tombée malade.", "Elle travaille la nuit.", "Elle voyage souvent."], "a": 3, "k": "Elle repart pour une conférence au Canada", "transcript": "– Stéphane, est-ce que Corinne est rentrée de sa mission au Japon ?\n– Oui, elle était au bureau hier et aujourd'hui, mais elle est très fatiguée.\n– La pauvre, sa mission a été plus difficile que d'habitude.\n– Oui, elle a eu des réunions dans plusieurs villes. Elle n'a pas arrêté de circuler.\n– C'est sympa. Elle a pu découvrir plein de lieux différents ?\n– Pas du tout. Elle terminait très tard le soir.\n– Elle devrait prendre des vacances.\n– Impossible. Elle repart pour une conférence au Canada la semaine prochaine."}, {"type": "document", "q": "Question 21. Que dit Théo à propos de ses vacances ?", "c": ["Il était déçu de la durée de ses vacances.", "Il est parti en Espagne avec ses amis.", "Il a séjourné dans un camping en bord de mer.", "Il n'a pas pu partir en vacances d'été."], "a": 2, "k": "on avait réservé dans un camping pas cher près de la plage", "transcript": "– Alors Théo, comment se sont passées tes vacances ?\n– Super. Une semaine, c'était un peu court, mais je suis content.\n– Tu es parti avec tes amis ?\n– Non, au dernier moment, ils ont préféré aller en Espagne. J'ai donc proposé à mon cousin de m'accompagner et il a accepté.\n– Vous avez dormi à l'hôtel ?\n– Non, on avait réservé dans un camping pas cher près de la plage. On a fait de la planche à voile tous les jours."}, {"type": "document", "q": "Question 22. Que propose cette émission ?", "c": ["Un point de vue sur la situation mondiale aujourd'hui.", "Une analyse de l'actualité économique dans le monde.", "Une critique des conséquences de la mondialisation.", "Une réflexion sur les relations politiques mondiales."], "a": 0, "k": "regarder notre monde avec un optimisme réaliste", "transcript": "– Bonjour. Ravi de vous retrouver. La pauvreté dans le monde recule, la démocratie avance. La couche d'ozone se reconstitue. Ou encore, le monde n'a jamais connu aussi peu de violence. Ce matin, nous recevons un spécialiste en psychologie positive, Jacques Lecomte. Il nous invite à regarder notre monde avec un optimisme réaliste, loin des discours catastrophistes des prophètes de malheur."}, {"type": "document", "q": "Question 23. Que conseille cette intervenante aux parents ?", "c": ["D'attribuer à la lecture le statut de loisir.", "De favoriser la lecture en autonomie.", "De limiter la lecture d'histoires illustrées.", "De sélectionner des lectures classiques."], "a": 0, "k": "la lecture est avant tout un plaisir", "transcript": "– Je crois que les difficultés en matière de lecture ont des causes à la fois individuelles et sociales. Les parents, par exemple, parce qu'ils sont angoissés par l'avenir de leurs enfants, leur présentent souvent la lecture comme une obligation. Mais la lecture est avant tout un plaisir, un livre est une aventure. Et puis, les parents refusent souvent à leurs enfants des lectures qu'ils considèrent comme mineures, comme les bandes dessinées. C'est une erreur, car lire une bande dessinée, c'est lire, et cela permet souvent de découvrir d'autres formes de littérature."}, {"type": "document", "q": "Question 24. Quel problème évoquent les interlocuteurs à propos des enfants ?", "c": ["Ils abusent de repas très caloriques.", "Ils consomment peu de produits frais.", "Ils ignorent l'origine de leurs plats.", "Ils refusent de manger des légumes."], "a": 2, "k": "savoir d'où ils viennent et comment ils poussent", "transcript": "– 87 % des gamins ne savent pas à quoi ressemble une betterave. Un tiers n'ont jamais vu de poireau et un cinquième ne reconnaît pas un abricot en ce qui concerne les pattes. 72 % ne savent pas ce qu'il y a dedans. Ça nous parle de nous aujourd'hui.\n– Oui, oui, tout à fait. C'est évidemment un des grands problèmes. Il faut redonner des repères sur les aliments, savoir d'où ils viennent et comment ils poussent. À quoi ça sert ? Pour cela, il faut emmener les enfants sur les marchés, faire les courses. Il faut leur montrer quand on fait la cuisine, les ingrédients que l'on met. Donc il faut réapprendre la culture alimentaire qui fait partie de nos traditions en France."}, {"type": "document", "q": "Question 25. D'après Camille, quel est le point fort de l'immobilier à Québec ?", "c": ["La possibilité de visiter les logements en personne.", "La difficulté de trouver un logement rapidement.", "La nécessité de chercher un logement sur Internet.", "L'obligation de choisir un logement en fonction du quartier."], "a": 0, "k": "je conseille de chercher sur place", "transcript": "– Camille, à ton arrivée à Québec, dans quel type de logement résidais-tu ?\n– J'ai d'abord habité un appartement en colocation dans le quartier de Montcalm. Au bout de six mois à peine, j'ai emménagé à deux pas du centre-ville. C'est très simple de trouver un logement ici. Ça se fait en quelques jours.\n– Hum, comment as-tu trouvé ton premier appartement ?\n– Avant de quitter la France, sur un site internet regroupant les annonces de colocation. Mais je conseille de chercher sur place. Il y a tout ce qu'il faut pour trouver facilement. On peut découvrir le quartier, voir si les pièces sont spacieuses, lumineuses et surtout bien insonorisées. Ce n'était pas le cas de mon premier logement, malgré le nom de quartier."}, {"type": "document", "q": "Question 26. Qu'est-ce que ce médecin retire de l'exercice de sa profession ?", "c": ["La préférence pour les mathématiques et les sciences.", "Un choix de carrière dicté par l'influence de son grand-père.", "Un rapprochement avec les gens dans des moments difficiles.", "Des regrets constants concernant son métier de médecin."], "a": 2, "k": "un métier qui m'a rapproché beaucoup des gens", "transcript": "– Moi, je n'ai pas été quelqu'un qui avait une vocation médicale. C'est arrivé très tard. J'aimais mieux les séances, les mathématiques, des trucs comme ça. Je n'ai pas d'environnement direct. Je n'avais pas ce moment-là des médecins, avec mon grand-père qui était médecin. Et donc ça a été un choix presque au hasard, la médecine pour moi. Mais c'est vrai que c'est un métier qui m'a rapproché beaucoup des gens parce qu'on est très, très près des gens, surtout à l'urgence, dans la douleur, dans la mort, dans ces trucs-là. Et je dirais que ça m'a aidé moi-même à me rapprocher de moi-même, d'être toujours en contact avec des gens. C'est assez différent d'être en contact avec moi, des mathématiques ou des livres. Et oui, je pense que c'est un métier que j'ai jamais regretté. J'ai jamais regretté le choix, une seconde."}, {"type": "document", "q": "Question 27. Que conseille de faire le psychologue face à un recruteur ?", "c": ["Montrer de l'insolence pour se démarquer.", "Être impressionné et angoissé pendant l'entretien.", "Faire face sans manquer de politesse.", "Éviter de créer une atmosphère détendue."], "a": 2, "k": "sans être insolente ou désinvolte", "transcript": "– David Bernard, vous êtes psychologue au travail. Quels conseils donneriez-vous pour décrocher un emploi de rêve ?\n– Tout d'abord, n'oubliez pas que le recruteur a l'habitude de voir des candidats impressionnés au cours de l'entretien, angoissés de rester deux semaines de plus au chômage.\n– Mais alors, que proposez-vous en pratique ?\n– Cassez la routine du recruteur, soyez à l'aise, mais sans être insolente ou désinvolte, soyez simple, franc, décidé et montrez de l'intérêt. Vous contribuerez ainsi à l'installation d'une atmosphère courtoise et détendue."}, {"type": "document", "q": "Question 28. Quel est le but poursuivi par ce photographe ?", "c": ["Faire découvrir la Riviera à travers ses couleurs et sa lumière.", "Faire connaître l'histoire et la culture de la Côte d'Azur.", "Faire voyager le lecteur dans les paysages de la Riviera.", "Faire apprécier le soleil et la douceur de la Riviera."], "a": 0, "k": "en partant de la lumière au point du jour ou au couchant", "transcript": "– Monsieur Jacquemin, parlez-nous de votre dernier ouvrage.\n– Mon objectif avec ces photos était de mettre en scène les paysages et les villages de la Riviera en partant de la lumière au point du jour ou au couchant et de dérouler la palette qu'offrent les panoramas, les villes et les façades de la Côte d'Azur. Je suis toujours subjugué de voir les roches s'habiller de mauve et les murs de rose dans la douceur des soirs d'été, toujours tenté de faire halte devant les maisons aux enduits chauds de l'ancien comté de Nice. C'est à ce voyage que j'ai voulu inviter le lecteur.\n– Merci pour cette présentation alléchante. Grâce à vos photos, nous redécouvrons ce territoire aux 1000 facettes où le soleil joue le premier rôle."}, {"type": "document", "q": "Question 29. Quel est le point commun entre l'écrivain et le réalisateur ?", "c": ["Ils sont tous les deux professeurs de français.", "Ils ont tous les deux participé à la même émission de radio.", "Ils ont tous les deux écrit un livre sur l'école.", "Ils s'intéressent tous les deux au même sujet de la vie scolaire."], "a": 3, "k": "il traitait tous les thèmes que je voulais aborder", "transcript": "– Comment aimer votre film ?\n– Ça faisait longtemps que je voulais faire un film sur l'école, rester entre les murs et montrer par des moments d'école ce que vivent les élèves. Le jour de la sortie de mon précédent film En route, j'ai participé à une émission de radio à laquelle était également invité François Rufus, qui venait de sortir son livre. Et au cours de l'émission, je me suis aperçu qu'il traitait tous les thèmes que je voulais aborder de la manière dont je voulais le faire, sans sortir du collège, avec une démarche minimaliste et très descriptive. Je lui demandai s'il était intéressé par une adaptation. Il m'a donné son livre. Et trois jours après, je signai."}, {"type": "document", "q": "Question 30. Dans quel but la journaliste Christine Pellé est-elle invitée à cette émission ?", "c": ["Pour donner des conseils pratiques pour sortir de la routine.", "Pour présenter son dernier livre sur la psychologie.", "Pour raconter son expérience personnelle de changement de vie.", "Pour analyser les causes et les conséquences de la routine."], "a": 0, "k": "il suffit de peu de choses pour déprogrammer cette routine", "transcript": "– Bonjour.\n– Bonjour. Vous êtes journaliste à Psychologie Magazine et vous venez aujourd'hui nous parler de notre routine de vie.\n– On se lève à la même heure, on se rend dans les mêmes lieux. On accomplit les mêmes gestes, ce qui entraîne souvent ennui, fatigue, manque d'énergie et surtout fermeture au reste du monde. Mais parfois, il suffit de peu de choses pour déprogrammer cette routine.\n– Expliquez-nous, Christine.\n– Vraiment peu de choses. Il suffit simplement de faire un petit pas de côté, de sortir de notre perception habituelle pour expérimenter de nouvelles sensations, de nouvelles émotions."}, {"type": "document", "q": "Question 31. Quelle est l'idée avancée par la journaliste ?", "c": ["Aujourd'hui, être à la mode est une préoccupation superficielle.", "Il faut porter des vêtements adaptés à toutes circonstances.", "La société actuelle donne trop de place à l'apparence.", "La tenue vestimentaire influence l'état psychologique."], "a": 3, "k": "Votre caractère en sera peut-être même transformé", "transcript": "– Je n'ai rien à me mettre. Avez-vous déjà prononcé cette phrase devant votre armoire pleine de vêtements ? Quelles sont les basiques de votre garde-robe ? Avez-vous une tenue fétiche que vous enfilez lorsque vous voulez jouer la carte de la sécurité ? Que porter pour un premier rendez-vous ? Pour un entretien d'embauche ? Pour un week-end à la campagne ? Ces questions semblent futiles. La mode nous paraît parfois un luxe superflu et on oppose souvent l'être et le paraître. Mais faites l'expérience. Si vous êtes femme, quel que soit votre gabarit, enfilez une robe qui vous met en valeur, de jolies chaussures, une touche de rouge à lèvres, peut-être vous vous sentirez sans aucun doute plus sûre de vous. Votre caractère en sera peut-être même transformé."}, {"type": "document", "q": "Question 32. Pourquoi la journaliste reste-t-elle prudente ?", "c": ["La conférence qui a eu lieu est uniquement symbolique.", "La secrétaire d'État a fait part de son pessimisme.", "Les modes de consommation.", "Tous les points de l'accord ont déjà été traités sans succès."], "a": 0, "k": "sur le fond, rien n'est encore fait", "transcript": "– C'est au cours de cette réunion internationale qu'un premier accord a été trouvé in extremis entre les deux pays et de nouvelles négociations commencent aujourd'hui, mais sur le fond, rien n'est encore fait. En effet, il aura fallu deux jours de négociations marathon pour parvenir à accoucher de ce document conjoint. Cela marque donc le début d'un processus, mais il faut rester prudent car c'est maintenant que les choses démarrent réellement.\n– Alors amorce d'un processus de paix ou conférence symbolique ?\n– La secrétaire d'État a d'ailleurs précisé hier soir que l'échec n'était pas une option. En fait, on n'est pas encore rentré dans le vif du sujet. Beaucoup de points n'ont pas encore été abordés et n'ont pas été détaillés dans le document conjoint, car les deux parties n'ont pas réussi à se mettre d'accord sur la formulation."}, {"type": "document", "q": "Question 33. Sur quoi s'opposent François Legault et Simon Tremblay-Pépin ?", "c": ["Sur l'amplitude de l'effet de la dette sur la croissance.", "Sur l'utilisation des recettes fiscales pour régler la dette.", "Sur l'acquittement de la dette par la vente du patrimoine de l'État.", "Sur le montant de la dette contractée par la province québécoise."], "a": 1, "k": "investir 100 % des redevances tirées des ressources naturelles pour rembourser la dette", "transcript": "– Et Jean-Philippe, la Coalition pour l'Avenir du Québec veut aussi réduire la dette.\n– Ce que propose François Legault, c'est d'investir 100 % des redevances tirées des ressources naturelles pour rembourser la dette plus tôt. On pourrait ainsi récupérer environ 200 000 000 de dollars par année. Mais pour Simon Tremblay-Pépin, de l'Institut de recherche et d'informations socio-économiques, ce n'est pas du tout une bonne idée. Au lieu d'investir dans des services publics qui, évidemment, sont dynamiques et qui aident à favoriser la croissance de l'économie et donc à réduire la dette, on décide de retirer ces fonds du secteur économique. Donc ça semble être une très mauvaise idée de se lancer là-dedans."}, {"type": "document", "q": "Question 34. Pourquoi développe-t-on l'habillage sonore des voitures en France ?", "c": ["Pour réduire la pollution sonore des voitures.", "Pour améliorer le confort et le plaisir des conducteurs.", "Pour augmenter la sécurité et la performance des voitures.", "Pour respecter les réglementations européennes."], "a": 1, "k": "Transformer les bruits que produisent les voitures en sons utiles et agréables", "transcript": "– L'équipe d'Interception vous propose de découvrir le travail d'habillage sonore qui entre aujourd'hui dans la conception des véhicules automobiles, aussi bien ceux qui sont équipés d'un moteur à explosion que les autres. Transformer les bruits que produisent les voitures en sons utiles et agréables, c'est un métier, et la France est plutôt bien placée dans ce domaine, planchant sur la mise au point d'un environnement sonore à la carte d'un clic. Tout conducteur pourra bientôt choisir le bruit de son moteur ou de ses clignotants. Il en changera même au gré de ses humeurs."}, {"type": "document", "q": "Question 35. Quel risque peut avoir la neige pour les plantes ?", "c": ["De geler et de se briser.", "De fondre et de noyer les racines.", "De peser et de casser les branches.", "De brûler et de dessécher les feuilles."], "a": 2, "k": "éviter que le poids casse les branche n patient guérit grâce à un placebo, on va sous-entendre qu'il a eu tort de guérir. C'est-à-dire que oui, effectivement, il faut être un peu humble en médecine. On ne comprend pas tout ce qui se passe. Et par un moment, nous guérissons grâce à une injonction thérapeutique ou à autre chose que l'on ignore et qu'il faut étudier."}, {"type": "document", "q": "Question 38. Que cherche à faire cette entreprise ?", "c": ["Améliorer la présentation des produits.", "Augmenter le nombre de clients.", "Multiplier les points de vente.", "Maintenir des tarifs compétitifs."], "a": 3, "k": "produire des aliments à des coûts qui sont quand même abordables", "transcript": "– La qualité, vous savez, la qualité, surtout la très grande qualité, tout ça, ça a un prix. Si on veut trouver une place sur le marché, il faut donc, et c'est tout un exercice, arriver à produire des aliments à des coûts qui sont quand même abordables. Et c'est l'exercice qui occupe en ce moment Sophie Ban de Caroline. C'est une petite fabrique de pâtes et de sauces qui est installée à Sabre en Montérégie."}, {"type": "document", "q": "Question 39. Comment s'est révélée la vocation de cet écrivain ?", "c": ["Par un concours de nouvelles.", "Par un appel d'une éditrice.", "Par un voyage à l'étranger.", "Par un coup de foudre littéraire."], "a": 1, "k": "qui était éditrice chez Julliard, m'a un jour appelé", "transcript": "– C'est une dame que je ne connaissais pas du tout. Une des deux filles d'Irène Némirovsky, une dame qui est décédée maintenant et qui s'appelle Élisabeth Gille, qui était éditrice chez Julliard, m'a un jour appelé en me disant : « Voilà, ça fait des années que je vous entends à la télé. Ça fait des années que je me dis qu'en fait, vous êtes un écrivain qui ne le savait pas. » Et quand je suis arrivé dans son bureau, elle m'a expliqué qu'en fait, je n'avais rien à faire à la télé, que ce n'était pas mon métier.\n– Mais vous croyez au hasard de la vie ou des rencontres ?\n– Essentiellement à moi, <script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 17/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test17_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 17</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 17 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
