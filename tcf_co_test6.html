<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 6 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

": ["Attends, ça vient juste de commencer.", "C'est vrai, j'aime bien cette salle.", "D'accord, approchons-nous de l'écran.", "Non, les acteurs sont peu connus."], "a": 0, "k": "Attends, ça vient juste de commencer.", "transcript": "– Ce film est vraiment ennuyeux, on s'en va."}, {"type": "extrait", "q": "", "c": ["Est-ce que ça coûte cher ?", "Oui, on part mercredi.", "Oui, tu as vu son dernier film ?", "Oui, qu'est-ce qu'on va voir ?"], "a": 3, "k": "Oui, qu'est-ce qu'on va voir ?", "transcript": "– Allô Simon, ça te dirait d'aller au cinéma ? Les places sont à 4 € tout le week-end."}, {"type": "extrait", "q": "", "c": ["À tout de suite.", "C'est très rapide.", "Dans une demi-heure.", "Il est déjà tard."], "a": 2, "k": "Dans une demi-heure.", "transcript": "– À quelle heure est ton rendez-vous ?"}, {"type": "extrait", "q": "", "c": ["Pardon, j'ai déménagé.", "Pardon, j'ai fait une erreur.", "Pardon, j'ai perdu les clés.", "Pardon, je vais revenir demain."], "a": 1, "k": "Pardon, j'ai fait une erreur.", "transcript": "– Bonjour, c'est ici pour visiter l'appartement ? – Non monsieur, ce n'est pas ici."}, {"type": "extrait", "q": "", "c": ["C'est de la part de qui ?", "Elle a un numéro de téléphone.", "Je suis bien au 01 42 35 80 96 ?", "Vous voulez laisser un message ?"], "a": 0, "k": "C'est de la part de qui ?", "transcript": "– Allô ! Bonjour, est-ce que je peux parler à Céline s'il vous plaît ?"}, {"type": "extrait", "q": "", "c": ["Oui, c'est juste.", "Oui, elle va sortir.", "Oui, j'y serai.", "Oui, tu as raison."], "a": 2, "k": "Oui, j'y serai.", "transcript": "– Chérie, demain soir, je vais chez le médecin à 18h30. Tu peux passer au collège et chercher Salomé ?"}, {"type": "document", "q": "Question 11. Que vont faire ces amis le mercredi soir ?", "c": ["Dîner au restaurant.", "Faire des courses.", "Travailler tard.", "Voir une exposition."], "a": 3, "k": "d'accord pour l'exposition", "transcript": "Tu voudrais aller à l'exposition Matisse au musée d'Orsay demain soir ?\n– Quelle bonne idée ! Mais après le travail, je voulais aller en ville pour faire des courses.\n– Tu ne peux pas les faire jeudi ?\n– Mais si ! Alors d'accord pour l'exposition et après on dînera chez moi."}, {"type": "document", "q": "Question 12. Où Sophie trouve-t-elle le dossier ?", "c": ["Dans la poubelle.", "Aux archives.", "Dans le tiroir.", "Sur le bureau."], "a": 0, "k": "J'ai jeté tous les papiers qui traînaient", "transcript": "– Sophie, je ne trouve pas le dossier Sanofi. Je l'ai posé sur votre bureau.\n– Où sur mon bureau ?\n– Près de l'écran de votre ordinateur, sur la pile de papiers.\n– Ah zut ! J'ai jeté tous les papiers qui traînaient.\n– Attendez, je vais regarder. Tenez, il n'est pas perdu. La femme de ménage n'est pas encore passée."}, {"type": "document", "q": "Question 13. Quelle est la particularité de ce bus ?", "c": ["Il y a un service internet.", "Le placement est libre.", "On y propose des repas.", "Son personnel est bilingue."], "a": 0, "k": "connecter vos appareils sur notre réseau", "transcript": "Soyez les bienvenus dans notre bus à destination de Paris Bercy. Nous ferons une pause à midi pour vous permettre de vous restaurer. Je vous rappelle que vous pouvez connecter vos appareils sur notre réseau tout au long du trajet. Un agent passera parmi vous pour vérifier vos billets et votre numéro de siège."}, {"type": "document", "q": "Question 14. Quel est le sujet de cette interview ?", "c": ["La création d'un réseau de médiateurs.", "Le financement nécessaire aux médiateurs.", "Le partage d'expériences entre médiateurs.", "Le rôle des médiateurs en milieu scolaire."], "a": 3, "k": "au service de ses camarades dans son établissement", "transcript": "Votre association Génération Médiateurs réunit en cette fin de semaine près de 150 jeunes médiateurs à la Grande Arche de la Défense. Ils sont collégiens, lycéens ou étudiants, mais qu'est-ce qu'un médiateur ? À quoi sert-il dans un collège lycée ? C'est un jeune qui a suivi une formation particulière. Il est ensuite au service de ses camarades dans son établissement. Il peut intervenir si ses camarades le lui demandent, ou bien il propose lui-même son aide quand il y a des copains qui sont en conflit."}, {"type": "document", "q": "Question 15. Pourquoi Audrey accepte-t-elle de faire de l'escalade ?", "c": ["Elle aime être en altitude.", "Elle désire accompagner un ami.", "Elle fait confiance à son guide.", "Elle veut prendre des risques."], "a": 2, "k": "je serai là pour vous guider", "transcript": "Audrey, nous allons grimper samedi prochain sur le site du vert. Vous venez ?\n– Ah non, je n'ai jamais fait d'escalade et j'ai peur du vide.\n– Rassurez-vous, tout est sécurisé. Il n'y a vraiment aucun risque. En plus, je serai là pour vous guider.\n– D'accord. Mais si j'ai peur, vous me ferez descendre.\n– Entendu."}, {"type": "document", "q": "Question 16. Pourquoi Annie refuse-t-elle d'aller à la cantine ?", "c": ["Parce qu'elle déteste la nourriture.", "Parce qu'elle veut commencer un régime.", "Parce qu'elle veut manger plus équilibré.", "Parce qu'il n'y a pas assez de choix."], "a": 2, "k": "une alimentation plus variée", "transcript": "Salut Annie, tu manges à la cantine aujourd'hui ?\n– Non, je n'y vais plus.\n– Vraiment ? Mais pourquoi ?\n– En fait, on nous sert des frites chaque semaine. Non pas que ça me déplaise, au contraire, j'aime plutôt ça. Mais j'aimerais vraiment qu'on nous propose une alimentation plus variée. Je voudrais éviter de manger trop gras."}, {"type": "document", "q": "Question 17. Qu'explique l'intervenant à propos des femmes par rapport aux hommes ?", "c": ["Elles ont moins tendance à faire carrière.", "Elles osent moins discuter leur contrat.", "Elles préparent moins leurs entretiens.", "Elles travaillent moins à temps complet."], "a": 1, "k": "les femmes négocieraient moins leur salaire", "transcript": "On a beaucoup parlé des inégalités salariales entre les femmes et les hommes. Un élément d'explication à cette différence : les femmes négocieraient moins leur salaire. Dès l'entretien d'embauche, seules 34 % des femmes osent négocier leur salaire alors que 41 % des hommes n'hésitent pas à le faire."}, {"type": "document", "q": "Question 18. Qu'est-ce qu'on apprend sur cette femme ?", "c": ["Elle est originaire de Lille.", "Elle propose des visites guidées.", "Elle recherche un hôtel.", "Elle s'intéresse à la gastronomie."], "a": 3, "k": "La promenade gastronomie demain matin", "transcript": "Bonjour, j'aimerais découvrir la ville de Lille.\n– Vous pouvez participer à nos promenades guidées avec des thèmes comme nature, architecture.\n– Oui, très bonne idée. La promenade gastronomie demain matin, c'est possible ?\n– Oui, rendez-vous à 10h devant la mairie.\n– Parfait, c'est près de mon hôtel. À demain."}, {"type": "document", "q": "Question 19. Qu'est-ce que Julie a aimé ce week-end ?", "c": ["La décoration des pièces.", "Le confort du logement.", "Le voyage en voiture.", "Les activités sur place."], "a": 3, "k": "on a fait de grandes promenades", "transcript": "Alors Julie, ce week-end à la montagne, c'était comment ?\n– Ouf ! On est partis samedi matin très tôt, on est arrivés après 6h de route. Mais la maison était trop petite, le chauffage ne marchait pas bien et on a mal dormi. Mais les paysages étaient magnifiques, on a fait de grandes promenades avant de rentrer."}, {"type": "document", "q": "Question 20. De quoi traite le reportage de Yann Galic ?", "c": ["D'un projet de recrutement.", "D'une campagne d'action sociale.", "D'une formation professionnelle.", "D'une opération publicitaire."], "a": 1, "k": "Il offre des soins gratuits aux femmes isolées", "transcript": "Le Grand Angle nous emmène ce matin à bord d'un bus transformé en salon de beauté. Il sillonne actuellement les communes rurales et les quartiers défavorisés. Il offre des soins gratuits aux femmes isolées ou en situation de précarité. Femme de ménage et mère de cinq enfants, Brigitte n'est pas une habituée des salons de beauté, faute de temps et de moyens."}, {"type": "document", "q": "Question 21. Pourquoi y a-t-il un retard de livraison ?", "c": ["La circulation routière est coupée.", "La commande s'est perdue.", "Le transporteur est en grève.", "Les marchandises ont été volées."], "a": 0, "k": "la neige a interrompu le trafic", "transcript": "– Allô, bonjour, je suis madame Leroi. J'ai passé une commande de vêtements par téléphone il y a 10 jours avec une livraison à domicile et pourtant rien n'est arrivé.\n– Donnez-moi votre numéro client s'il vous plaît, je vais vérifier. En effet, la livraison n'a pas été faite, la neige a interrompu le trafic. Le transporteur ne pourra vous livrer que demain."}, {"type": "document", "q": "Question 22. Quel objectif Sylvie poursuit-elle en enseignant le français langue étrangère ?", "c": ["La diffusion d'une langue qui exprime les nuances des sentiments.", "La multiplication des actions pour la défense des droits de l'homme.", "La promotion d'un moyen d'échanges entre les différentes nationalités.", "La reconnaissance d'un patrimoine culturel unique par sa richesse."], "a": 2, "k": "une passerelle entre les peuples et les cultures", "transcript": "Sylvie, qu'est-ce qui vous plaît plus particulièrement dans votre travail ?\n– Un de mes centres d'intérêt en français langue étrangère concerne le développement d'une politique linguistique en faveur du français comme langue de communication, et pas seulement comme symbole d'une certaine culture. J'essaie de montrer que l'apprentissage des langues est une passerelle entre les peuples et les cultures."}, {"type": "document", "q": "Question 23. D'après cet intervenant, à quoi peut prétendre le meilleur chasseur d'une communauté ?", "c": ["À un poste de responsabilité du village.", "À un temps de loisir plus étendu.", "À une place spéciale dans l'histoire.", "À une plus grosse part de nourriture."], "a": 0, "k": "celui qui va devenir le chef du village", "transcript": "Le meilleur chasseur, c'est celui qui va devenir le chef du village. Celui qui rapporte le plus de têtes d'animaux est le plus fort physiquement, donc il s'impose symboliquement. Le lien entre la chasse et la guerre est direct : celui qui est un bon chasseur va être un bon guerrier."}, {"type": "document", "q": "Question 24. Selon l'intervenante, pourquoi accumulons-nous des objets ?", "c": ["Pour afficher notre niveau de vie.", "Pour affirmer notre personnalité.", "Pour améliorer notre quotidien.", "Pour imiter notre entourage."], "a": 1, "k": "cela nous permet de nous construire une identité", "transcript": "Pourquoi accumulons-nous des objets ? L'objet nous signale, l'objet c'est un peu nous. Je suis ce que j'ai, je suis ce que je porte, je suis ce que je possède. Via le regard d'autrui sur notre objet, cela nous permet de nous construire une identité, qui on est, notre intérêt."}, {"type": "document", "q": "Question 25. Que propose l'association présentée ?", "c": ["Elle construit des maisons pour les personnes âgées.", "Elle organise des évènements rassemblant les générations.", "Elle permet à des jeunes d'habiter chez des personnes âgées.", "Elle valorise les professions d'assistance aux personnes âgées."], "a": 2, "k": "favorise la cohabitation entre personnes âgées et jeunes", "transcript": "D'un côté, certaines personnes âgées ont de la place chez elles et besoin d'aide dans leur quotidien. D'un autre côté, certains jeunes ont du temps libre et cherchent à se loger. L'association favorise la cohabitation entre personnes âgées et jeunes défavorisés."}, {"type": "document", "q": "Question 26. Sur quoi portent les réflexions de la personne interviewée ?", "c": ["L'entretien des liens d'amitié à distance.", "La comparaison de moyens de mobilité.", "La sociabilité à l'ère du numérique.", "Les échanges dans les transports."], "a": 2, "k": "un effet certain sur une redéfinition de la relation des personnes à autrui", "transcript": "Ces nouvelles technologies, la présence d'Inte s que l'argent nous accompagne toute notre vie. Construire un budget, ça s'apprend, mais trop souvent le sujet est considéré tabou par les adultes. Dans la sphère de l'école, aucune séance de travail n'est dédiée à cette question."}, {"type": "document", "q": "Question 30. Quel est le rôle du sourire d'après ce docteur ?", "c": ["Il aide à lutter efficacement contre la tristesse.", "Il est indispensable pour l'activité de notre cerveau.", "Il montre les progrès dans l'apprentissage des émotions.", "Il permet d'entrer en relation avec les autres."], "a": 3, "k": "il participe à une relation sociale", "transcript": "C'est un atout extraordinaire qui produit une grande confiance qui attire le regard des autres. En plus, il participe à une relation sociale. Un sourire heureux nous rend heureux, un sourire triste nous attriste, et toutes ces expressions de visage pénètrent notre inconscient."}, {"type": "document", "q": "Question 31. Comment s'y prend l'étudiant pour réviser l'anglais ?", "c": ["De l'activité économique.", "De la gastronomie locale.", "De pistes cyclables.", "De sorties originales."], "a": 3, "k": "on parle moitié en anglais, moitié en français", "transcript": "Pour l'oral, pas de livre, pas de cassette. Le garçon qui a la chambre à côté de la mienne est anglais. Alors on s'invite pour le café deux soirs par semaine et on parle moitié en anglais, moitié en français."}, {"type": "document", "q": "Question 32. Que permet le tourisme selon cet intervenant ?", "c": ["De côtoyer des cultures et coutumes différentes.", "De mettre le monde à la portée de tout budget.", "De partager une aventure avec les siens.", "De participer à l'essor économique d'un endroit."], "a": 0, "k": "découverte d'autres cultures", "transcript": "Dans cette idée de voyage, il y a la notion d'exploration, de découverte d'autres cultures, de découverte d'autres normes, et finalement aussi d'émancipation par rapport aux normes qui sont celles de notre quotidien."}, {"type": "document", "q": "Question 33. Dans ce reportage, qu'apprend-on sur les seniors ?", "c": ["Ils consomment plus que la jeune génération.", "Ils dépensent beaucoup pour la santé.", "Ils profitent peu des effets de la croissance.", "Ils sont à l'origine de créations d'emplois."], "a": 3, "k": "un formidable gisement de croissance et d'emploi", "transcript": "Les plus de 60 ans sont près d'un milliard sur la planète. Un marché juteux pour les entreprises et un formidable gisement de croissance et d'emploi. On considère qu'il faut 220000 emplois de plus d'ici 2020 dans le secteur de l'aide à domicile."}, {"type": "document", "q": "Question 34. Selon l'intervenant, pourquoi l'aquaculture pose-t-elle problème ?", "c": ["L'alimentation fournie aux élevages est de mauvaise qualité.", "L'existence d'industries piscicoles nuit à la variété des espèces.", "La filière aquacole fragilise l'équilibre alimentaire mondial.", "Les pêcheurs pillent les fonds marins pour soutenir la concurrence."], "a": 2, "k": "ne fait qu'aggraver la situation dans les autres pays", "transcript": "La consommation de poissons d'élevage dans les pays riches ne fait qu'aggraver la situation dans les autres pays puisqu'il faut avoir recours aux réserves de poissons des pays en développement pour produire les ressources qu'on consacre à l'élevage industriel."}, {"type": "document", "q": "Question 35. Qu'explique la personne interviewée ?", "c": ["Établir des priorités s'avère être très difficile.", "Grâce au numérique les gains de temps sont importants.", "Il n'y a pas de limite à la quantité d'informations traitées.", "La communication en ligne est addictive."], "a": 0, "k": "on perd le sens de la priorité", "transcript": "Si vous voulez vraiment voir quelles sont vos priorités dans une journée, ce qui est vraiment important se compte sur les doigts d'une main. Le problème, c'est que le flux d'information aujourd'hui est tel qu'on est submergé d'informations parmi lesquelles on perd le sens de la priorité."}, {"type": "document", "q": "Question 36. Dans quel but utilisent-elles les nouveaux médias ?", "c": ["Pour faire connaître leurs services.", "Pour rechercher des collaborateurs.", "Pour s'informer sur la concurrence.", "Pour vendre leurs produits en ligne."], "a": 1, "k": "elles s'en servent de plus en plus pour recruter", "transcript": "Recruter grâce aux réseaux sociaux, ce n'est plus une tendance émergente mais bien un mouvement de fond. En 4 ans, la part des entreprises qui utilisent les médias sociaux a plus que doublé, et elles s'en servent de plus en plus pour recruter."}, {"type": "document", "q": "Question 37. Selon le chroniqueur, comment les médias utilisent-ils les faits divers ?", "c": ["Comme un prétexte pour éviter de traiter les questions significatives.", "Comme une occasion de commenter ce qui ne va pas dans notre société.", "Comme un moyen de sensibiliser le public aux problèmes des individus.", "Comme une façon de distraire les individus de leurs petits soucis quotidiens."], "a": 0, "k": "les médias contournent gaillardement les problèmes majeurs collectifs", "transcript": "À leur donner tant d'importance sans les commenter, les médias contournent gaillardement les problèmes majeurs collectifs. Ces catastrophes si diverses sont mises en avant pour faire diversion, pour détourner de ce qui est plus général et plus important."}, {"type": "document", "q": "Question 38. Quel jugement cette personne porte-t-elle sur les lieux culturels ?", "c": ["Elle déplore le manque de structures pour accueillir et réunir les jeunes.", "Elle désapprouve la disparition d'endroits consacrés aux pratiques culturelles.", "Elle estime insuffisantes les tentatives des cinémas de mélanger les publics.", "Elle regrette le désintérêt des publics pour les espaces et les échanges culturels."], "a": 0, "k": "je regrette qu'il n'y ait pas plus de lieux", "transcript": "Je regrette qu'il n'y ait pas plus de lieux qui permettent aux jeunes de se retrouver sur des terrains festifs. Ça manque, même dans les multiplexes, on voit que selon les films, les publics ne sont pas les mêmes et ont des pratiques séparées."}, {"type": "document", "q": "Question 39. Que faisait cet homme quand il était enfant ?", "c": ["Il concevait des histoires originales.", "Il participait au journal de l'école.", "Il récupérait des albums d'occasion.", "Il s'amusait à illustrer ses cours."], "a": 0, "k": "c'est d'en fabriquer moi-même", "transcript": "Le meilleur moyen d'augmenter ma collection de bandes dessinées, c'est d'en fabriquer moi-même. Je prenais des papiers de cahier scolaire, je les agrafais, je faisais une couverture, et j'avais un volume de plus dans ma collection sans avoir dépensé un centime."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 6/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test34_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 6</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 6 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}

      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 6</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
