<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 25 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

lent français ?"}, {"type": "extrait", "q": "Question 9. Choisissez la bonne réponse.", "c": ["Début juin.", "Depuis hier.", "Jusqu'à minuit.", "Pendant 10 jours."], "a": 0, "k": "festival de jazz", "transcript": "– Quand commence le festival de jazz de Montréal ?"}, {"q": "Question 10. Que fera Pierre la semaine prochaine ?", "c": ["Il aura une visite de sa famille.", "Il fera une compétition.", "Il pourra travailler au calme.", "Il sera en vacances."], "a": 3, "k": "maison de campagne", "transcript": "Amie : Pierre, tu travailles la semaine prochaine ?\nPierre : Non, on descend avec les enfants dans notre maison de campagne dans le sud.\nAmie : Tu as de la chance de te reposer un peu.\nPierre : Oui, je vais enfin pouvoir jouer au tennis.", "type": "document"}, {"q": "Question 11. Pourquoi l'homme va-t-il au guichet de la poste ?", "c": ["Pour un achat.", "Pour un envoi.", "Pour un enregistrement.", "Pour une réclamation."], "a": 2, "k": "remplir un formulaire", "transcript": "Femme : Bonjour monsieur.\nHomme : Bonjour. Je déménage bientôt et je voudrais savoir comment faire pour continuer à recevoir mon courrier.\nFemme : C'est simple. Vous devez remplir un formulaire en indiquant votre nouvelle adresse.\nHomme : Hmm, et ensuite ?\nFemme : Ensuite, nous nous occupons de l'envoi quotidien de votre courrier.", "type": "document"}, {"q": "Question 12. Que veut cet étudiant ?", "c": ["Avoir une aide financière.", "Obtenir un logement.", "Participer à un échange.", "S'inscrire à un cours."], "a": 1, "k": "demande de chambre", "transcript": "Étudiant : Bonjour. Je suis étudiant en commerce international à l'Université de Laval et je voudrais déposer une demande de chambre sur le campus pour le semestre prochain.\nFemme : Avez-vous tous les documents indiqués dans le dossier ?\nÉtudiant : Je crois. Voici mon passeport, mon attestation de bourse...\nFemme : Je ne vois pas la copie de votre carte d'étudiant. Il nous la faut absolument pour enregistrer votre demande.\nÉtudiant : D'accord. Je repasserai cet après-midi.", "type": "document"}, {"q": "Question 13. Que souhaite cette étudiante ?", "c": ["S'entretenir avec un enseignant.", "Assister à un colloque.", "S'inscrire à l'université.", "Suivre un stage."], "a": 0, "k": "rencontrer Monsieur Bernard", "transcript": "Femme : Bonjour, vous cherchez qui ?\nÉtudiante : Bonjour, je souhaiterais rencontrer Monsieur Bernard.\nFemme : Ah, je crois qu'il n'est pas à l'université aujourd'hui. Attendez, je regarde son planning de la semaine. C'est cela, il est absent cet après-midi, il assiste à un colloque. Je peux vous donner un rendez-vous pour demain, si vous voulez.\nÉtudiante : Demain, ce n'est pas possible. Je suis en stage toute la journée.\nFemme : Alors, lundi ?\nÉtudiante : Lundi, ouais. Ce serait bien. Dans la matinée, ce serait possible ?", "type": "document"}, {"q": "Question 14. Pour ces personnes, qui est Daniel ?", "c": ["Leur client.", "Leur collègue.", "Leur directeur.", "Leur professeur."], "a": 1, "k": "son secrétaire", "transcript": "Femme : Est-ce que tu veux participer au cadeau pour Daniel ?\nHomme : Un cadeau ? Pourquoi ?\nFemme : Il part à la retraite à la fin du mois.\nHomme : Il part déjà ? Le service semblera vide sans lui. Et comment va faire le chef sans son secrétaire ?\nFemme : Il essaie de trouver quelqu'un pour le remplacer, mais je crois qu'il va avoir du mal à trouver un aussi bon employé que lui.\nHomme : Si le remplaçant doit plaire au chef, aux collègues et aux clients, c'est sûr, ça va être dur.", "type": "document"}, {"q": "Question 15. Pourquoi l'un des interlocuteurs n'a-t-il pas apprécié l'exposition ?", "c": ["Il n'aime pas l'œuvre de ce peintre.", "La présentation des tableaux lui a déplu.", "Il a trouvé qu'il y avait trop de visiteurs.", "Il s'est ennuyé en faisant la queue."], "a": 2, "k": "cette foule", "transcript": "Homme : Alors, finalement, tu as vu l'exposition Matisse ?\nFemme : Oui. J'y suis allée pendant les vacances. Il y avait deux heures d'attente avant de pouvoir entrer. Heureusement que j'avais un bon livre.\nHomme : Ah oui, c'est souvent comme ça. Mais après, tu as vu ? La disposition des tableaux, l'organisation de l'espace, la lumière... C'est vraiment superbe.\nFemme : Oui, il y a un très bel éclairage qui met bien les toiles en valeur. Mais dans cette foule, il faut se battre pour les voir. Très sincèrement, j'aurais été plus tranquille chez moi à feuilleter une revue d'art contemporain.", "type": "document"}, {"q": "Question 16. Quel est le projet d'été de Julie ?", "c": ["Aller chez Anne pendant ses congés.", "Passer le mois de juillet à Montpellier.", "Prêter son appartement à son amie.", "Visiter des logements en centre-ville."], "a": 1, "k": "louer en juillet", "transcript": "Julie : Salut Anne ! C'est Julie. J'ai vu une annonce pour un appartement à Montpellier. C'est dans un immeuble moderne, au quatrième étage. Il est agréable et se trouve en plein centre-ville. Je veux le louer en juillet. Je serais ravie d'y passer les vacances avec toi. Tu y réfléchis ? Rappelle-moi !", "type": "document"}, {"q": "Question 17. Que regrette la femme ?", "c": ["Elle aurait aimé faire du tourisme.", "Elle aurait préféré se coucher tôt.", "Elle espérait avoir plus d'interlocuteurs.", "Elle s'attendait à un accueil plus favorable."], "a": 0, "k": "visiter un peu la ville", "transcript": "Homme : Alors, ton voyage en Allemagne ?\nFemme : Super ! J'ai pu rencontrer les responsables de programme et leur proposer nos produits. Dans l'ensemble, ils étaient assez intéressés. C'est plutôt encourageant pour la suite.\nHomme : Ah génial ! Tu as pu visiter un peu la ville ?\nFemme : En dehors du quartier de l'hôtel, pas vraiment. Je suis assez déçue. Mais je n'ai pas eu le temps. Je ne suis restée que trois jours et j'avais beaucoup de personnes à rencontrer. On mangeait tout le temps au restaurant de l'entreprise, les journées se terminaient tard...", "type": "document"}, {"q": "Question 18. Pourquoi la mère refuse-t-elle d'avoir un lave-vaisselle ?", "c": ["Parce qu'elle trouve ça trop bruyant.", "Parce que c'est inadapté à ses besoins.", "Parce que ça consomme trop d'eau.", "Parce que ses enfants font la vaisselle."], "a": 1, "k": "je suis seule", "transcript": "Fils : Maman, tu sais, avec Julie, on a décidé d'acheter un lave-vaisselle. Avec les deux enfants, il y a beaucoup de vaisselle. Mais j'ai peur que ça consomme beaucoup d'eau et que ça soit bruyant.\nMère : Détrompe-toi ! Il paraît qu'on utilise moins d'eau avec un lave-vaisselle qu'en lavant à la main. Et les nouveaux appareils sont vraiment silencieux.\nFils : Et toi ? Tu n'en veux pas un ?\nMère : Bah, je suis seule. Même avec un petit appareil, il faudrait que j'attende plusieurs jours avant qu'il soit rempli.", "type": "document"}, {"q": "Question 19. Quel est l'objectif de ce programme ?", "c": ["Encourager la mobilité des étudiants.", "Favoriser l'intégration des étrangers.", "Mettre en relation des francophones.", "Offrir des emplois aux mères de famille."], "a": 1, "k": "en francisation", "transcript": "Femme : Mon rôle à moi ? Je suis agente de recrutement. En fait, je suis chargée du projet de démarchage en francisation. Ce projet vise à contacter les immigrants qui sont installés ici au Québec depuis trois ans ou plus et qui ont besoin de connaître la langue pour faciliter leur vie quotidienne. Des programmes de cours de français existent déjà, mais nous, notre rôle, c'est de contacter les personnes isolées. Par exemple, les femmes qui, à cause des charges familiales, une grossesse, ou les enfants à garder, n'ont pas eu l'occasion d'apprendre le français dès leur arrivée.", "type": "document"}, {"q": "Question 20. Qu'est-ce qui caractérise ce service ?", "c": ["Il associe tourisme et shopping.", "Il est accessible la journée entière.", "Il regroupe les personnes âgées.", "Il s'adresse aux acheteurs à Noël."], "a": 3, "k": "achats de fin d'année", "transcript": "Journaliste : En période de grande bousculade dans les magasins pour les achats de fin d'année, si la perspective des difficultés de circulation ou de stationnement vous angoisse, voici une initiative qui va peut-être vous intéresser. La ville d'Angers a mis en place un service original pour que les particuliers puissent faire leurs courses de Noël sans subir le stress des transports en commun. De 14 heures à 19 heures, un chauffeur vient vous chercher à votre domicile et vous conduit en centre-ville à proximité des magasins dans lesquels vous souhaitez vous rendre. Ce service est gratuit à condition d'avoir de nombreux achats à effectuer.", "type": "document"}, {"q": "Question 21. Que se passe-t-il dans la région ?", "c": ["Des habitants ont voté pour un maire écologiste.", "Les écologistes refusent la construction d'une autoroute.", "Le ministère des Transports veut faire construire une autoroute.", "Un maire propose d'ouvrir une réserve naturelle."], "a": 1, "k": "affronter les écologistes", "transcript": "Femme : Tu as entendu les informations ? Il paraît que le maire veut faire construire une autoroute qui passe par la réserve naturelle de la région.\nHomme : Ah bon ? Et il va vraiment le faire ?\nFemme : Pour l'instant, il est obligé d'affronter les écologistes et même le ministère des transports.", "type": "document"}, {"q": "Question 22. Que critique ce journaliste dans la pratique actuelle de son métier ?", "c": ["La formation professionnelle des jeunes.", "L'absence de vérification des sources.", "Le recours systématique aux technologies.", "Les mensonges de certains collègues."], "a": 1, "k": "trier l'information", "transcript": "Animateur : Cette nouvelle façon de faire l'info immédiate par rapport à celle que vous faisiez à l'époque, dans Envoyé Spécial, vous fascine-t-elle ou vous fait-elle peur ?\nJournaliste : Elle m'inquiète. Elle m'inquiète parce que j'ai l'impression qu'on a tendance à oublier le rôle du journaliste. Nous, vous, nous sommes là pour trier l'information, pour savoir ce qui est vrai de ce qui ne l'est pas. Aujourd'hui avec l'avalanche d'informations que nous avons, en particulier sur les réseaux sociaux, on ne sait plus ce qui est vrai, ce qui n'est pas vrai. Les rumeurs les plus folles courent et ensuite, on met des jours et des jours à rattraper une information qui était fausse au départ. Je pense que les journalistes devraient être beaucoup plus présents dans cette course à l'information et faire attention, c'est-à-dire, faire leur métier.", "type": "document"}, {"q": "Question 23. Pourquoi la patiente consulte-t-elle le médecin ?", "c": ["Parce qu'elle a toujours très faim.", "Parce qu'elle est surmenée et stressée.", "Parce qu'elle souffre et qu'elle est fatiguée.", "Parce qu'elle veut perdre du poids."], "a": 2, "k": "mal au ventre", "transcript": "Patiente : Docteur, je ne sais pas ce que j'ai. J'ai très mal au ventre et il est tout gonflé. Je me sens épuisée. Pourtant, je rentre de vacances et jusqu'à présent je me sentais en forme.\nMédecin : Allongez-vous, je vais prendre votre tension. Bon, tout est normal. Je pense que c'est juste un problème de digestion, peut-être des repas trop lourds.\nPatiente : Alors ce n'est pas grave docteur ? Je peux manger tout ce que je veux ?\nMédecin : Il faut faire attention pendant quelques jours. Il va falloir maigrir un peu.", "type": "document"}, {"q": "Question 24. De quoi parle cette personne ?", "c": ["D'une collection de haute-couture.", "D'une exposition de peinture.", "D'une sélection de films.", "D'une tournée de chanteurs."], "a": 2, "k": "longs-métrages canadiens", "transcript": "Journaliste : Près de la moitié des meilleurs longs-métrages canadiens produits cette année proviennent du Québec. La liste a été établie par dix experts nationaux, parmi lesquels on peut citer la productrice Nicole Robert, seule personne représentant le Québec. Ce choix permet de mettre en vedette un groupe de nouveaux jeunes réalisateurs passionnants. Ils ont fait un travail audacieux. Des projections auront lieu dans de nombreuses salles à travers tout le pays, du 14 au 21 janvier, en présence de certains d'entre eux.", "type": "document"}, {"q": "Question 25. Pour quelle raison ce psychologue a-t-il interrompu ses consultations ?", "c": ["Il a répondu à une demande de ses patients.", "Il consacre son temps à son nouveau métier.", "Il s'est remis en question suite à un échec.", "Il veut éviter toute publicité personnelle."], "a": 3, "k": "souci éthique", "transcript": "Animateur : Psychologue, vous animez une émission télévisée. Comment faites-vous pour jongler entre vos consultations et vos émissions ?\nPsychologue : J'ai suspendu mes consultations privées dans un souci éthique. Je ne veux pas utiliser cette émission comme fonds de commerce, comme une manière de rabattre de la clientèle. Je suis un thérapeute ordinaire et je ne veux pas donner l'image de quelqu'un qui va plus vite que les autres.", "type": "document"}, {"q": "Question 26. Quelle relation le père entretenait-il avec sa fille ?", "c": ["Il avait du mal à accepter ses choix.", "Il essayait souvent de rivaliser avec elle.", "Il était attentif à ses centres d'intérêt.", "Il lui interdisait les activités intellectuelles."], "a": 0, "k": "Il s'énervait", "transcript": "Journaliste : Quel rapport aviez-vous avec votre père ?\nFemme : Je ne lui parlais plus de mes études. Il avait toujours la peur ou peut-être le désir que je n'y arrive pas. Il s'énervait de me voir à longueur de journée dans les livres. Je crois qu'il pensait que j'étais malheureuse.\nJournaliste : Comment se comportait-il avec vous face au monde extérieur ?\nFemme : Devant la famille, les clients, de la gêne. Presque de la honte que je ne gagne pas encore ma vie à 17 ans. Il craignait qu'on ne me prenne pour une paresseuse, et lui pour un crâneur. Il disait que j'apprenais bien, jamais que je travaillais bien.\nJournaliste : Quelle était pour lui la définition du mot travail ?\nFemme : Travailler, c'était seulement travailler de ses mains.", "type": "document"}, {"q": "Question 27. Quel est le point de vue de la libraire interrogée ?", "c": ["La création d'un livre pour enfant de qualité est un travail d'équipe.", "Les enfants préfèrent les livres illustrés en trois dimensions.", "Pour faire un bon livre, l'auteur doit réaliser lui-même les illustrations.", "Un livre pour enfant doit comporter le moins de texte possible."], "a": 0, "k": "équilibrer le texte et l'image", "transcript": "Journaliste : Souad Haddad, vous êtes libraire à Bordeaux. Parmi vos clients, vous en comptez de très jeunes. Dans un album pour enfants, l'image est-elle plus importante que le texte ?\nSouad Haddad : Il y a des albums sans texte qui sont très forts. La petite marionnette de Gabrielle Vincent en est un exemple. Les émotions sont véhiculées par un trait de crayon extrêmement évocateur, et la moindre ligne aurait été de trop. Le bon travail éditorial consiste précisément à équilibrer le texte et l'image, tout en laissant l'auteur et l'illustrateur s'exprimer au mieux de leurs compétences. Il y a de grands artistes dans la littérature de jeunesse, qu'ils soient auteurs, illustrateurs, ou les deux à la fois. Et il y a aussi des éditeurs passionnés. Ces rencontres donnent naissance à de petits chefs-d'œuvre.", "type": "document"}, {"q": "Question 28. De quoi est-il question ?", "c": ["Des besoins énergétiques des jeunes.", "Des bons réflexes pour les repas.", "Des comportements alimentaires.", "Des conseils de préparation culinaire."], "a": 2, "k": "mangent principalement par plaisir", "transcript": "Locuteur : Et si les enfants ne mangent pas assez de fruits et de légumes, c'est peut-être parce qu'ils n'aiment pas ça. En fait, les enfants mangent principalement par plaisir, et c'est une fonction que ne remplissent pas les fruits et les légumes. Certes, tout le monde est d'accord pour dire que c'est bon pour la santé, que c'est nécessaire, que c'est souvent contraignant à préparer, que cela ne remplit pas l'estomac, voire que ce n'est pas bon. Mais on trouve rarement la notion de plaisir associée aux fruits et aux légumes.", "type": "document"}, {"q": "Question 29. Qu'est-ce que Patrick était le seul à vouloir faire ?", "c": ["Jouer aux cartes.", "Aller se promener.", "Regarder la télévision.", "Visiter la région."], "a": 1, "k": "voulais encore marcher", "transcript": "Audrey : Alors Patrick, ce stage d'informatique à la Tulipe ?\nPatrick : Oh... ne m'en parle pas ! Horrible ! Je suis ravi d'être au boulot. D'abord, il a plu toute la semaine avec une tempête, tu aurais vu ça. On pensait pouvoir faire des balades en fin de journée. Il n'y a que moi qui voulais encore marcher malgré la pluie. Les autres se retrouvaient au bar pour jouer aux cartes ou refaire le monde. D'autres ont passé leur temps devant la télé.\nAudrey : Eh bien, bravo ! Pour prendre le bon air, c'est réussi !\nPatrick : Et je ne te décris pas le trou que c'était ! Rien à voir à des kilomètres à la ronde.", "type": "document"}, {"q": "Question 30. Que dénonce cette journaliste ?", "c": ["L'absence de formation sur l'élaboration d'un budget.", "Le désintérêt des jeunes pour les questions financières.", "Le manque de cours d'économie à l'université.", "Le peu d'informations des banques sur les crédits."], "a": 0, "k": "Construire un budget, ça s'apprend", "transcript": "Journaliste : Apprendre à gérer son argent n'est pas une priorité éducative, alors que l'argent nous accompagne toute notre vie. Construire un budget, ça s'apprend, mais trop souvent, le sujet est considéré tabou par les adultes, donc pas question d'en parler avec les enfants. Dans la sphère de l'école, aucune séance de travail n'est dédiée à cette question. Pourtant, chacun est concerné dans sa vie professionnelle et personnelle par les principales notions que sont les coûts, les crédits, les prêts, les taux d'intérêt, l'endettement. L'économie à l'échelle de l'individu, voilà un domaine qui touche chaque Français sans que jamais celui-ci y soit vraiment initié.", "type": "document"}, {"q": "Question 31. Quelle est l'hypothèse de la police sur les œuvres volées ?", "c": ["Elles ont été revendues.", "Elles seront abandonnées.", "Elles sont stockées à l'étranger.", "Elles vont être falsifiées."], "a": 0, "k": "revente était déjà conclue", "transcript": "Journaliste : C'est l'un des plus importants vols jamais réalisés dans une galerie de peinture en Europe. Il concerne quatre tableaux de certains des plus grands maîtres de la peinture européenne : Manet, Renoir, Sisley et Chagall. Le montant du préjudice s'élève à plusieurs centaines de millions d'euros. Ces tableaux sont tellement connus que les enquêteurs pensent que la revente était déjà conclue avant que les trafiquants ne passent à l'acte. Il faut faire vite car ces œuvres sont fragiles. Toutes les polices européennes coopèrent afin de retrouver les malfaiteurs et les tableaux dans les plus brefs délais.", "type": "document"}, {"q": "Question 32. Comment ce sociologue étudie-t-il la communication ?", "c": ["En écoutant les gens dans la sphère privée.", "En employant des technologies innovantes.", "En interrogeant des personnes cultivées.", "En observant divers types d'interlocuteurs."], "a": 3, "k": "les mouvements de libération de la femme, les syndicats, les médias, la politique", "transcript": "Journaliste : La communication est l'une des plus grandes révolutions de notre époque moderne. Elle a bouleversé nos existences et la société. Ainsi parle Dominique Wolton, sociologue très médiatique. Dominique Wolton a passé sa vie à valoriser une conception originale de la communication. Il s'est penché sur les mouvements de libération de la femme, les syndicats, les médias, la politique. Une question obsède Dominique Wolton : comment réussir à cohabiter avec l'autre ? Et un paradoxe l'étonne : malgré les techniques de communication de plus en plus performantes, les hommes, les sociétés ou les cultures ne se comprennent pas mieux qu'il y a 2000 ans.", "type": "document"}, {"q": "Question 33. Sur quel registre cette rétrospective joue-t-elle ?", "c": ["L'humour : elle met en scène des produits ménagers.", "La provocation : elle présente des tableaux scandaleux.", "La répétition : elle montre des toiles absolument identiques.", "Le paradoxe : elle expose une absence d'œuvres."], "a": 3, "k": "espace entièrement vide", "transcript": "Journaliste : Il faut passer devant plusieurs tableaux de la collection permanente avant d'arriver à un seuil métallique qui marque l'entrée dans un espace entièrement vide. Il s'agit de l'exposition Vide, une rétrospective présentée actuellement à Paris. 50 ans auparavant, un artiste lessivait pour la première fois une salle de musée. C'était en 1958. Yves Klein, célèbre notamment pour ses monochromes, avait alors présenté une salle de musée déserte. L'an dernier, le Vide en art contemporain a donc soufflé ses 50 bougies. L'occasion de faire le point sur cette histoire particulière. Le musée parisien consacre donc une rétrospective aux artistes qui, depuis un demi-siècle, ont proposé une autre approche du lieu d'exposition.", "type": "document"}, {"q": "Question 34. Quelle est la position de ce spécialiste par rapport à cette étude ?", "c": ["Il adhère au choix de la méthodologie retenue.", "Il approuve toutes les conclusions présentées.", "Il conteste le professionnalisme des sondeurs.", "Il met en doute l'interprétation des résultats."], "a": 3, "k": "est-ce que cette étude prouve", "transcript": "Journaliste : Une étude menée dans 10 pays montre que les Français ont mauvaise opinion de leur chef d'entreprise. Bernard Ramanantsoa, vous êtes directeur d'une école de commerce. Qu'en pensez-vous ?\nBernard Ramanantsoa : C'est vrai que les dirigeants français ressortent moins bien notés. Lorsqu'il s'agit d'organiser le travail de leur équipe ou d'accompagner leurs collaborateurs dans leur évolution professionnelle, ils sont 20 points en dessous des dirigeants internationaux. Maintenant, est-ce que cette étude prouve que les chefs d'entreprise sont moins bons ou est-ce que ça prouve que les gens qui ont répondu au questionnaire, quand ils sont Français, sont capables d'être plus critiques que leurs homologues européens ? Car encore une fois, il s'agit de perceptions qu'ont les salariés de leurs patrons.", "type": "document"}, {"q": "Question 35. Qu'apprend-on sur l'équipe des Canadiens de Montréal ?", "c": ["C'est un exemple de réussite par le sport.", "C'est un modèle rare de mixité culturelle.", "C'est un symbole fort de cette province.", "C'est une référence pour son style de jeu."], "a": 2, "k": "un tremplin extraordinaire", "transcript": "Journaliste : Fondés en 1909, les Canadiens de Montréal est la plus ancienne équipe de hockey toujours en activité. Les joueurs qui ont composé cette ancestrale franchise ont longtemps été en grande majorité d'origine canadienne, puis nord-américaine. Mais ce qui a marqué longtemps l'histoire de ce fameux club de hockey, c'est que ses héros sur glace ont été francophones. Dans un Québec dont les destinées étaient surtout menées par des compagnies anglaises et où l'étiolement de la communauté minoritaire semblait inexorable, le fait d'avoir des joueurs de hockey francophones héroïques parmi les meilleurs du monde a été pour les Québécois un tremplin extraordinaire et un encouragement à décrocher leur propre succès.", "type": "document"}, {"q": "Question 36. De quoi l'auteur s'est-elle inspirée pour choisir le titre de son livre ?", "c": ["De sa propre personnalité.", "D'un ouvrage scientifique.", "D'une action humanitaire.", "D'une période de sa vie."], "a": 0, "k": "je voulais me résumer moi-même", "transcript": "Auteure : Biographie de la faim est un livre que j'ai écrit il y a quelques années, c'était en 2005, ou en 2004. Ça répondait à une question assez énorme. Je voulais, de même que les physiciens essaient de résumer toute la loi de la nature à une seule loi, je voulais me résumer moi-même en un seul mot. Je me suis demandé quel était le mot le plus susceptible de me résumer. Après avoir quelque peu réfléchi, j'en suis arrivée à la conclusion que le mot « faim » était celui qui me résumait le mieux. Bien sûr, « faim » est à prendre à son sens le plus large, non seulement la faim des aliments, mais aussi la faim de tout : la faim des êtres humains, la faim des livres, la faim de la beauté, la faim de tout ce qui existe.", "type": "document"}, {"q": "Question 37. Quelle inquiétude exprime l'intervenante concernant les musées ?", "c": ["Que les œuvres d'art y soient dégradées.", "Que leur taux de fréquentation chute.", "Qu'ils deviennent des espaces désuets.", "Qu'ils soient détournés de leurs objectifs."], "a": 3, "k": "ne plus voir l'œuvre", "transcript": "Journaliste : Les musées sont de moins en moins ces lieux morts et poussiéreux qui habitent encore votre imaginaire. Décors vivants, animations son et lumière, chasses aux trésors, jeux de rôles, tout en exposant les collections, les musées innovent et proposent aussi de se divertir. Mais se divertir jusqu'où ? Jusqu'à ne plus voir l'œuvre et seulement son emballage ? C'est le risque que pointent certains dans cette course à l'attractivité.", "type": "document"}, {"q": "Question 38. Que cherche à faire cette entreprise ?", "c": ["Améliorer la présentation des produits.", "Augmenter le nombre de clients.", "Multiplier les points de vente.", "Maintenir des tarifs compétitifs."], "a": 3, "k": "coûts qui sont quand même abordables", "transcript": "Intervenante : La qualité, vous savez, la qualité, surtout la très grande qualité, tout ça, ça a un prix. Si on veut trouver une place sur le marché, il faut donc, et c'est tout un exercice, arriver à produire des aliments à des coûts qui sont quand même abordables. Et c'est l'exercice qui occupe en ce moment Sophie Barry de Caroline. C'est une petite fabrique de pâtes et de sauces qui est installée à Sabrevois en Montérégie.", "type": "document"}, {"q": "Question 39. Selon la journaliste, en Afrique, quelle tendance suit la littérature destinée à la jeunesse ?", "c": ["Elle tend à devenir une forme d'expression spécifique.", "Elle reste cantonnée aux frontières du continent africain.", "Elle réunit plusieurs générations au sein d'un même lectorat.", "Elle soutient la popularité du français auprès des enfants."], "a": 0, "k": "commençait à avoir une identité propre", "transcript": "Journaliste : Au mois de mars dernier, l'AUF (Agence Universitaire de la Francophonie) organisait à Dakar ses journées scientifiques autour du thème de « L'appropriation du français par les écrivains d'Afrique ». L'occasion de rencontrer un certain nombre de spécialistes et plus précisément deux écrivains qui s'intéressent à la littérature d'enfance. Il s'agit d'Abdallah Madaria Alaoui et de Guy Missodey. Depuis longtemps, ils essaient de cerner l'évolution de cette littérature destinée à la jeunesse, qui au départ ne se différenciait peut-être pas tellement de ce qui est production littéraire, et puis en prenant de l'ampleur, commençait à avoir une identité propre.", "type": "document"}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 25/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test25_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 25</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">

    <style>

      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}

      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}

      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}

    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 25</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>

      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>

}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
