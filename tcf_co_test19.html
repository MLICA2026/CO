<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 19 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

orrespond à l'image.", "c": ["Donne-moi un verre de lait.", "Elle est belle, votre viande.", "Je voudrais un kilo de tomates.", "Pardon, je cherche le marché."], "a": 2, "k": "Je voudrais un kilo de tomates.", "transcript": "Image 1 : Un vendeur de fruits et légumes sur un marché sert un client qui pointe du doigt les étals de fraises et de tomates."}, {"type": "extrait", "q": "Question 2. Choisissez la bonne réponse.", "c": ["Oui, à 10h aujourd'hui.", "Oui, c'est à quelle adresse?", "Oui, pour combien de personnes?", "Oui, qu'est-ce que vous cherchez?"], "a": 0, "k": "Oui, à 10h aujourd'hui.", "transcript": "– Bonjour, je voudrais un rendez-vous avec le docteur Savin, s'il vous plaît."}, {"type": "extrait", "q": "Question 3. Choisissez la bonne réponse.", "c": ["Il préfère faire de la natation.", "Je ne peux pas, j'ai perdu mon ballon.", "Les deux équipes ont très bien joué.", "On peut le regarder ensemble."], "a": 2, "k": "Les deux équipes ont très bien joué.", "transcript": "– Qu'est-ce que tu as pensé du match de football hier ?"}, {"type": "extrait", "q": "Question 4. Choisissez la bonne réponse.", "c": ["A Montpellier.", "En vacances.", "Ma grande soeur.", "Samedi prochain."], "a": 0, "k": "A Montpellier.", "transcript": "– Où habite ta famille ?"}, {"type": "extrait", "q": "Question 5. Choisissez la bonne réponse.", "c": ["Non, ça fait deux ans.", "Non, j'ai changé de métier.", "Non, je parle français.", "Non, nous voulons déménager."], "a": 0, "k": "Non, ça fait deux ans.", "transcript": "J'ai rencontré mon mari quand je travaillais à l'étranger. On prenait des cours dans la même école de langue.\n– Ah oui ? Et vous vivez à Toulouse depuis longtemps ?"}, {"type": "extrait", "q": "Question 6. Choisissez la bonne réponse.", "c": ["C'est passionnant, ils vont adorer.", "C'est possible, la séance est à 16 heures.", "C'est gratuit jusqu'à 8 ans.", "C'est la première salle sur votre droite."], "a": 2, "k": "C'est gratuit jusqu'à 8 ans.", "transcript": "– Bonjour monsieur, deux places pour le film Nima, s'il vous plaît. C'est combien pour les enfants ?"}, {"type": "extrait", "q": "Question 7. Choisissez la bonne réponse.", "c": ["Je joue au tennis le dimanche.", "Je suis toujours célibataire.", "Je travaille dans une école.", "Je vis à Montréal maintenant."], "a": 2, "k": "Je travaille dans une école.", "transcript": "– Salut, on ne se connaît pas. Je m'appelle Bertrand. Je suis à Québec depuis trois mois seulement. Je suis informaticien. Et toi, tu fais quoi ?"}, {"type": "extrait", "q": "Question 8. Choisissez la bonne réponse.", "c": ["Non, le train est annulé.", "Non, le train est complet.", "Non, le train est déjà là.", "Non, le train est en retard."], "a": 2, "k": "Non, le train est déjà là.", "transcript": "– C'est bientôt l'heure de monter dans le train, mais est-ce que tu penses que j'ai le temps d'acheter un journal ?"}, {"type": "extrait", "q": "Question 9. Choisissez la bonne réponse.", "c": ["Bien sûr, je réserve l'hôtel.", "D'accord, on reste à la maison.", "Non, l'appartement est trop cher.", "Pourquoi pas, les enfants vont adorer."], "a": 3, "k": "Pourquoi pas, les enfants vont adorer.", "transcript": "Maxime propose de faire du camping dans le sud de la France pour les prochaines vacances.\n– Est-ce que tu en penses ?"}, {"type": "document", "q": "Question 10. Qu'est-ce qui est difficile pour Léo ?", "c": ["La communication avec ses clients", "La recherche d'un nouveau travail", "L'achat d'un nouveau téléphone", "L'utilisation de son ordinateur portable"], "a": 0, "k": "Je ne peux pas travailler et contacter mes clients.", "transcript": "– Léo, comment ça va depuis que tu es dans ta nouvelle maison ?\n– Ça va, ça va, mais je n'ai pas encore Internet.\n– Mince alors ! Et est-ce que ton téléphone fixe marche au moins ?\n– Oui, mais je n'en ai pas vraiment besoin. Je viens de m'acheter un ordinateur tout neuf, mais sans Internet. Je ne peux pas travailler et contacter mes clients.\n– Je comprends. Tu as vu quelqu'un pour arranger ça ?"}, {"type": "document", "q": "Question 11. Sur quoi est-ce que ces deux personnes ont des goûts différents ?", "c": ["La mode", "La nature", "Les saisons", "Les vacances"], "a": 2, "k": "on n'a pas les mêmes goûts", "transcript": "– Salut, Hayat. Wow, il est beau ton manteau.\n– Merci. Il est parfait pour l'automne et le froid qui arrive.\n– Oui, moi j'adore cette époque. Les couleurs des arbres sont magnifiques. C'est super pour se promener en forêt. Et on peut sortir son beau manteau, comme toi.\n– Mais moi, en fait, je préfère l'été. Les vêtements légers, être dehors.\n– Eh bien, on n'a pas les mêmes goûts. Mais bon, c'est vrai qu'il fait un peu froid dehors. On va boire un café ?"}, {"type": "document", "q": "Question 12. De quoi parlent ces deux personnes ?", "c": ["De leur voyage en Argentine", "Des résultats des examens", "Du coût de la vie en ville", "D'un séjour linguistique"], "a": 3, "k": "faire un stage de langue espagnole", "transcript": "– Maintenant que les examens universitaires sont finis, qu'est-ce que tu vas faire ?\n– Je voudrais faire un stage de langue espagnole pendant un mois.\n– Bonne idée, j'en ai fait un l'année dernière en Argentine. C'était super !\n– Je ne veux pas aller si loin. Je pense plutôt à l'Espagne.\n– Tu devrais aller dans le sud, à Séville. C'est une ville magnifique.\n– Pourquoi pas ? Mais j'ai un petit budget. Je dois voir si je peux trouver un logement pas trop cher."}, {"type": "document", "q": "Question 13. Quel bilan Alex tire-t-il de sa première journée de travail ?", "c": ["Il a été très agréablement surpris", "Il préfère attendre pour se prononcer", "Il aurait aimé se mettre déjà au travail", "Il a trouvé son supérieur peu disponible"], "a": 0, "k": "il a été très sympa", "transcript": "– Alors, comment s'est passée cette première journée dans la vie active ?\n– Plutôt bien. Les collègues ont été très accueillants.\n– Et avec ton chef ? Tu m'avais dit qu'il était un peu froid.\n– Ben, en fait, il a été très sympa. Il m'a présenté à toute l'équipe, fait visiter les locaux et montré mon bureau, qui est très grand. Je n'en revenais pas.\n– Bienvenue dans le monde professionnel, Alex. Tu n'es pas au bout de tes découvertes."}, {"type": "document", "q": "Question 14. Que décident de faire les deux amis pour leurs vacances ?", "c": ["De visiter le sud de la France", "De partir ensemble à l'étranger", "De partir chacun de leur côté", "D'aller pêcher avec d'autres amis"], "a": 1, "k": "si c'était toi qui venais avec moi en Irlande", "transcript": "– Où pars-tu en vacances cet été ?\n– Sûrement dans le sud. J'aime la pêche et mes amis de Marseille m'ont proposé leur appartement.\n– Moi, je supporte très mal les fortes chaleurs. Ça me rend malade.\n– Dommage. Tu aurais pu venir avec moi. Il y a de la place chez mes amis.\n– Et si c'était toi qui venais avec moi en Irlande ? C'est beau l'Irlande. Là-bas aussi, on peut pêcher.\n– Oui, tiens, c'est une idée. Je ne connais pas du tout ce pays. Pourquoi pas ?"}, {"type": "document", "q": "Question 15. Pour quelle raison Raffia intervient-elle ?", "c": ["Pour conseiller un livre", "Pour discuter d'écologie", "Pour parler de sa ville", "Pour raconter un voyage"], "a": 2, "k": "on n'a jamais eu personne de Buffalo", "transcript": "– Raffia de Buffalo ? Bienvenue dans La Terre est belle. Bonjour, Marc. Alors nous sommes ravis de vous avoir à l'antenne parce qu'on n'a jamais eu personne de Buffalo. Vous allez nous apprendre des choses. Ça se trouve déjà totalement à l'ouest de l'État de New York.\n– C'est limitrophe du Canada. C'est drôle comme nom. Il n'y a pas spécialement de buffle ou de choses comme ça, non ? D'après la légende, ça vient du beau fleuve. Un nom donné par les explorateurs français. Enfin, c'est l'histoire qu'on raconte."}, {"type": "document", "q": "Question 16. Qu'explique cet homme ?", "c": ["La crise de l'économie mondiale", "L'accroissement de la population", "Les nouvelles règles d'hygiène", "Les récentes découvertes médicales"], "a": 1, "k": "une augmentation de la population", "transcript": "Pourquoi aussi peu de temps on est venu à cette minière sur terre ? Parce que la mortalité a diminué notamment la mortalité des enfants grâce au progrès de l'hygiène de la médecine, au progrès économique. Résultat, les décès sont devenus moins nombreux est apparu un excédent des naissances sur les décès qui a entraîné une augmentation de la population."}, {"type": "document", "q": "Question 17. Pourquoi cette personne a-t-elle choisi la colocation ?", "c": ["Pour avoir un logement plus grand et peu cher", "Pour louer des chambres à des étudiants", "Pour partager les tâches ménagères", "Pour rencontrer de nouvelles personnes"], "a": 0, "k": "trouver de l'espace pour un loyer modéré", "transcript": "Ça fait trois ans que je vis à Laval. Après avoir habité une chambre en cité universitaire, j'ai voulu vivre dans mon propre appartement, mais trouver de l'espace pour un loyer modéré, ce n'est pas facile. Finalement, j'ai opté pour la colocation. Nous sommes deux colocataires au début. La vie en colocation n'est pas simple, surtout quand on ne se connaît pas. Il faut savoir faire des compromis et s'organiser."}, {"type": "document", "q": "Question 18. Quelle est la condition pour répondre à cette annonce ?", "c": ["Avoir de l'expérience dans la vente", "Habiter près de Sainton-les-Tonges", "Pratiquer régulièrement un sport", "Savoir gérer un site internet"], "a": 2, "k": "des vendeurs qui soient en même temps des sportifs", "transcript": "Et maintenant, les annonces de Radio Saintonge. Vous faites du sport dans un club et avez toujours rêvé de faire de votre passion votre métier ? Les magasins Sportez-vous Bien recherchent des vendeurs qui soient en même temps des sportifs pour l'ouverture de leur nouvelle boutique à Sainton Létonge. Si vous êtes intéressé, veuillez déposer votre CV et votre lettre de motivation dans la boutique la plus proche de chez vous ou en ligne sur notre site internet."}, {"type": "document", "q": "Question 19. Quel est le problème de Clément dans sa recherche d'un emploi ?", "c": ["Il a peu de diplômes", "Il est déjà trop âgé", "Il est mauvais en langues", "Il manque d'expérience"], "a": 3, "k": "je ne peux pas avoir travaillé 10 ans dans la même entreprise", "transcript": "– Alors Clément, ta recherche d'emploi, ça avance ?\n– Pas vraiment. Et ce n'est pas faute de chercher. Pourtant, avec ta formation d'architecte, décorateur et tous tes stages, c'est incroyable. J'avais une piste dans un cabinet de Montréal, mais ils m'ont répondu qu'ils cherchaient un professionnel confirmé et qu'il soit au moins bilingue, comme toi. J'espère ça. Ce n'est pas le problème, mais à 25 ans, je ne peux pas avoir travaillé 10 ans dans la même entreprise."}, {"type": "document", "q": "Question 20. Que dit cette intervenante au sujet du travail à Londres ?", "c": ["Le recrutement se fonde sur l'expérience.", "Les salaires à l'embauche sont très élevés.", "L'évolution professionnelle est très lente.", "L'obtention d'un premier emploi est aisée."], "a": 0, "k": "On va surtout regarder les postes que vous avez déjà occupés", "transcript": "On dit souvent qu'à Londres, on peut changer de job quasiment comme de chemise. Est-ce que c'est toujours vrai ? Il est toujours facile de passer d'un job à l'autre. Le diplôme a beaucoup moins d'importance. On va surtout regarder les postes que vous avez déjà occupés. On va aussi tenir compte de vos motivations. C'est vrai qu'on vous donne aussi la possibilité d'augmenter assez... comment dire, de franchir les étapes beaucoup plus rapidement. On retrouve assez régulièrement des personnes vers 22, 23 ans et déjà manager, tandis qu'en France, c'est quand même un petit peu plus compliqué."}, {"type": "document", "q": "Question 21. Pour quelle raison la fille refuse-t-elle de jouer au volley ?", "c": ["Elle veut faire du vélo.", "Elle a horreur du volley.", "Elle trouve le vent trop fort.", "Elle se sent fatiguée."], "a": 2, "k": "vous avez vu ce vent", "transcript": "– Vous venez, on va faire un volley. Et après on ira nager. Tu viens, Véro ?\n– Mais ce n'est pas possible. Par ce temps, vous avez vu ce vent. Vous n'attraperez jamais le ballon.\n– N'exagère pas. Ce n'est pas grave. Allez, viens. Tu adores ça.\n– Non, allez-y sans moi. J'aime mieux aller me baigner."}, {"type": "document", "q": "Question 22. Que se passe-t-il dans la région ?", "c": ["Des habitants ont voté pour un maire écologiste.", "Les écologistes refusent la construction d'une autoroute.", "L'Union européenne veut faire construire une autoroute.", "Un maire propose d'ouvrir une réserve naturelle."], "a": 1, "k": "il est obligé d'affronter les écologistes", "transcript": "– Tu as entendu les informations. Il paraît que le maire veut faire construire une autoroute qui passe par la réserve naturelle de la région.\n– Ah bon ? Et il va vraiment le faire ?\n– Pour l'instant, il est obligé d'affronter les écologistes et même l'Union européenne."}, {"type": "document", "q": "Question 23. Qu'apprécie la femme dans son nouveau travail ?", "c": ["L'atmosphère détendue.", "La souplesse des horaires.", "L'efficacité de son équipe.", "Les opportunités de carrière."], "a": 3, "k": "les perspectives sont bonnes", "transcript": "– Malheureusement, je n'ai pas de vacances. Je viens de changer de travail.\n– Ah bon ? Tu ne te plaisais pas là où tu étais ? L'ambiance était vraiment bonne et tu avais un bon emploi du temps.\n– Oui, je me souviens, et tu as trouvé encore mieux.\n– En fait, c'était sympa, mais je n'avais pas de possibilité d'évolution, alors que là, les perspectives sont bonnes. Enfin, si je survis aux horaires imposés... et l'ambiance est aussi bonne qu'avant. Oui, je pense que ça va aller, mais je ne connais pas encore beaucoup de monde. Il faut du temps."}, {"type": "document", "q": "Question 24. Pourquoi les pêcheurs utilisent-ils une cabane ?", "c": ["Pour conserver le poisson.", "Pour ranger leur matériel.", "Pour se réchauffer.", "Pour se reposer."], "a": 2, "k": "chaque pêcheur se protège du froid", "transcript": "– Dis-moi, Paul, c'est quoi la pêche blanche au Québec ?\n– On l'appelle blanche parce qu'on pêche l'hiver à la ligne en creusant des trous dans la glace des lacs et des rivières gelées.\n– Mais vous, vous devez geler à attendre le poisson sans bouger.\n– Non, car chaque pêcheur se protège du froid en installant une cabane en bois au-dessus des trous.\n– C'est une pêche d'intérieur ?\n– En quelque sorte. En tout cas, le poisson est bien frais."}, {"type": "document", "q": "Question 25. Les journalistes évoquent une tendance qui concerne les Français. Laquelle ?", "c": ["Ils aiment passer leurs vieux jours dans le sud de la France.", "Ils osent davantage partir à l'étranger qu'auparavant.", "Ils payent plus d'impôts que les autres citoyens européens.", "Ils prennent des cours de langue pour améliorer leur niveau."], "a": 1, "k": "ils n'ont plus peur de partir à la conquête du monde", "transcript": "Gros plan sur les Français qui partent pour réussir. Oui, tous ces Français que l'on dit nuls en anglais. Eh bien, ils n'ont plus peur de partir à la conquête du monde. En fait, il est toujours un peu difficile de cerner leurs motivations profondes, entre ceux qui franchissent les frontières pour monter un business, ceux qui cherchent un job, ceux qui s'exilent pour fuir une fiscalité asphyxiante ou bien ceux qui veulent tout simplement profiter d'une retraite au soleil."}, {"type": "document", "q": "Question 26. Selon le reportage, que font les touristes pendant les grandes chaleurs ?", "c": ["Ils annulent leurs activités.", "Ils partent à la montagne.", "Ils préfèrent sortir la nuit.", "Ils restent au frais à l'intérieur."], "a": 1, "k": "fait les affaires des professionnels du tourisme de la montagne", "transcript": "Il va faire chaud cette semaine, très chaud. La chaleur va de nouveau être difficile à supporter. Cette situation fait les affaires des professionnels du tourisme de la montagne. Là-bas, pendant la nuit, les températures vont de 12 à 15 degrés, ce qui permet de mieux se reposer. Pendant la journée, il est possible de faire des activités nautiques dans de l'eau bien fraîche. C'est ce dont tout le monde rêve actuellement."}, {"type": "document", "q": "Question 27. Qu'apprend-on sur l'attitude des jeunes Français face à leur avenir ?", "c": ["Ils espèrent obtenir une allocation de l'Etat.", "Ils voient leur futur de manière positive.", "Ils comptent sur le soutien de leurs proches.", "Ils refusent d'habiter chez leurs parents"], "a": 1, "k": "les jeunes ont plutôt confiance en l'avenir", "transcript": "Comment les jeunes Français envisagent-ils leur avenir ? La réponse est à lire dans le sondage publié aujourd'hui par le tout nouvel observatoire des jeunes et des familles. 1000 jeunes de 18 à 25 ans et 1000 familles ont été interrogés. Première surprise, les jeunes ont plutôt confiance en l'avenir, à 52 %. Et même si les difficultés économiques créent des angoisses, huit sur dix estiment qu'ils obtiendront ce qu'ils veulent. Mais les principaux obstacles seront le travail et le logement."}, {"type": "document", "q": "Question 28. Quelle information le chef de train donne-t-il aux voyageurs ?", "c": ["Ils devront demander le remboursement de leur billet par écrit.", "Ils devront descendre en gare de Valence suite à une panne.", "Ils devront patienter à leur place jusqu'à l'arrêt complet du train.", "Ils devront présenter leur billet à leur descente du train."], "a": 0, "k": "un document à remplir et à retourner à l'adresse indiquée", "transcript": "Mesdames, messieurs, suite à un incident technique, notre train arrive en gare de Valence TGV, avec un retard de 45 minutes. Nous invitons tous les voyageurs qui descendent à se rapprocher du personnel de gare. Il vous remettra une enveloppe et un document à remplir et à retourner à l'adresse indiquée pour que la SNCF puisse vous virer la somme correspondant au prix de votre billet de train à titre de dédommagement. Nous vous prions de bien vouloir nous excuser pour la gêne occasionnée. Assurez-vous de n'avoir rien oublié à vos places. Bonne fin de journée."}, {"type": "document", "q": "Question 29. Selon le chroniqueur, que permet la course par rapport à la marche ?", "c": ["De maigrir plus rapidement.", "De manger sans compter.", "De s'entraîner moins souvent.", "De vivre plus longtemps."], "a": 0, "k": "c'est la course qui l'emporte haut la main", "transcript": "Et on termine avec vous, Janick, qui posait une grande question existentielle : marcher ou courir ? Ça dépend. C'est ce qui ressort de quelques études récentes qui ont opposé les deux exercices et mesuré leurs effets. L'une d'elles a été publiée le mois dernier dans la revue Medicine and Science in Sports Exercise. Conclusion : en ce qui concerne la perte de poids, c'est la course qui l'emporte haut la main. Les coureurs sont plus minces, ont moins de surcharge pondérale que les marcheurs, et passé l'âge de 55 ans, c'est encore plus vrai. Même si le nombre de kilomètres parcourus à la course par semaine est minime, il y a une différence entre les coureurs et les marcheurs. Et la cause pourrait être l'effet de la course sur l'appétit."}, {"type": "document", "q": "Question 30. Que dénonce cette journaliste ?", "c": ["L'absence de formation sur l'élaboration d'un budget.", "Le désintérêt des jeunes pour les questions financières.", "Le manque de cours d'économie à l'université.", "Le peu d'informations des banques sur les crédits."], "a": 0, "k": "aucune séance de travail n'est dédiée à cette question", "transcript": "Apprendre à gérer son argent n'est pas une priorité éducative alors que l'argent nous accompagne toute notre vie. Construire un budget, ça s'apprend mais trop souvent le sujet est considéré tabou par les adultes. Donc pas question d'en parler avec les enfants. Dans la sphère de l'école, aucune séance de travail n'est dédiée à cette question. Pourtant, chacun est concerné dans sa vie professionnelle et personnelle par les principales notions que sont les coûts, les crédits, les prêts, les taux d'intérêt, l'endettement, l'économie à l'échelle de l'individu. Voilà un domaine qui touche chaque Français sans que jamais celui-ci y soit vraiment initié."}, {"type": "document", "q": "Question 31. Qu'apprend-on sur le site historique de Pompéi ?", "c": ["L'attitude des touristes accélère sa dégradation.", "Le financement des travaux d'entretien est menacé.", "Les autorités restaurent actuellement les vestiges.", "L'intérêt pour l'architecture des lieux est en déclin."], "a": 0, "k": "l'inconscience des visiteurs qui se conduisent souvent dans ces ruines millénaires comme dans un vulgaire parc d'attractions", "transcript": "C'est le plus grand site archéologique du monde, sur une superficie de 44 hectares. Il accueille chaque année 2 millions et demi de visiteurs. C'est sa chance, mais c'est aussi son malheur, car Pompéi est à une vingtaine de kilomètres de Naples et du Vésuve. L'Italie, qui se présente comme l'héritière du plus grand patrimoine de l'humanité, a bien tenté d'en prendre soin. Mais ces dernières années, des effondrements à répétition nous montrent que l'on a franchi la frontière de l'urgence. C'est l'Europe qui s'émeut de l'état de quasi-abandon dans lequel se retrouve le site, tout concourt à un laisser-aller dramatique, sans oublier l'inconscience des visiteurs qui se conduisent souvent dans ces ruines millénaires comme dans un vulgaire parc d'attractions."}, {"type": "document", "q": "Question 32. Selon ce journaliste, quel risque la neige peut-elle avoir pour les plantes ?", "c": ["Elle peut rompre les branches.", "Elle peut geler les racines.", "Elle peut surcharger les branches.", "Elle peut empêcher la lumière du soleil"], "a": 0, "k": "son poids ne casse les branches", "transcript": "Encore une question qui est liée au temps. Pauline habite dans le sud et la neige est tombée en grosse quantité. Elle a peur que son poids ne casse les branches de ses arbres et de ses arbustes, et voudrait savoir s'il est conseillé de les agiter pour faire tomber la neige, à une condition, une seule : qu'il ne gèle pas. C'est-à-dire que si vraiment la température demain dehors est un peu comme ce matin, le bois est extrêmement cassant. On attend donc le redoux des températures, et là, on peut effectivement agiter pour laisser tomber la neige et éviter que le poids ne casse les branches. Malheureusement, quantité de plantes, je pense aux grosses haies, vont souffrir du poids de la neige, car la neige représente un poids énorme qui risque de poser quantité de dommages."}, {"type": "document", "q": "Question 33. Que font les jeunes Parisiens dont parle ce reportage ?", "c": ["Ils nagent en plein air dans la capitale.", "Ils s'amusent dans un parc d'attractions.", "Ils se retrouvent à la piscine municipale.", "Ils sont en vacances au bord de la mer."], "a": 0, "k": "le canal de l'Ourcq est devenu notre espace de baignade quotidien", "transcript": "En fait, comme on vit tous dans le 19e arrondissement de Paris, le canal de l'Ourcq est devenu notre espace de baignade quotidien après une journée de travail. Généralement, on se retrouve au bord du canal, tous ensemble, et on se baigne. Aujourd'hui, on est entre 15 et 20 à se baigner régulièrement dans le canal de l'Ourcq. On est des jeunes étudiants fauchés qui ont envie de s'amuser, qui n'ont pas forcément les moyens de partir de Paris."}, {"type": "document", "q": "Question 34. De quoi parle cet artiste ?", "c": ["De la particularité de sa voix.", "De la reprise d'une oeuvre.", "De sa nouvelle tournée.", "De son dernier rôle au cinéma."], "a": 1, "k": "j'ai chanté cette chanson-là", "transcript": "C'est une des plus grandes chansons qui aient été faites dans toute l'histoire de la chanson francophone. C'est un court métrage, c'est même un long métrage en quelques minutes. Et arriver à dépeindre tout un univers où on comprend la complexité du personnage, où on peut tout mettre dans un contexte social, où on a même presque des parfums... on a tout dans cette chanson-là. Donc oui, pour moi, c'est comme si j'avais chanté une grammaire. Si j'étais un classique, j'aurais joué Bach. J'ai chanté à Saint-Paul, j'ai chanté cette chanson-là."}, {"type": "document", "q": "Question 35. Dans quel but a été fait ce reportage photo ?", "c": ["Pour accélérer la rénovation d'anciennes constructions.", "Pour comparer les styles des maisons nord-américaines.", "Pour conserver la trace du patrimoine architectural.", "Pour dénoncer la dégradation des logements urbains."], "a": 2, "k": "prendre des photographies des bâtiments, pierre grise à Montréal", "transcript": "Quand vous revenez de Chicago, vous fondez d'abord Héritage Montréal. Pourquoi ? Vous savez, quand je suis revenue de Chicago, j'étais là pendant quelques années à prendre des photographies des bâtiments, pierre grise à Montréal. Oui, parce que j'ai trouvé ça formidable et ça délimite. C'était une façon de marquer chaque quartier de Montréal. Alors je faisais ça avec un photographe. Et puis, quand nous étions par exemple dans un couvent, on m'a dit : mais pourquoi est-ce que vous êtes dans ce bâtiment, c'est voué à démolir comme ça partout. Alors finalement, j'ai compris qu'il fallait vraiment le faire, surtout que je venais de Chicago. Et puis toutes les villes autour, en trois ans, un peu partout, il y avait peut-être un bâtiment qui restait debout, le bâtiment Victoria, et puis tout était aplati. C'était une période féroce."}, {"type": "document", "q": "Question 36. Qu'a-t-on découvert sur le sommeil ?", "c": ["Il conditionne l'humeur", "Il dope l'énergie", "Il minimise l'angoisse", "Il stimule la créativité"], "a": 3, "k": "joue un rôle essentiel dans l'inventivité", "transcript": "Petit dicton au rayon du bon sens près de chez nous : quand on a un problème, eh bien, dormons dessus. Rien de tel qu'une bonne nuit de sommeil pour y voir plus clair s le public que dans le privé, ce mal-être au travail résulte, selon vous, d'une mutation sociale profonde et structurelle du marché du travail et de notre rapport au travail. Ce que l'on constate, c'est que, pour essayer de résumer, le travail était issu étymologiquement du tripalium, le poteau de torture : tu gagneras ta vie à la sueur de ton front, etc., c'est-à-dire la pénibilité physique. Or, on constate, et c'est un paradoxe, qu'en fait le temps de travail dans la vie a plutôt diminué, et la pénibilité physique a considérablement diminué dans la plupart des métiers, mais ça a été compensé ou transformé par une charge psychique, une mobilisation psychique et une pénibilité subjective."}, {"type": "document", "q": "Question 39. D'après les chercheurs dont parle le journaliste, qu'est-ce qui est bénéfique pour la santé ?", "c": ["Pratiquer des exercices mentaux.", "Exprimer ses sentiments.", "Se montrer chaleureux.", "Se retirer régulièrement au calme."], "a": 2, "k": "plus nous manifestons d'amabilité", "transcript": "D'après les chercheurs, plus nous manifestons d'amabilité, plus nous sécrétons de sérotonine. De plus, la gentillesse aurait des effets positifs sur le cerveau. Les pensées hostiles ou agressives augmentent le rythme cardiaque et la pression artérielle, alors que la gentillesse abaisse le niveau de stress. On a vu des gens mourir de méchanceté. L'agressivité pratiquée au quotidien augmente les risques cardiaques et conduit à une solitude qui aggrave tous les problèmes."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 19/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test19_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 19</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
