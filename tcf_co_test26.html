<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 26 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

resse d'un garage", "Adresse d'un docker"], "a": 1, "k": "l'adresse de ton docteur", "transcript": "Allô Pierre ? Oui. Bonjour c'est Jacqueline. Pierre, peux-tu me donner l'adresse de ton docteur ? Celui dont tu m'as parlé l'été dernier. Mais, il a déménagé. Quel dommage. Mais, il y a un cabinet qui a ouvert, entre le garage et le salon de coiffure, tu pourrais essayer. Oui, bonne idée. Je vais essayer. Merci Pierre."}, {"type": "document", "q": "Question 12 : De quoi parlent ces deux femmes ?", "c": ["De leurs derniers voyages", "De leurs destinations préférées", "De leurs prochaines vacances", "De leurs traditions familiales"], "a": 2, "k": "Tu as pris tes congés", "transcript": "Tu as pris tes congés ? Oui, pour une fois. Je pars la première quinzaine d'août, et toi ? Moi, j'attends le mois de septembre. Avec mon mari nous partons à Rome. Ils disent que c'est moins cher en cette période de l'année. Rome ? Quelle chance. Moi, comme tous les ans, je pars en Bretagne, dans la maison de mon père."}, {"type": "document", "q": "Question 13 : Que critique cet homme ?", "c": ["La qualité du catalogue", "Le prix des entrées", "Les conditions de visite", "Les œuvres présentées"], "a": 2, "k": "on a dû faire la queue pendant trois heures", "transcript": "J'ai adoré cette expo. C'est fantastique non ? Oui, sauf que comme tu n'avais pas acheté les billets en avance, on a dû faire la queue pendant trois heures pour rentrer. Ça en valait la peine. Bon, il y avait tellement de monde, je ne voyais pas les œuvres, je n'ai pas profité de la visite. Tu as pris le catalogue au moins ? Euh non, je ne l'ai pas trouvé."}, {"type": "document", "q": "Question 14 : Que doit faire monsieur Berthaud ?", "c": ["Utiliser une application bancaire", "Effectuer une recherche en ligne", "Consulter un expert financier", "Appeler la banque"], "a": 3, "k": "Vous téléphonez tout de suite à votre banque", "transcript": "Assistance mondiale, bonjour. Bonjour monsieur, je suis monsieur André Berthaud. Je vous appelle d'Adélaïde en Australie. Je ne retrouve plus ma carte bancaire, qu'est-ce que je dois faire ? Vous téléphonez tout de suite à votre banque en France et vous faites opposition. Vous me faxez la déclaration de perte et nous allons vous envoyer 1000 $ en chèque de voyage à Adélaïde."}, {"type": "document", "q": "Question 15 : Qu'arrive-t-il à la femme ?", "c": ["Elle a cassé son téléphone", "Elle a raté un appel important", "Elle n'a pas été invitée à un anniversaire", "Elle n'a pas eu l'appel espéré"], "a": 3, "k": "David ne m'a pas téléphoné pour mon anniversaire", "transcript": "Qu'est-ce qui t'arrive ? Tu as l'air triste. David ne m'a pas téléphoné pour mon anniversaire. J'ai attendu son appel toute la journée. Il va peut-être le faire ce soir, ne t'inquiète pas."}, {"type": "document", "q": "Question 16 : Pourquoi Aurélie accepte-t-elle de faire de l'escalade ?", "c": ["Elle aime être en altitude", "Elle désire accompagner un ami", "Elle fait confiance à son guide", "Elle veut prendre des risques"], "a": 2, "k": "je serai là pour vous guider", "transcript": "Aurélie, nous allons grimper le samedi prochain sur le site OVR, vous venez ? Oh, non, je n'ai jamais fait d'escalade et j'ai peur du vide. Rassurez-vous, tout est sécurisé, il n'y a vraiment aucun risque. En plus, je serai là pour vous guider. D'accord, mais si j'ai peur, vous me ferez descendre. Entendu."}, {"type": "document", "q": "Question 17 : Pourquoi ce stage intéresse-t-il la jeune femme ?", "c": ["Parce qu'il offre un abonnement dans les transports en commun", "Parce qu'il développe les compétences professionnelles", "Parce qu'il forme sur les principes éthiques", "Parce qu'il réduirait l'impact environnemental"], "a": 1, "k": "ça sera une bonne expérience", "transcript": "Salut Marc. J'ai trouvé un stage pour cet été dans une société de transport, c'est assez loin de chez moi mais je suis super contente. Tu seras payée ? Pas beaucoup, mais ça sera une bonne expérience. Et tu vas faire quoi ? Des statistiques sur la circulation des bus. Toi qui adore les chiffres c'est super. Comment tu as trouvé ce stage ? Grâce à un ami de mon père qui travaille là-bas."}, {"type": "document", "q": "Question 18 : Que propose le site internet présenté ?", "c": ["De créer un réseau étudiant pour échanger des services", "De mettre en contact des personnes pour partager du matériel", "De trouver une voiture pour transporter des affaires lourdes", "D'employer des jeunes pour réparer de vieux objets"], "a": 1, "k": "qui met en relation ceux qui ont une machine à laver et leurs voisins", "transcript": "Lorsque nous nous sommes installés loin de chez nos parents, nous nous sommes aperçus que le magasin le plus proche était à plus de 2 km. On s'est dit que ce serait sympa si la voisine pouvait nous prêter sa machine à laver. Nous avons donc créé un site internet qui met en relation ceux qui ont une machine à laver et leurs voisins qui ne l'ont pas contre quelques euros."}, {"type": "document", "q": "Question 19 : Que demande le directeur ?", "c": ["D'annuler une réunion", "D'informer de son retard", "De recevoir un client", "De reporter un entretien"], "a": 1, "k": "Il faut les prévenir que je ne serai pas à l'heure", "transcript": "La rencontre avec les représentants du personnel est bien prévue aujourd'hui ? Oui monsieur, à 15h dans la salle du rez-de-chaussée. Il faut les prévenir que je ne serai pas à l'heure, j'attends un appel très important de l'un de nos importateurs. D'accord, mais je croyais que vous lui aviez parlé hier ? Non, il n'a pas pu me téléphoner."}, {"type": "document", "q": "Question 20 : Quel est l'objectif de ce programme ?", "c": ["Renforcer la lutte contre le changement climatique", "Améliorer l'accès aux soins de santé", "Faciliter l'intégration des immigrants", "Promouvoir le travail de la femme"], "a": 2, "k": "contacter les immigrants installés ici au Québec", "transcript": "Je suis agent de recrutement, en fait je suis chargé de projet de démarchage en francisation. Ce projet vise à contacter les immigrants installés ici au Québec depuis 3 ans et plus et qui ont besoin de connaître la langue pour faciliter leur vie quotidienne. Notre rôle c'est de contacter les personnes isolées, par exemple les femmes qui, à cause des charges familiales, n'ont pas eu l'occasion d'apprendre le français dès leur arrivée."}, {"type": "document", "q": "Question 21 : Que demande le Directeur ?", "c": ["De fixer les horaires de travail du comptable", "De prendre rendez-vous avec le comptable", "De préparer des documents pour le comptable", "De remplir la fiche de salaire du comptable"], "a": 2, "k": "les fiches de paie des professeurs doivent être prêtes pour demain", "transcript": "Allô, bonjour. Oui, bonjour Monsieur le Directeur. Je veux juste vous rappeler que les fiches de paie des professeurs doivent être prêtes pour demain. Oui, j'ai contrôlé les heures de tous les professeurs. J'attends deux confirmations ce matin et je vais pouvoir finir cet après-midi. Bon, je compte sur vous pour respecter les délais imposés par le service comptabilité."}, {"type": "document", "q": "Question 22 : Que demande le client ?", "c": ["La visite d'un technicien", "L'échange d'un article abîmé", "Le conseil d'un professionnel", "Le remboursement d'un produit"], "a": 2, "k": "comment emboîter les parties vitrées sur les panneaux en bois", "transcript": "Bonjour, je suis bien au service après-vente de meubles modernes ? Oui bonjour, que puis-je faire pour vous ? C'est au sujet de la bibliothèque que j'ai achetée chez vous. Depuis deux jours j'essaie de la monter mais, hélas je n'ai pas dû comprendre comment emboîter les parties vitrées sur les panneaux en bois. Je ne gère pas le côté technique. Je vais donc vous mettre en communication avec le service compétent qui vous expliquera comment réaliser l'assemblage."}, {"type": "document", "q": "Question 23 : Quelle est la qualité dont le travailleur moderne doit faire preuve ?", "c": ["La créativité", "La disponibilité", "La mobilité", "La persuasion"], "a": 2, "k": "savoir changer de métier, de pays avec souplesse", "transcript": "Bienvenue à tous. Ce colloque est intitulé « Travail et modernité » car nous devons changer notre manière d'appréhender le travail au sein d'une société en pleine mutation. Nous entrons en effet dans l'ère de la communication interplanétaire. Nul ne peut se contenter d'évoluer à l'intérieur des frontières de son pays. Il faut étudier, voyager, communiquer et surtout savoir changer de métier, de pays avec souplesse."}, {"type": "document", "q": "Question 24 : Pourquoi les pêcheurs utilisent-ils une cabane ?", "c": ["Pour conserver le poisson", "Pour ranger leur matériel", "Pour se réchauffer", "Pour se reposer"], "a": 2, "k": "chaque pêcheur se protège du froid en installant une cabane", "transcript": "Dis-moi, Paul, c'est quoi la pêche blanche au Québec ? On l'appelle blanche parce qu'on pêche l'hiver à la ligne en creusant des trous dans la glace des lacs et des rivières gelées. Mais vous, vous devez geler à attendre le poisson sans bouger. Non, car chaque pêcheur se protège du froid en installant une cabane en bois au-dessus des trous. C'est une pêche d'intérieur ? En quelque sorte."}, {"type": "document", "q": "Question 25 : D'après le directeur de la revue, pourquoi l'ouverture des magasins le dimanche aurait-elle peu d'influence sur l'économie française ?", "c": ["Parce que la consommation dépend avant tout du pouvoir d'achat", "Parce que la création d'emploi restera rare dans ce secteur d'activité", "Parce que les commerces font des bénéfices sur les ventes en semaine", "Parce que les Français ne sont pas habitués à consommer le dimanche"], "a": 0, "k": "Les consommateurs dépensent d'abord en fonction de leur revenu", "transcript": "Autoriser les magasins à ouvrir le dimanche en France, serait-ce la solution pour développer la croissance et l'emploi ? Les boutiques réalisent sur ce seul jour plus du tiers du chiffre d'affaires de toute la semaine. Mais ce qu'on achète le dimanche, on ne l'achète pas les autres jours et vice versa. Les consommateurs dépensent d'abord en fonction de leur revenu et non en fonction des jours d'ouverture des magasins, c'est simplement une autre répartition des parts d'achat."}, {"type": "document", "q": "Question 26 : Que reprochait l'employeur à Monsieur Baudot ?", "c": ["Sa mauvaise gestion du temps", "Ses dépenses excessives", "Ses absences répétées", "Ses résultats insuffisants"], "a": 3, "k": "vous n'avez pas réalisé votre objectif", "transcript": "Tu te rends compte ? Il m'a convoqué dans son bureau dès que je suis arrivé. Pourquoi ? Il m'a dit, Monsieur Baudot, ce mois-ci vous n'avez pas réalisé votre objectif, vous devriez atteindre les 150 000 euros et vous en êtes loin, il va falloir être plus performant. Tu lui as répondu quoi ? D'abord que depuis que je travaille ici j'ai rarement peu de profit, en plus comme j'essaie de réduire les frais de déplacement, je fais un peu moins de ventes mais plus de bénéfices."}, {"type": "document", "q": "Question 27 : Selon la personne interrogée, pour quelles raisons les entreprises québécoises doivent-elles continuer leurs efforts pour l'intégration des immigrés ?", "c": ["Parce qu'elles sont beaucoup à apprendre d'eux", "Parce qu'elles s'implanteront mieux ensuite à l'étranger", "Parce qu'elles sont en manque de main-d'œuvre", "Parce qu'elles y sont contraintes par la mondialisation"], "a": 0, "k": "On apprend sur la nôtre, on apprend sur les autres", "transcript": "Les entreprises québécoises ont fait beaucoup pour l'intégration des immigrés, mais elles doivent faire davantage. Si on ne le fait pas, on y perd parce qu'il y a tellement de gains à l'immigration. On n'a qu'à parler de s'ouvrir vers d'autres cultures, on y gagne. On apprend sur la nôtre, on apprend sur les autres, et dans le milieu du travail, toute la richesse, la diversité que d'autres cultures peuvent nous apporter."}, {"type": "document", "q": "Question 28 : Comment favorise-t-on l'innovation chez les jeunes dans cet institut ?", "c": ["En les incitant à travailler de manière collaborative", "En les poussant à prendre des risques importants", "En leur offrant des formations personnalisées", "En leur proposant de participer à des compétitions"], "a": 0, "k": "conduire des projets innovants dans le cadre d'équipes diversifiées", "transcript": "Delphine Monceau, pensez-vous que tout le monde peut être innovant ? On croit souvent que l'innovation survient par hasard et qu'il s'agit d'un don individuel, mais d'être innovant et créatif, ça s'apprend. Comment rend-on un étudiant créatif ? Il faut différencier l'innovation individuelle et la capacité à être innovant collectivement. Nous avons donc mis en place des programmes pour apprendre aux jeunes à conduire des projets innovants dans le cadre d'équipes diversifiées."}, {"type": "document", "q": "Question 29 : Pour quelles raisons le stress peut-il être bénéfique ?", "c": ["Il améliore significativement la condition physique", "Il donne de l'énergie pour faire face aux épreuves", "Il fait naître un fort sentiment de confiance en soi", "Il renforce les compétences professionnelles"], "a": 1, "k": "Le stress est source de motivation", "transcript": "Indispensable pour réussir les challenges et autres défis de la vie. Un excès de stress engendre la contre-productivité et la frustration mais active d'autres. Le stress est source de motivation et c'est la condition pour devenir meilleur. Si le stress est vécu comme un défi à surmonter, il devient un puissant stimulant. Les sportifs de haut niveau le savent, parce qu'ils réussissent leur performance grâce à ce stress qu'ils arrivent à exploiter de façon positive."}, {"type": "document", "q": "Question 30 : Quel regard porte cet homme sur sa célébrité ?", "c": ["Elle l'a beaucoup fasciné à ses débuts", "Elle l'a conduit à la tête d'un grand magazine", "Elle l'a laissé complètement indifférent", "Elle l'a mis en danger pendant sa carrière"], "a": 2, "k": "la célébrité n'a jamais été un objectif pour moi", "transcript": "Je n'ai pas cherché la célébrité, franchement. Des amis le savent, ils savent que j'ai gravi en ce temps-là d'être un éditeur, servant des plus grands corridors, ayant interviewé des personnalités comme Roland Barthes, Michel Foucault. Non, la célébrité n'a jamais été un objectif pour moi à l'époque, ça ne l'est toujours pas."}, {"type": "document", "q": "Question 31 : De quoi parle ce témoignage ?", "c": ["D'une compétition sportive", "D'une croisière maritime", "D'une histoire familiale", "D'une rencontre amoureuse"], "a": 2, "k": "essayer de trouver une trace de nos ancêtres", "transcript": "On fait un petit tour de France, c'est-à-dire qu'on est parti vers le sud et on s'est arrêté à La Rochelle parce que nos ancêtres viennent de La Rochelle. Ils sont partis au XVIIe siècle pour le Québec du port de La Rochelle. Donc, on est venu voir le port et essayer de trouver une trace de nos ancêtres."}, {"type": "document", "q": "Question 32 : Quelle est la particularité de l'établissement de Philippe ?", "c": ["C'est la reproduction d'un café du siècle dernier", "Il contient un dépôt-vente de meubles design", "C'est à la fois un restaurant et une galerie d'art", "Il y organise un festival de musique électronique"], "a": 2, "k": "j'ai accroché des tableaux, des œuvres contemporaines", "transcript": "Philippe, est-ce que vous pouvez nous apprendre plus sur votre établissement ? Quand j'ai récupéré l'endroit, il s'agissait d'un lieu ancien à Montréal au début du 19e siècle. J'ai gardé ce qui était d'époque et j'ai rajouté une touche moderne. En plus d'y manger, on peut assister à des soirées musicales avec des DJs connus dans le domaine de la musique électronique. Étant donné qu'on est dans un lieu à très haut plafond, j'ai accroché des tableaux, des œuvres contemporaines, et on organise ici des expos temporaires."}, {"type": "document", "q": "Question 33 : Pourquoi cette jeune femme a-t-elle été surprise ?", "c": ["La notice était impossible à lire", "La traduction était partielle", "L'emballage était défectueux", "Les céréales étaient périmées"], "a": 1, "k": "J'ai cherché en français", "transcript": "Alors, moi en fait, je préparais mon meeting, je voulais regarder quelle était la proposition du produit. C'était marqué « Le plein d'énergie naturelle ». J'étais en train de regarder un petit peu, et là j'ai remarqué une petite mention, sous l'effet de... enfin... qui parlait de femmes enceintes. J'ai cherché en français, ça m'a déçue de comprendre ce qui était mentionné. Là, j'ai eu une mauvaise surprise : il y a tellement de mots écrits en français, même en regardant sur tous les aspects du paquet... En fait, moi j'ai compris ce que ça voulait dire, c'est qu'on n'est pas ensemble, c'est... pour les femmes enceintes, ce produit n'était pas bien indiqué pour ces personnes-là."}, {"type": "document", "q": "Question 34 : Qu'est-il reproché à cet emploi ?", "c": ["La perte de sa liberté intellectuelle", "Les nombreux voyages à l'étranger", "Un manque de reconnaissance", "Une rémunération insuffisante"], "a": 0, "k": "la rédaction a un droit de regard sur le papier", "transcript": "Alors Jean, cet essai au journal, qu'est-ce que ça a donné ? C'était passionnant. Épuisant, parce qu'on ne compte pas ses heures. Il y a énormément de déplacements, c'est un côté agréable. C'est un travail très valorisant, non ? C'est vrai, on bénéficie d'une considération exceptionnelle. Ce qui pose problème, c'est que la rédaction a un droit de regard sur le papier. Les gens qui travaillent avec eux peuvent être trop orientés. Il y a un manque d'indépendance."}, {"type": "document", "q": "Question 35 : Quelle est la particularité du piment d'Espelette ?", "c": ["Il a été découvert en Amérique avant d'être introduit en France", "Il est cueilli uniquement en été pour être conforme aux normes", "Il est utilisé dans de nombreux plats de la cuisine basque", "Son exportation à l'étranger est fortement contrôlée"], "a": 3, "k": "une appellation d'origine contrôlée", "transcript": "Cousin du poivron, le piment d'Espelette a été rapporté d'Amérique du Sud par Christophe Colomb. Aujourd'hui, il est la seule épice française disposant d'une appellation d'origine contrôlée et sa notoriété a largement dépassé les frontières du Pays basque. Pour avoir droit à la prestigieuse appellation « Piment d'Espelette », les piments doivent être récoltés à un stade très précis."}, {"type": "document", "q": "Question 36 : Selon cet artiste, comment s'exprime la folie d'un compositeur ?", "c": ["Par l'originalité dont est marquée sa personnalité", "Par la modernité avec laquelle il joue des airs célèbres", "Par la place que la musique occupe dans son quotidien", "Par le côté imprévisible des mélodies qu'il invente"], "a": 3, "k": "un sous-harmonique qui peut démarrer et s'échapper vers le futur", "transcript": "La folie dont on parle se situe peut-être dans l'espace qui rend un compositeur intéressant. C'est qu'il y a un sous-harmonique qui peut démarrer et s'échapper vers le futur, vers ailleurs. C'est cela qui fait l'intérêt des personnes présentes. Cette folie, je pense, n'est à aucun moment perçue comme une phobie. Je pense que lorsque je suis au théâtre, elle devient palpable."}, {"type": "document", "q": "Question 37 : Sur quoi porte la réflexion de ce scientifique ?", "c": ["La communication entre les animaux", "La place de l'être humain dans la nature", "Le progrès des sciences naturelles", "L'évolution de l'espèce humaine"], "a": 1, "k": "C'est l'anthropocentrisme : on regarde les autres du haut de nos positions", "transcript": "À cette époque-là, on ne connaissait pas grand-chose. C'est surtout la manière dont on regardait. D'un seul coup, il y a eu cet effet réversif. C'est l'anthropocentrisme : on regarde les autres du haut de nos positions, et d'un seul coup, ça nous permet de dire « Mais qu'est-ce qui te permet de te mettre cette position-là ? » On a longtemps dit que la capacité d'interroger sur ce que nous sommes était propre à l'humain."}, {"type": "document", "q": "Question 38 : Que regrette l'intervenant dans ce type de relation ?", "c": ["La fragilité de l'engagement", "La multiplicité des contacts", "La pauvreté des échanges", "L'absence du face à face"], "a": 0, "k": "Il y a une précarité de la relation humaine", "transcript": "Dans les relations d'amitié virtuelles, on dit souvent que le lien se crée d'un clic. Ce défaut m'attire. Il y a une précarité de la relation humaine dans ces réseaux-là, et même dans les concours qu'on est appelés à faire sur le web comme le speed dating, une forme de speed meeting qui fait que là il semble qu'on maintienne une relation ou pas. On peut se poser la question du caractère durable des vertus des amitiés."}, {"type": "document", "q": "Question 39 : Que cherche à étudier cette personne à propos des algues ?", "c": ["Le processus d'attractivité des cellules femelles", "Les différences avec la reproduction des plantes terrestres", "La constitution de certains organismes aquatiques", "L'influence de la météorologie sur leur fécondation"], "a": 0, "k": "attirent les femelles pour féconder", "transcript": "Tes recherches sur les algues, ça avance ? Oui, pas mal. Mais, tu étudies quoi au juste ? Leur système de reproduction. Dans un milieu aquatique, le vent et les insectes ne jouent évidemment aucun rôle. Ce sont de petites boules au bout de tiges qui se forment et attirent les femelles pour féconder. Et à quoi serviront ces recherches ? Par la suite, on pourra multiplier ces algues et les utiliser dans la composition des produits pharmaceutiques."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 26/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test26_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 26</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 26 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 26</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
</html>
