<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 21 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

mathématiques nous a donné un problème très difficile pour demain. Je ne comprends rien, et tout seul je n'y arrive pas. Tu veux bien m'expliquer, s'il te plaît ?"}, {"type": "extrait", "q": "", "c": ["Oui, bonne idée. C'est facile à préparer.", "Oui, fais-nous une tarte au citron.", "Oui, il aime bien le chocolat chaud.", "Oui, on peut manger au restaurant."], "a": 0, "k": "quel dessert préparer", "transcript": "Je ne sais pas quel dessert préparer pour le dîner avec Marc ce soir. Qu'est-ce que tu penses d'une salade de chouettes ?"}, {"type": "extrait", "q": "", "c": ["Oui, achetez un timbre.", "Oui, allez au guichet numéro 3.", "Oui, écrivez votre adresse ici.", "Oui, prenez la rue en face."], "a": 3, "k": "où se trouve la poste", "transcript": "Excusez-moi Monsieur, pourriez-vous me dire où se trouve la poste, s'il vous plaît ?"}, {"type": "extrait", "q": "", "c": ["Oui. Ce serait bien que tu manges mieux.", "Oui. Il faut que tu te reposes plus.", "Oui. Prends rendez-vous chez le médecin.", "Oui. Tu devrais t'inscrire à la piscine."], "a": 3, "k": "si j'ai du sport", "transcript": "Je ne suis pas en forme. J'ai souvent mal au dos. Tu penses que je vais aller mieux si j'ai du sport ?"}, {"type": "extrait", "q": "", "c": ["Pardon. J'ai déménagé.", "Pardon. J'ai fait une erreur.", "Pardon. J'ai perdu les clés.", "Pardon. Je vais revenir demain."], "a": 1, "k": "Ce n'est pas ici", "transcript": "– Bonjour. C'est ici pour visiter l'appartement ?\n– Non, monsieur. Ce n'est pas ici."}, {"type": "extrait", "q": "", "c": ["Non, le train est annulé.", "Non, le train est complet.", "Non, le train est déjà là.", "Non, le train est en retard."], "a": 2, "k": "j'ai le temps d'acheter un journal", "transcript": "C'est bientôt l'heure de monter dans le train, mais est-ce que tu penses que j'ai le temps d'acheter un journal ?"}, {"type": "extrait", "q": "", "c": ["Bien sûr, je réserve l'hôtel.", "D'accord, on reste à la maison.", "Non, l'appartement est trop cher.", "Pourquoi pas ? Les enfants vont adorer."], "a": 3, "k": "faire du camping", "transcript": "Maxime propose de faire du camping dans le sud de la France pour les prochaines vacances. Qu'est-ce que tu en penses ?"}, {"type": "extrait", "q": "", "c": ["Début juin.", "Depuis hier.", "Jusqu'à minuit.", "Pendant dix jours."], "a": 0, "k": "Quand commence le festival de jazz", "transcript": "Quand commence le festival de jazz de Montréal ?"}, {"type": "document", "q": "Question 11. Qu'est-ce que Julie explique ?", "c": ["Elle doit quitter son logement.", "Il y a des travaux chez elle.", "Le loyer est devenu trop cher.", "Sa colocataire est partie."], "a": 0, "k": "Je vais déménager", "transcript": "– Eh bien Julie, qu'est-ce qu'il y a ?\n– Je vais déménager parce que mon propriétaire veut vendre l'appartement et faire de gros travaux dans quelques mois. Je regarde les annonces sur Internet.\n– Et tu as déjà trouvé un logement ?\n– Non, pas encore.\n– Tu sais que Malika cherche un colocataire. Tu pourras faire des économies sur le loyer.\n– Oui, mais je préfère vivre seule."}, {"type": "document", "q": "Question 12. Pourquoi Oscar est-il inquiet ?", "c": ["Parce que la zone d'embarquement est loin.", "Parce que leur avion décolle bientôt.", "Parce que leur vol est en retard.", "Parce que Yasmine a perdu sa valise."], "a": 1, "k": "notre embarquement est en cours", "transcript": "Dernier appel pour les passagers à destination de Montréal. Embarquement immédiat, porte B.\n– Yasmina, on va être en retard. Dépêche-toi. Regarde cette file d'attente devant le contrôle de sécurité.\n– Ne t'inquiète pas, Oscar. Excusez-nous, monsieur. Nous allons à Montréal et notre embarquement est en cours. Est-ce que nous pourrions passer devant vous ?\n– Oui, allez-y. Je décolle dans deux heures."}, {"type": "document", "q": "Question 13. Où Sophie trouve-t-elle le dossier Sanovi ?", "c": ["Dans la poubelle.", "Aux archives.", "Dans le tiroir.", "Sur le bureau."], "a": 0, "k": "J'ai jeté tous les papiers", "transcript": "– Sophie, je ne trouve pas le dossier Sanovi.\n– Je l'ai posé sur votre bureau.\n– Où, sur mon bureau ?\n– Près de l'écran de votre ordinateur, sur la pile de papier.\n– Ah, zut. J'ai jeté tous les papiers qui traînaient.\n– Attendez, je vais regarder. Tenez, il n'est pas perdu. La femme de ménage n'est pas encore passée."}, {"type": "document", "q": "Question 14. Qu'est-ce qui pose problème aux clients ?", "c": ["La date de départ.", "La durée du voyage.", "La situation de l'hôtel.", "Le prix du séjour."], "a": 3, "k": "C'est au-dessus de mes moyens", "transcript": "– Bonjour, je voudrais réserver un séjour aux Seychelles.\n– Alors, j'ai plusieurs formules de voyage à vous proposer. J'ai notamment quelque chose de très intéressant. Un combiné avion plus hôtel 4 étoiles sur l'île principale à 1300 euros la semaine. Départ entre le 10 et le 15 décembre.\n– C'est au-dessus de mes moyens. Auriez-vous d'autres formules à me proposer ?\n– J'ai aussi des hôtels de catégorie inférieure.\n– Oui, je préférerais."}, {"type": "document", "q": "Question 15. Pourquoi Lara téléphone-t-elle à Alex ?", "c": ["Pour lui conseiller d'aller voir un médecin.", "Pour lui dire qu'elle sera un peu en retard.", "Pour lui proposer un film qu'elle veut voir.", "Pour lui rappeler une chose importante."], "a": 3, "k": "N'oublie pas de prendre tes lunettes", "transcript": "Allô, Alex ? C'est Lara. N'oublie pas de prendre tes lunettes pour la séance de ciné ce soir. La dernière fois, tu ne voyais rien et tu as dormi pendant deux heures. On se retrouve comme prévu ? Salut."}, {"type": "document", "q": "Question 16. Pourquoi Pierre Toussaint appelle-t-il M. Le Fort ?", "c": ["Pour lui communiquer une décision.", "Pour lui confirmer une adresse.", "Pour lui demander d'envoyer un CV.", "Pour lui proposer un entretien."], "a": 3, "k": "je souhaiterais vous rencontrer", "transcript": "Bonjour M. Le Fort. Je suis Pierre Toussaint des affaires culturelles de la ville d'Aubervilliers. Je vous contacte car vous avez répondu à notre offre d'emploi pour notre médiathèque. Votre profil nous intéresse pour le poste de bibliothécaire, mais je souhaiterais vous rencontrer pour obtenir des informations complémentaires. Pourriez-vous contacter mon assistant avant vendredi après-midi pour lui faire part de vos disponibilités ? Bonne journée."}, {"type": "document", "q": "Question 17. Que doit faire Sandra ?", "c": ["Classer des documents.", "Préparer des courriers.", "Téléphoner aux clients.", "Vérifier les comptes."], "a": 0, "k": "rangement des dossiers de litige", "transcript": "Monsieur, j'ai fini de contacter tous les fournisseurs. Je pourrais peut-être mettre à jour les factures sur l'ordinateur maintenant. Occupez-vous plutôt d'abord du rangement des dossiers de litige dans les chemises cartonnées, merci, Sandra."}, {"type": "document", "q": "Question 18. Qu'apprend-on sur les entreprises françaises ?", "c": ["Elles cherchent des spécialistes en vidéo.", "Elles modernisent leurs procédés de recrutement.", "Elles préfèrent employer des stagiaires.", "Elles reçoivent peu de candidatures spontanées."], "a": 1, "k": "en train d'ailleurs d'exploser dans les entreprises françaises", "transcript": "Le groupe Canal recrute des stagiaires et pour la première fois, la sélection va se faire uniquement sur la base d'entretiens vidéo. C'est une méthode qui est en train d'ailleurs d'exploser dans les entreprises françaises. Oui, c'est une première. La chaîne emboîte le pas à un processus de recrutement très à la mode. Un chiffre sur le site de recrutement Météo Job : le nombre de candidats ayant passé un entretien vidéo a augmenté de 250 % entre 2016 et 2017. Voilà comment ça se passe. Un Canal Plus, pour prendre son exemple, reçoit des milliers de CV de jeunes qui veulent accéder à des stages ou trouver des contrats d'alternance. Elle ne doit en retenir que 120."}, {"type": "document", "q": "Question 19. De quoi parlent les deux personnes ?", "c": ["D'une négociation par visioconférence.", "De l'urgence des dossiers à traiter.", "Des avantages du travail à distance.", "Des problèmes fréquents de transports."], "a": 2, "k": "je me concentre mieux sur mes dossiers", "transcript": "– Ah, tiens, Camilo. Tu es au bureau aujourd'hui. Tu n'es pas en télétravail.\n– Normalement, non, c'est seulement le jeudi et ça me plaît. Alors au moins je ne perds pas tant de temps dans les transports et je me concentre mieux sur mes dossiers compliqués. Et puis même si je ne suis pas là, je suis toujours joignable par téléphone et par courriel. Il m'arrive même d'assister à des réunions par visioconférence. Ce n'est pas très différent d'une journée normale."}, {"type": "document", "q": "Question 20. Que propose Marie à ses amis ?", "c": ["Une sortie au théâtre.", "Un voyage au Pérou.", "Un séjour en Bretagne.", "Une visite à Anne Roman."], "a": 0, "k": "réservations des places de théâtre", "transcript": "Bonjour, c'est Marie. Vous n'êtes pas là. Bon, je vous appelais comme promis au sujet des réservations des places de théâtre avant votre départ au Pérou. Je vous propose un autre spectacle que Bérénice car ça ne se joue plus. Pourquoi pas un roman ? Il paraît que son spectacle est très bien et plein d'humour. Ou bien André S, qui lit des textes qu'il a créés lui-même sur les athlètes de haut niveau. Dites ce que vous en pensez. Je réserverai les places. Nous partons en Bretagne demain, mais je crois que vous avez notre numéro de téléphone là-bas. À bientôt."}, {"type": "document", "q": "Question 21. De quoi parlent ces personnes ?", "c": ["D'un projet de voyage.", "D'un changement de travail.", "D'un futur déménagement.", "D'une sortie au cinéma."], "a": 0, "k": "réaliser un documentaire sur la Gaspésie", "transcript": "– Salut, ça va, ça va. Mais mon petit ami est parti pour trois mois pour réaliser un documentaire sur la Gaspésie. Une région assez sauvage du Québec.\n– Ah oui, je connais, quelle chance ! J'adorais y retourner et tu vas y aller aussi.\n– J'aimerais bien, mais j'ai des missions prévues prochainement. Mais bon, je vais voir mon patron demain. Je lui demanderai si je peux prendre des vacances.\n– Bonne chance. Tu m'écriras pour me raconter ton expérience là-bas et préviens-moi quand le film sortira."}, {"type": "document", "q": "Question 22. Que regrette Nathalie ?", "c": ["Elle a perdu aux jeux de société.", "Elle est restée près de chez elle.", "La météo était très mauvaise.", "Le logement était mal situé."], "a": 2, "k": "il a plu tout le temps", "transcript": "– Salut Nathalie. Alors, comment s'est passé le week-end à la montagne ?\n– L'endroit était complètement vide, mais le séjour a été gâché parce qu'il a plu tout le temps. On n'a pas pu faire de randonnée comme prévu.\n– C'est dommage. Qu'est-ce que vous avez fait alors ?\n– On a sorti les dominos et les cartes. On aurait pu faire ça chez nous. Ça nous aurait coûté moins cher. On a fait beaucoup de route pour rester enfermés."}, {"type": "document", "q": "Question 23. Quelles difficultés les créateurs de musique rencontrent-ils ?", "c": ["Leur public est en diminution.", "Leur salaire est insuffisant.", "Leur savoir est peu transmis.", "Leur talent est dévalorisé."], "a": 1, "k": "suffisamment de rémunération pour vivre correctement", "transcript": "Et donc les compositeurs ont un autre métier. C'est-à-dire que oui, ils sont chefs d'orchestre ou ils sont directeurs de conservatoire ou ils sont enseignants, chercheurs, directeur artistique, parfois parce que leur métier de compositeur ne leur permet pas de pouvoir avoir suffisamment de rémunération pour vivre correctement. Je pense qu'il doit d'ailleurs y avoir à peu près deux ou 3 % de compositeurs aujourd'hui qui vivent réellement de leur musique. C'est très, très peu."}, {"type": "document", "q": "Question 24. De quoi parlent les deux amis ?", "c": ["De conseils pour mieux dormir.", "De difficultés à calmer les enfants.", "De la relation entre fille et mère.", "Des premiers mois d'un bébé."], "a": 3, "k": "elle n'a que trois mois", "transcript": "– Allô ? Salut. C'est Julie. Ça va ? Je voulais prendre des nouvelles et aussi de Sarah. Ça va ?\n– Je suis fatiguée, mais tout se passe bien. Sarah a bien grandi. Elle est très mignonne, mais les nuits sont encore difficiles. Je ne dors pas beaucoup. Et oui, elle n'a que trois mois.\n– Il faut attendre encore un peu. Tu feras moins de nuits difficiles.\n– Mais heureusement, ma mère vient souvent m'aider pendant la journée. Ça me permet de faire une sieste et Sarah adore voir sa grand-mère. Les nuits sont difficiles, mais on y arrivera.\n– Génial. Je viendrai vous voir bientôt."}, {"type": "document", "q": "Question 25. Quel changement de société est observé dans ce reportage ?", "c": ["Les gens cherchent davantage à être heureux.", "Les gens deviennent de plus en plus égoïstes.", "Les gens se préoccupent moins de leur famille.", "Les gens sont peu demandeurs de sensations."], "a": 0, "k": "il y a le droit au bonheur", "transcript": "Jadis, on mettait plus l'accent sur les devoirs de l'individu, il fallait être un bon père, une bonne mère, etc. Et aujourd'hui, on met beaucoup plus l'accent sur les droits, et parmi ces droits, il y a le droit au bonheur. Et donc ce droit, d'ailleurs, qui est inscrit dans la constitution, dans la déclaration des droits de l'homme, a bien créé petit à petit, oui, une sorte de pression sociale. On l'observe depuis une dizaine d'années et c'est vrai que les gens veulent du coup apprendre à mieux vivre avec leurs émotions qu'ils considèrent d'ailleurs parfois comme encombrantes."}, {"type": "document", "q": "Question 26. À quoi aboutit l'initiative collective ?", "c": ["La création de meubles à partir du recyclage.", "La distribution d'emballages non polluants.", "La promotion des marques peu connues.", "L'achat en gros d'aliments labellisés bio."], "a": 0, "k": "en faire des tables ou des bancs en plastique", "transcript": "Une initiative vient de voir le jour. Elle s'appelle Collectif Bio. Oui, c'est un collectif de 13 marques bio qui a mis ce projet sur pied en partenariat avec des magasins spécialisés bio. Il y a des indépendants et des magasins en réseau. Au total, il y a quand même plus de 650 points de collecte implantés en France. En pratique, en fait, vous êtes invités à ramener vos emballages non recyclables en magasin pour les déposer dans des box, pour que l'opérateur recycle ces déchets pour en faire des tables ou des bancs en plastique, par exemple. Alors, on peut même déposer des emballages de marques qui ne sont pas partenaires de cette opération ? Eh oui, absolument, même s'il en a coûté 175 000 € aux 13 pionniers pour rendre possible cette initiative. D'ailleurs, on peut se demander si ça n'aura pas un impact sur le prix des produits."}, {"type": "document", "q": "Question 27. Qu'apprend-on au sujet de cet écrivain ?", "c": ["Il a eu conscience de son talent tôt.", "Il édite des œuvres pour la jeunesse.", "Il pratique son art depuis l'enfance.", "Il rédige des manuels de jardinage."], "a": 2, "k": "je n'ai jamais arrêté d'écrire", "transcript": "– Bien, à partir de là, vous n'avez jamais arrêté d'écrire.\n– Oui, je n'ai jamais arrêté d'écrire et ça me fait me rendre compte véritablement que j'ai toujours été écrivain. Moi, j'étais absolument persuadé pendant très, très longtemps que tout petit garçon ou petite fille qui rentrait chez lui ou chez elle écrivait des histoires, puisque c'était ce que je faisais. Je suis écrivain comme le pommier fait les pommes, très, très naturel. Tout le monde avait compris que j'étais écrivain."}, {"type": "document", "q": "Question 28. Que propose la navigatrice ?", "c": ["De collecter des dons.", "De développer la recherche.", "De sensibiliser l'opinion.", "D'explorer l'écosystème."], "a": 2, "k": "faire prendre conscience", "transcript": "La navigatrice Marie Le Valois est la porte-parole de la Semaine de la mer. Écoutez-la : on a voulu mettre en place une Semaine de la mer pour le très grand public. À côté, les institutions membres de l'Alliance de la Mer font intervenir des scientifiques et des professionnels qui travaillent sur des solutions d'avenir pour une meilleure gestion de la mer. Mais il faut mobiliser tout le monde pour faire prendre conscience que les océans ne sont pas seulement l'endroit où l'on va passer ses vacances, mais participent aussi à la régulation du climat, fournissent 70 % de l'oxygène que l'on respire, et représentent un réservoir de solutions en énergie renouvelable et médicinale, des ressources dont on ne connaît quasi rien. Puisqu'on ne connaît qu'un pour cent de la biodiversité marine."}, {"type": "document", "q": "Question 29. Que recherchent les habitants de ces oasis ?", "c": ["Adopter un mode de vie collectif responsable.", "Construire un réseau d'assainissement des eaux.", "Faire la promotion de logements écologiques.", "Mener une politique d'aménagement des villes."], "a": 0, "k": "décidés à vivre de façon plus écolo", "transcript": "Si demain vous viviez dans une oasis — je ne vous parle pas d'un lac avec des petits palmiers au milieu du désert, mais d'une communauté, d'une petite communauté en France, en ville ou à la campagne, où vos voisins seraient comme vous décidés à vivre de façon plus écolo. C'est ça, les oasis : 500 petits groupes aujourd'hui, des familles qui vivent côte à côte, mais aussi ensemble, et c'est peut-être avant-gardiste. Prenez par exemple l'écohameau du Plessis : 28 familles, soit 60 personnes qui vivent dans des bâtiments bioclimatiques, dont le chauffage, pour faire simple, ne pollue pas, et qui toutes ont renoncé à se brancher au tout-à-l'égout. Leurs eaux grises sont traitées dans des bassins plantés de roseaux qui dépolluent. C'est parfaitement légal. Ça marche."}, {"type": "document", "q": "Question 30. Quel est le rôle du sourire d'après ce docteur ?", "c": ["Il aide à lutter efficacement contre la tristesse.", "Il est indispensable pour l'activité de notre cerveau.", "Il montre les progrès dans l'apprentissage des émotions.", "Il permet d'entrer en relation avec les autres."], "a": 3, "k": "important dans notre relation avec les autres", "transcript": "Avoir un beau sourire est un atout majeur de notre bien-être et un élément important dans notre relation avec les autres. Nous en parlons avec le docteur Franck Amoyel. Bonjour. Bonjour. Comment d'abord définiriez-vous le sourire ? C'est un atout extraordinaire qui produit une grande confiance, qui attire le regard des autres. En plus, il participe à la relation sociale. Vous savez, un sourire heureux nous rend heureux, un sourire triste nous rend triste. Et toutes ces expressions de visage finalement pénètrent notre inconscient, et c'est notre cerveau qui les décode. Ce qu'il faut savoir aussi, c'est que le sourire, il est déterminé génétiquement."}, {"type": "document", "q": "Question 31. Qu'apprend-on sur le niveau d'orthographe dans le monde du travail ?", "c": ["C'est un délai négligeable pour les recruteurs.", "Il est indépendant de la promotion professionnelle.", "Il est prévu de tester celui des futurs salariés.", "La question est préoccupante pour les plus jeunes."], "a": 3, "k": "chez les jeunes de moins de 30 ans", "transcript": "Sans aller jusqu'au licenciement, quelles sont les conséquences d'un mauvais niveau d'orthographe ? Alors, les responsables des ressources humaines interrogés par l'institut de sondage reconnaissent à 52 % que cela a déjà pu jouer dans la mise à l'écart d'un candidat au moment du recrutement. Et ils sont 15 % à estimer que cela peut freiner la promotion d'un salarié. Ce n'est pas vrai pour toute la population, mais ça prend une autre proportion chez les jeunes de moins de 30 ans qui disent avoir le plus de mal avec l'orthographe. Quand on leur demande si leurs fautes ont suscité des reproches de la part de leurs collègues, leur hiérarchie ou leurs clients, ils sont deux fois plus nombreux que le reste de la population à dire oui."}, {"type": "document", "q": "Question 32. Que déplore cet homme à propos de l'individu dans le monde actuel ?", "c": ["L'absence de formes d'altruisme.", "La place accordée à l'apparence.", "La superficialité des relations.", "Le manque d'estime de soi."], "a": 3, "k": "nous ne nous autorisons pas à être nous-mêmes", "transcript": "Et je me suis rendu compte que nous vivions dans un monde où nous ne nous autorisons pas à être nous-mêmes, à nous écouter, à nous respecter. Et c'est surtout de cette manière que nous sommes pris par une forme d'auto-exploitation qui entraîne tant de gens jusqu'à l'épuisement, jusqu'au burn-out. Cela me donne envie de dire : « Juste sauvez votre peau, devenez narcissique. » Et je crois que ce que signifie être narcissique, c'est pouvoir s'écouter, se rencontrer, se respecter. Et je crois que cela, c'est vraiment important aujourd'hui, crucial."}, {"type": "document", "q": "Question 33. Dans quelle mesure cette femme fait-elle de la politique ?", "c": ["En communiquant dans les médias.", "En critiquant le pouvoir en place.", "En représentant les électeurs.", "En s'engageant comme citoyenne."], "a": 3, "k": "les gens qu'on appelle la société civile", "transcript": "– On a de la difficulté à croire que vous ne faites pas de politique. Et vous avez... j'espère qu'on va parler un peu de démocratie, mais la démocratie, ça ne s'explique pas exclusivement par la politique électorale. Ça me surprend toujours quand je vous entends dire que vous n'avez pas l'intention de faire de la politique, au sens de vous présenter.\n– Mais en fait, j'en fais de la politique, de la politique internationale, mais sans mandat, ce qui d'ailleurs pose ses propres problèmes. Les gens disent : mais vous êtes qui, qui vous a donné un mandat ? Mais je pense qu'on vit maintenant dans un monde où les gens qu'on appelle la société civile sont de plus en plus organisés à l'extérieur des institutions formelles de la démocratie."}, {"type": "document", "q": "Question 34. Selon l'intervenant, pourquoi l'aquaculture pose-t-elle problème ?", "c": ["L'alimentation fournie aux élevages est de mauvaise qualité.", "L'existence d'industries piscicoles nuit à la variété des espèces.", "La filière aquacole fragilise l'équilibre alimentaire mondial.", "Les pêcheurs pillent les fonds marins pour soutenir la concurrence."], "a": 2, "k": "mettre en opposition les pays en développement et les pays développés", "transcript": "Selon ce comité d'experts, c'est une stratégie qui ne fait que davantage mettre en opposition les pays en développement et les pays développés. Ils estiment que la consommation de poissons d'élevage dans les pays riches ne fait qu'aggraver la situation dans les autres pays, puisqu'il faut avoir recours aux réserves de poissons des pays en développement pour produire les ressources qu'on consacre à l'élevage industriel. L'aquaculture, qui nous donne des saumons et autres poissons, est une grande consommatrice de farine de poisson. Or, la farine de poisson est obtenue en broyant des poissons tout à fait consommables, comme des maquereaux, des anchois, etc. Ces poissons sont détruits pour fabriquer de la nourriture pour poissons d'élevage, qui est ensuite vendue dans les pays occidentaux."}, {"type": "document", "q": "Question 35. Qu'est-ce qui a conduit Armel à suivre une formation continue ?", "c": ["La perte de son emploi.", "Sa volonté d'apprendre.", "Ses nouvelles fonctions.", "Un dispositif gouvernemental."], "a": 0, "k": "j'ai été licencié", "transcript": "– La formation continue offre parfois une seconde chance inespérée pour changer de cap. Armel nous le montre. Parlez-nous de votre ancien emploi.\n– Ingénieur agroalimentaire. J'ai travaillé pendant 12 ans dans un centre technique industriel dont j'ai été licencié.\n– Pourquoi avoir suivi une formation ?\n– Suite à mon licenciement, j'ai postulé à différentes offres d'emploi, mais on me reprochait toujours mon profil trop scientifique et ma méconnaissance des systèmes et acteurs de l'innovation. Afin de combler ces lacunes, je me suis inscrite en master.\n– Comment cela s'est-il déroulé ?\n– Les obstacles ont été nombreux : administratifs, financiers et organisationnels. Bon, et la double compétence acquise me permet aujourd'hui de travailler dans le domaine que je cherchais."}, {"type": "document", "q": "Question 36. Que dit le scientifique sur l'existence extraterrestre ?", "c": ["C'est un thème controversé.", "C'est une croyance invraisemblable.", "C'est une hypothèse vérifiée.", "C'est une invention de science-fiction."], "a": 0, "k": "j'ai des collègues qui pensent le contraire", "transcript": "Habitées, elles pourraient l'être, je ne sais pas, nous ne savons rien de cela. Je sais que j'ai mon opinion, mais c'est une opinion. Ce n'est pas quelque chose que je peux appuyer par les scientifiques. C'est que dans cet univers, la vie est un phénomène très général. Je pense qu'il y a beaucoup de planètes exo, de planètes habitées, mais je ne peux pas l'affirmer parce que je n'ai pas de preuve et j'ai des collègues qui pensent le contraire. Donc, c'est un bon sujet de discussion pour les jours où la télévision en parle."}, {"type": "document", "q": "Question 37. Quel est le propos de ce médecin ?", "c": ["Il admet que les guérisons spontanées sont fréquentes.", "Il considère que la médecine a du mal à tout expliquer.", "Il déconseille l'utilisation de certains médicaments.", "Il est convaincu de l'efficacité des remèdes naturels."], "a": 1, "k": "il faut être un peu humble en médecine", "transcript": "J'accepte l'idée que le placebo n'a pas une efficacité tellement différente de celle d'un médicament. Mais en fait, nous avons besoin de médicaments qui sont des placebos. Et je suis médecin et je le dis. Et le problème, c'est qu'aujourd'hui, à la limite, quand un patient guérit grâce à un placebo, on va sous-entendre qu'il a eu le temps de guérir. C'était pour dire que oui, effectivement, il faut être un peu humble en médecine. On ne comprend pas tout ce q . Mais à aucun moment notre cerveau n'entre dans un mode très simple, qui est d'être là, conscient que je suis vivant, conscient que j'appartiens à un ordre naturel, et de juste contempler et ressentir ce phénomène."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 21/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test21_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 21</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`

      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
