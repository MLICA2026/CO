<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 5 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

agne.\n– Tu devrais aller dans le sud, à Séville. C'est une ville magnifique.\n– Pourquoi pas ? Mais j'ai un petit budget. Je dois voir si je peux trouver un logement pas trop cher."}, {"type": "document", "q": "Question 13. Qu'est-ce que Thomas propose à Marion ?", "c": ["D'aller dans un bar.", "De faire les courses.", "De préparer un voyage.", "De travailler ensemble."], "a": 0, "k": "On prend un verre quelque part", "transcript": "– Salut Marion.\n– Salut Thomas, ça va ?\n– J'ai une journée difficile au bureau. On prend un verre quelque part et tu me racontes ton week-end ?\n– D'accord.\n– Mais avant, je dois passer à la pharmacie.\n– Ce n'est pas loin. Je suis fatigué, moi."}, {"type": "document", "q": "Question 14. Quel est le problème ?", "c": ["L'enfant est malade à cause des chats.", "La famille a déjà eu un chien.", "Le père déteste les animaux.", "Les parents ont beaucoup de travail."], "a": 0, "k": "avec tes allergies", "transcript": "– Papa, maman, j'aimerais vraiment avoir un chat, vous savez ?\n– Oui, Sébastien. Mais avec tes allergies, ça va être difficile. On pourrait plutôt prendre un chien.\n– Ah non, un chien, ça demande trop de travail."}, {"type": "document", "q": "Question 15. Dans quel type de logement habite cette personne ?", "c": ["Une chambre d'hôtel.", "Une maison individuelle.", "Un grand appartement.", "Un studio en ville."], "a": 3, "k": "Il y a une seule pièce", "transcript": "– Alors, tu as trouvé un logement ?\n– Oui, c'est tout petit. Il y a une seule pièce. C'est au deuxième étage d'un immeuble situé en plein centre-ville. En plus, la propriétaire est gentille. C'est ce qu'il me faut."}, {"type": "document", "q": "Question 16. Que demande Olivier ?", "c": ["À quel moment il pourra poser des congés.", "Dans quelle ville il devra partir en mission.", "Qui sera de permanence au mois d'août.", "S'il sera autorisé à suivre un stage en été."], "a": 0, "k": "Je voudrais les prendre en juillet", "transcript": "– Bonjour, Monique. Bonjour e de l'ouest. Ce sont les gens qui sont le plus susceptibles d'avoir des enfants. Alors il y a un effet double. Non seulement il y a de la croissance grâce à la migration interne, mais le taux de naissance augmente aussi en Alberta. Les deux facteurs contribuent grandement à cette croissance explosive."}, {"type": "document", "q": "Question 19. De quoi parlent les deux personnes ?", "c": ["D'une négociation par visioconférence.", "De l'urgence des dossiers à traiter.", "Des avantages du travail à distance.", "Des problèmes fréquents de transports."], "a": 2, "k": "je ne perds pas tant dans les transports", "transcript": "– Ah, tiens, Camilo. Tu es au bureau aujourd'hui. Tu n'es pas en télétravail.\n– Normalement, non, c'est seulement le jeudi et ça te plaît.\n– Alors au moins je ne perds pas tant dans les transports et je me concentre mieux sur mes dossiers compliqués. Et puis même si je ne suis pas là, je suis toujours joignable par téléphone et par courriel, il m'arrive même d'assister à des réunions par visioconférence. Ce n'est pas très différent d'une journée normale."}, {"type": "document", "q": "Question 20. Quel est le projet de Régis Olives et de ses élèves ?", "c": ["Interviewer un réalisateur.", "Participer à un festival.", "Tourner un film.", "Visiter des studios de cinéma."], "a": 2, "k": "participer à la réalisation d'un film", "transcript": "– Régis Olives. Bonjour, bonjour. Bonjour Régis, vous lancez une aventure à vos lycéens dans une aventure assez incroyable qui est de participer à la réalisation d'un film, un film avec un réalisateur professionnel avec des professionnels du cinéma. Et il s'appelle François Chailloux.\n– Oui, à l'occasion du festival de Luchon, j'ai rencontré François. J'ai dit que je voulais faire un film."}, {"type": "document", "q": "Question 21. Qu'apprend-on sur le peintre Pierre Soulage ?", "c": ["C'est un artiste oublié par le public.", "Il a travaillé avec des couleurs claires.", "On lui a demandé de décorer un bâtiment.", "Son œuvre est présentée en France."], "a": 3, "k": "célébré dans son pays au musée d'art moderne de Paris", "transcript": "Bienvenue dans notre émission culturelle. Le peintre Soulage, connu mondialement et célébré dans son pays au musée d'art moderne de Paris. L'exposition s'appelle Noire Lumière parce que le noir de Soulage ne ressemble à aucun autre."}, {"type": "document", "q": "Question 22. Pourquoi les enfants de M. Baoulé ont-ils des accents variés quand ils parlent français ?", "c": ["Parce qu'ils ont été scolarisés dans des lycées plurilingues.", "Parce qu'ils ont été adoptés dans des pays différents.", "Parce qu'ils ont vécu dans de diverses zones de la planète.", "Parce qu'ils parlent plusieurs langues à la maison."], "a": 2, "k": "tous nés dans des endroits différents", "transcript": "– J'ai le plaisir de recevoir aujourd'hui Monsieur Baoulé, qui nous vient tout droit du Nouveau-Brunswick. Alors, Monsieur Baoulé, vous avez une belle famille puisque vous avez huit enfants, tous nés dans des endroits différents, je crois.\n– Oui, en Afrique, au Québec et les petits derniers au Nouveau-Brunswick.\n– Ah. Et est-ce qu'ils ont tous des accents différents ?\n– Ma foi, oui. Dans chacun de ces endroits, le français est parlé différemment et mes enfants ont pris l'accent du lieu où ils sont allés à l'école dans les premières années de leur vie."}, {"type": "document", "q": "Question 23. Que conseille cet intervenant aux parents ?", "c": ["D'attribuer à la lecture le statut de loisir.", "De favoriser la lecture en automne.", "De limiter la lecture d'histoires illustrées.", "De sélectionner des lectures classiques."], "a": 0, "k": "la lecture est avant tout un plaisir", "transcript": "Mais je crois que les difficultés en matière de lecture ont des causes à la fois individuelles et sociales. Les parents, par exemple, parce qu'ils sont angoissés par l'avenir de leurs enfants, leur présentent souvent la lecture comme une obligation, une démarche indispensable pour réussir. Et c'est une erreur parce que la lecture est avant tout un plaisir. Un livre, c'est un voyage, une découverte, une aventure, et il faudrait faire découvrir la lecture aux enfants comme on leur fait découvrir la cuisine chinoise ou les jeux dans la neige. Et puis les parents refusent aussi souvent à leurs enfants des lectures qu'ils considèrent comme mineures, les bandes dessinées, par exemple. Et ça aussi, c'est une erreur. Lire une bande dessinée, c'est lire et ça permet souvent d'ailleurs de découvrir ensuite d'autres formes de littérature."}, {"type": "document", "q": "Question 24. Qu'apprend-on sur Chantal Harvey ?", "c": ["Elle a beaucoup d'expérience.", "Elle a vite appris son métier.", "Elle aime prendre des risques.", "Elle sait diriger ses collègues."], "a": 1, "k": "Elle a assimilé rapidement les manœuvres", "transcript": "– Chers auditeurs, nous allons aujourd'hui vous présenter Chantal Harvey, une franco-québécoise qui travaille au centre de service de Shawinigan et qui, tenez-vous bien, conduit un chasse-neige. Alors Chantal, comment on se sent aux commandes de cette grosse machine ?\n– Je me sens parfaitement dans mon élément.\n– Et votre chef, qu'en pense-t-il ? Il est satisfait d'avoir une femme dans votre équipe.\n– J'en suis ravi. Elle a assimilé rapidement les manœuvres d'exécution et elle intervient efficacement aux endroits stratégiques. Même si elle s'y connaît peu en déneigement, elle a su tirer son épingle du jeu. C'est une personne courageuse et regardez comme elle est à l'aise aux manettes de cet engin. On jurerait qu'elle a fait ça toute sa vie."}, {"type": "document", "q": "Question 25. Qu'expliquent ces personnes sur le monde universitaire québécois ?", "c": ["Le nombre d'étudiants inscrits a augmenté.", "Les cursus sur l'environnement se sont multipliés.", "Les enseignants font des carrières prestigieuses.", "Les formations sont devenues plus concrètes."], "a": 1, "k": "au-dessus de 400 programmes au Québec", "transcript": "– Vous êtes écologiste, vous êtes environnementaliste à temps plein. C'est votre carrière. C'est votre métier.\n– Tout à fait, j'ai ce plaisir, moi, quand je faisais mes études, il n'y avait pas de possibilité de travailler en environnement. Alors maintenant, il existe des formations, des cours. On va à l'université pour…\n– Tout à fait. Il existe de très nombreux programmes. C'est assez fascinant. On a au-dessus de 400 programmes au Québec, tant au niveau technique qu'au niveau cégep. 400 programmes techniques, cégep, université, pour aller à l'université pour apprendre l'environnement.\n– Oui, oui, tout à fait. Mais j'ai, je travaille beaucoup sur le terrain avant, alors que j'avais moins de programme à l'époque."}, {"type": "document", "q": "Question 26. Que propose l'association présentée ?", "c": ["Elle construit des maisons pour les personnes âgées.", "Elle organise des évènements rassemblant les générations.", "Elle permet à des jeunes d'habiter chez des personnes âgées.", "Elle valorise les professions d'assistance aux personnes âgées."], "a": 2, "k": "favorise la cohabitation entre personnes âgées et jeunes", "transcript": "D'un côté, certaines personnes âgées ont de la place chez elles, ont besoin d'aide dans leur quotidien. D'un autre côté, certains jeunes ont du temps libre et cherchent à se loger. Alors on en reste là où on trouve une solution. L'association de l'or à Rennes favorise la cohabitation entre personnes âgées et jeunes défavorisés. Si vous voulez soutenir ce type de solution, rendez-vous sur Fondation de France.org."}, {"type": "document", "q": "Question 27. Selon Marie Nicole Lemieux, quelle est la spécificité du français qu'elle parle ?", "c": ["Il est caractérisé par son rythme.", "Il est protégé par des apports lexicaux variés.", "Il est protégé par les académiciens.", "Il est utilisé par une minorité de locuteurs."], "a": 1, "k": "j'ai la richesse de tout le patrimoine québécois", "transcript": "– Bonjour Marie Nicole Lemieux.\n– Bonjour, merci beaucoup d'être avec nous. Ça me fait très plaisir.\n– D'abord, quel français est-ce que vous parlez, vous ?\n– C'est un français que j'espère être international. Donc, vous êtes capable de me comprendre et déjà ça. Mais disons aussi que j'ai la richesse de tout le patrimoine québécois qui contient évidemment des mots anciens, très anciens qu'on a gardés, comme là, présentement, nous ne discutons pas, nous jasons. Et puis, et puis aussi d'anglicismes. Le régime britannique a vraiment teinté aussi notre français."}, {"type": "document", "q": "Question 28. Quel est l'objet de la discussion ?", "c": ["La répartition des tâches dans le service.", "Le manque d'expérience de l'équipe.", "Le retard pris dans la réalisation d'un projet.", "Les désaccords entre employeur et employés."], "a": 0, "k": "redéfinir clairement", "transcript": "– Je pense que le chef de département a raison. Il faudrait modifier la façon dont nous fonctionnons et redéfinir clairement les missions de chacun.\n– Oui, je suis d'accord d'autant que nous avons eu des incompréhensions entre nous ces derniers temps. D'après moi, elles sont directement liées au fait que personne ne sait précisément où commence son rôle et surtout, où il s'arrête dans le projet.\n– Tout à fait, d'accord. Moi-même, je suis un peu perdu. Si tout le monde essaie de tout faire, on ne sera jamais d'accord au sein de ce service, sans compter que ça ne nous fait pas gagner de temps.\n– Bien. Alors mettons ça à l'ordre de la réunion d'équipe de demain."}, {"type": "document", "q": "Question 29. De quoi est-il question dans cette émission ?", "c": ["D'un outil qui facilite l'apprentissage, quelle que soit la discipline étudiée.", "De la bonne méthode de révision d'un cours quand on est pris par le temps.", "De la difficulté à rédiger des cours motivants pour les jeunes étudiants.", "Des limites de l'enseignement à distance pour certaines disciplines."], "a": 0, "k": "un logiciel qui s'adapte à toutes les matières", "transcript": "– Parlons maintenant de l'enseignement à distance. Marielle Barreau, vous nous présentez un logiciel qui fait des fils de révision à votre place. C'est ça. Finalement, vous voulez inciter nos auditeurs étudiants à se tourner les pouces.\n– Ce n'est pas exactement ça. On vous propose en fait de travailler plus efficacement. C'est un logiciel qui s'adapte à toutes les matières et qui vous fait réviser. Le principe, c'est que vous numérisez en un temps record n'importe quel cours. Vous faites vous-même votre fiche de révision que vous saisissez sur votre clavier et le logiciel vous interroge de la façon la plus adéquate pour vous faire apprendre. Il pose des questions en rafale et s'adapte à vos difficultés en mettant l'accent là où vous avez des points faibles."}, {"type": "document", "q": "Question 30. De quoi traite ce reportage ?", "c": ["D'un appel à des projets imaginaires.", "D'un examen de fin d'études.", "D'un nouveau plan d'urbanisme.", "D'une rénovation d'un monument."], "a": 0, "k": "La consigne était de rêver", "transcript": "Jeunes sont complexes, se sont mesurés à cette forme unique qu'est la Tour Eiffel pour ce concours organisé par la fondation Eiffel adressé aux élèves des écoles d'architecture. La consigne était de rêver. Concevoir un édifice de très grande hauteur sur le Champ-de-Mars à Paris, à distance, accolée ou à la place de la Tour Eiffel. Trois étudiants suppriment donc carrément la tour. À la place, ils y construisent un aéroport vertical où creusent un puits de lumière avec de vastes plateaux, d'autres choisissent de la rendre habitable en comblant ses vides par des baies de couleur ou la doter d'un jardin suspendu."}, {"type": "document", "q": "Question 31. Selon Hubert Reeve, pourquoi cette première observation d'un trou noir est-elle importante ?", "c": ["Elle annonce de futures découvertes.", "Elle confirme une théorie ancienne.", "Elle illustre les progrès du matériel scientifique.", "Elle permet la poursuite des travaux d'Einstein."], "a": 1, "k": "C'est une confirmation de la valeur de la science", "transcript": "– Là, on vient très récemment d'observer pour la première fois un trou noir Uber, ce quelle a été votre réaction.\n– C'est le moment où on découvre une chose pour la première fois et surtout le fait que cette idée des trous noirs qui a été inventée par Einstein dans les années 1910-15, je ne me souviens pas, c'était au départ une théorie et de trouver que le comportement de ces trous noirs existe. C'est une confirmation de la valeur de la science en général qui sont par exemple, des idées des trous noirs. Ça vous donne confiance dans la science."}, {"type": "document", "q": "Question 32. Pourquoi la journaliste reste-t-elle prudente ?", "c": ["La conférence qui a eu lieu est uniquement symbolique.", "La secrétaire d'État a fait part de son pessimisme.", "Les discussions s'annoncent longues et difficiles.", "Tous les points de l'accord ont déjà été traités sans succès."], "a": 2, "k": "c'est maintenant que les choses démarrent réellement", "transcript": "C'est au cours de cette réunion internationale qu'un premier accord a été trouvé in extremis entre les deux pays et de nouvelles négociations commencent aujourd'hui, mais sur le fond, rien n'est encore fait. En effet, il aura fallu deux jours de négociations marathon pour parvenir à accoucher de ce document conjoint. Cela marque donc le début d'un processus, mais il faut rester prudent car c'est maintenant que les choses démarrent réellement. Alors amorce d'un processus de paix ou conférence symbolique. La secrétaire d'État a d'ailleurs précisé hier soir que l'échec n'était pas une option. En fait, on n'est pas encore rentré dans le vif du sujet. Beaucoup de points n'ont pas encore été abordés et n'ont pas été détaillés dans le document conjoint, car les deux parties n'ont pas réussi à se mettre d'accord sur la formulation."}, {"type": "document", "q": "Question 33. Quelle est la particularité de l'établissement de Philippe ?", "c": ["C'est la reproduction d'un café du siècle dernier.", "Il contient un dépôt-vente de meubles design.", "C'est à la fois un restaurant et une galerie d'art.", "Il y organise un festival de musique électronique."], "a": 2, "k": "j'ai accroché des tableaux, des œuvres contemporaines", "transcript": "– Alors, Philippe, est-ce que vous pouvez nous apprendre plus sur votre établissement ?\n– Quand j'ai récupéré l'endroit, il s'agissait d'un lieu qui était ancien à Montréal au début du 19e siècle. J'ai donc gardé ce qui était d'époque et j'ai rajouté une touche moderne, design, pour créer un espace particulier où des styles se mélangent. Comme je suis un passionné des meubles design, j'ai acheté des pièces qui me plaisent, et en plus d'y manger, on peut assister à des soirées musicales. Il y a un DJ très connu internationalement dans le domaine de la musique électronique. Enfin, étant donné qu'on est dans un lieu très haut plafond, j'ai accroché des tableaux, des œuvres contemporaines, mais on organise ici des expos temporaires. Toutes les formes de l'expression nous intéressent."}, {"type": "document", "q": "Question 34. Quelle forme de littérature cherche à promouvoir le festival Hors Limite ?", "c": ["Une littérature axée sur les débats avec le public.", "Une littérature expérimentée à travers le jeu.", "Une littérature interprétée par les comédiens.", "Une littérature portée sur l'interdisciplinarité."], "a": 3, "k": "La littérature peut croiser la danse, le graphisme ou le cinéma", "transcript": "– C'est la quatrième édition de ce rendez-vous qui s'échelonne sur deux semaines avec une cinquantaine d'auteurs invités. Pourquoi l'avoir appelé hors limite ? Ça n'évoque pas du tout la littérature.\n– Alors par contre, ça parle de l'ouverture. Je dirais que ce festival littéraire veut prouver que la littérature est ouverte de deux points de vue : sur le fond, le maître mot du festival, c'est les croisements et l'ouverture des formes. Le festival propose des lectures croisées. Il y a énormément de rencontres avec plusieurs auteurs. La littérature peut croiser la danse, le graphisme ou le cinéma. Je dirai aussi que hors limite, c'est l'ouverture sur le fond puisque on veut prouver que la littérature n'est pas nombriliste, qu'elle est ouverte aux questions qui agitent notre temps."}, {"type": "document", "q": "Question 35. Quel est l'intérêt de l'application Plana pour les usagers ?", "c": ["Allonger la durée de vie des smartphones.", "Évaluer la consommation téléphonique.", "Gérer le temps de connexion à internet.", "Optimiser l'utilisation des appareils."], "a": 3, "k": "Le principe n'est pas d'utiliser moins son smartphone, mais mieux", "transcript": "– Internet pollue. Cette technologie consomme aujourd'hui 10 % de l'énergie mondiale et cette consommation augmente d'année en année depuis 2013, elle a doublé. Alors pour enrayer ce fléau, une application a été créée afin de nous inciter à mieux utiliser nos smartphones car chaque geste compte. Comment se présente-t-elle cette application ?\n– Eh bien, comme pour mieux se faire entendre, Mathilde, elle prend la forme d'un assistant vocal dont le but est de nous aider à revoir certains de nos réflexes.\n– Et quel est le principe ?\n– Le principe n'est pas d'utiliser moins son smartphone, mais mieux. L'application Plana va donc scanner l'activité de votre téléphone. Elle va en dresser le bilan afin de pouvoir en tirer des conclusions et le rendre moins énergivore."}, {"type": "document", "q": "Question 36. Quelle est la particularité de l'œuvre présentée ?", "c": ["Des partitions musicales ponctuent les chapitres.", "Elle réunit des textes de musiciens sur le thème de la peur.", "L'éditeur a choisi d'accompagner le livre d'un DVD.", "Sa mise en page est comparable à celle du livret d'un disque."], "a": 3, "k": "le texte qui est centré en milieu de page", "transcript": "Et on est rendu à notre chronique littéraire avec Audry. Alors tout d'abord, Autostop, Daniel Bélanger. Alors on a affaire, évidemment, à un musicien guitariste aguerri, mais Daniel Bélanger, c'est d'abord un compositeur. C'est l'auteur de ses chansons. Et c'est cependant de son travail qu'on retrouve ici pour la forme du récit. On a d'ailleurs cette présentation-là que l'on trouve dans les jaquettes de CD. Là, vous savez, le texte qui est centré en milieu de page. Donc on a des renvois à la ligne à chaque nouvelle strophe. Ici, c'est la même chose, comme une partition. J'aimais bien ce format. C'est une nouveauté chez Les Allusifs. Voilà, on connaît cette maison d'édition pour ses parutions, souvent étrangères, aussi poétiques. Mais Les Allusifs, là, ils sortent une nouvelle collection de petits livres qu'ils appellent Les Peurs, avec comme concept : un auteur, une peur, un livre."}, {"type": "document", "q": "Question 37. Que préconise ce spécialiste face à l'engouement des jeunes pour les jeux vidéo ?", "c": ["De consulter un médecin psychothérapeute.", "Pour limiter la naissance des automobiles.", "De prescrire un traitement médicamenteux.", "D'informer les utilisateurs sur leurs dangers."], "a": 3, "k": "on l'accompagne", "transcript": "La question principale, c'est de savoir si on va médicaliser la crise d'adolescence ou pas, sachant qu'aujourd'hui le symptôme principal de la crise d'adolescence chez le garçon, c'est le jeu vidéo excessif ou l'internet excessif. Donc, si on dit addiction, on le médicalise, et ça veut dire tôt ou tard pas seulement des psychothérapies, mais des chimiothérapies pour tous les adolescents joueurs. Alors qu'on sait, encore une fois d'expérience, que 99 % arrêtent de jouer à 17 ou 18 ans parce qu'ils ont fini leurs adolescences, qui sont plus en révolte contre les parents, qui sont soucieux de s'intégrer à la société et d'avoir une activité professionnelle. Donc, à l'adolescence, on l'accompagne. Voilà, ne la pathologisons pas. Et je suis bien content que l'académie de médecine ait pris cette position."}, {"type": "document", "q": "Question 38. Que re <script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 5/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test34_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 5</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`

      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
