<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 9 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

"Je viens d'acheter mes billets d'avion pour Dakar. Je pars le 2 juillet. Et toi, qu'est-ce que tu fais pendant les vacances ?", "c": ["C'est une chouette idée.", "Je pars avec des amis.", "Ma mère vit là-bas.", "On revient dans 3 jours."], "a": 1, "k": "Je pars avec des amis.", "transcript": "– Je viens d'acheter mes billets d'avion pour Dakar. Je pars le 2 juillet. Et toi, qu'est-ce que tu fais pendant les vacances ?"}, {"type": "extrait", "q": "Question 4. Choisissez la bonne réponse.", "prompt": "Où habite ta famille ?", "c": ["À Montpellier.", "En vacances.", "Ma grande sœur.", "Samedi prochain."], "a": 0, "k": "À Montpellier.", "transcript": "– Où habite ta famille ?"}, {"type": "extrait", "q": "Question 5. Choisissez la bonne réponse.", "prompt": "J'ai rencontré mon mari quand je travaillais à l'étranger. On prenait des cours dans la même école de langue. Ah oui ? Et vous vivez à Toulouse depuis longtemps ?", "c": ["Non, ça fait 2 ans.", "Non, j'ai changé de métier.", "Non, je parle français.", "Non, nous voulons déménager."], "a": 0, "k": "Non, ça fait 2 ans.", "transcript": "– J'ai rencontré mon mari quand je travaillais à l'étranger. On prenait des cours dans la même école de langue. Ah oui ? Et vous vivez à Toulouse depuis longtemps ?"}, {"type": "extrait", "q": "Question 6. Choisissez la bonne réponse.", "prompt": "Allô, Fatima ? Dis-moi, demain, tu es libre à quelle heure ?", "c": ["Dans 2 heures, je pense.", "Vers 8 heures, si tout va bien.", "Pas plus tard que demain.", "Un peu plus tôt, je crois."], "a": 1, "k": "Vers 8 heures, si tout va bien.", "transcript": "– Allô, Fatima ? Dis-moi, demain, tu es libre à quelle heure ?"}, {"type": "extrait", "q": "Question 7. Choisissez la bonne réponse.", "prompt": "Vous avez reçu la commande de Madame Cordier ?", "c": ["Oui, oui, bientôt.", "Oui, ce matin.", "Oui, d'accord.", "Oui, pourquoi pas ?"], "a": 1, "k": "Oui, ce matin.", "transcript": "– Vous avez reçu la commande de Madame Cordier ?"}, {"type": "document", "q": "Question 8. De quoi est-ce que ces deux personnes parlent ?", "c": ["D'un atelier de cuisine.", "D'une recette familiale.", "Des courses pour un repas.", "Des horaires d'un magasin."], "a": 2, "k": "Tu peux en acheter une avant de rentrer à la maison ?", "transcript": "– Je dois aller au supermarché avant la fermeture. Qu'est-ce que tu veux manger ce soir ?\n– Je ne sais pas. Des pizzas, c'est possible ?\n– Oui, mais elles sont meilleures au restaurant italien. Tu peux en acheter une avant de rentrer à la maison ?\n– Bien sûr."}, {"type": "document", "q": "Question 9. Pourquoi est-ce que le jeune homme repart sans billet ?", "c": ["La représentation est annulée.", "Le spectacle est complet.", "Les places sont trop chères.", "Les réservations sont terminées."], "a": 2, "k": "je ne voudrais pas payer plus de 20 euros", "transcript": "– Bonjour, Madame. Je voudrais réserver des places pour le spectacle de danse du 18 décembre.\n– À cette date, il reste des places à 30 euros.\n– Ah, je ne voudrais pas payer plus de 20 euros. Et pour la représentation du 17 ?\n– Désolée, c'est pareil."}, {"type": "document", "q": "Question 10. Sur quoi est-ce que ces deux personnes ont des goûts différents ?", "c": ["La mode.", "La nature.", "Les saisons.", "Les vacances."], "a": 2, "k": "je préfère l'été. Les vêtements légers", "transcript": "– Salut, Ayat. Waouh ! Il est beau, ton manteau !\n– Merci. Il est parfait pour l'automne et le froid qui arrive.\n– Oui, moi j'adore cette époque. Les couleurs des arbres sont magnifiques. C'est super pour se promener en forêt. Et on peut sortir son beau manteau, comme toi.\n– Mais moi, en fait, je préfère l'été. Les vêtements légers, être dehors…\n– Eh bien, on n'a pas les mêmes goûts. Mais bon, c'est vrai qu'il fait un peu froid dehors. On va boire un café ?"}, {"type": "document", "q": "Question 11. Quel est le problème de Lydie ?", "c": ["Elle a oublié un objet important.", "Elle a raté son bus ce matin.", "Elle doit s'absenter du bureau.", "Elle est en retard à une réunion."], "a": 0, "k": "J'ai laissé mes clés de voiture dans la salle de conférence", "transcript": "– Allô, Paul ? Tu peux m'aider ?\n– Qu'est-ce qui t'arrive, Lydie ?\n– J'ai laissé mes clés de voiture dans la salle de conférence. Et elle est occupée jusqu'à 20h.\n– Je peux te ramener si tu veux.\n– Oh, merci, ça m'arrange. Je dois être chez moi à 18h30. Demain, je viendrai en transport."}, {"type": "document", "q": "Question 12. De quoi parlent ces deux personnes ?", "c": ["D'un nouveau produit.", "De collègues de travail.", "De leur lieu d'habitation.", "De leurs derniers achats."], "a": 0, "k": "j'ai lancé mon projet avec mon équipe", "transcript": "– Salut, Pauline.\n– Salut, Clément. Ça y est, j'ai lancé mon projet avec mon équipe.\n– Ah oui ? C'est le boîtier connecté pour trier les déchets ?\n– Oui, c'est ça. On le fixe à côté de ces poubelles. Et après, c'est très simple. On scanne le code des emballages avant de les jeter. Et le boîtier indique dans quelles poubelles il faut les jeter en fonction des règles de la ville où on réside.\n– C'est génial !"}, {"type": "document", "q": "Question 13. Quelle est la particularité de ce bus ?", "c": ["Il y a un service internet.", "Le placement est libre.", "On y propose des repas.", "Son personnel est bilingue."], "a": 0, "k": "vous pouvez connecter vos appareils sur notre réseau", "transcript": "Soyez les bienvenus dans notre bus à destination de Paris-Bercy. Nous ferons une pause à midi pour vous permettre de vous restaurer. Je vous rappelle que vous pouvez connecter vos appareils sur notre réseau tout au long du trajet. Un agent passera parmi vous pour vérifier vos billets et votre numéro de siège. Je vous invite à l'informer si vous voulez en changer et à lui poser vos questions. Merci d'avoir choisi notre compagnie et bon voyage !"}, {"type": "document", "q": "Question 14. Qu'est-ce qu'on apprend sur la soirée de Rachida ?", "c": ["Elle a rencontré des musiciens.", "Elle a testé un nouveau bar.", "Elle a vu un spectacle gratuit.", "Elle est allée en discothèque."], "a": 1, "k": "nous sommes allés dans un bar qui vient d'ouvrir", "transcript": "– Alors Rachida, comment s'est passée ta soirée hier ?\n– Super ! Avec Bertrand, nous sommes allés dans un bar qui vient d'ouvrir. Il y avait un concert de musique jazz. J'ai adoré ! Le billet d'entrée était un peu cher, mais on a parlé avec des gens très sympas. Ils nous ont proposé d'aller danser en discothèque après le spectacle. Comme on était un peu fatigués, on a refusé. Ce sera pour une prochaine fois."}, {"type": "document", "q": "Question 15. Pourquoi Rachida appelle-t-elle son frère ?", "c": ["Pour l'inviter au restaurant.", "Pour le remercier de son accueil.", "Pour lui conseiller un logement.", "Pour lui donner des informations."], "a": 3, "k": "On vous a préparé des draps, des serviettes, et le frigo est plein", "transcript": "– Allô ? Salut, c'est Rachida.\n– Salut, petite sœur.\n– Je t'appelle pour qu'on s'organise. Tu te souviens qu'on sera déjà partis quand vous arriverez ?\n– Ah, c'est vrai, j'avais complètement oublié. Comment on fait pour les clés ?\n– Je les laisserai chez la voisine d'en face. On vous a préparé des draps, des serviettes, et le frigo est plein. Nous vous avons aussi laissé une liste d'activités à faire ici et des adresses pour sortir dîner.\n– Merci beaucoup. Je te dois combien ?\n– Ben rien, tu plaisantes. C'est normal, tu es mon frère."}, {"type": "document", "q": "Question 16. Pourquoi la secrétaire doit-elle appeler Monsieur Demers ?", "c": ["Pour annuler une réunion.", "Pour convoquer un collègue.", "Pour changer un rendez-vous.", "Pour annoncer un retard."], "a": 3, "k": "je ne pense pas que la réunion sera terminée à 16 heures", "transcript": "– Pouvez-vous envoyer un courriel pour la réunion de cet après-midi à midi, mademoiselle ?\n– Oui, bien sûr. Mais n'oubliez pas votre rendez-vous de 16h avec Monsieur Demers.\n– Ah oui, c'est vrai. Mais il faudra le faire patienter. Je ne pense pas que la réunion sera terminée à 16 heures. Je le verrai plus tard.\n– Très bien, Monsieur, il vaut mieux que je l'appelle pour le prévenir."}, {"type": "document", "q": "Question 17. Pourquoi cette personne a-t-elle choisi la colocation ?", "c": ["Pour avoir un logement plus grand et peu cher.", "Pour louer des chambres à des étudiants.", "Pour partager les tâches ménagères.", "Pour rencontrer de nouvelles personnes."], "a": 0, "k": "trouver de l'espace pour un loyer modéré, ce n'est pas facile", "transcript": "Ça fait trois ans que je vis à Laval. Après avoir habité une chambre en cité universitaire, j'ai voulu vivre dans mon propre appartement, mais trouver de l'espace pour un loyer modéré, ce n'est pas facile. Finalement, j'ai opté pour la colocation. Nous sommes deux colocataires. Au début, la vie en colocation n'est pas simple, surtout quand on ne se connaît pas. Il faut savoir faire des compromis et s'organiser."}, {"type": "document", "q": "Question 18. Quel est le problème de cette femme ?", "c": ["Elle a été victime d'un vol.", "Elle a oublié son passeport.", "Elle a perdu son sac à main.", "Elle est tombée dans le métro."], "a": 0, "k": "On m'a volé mon sac hier dans le métro", "transcript": "– Bonjour monsieur. On m'a volé mon sac hier dans le métro à la station Mont-Royal. Quelles sont les démarches à suivre pour obtenir un autre passeport rapidement ?\n– Eh bien, tout d'abord, nous allons enregistrer votre déclaration et ensuite il vous faudra aller à l'ambassade de France de Montréal pour leur signaler.\n– D'accord. Merci monsieur."}, {"type": "document", "q": "Question 19. Que propose chaque semaine cette radio à ses auditeurs ?", "c": ["De déjeuner ensemble.", "De faire une soirée.", "De participer à un jeu.", "De rencontrer un invité."], "a": 0, "k": "on peut venir avec son panier et on partage en commun le repas", "transcript": "Tout le monde rêve de faire de la proximité, d'être proche des auditeurs. Alors, quand on est une radio associative locale, on a plus de facilité. Vous, chaque vendredi, vous ouvrez le local à 13h. On peut venir avec son panier et on partage en commun le repas. Tout à fait. Et là, pour la fin de l'année, on a donc lancé une invitation à tous ceux qui voudraient venir manger avec nous et réaliser une émission collective de fin d'année, un petit peu festive."}, {"type": "document", "q": "Question 20. Pourquoi cette dame va-t-elle finalement envoyer son colis le lendemain ?", "c": ["Elle a décidé de changer d'emballage.", "Elle a laissé son portefeuille chez elle.", "Elle a mal rempli la fiche de douane.", "Elle a oublié l'adresse du destinataire."], "a": 0, "k": "je vais refaire le colis chez moi avec une de vos boîtes", "transcript": "– Bonjour, je voudrais envoyer ce colis en outre-mer en express.\n– D'accord, alors ça vous fera 20 euros s'il vous plaît.\n– 20 euros ?\n– Oui, mais si vous préférez, nous proposons des boîtes standards qui coûtent moins cher.\n– Je pense que je vais refaire le colis chez moi avec une de vos boîtes et revenir demain.\n– N'oubliez pas de détailler le contenu du colis pour la douane.\n– Oui, je m'en suis occupée. J'ai également la fiche avec les coordonnées du destinataire."}, {"type": "document", "q": "Question 21. De quoi parlent ces personnes ?", "c": ["D'un projet de voyage.", "D'un changement de travail.", "D'un futur déménagement.", "D'une sortie au cinéma."], "a": 0, "k": "je vais voir mon patron demain. Je lui demanderai si je peux prendre des vacances", "transcript": "– Salut, ça va ?\n– Ça va. Mais mon petit ami est parti pour trois mois pour réaliser un documentaire sur la Gaspésie, une région assez sauvage du Québec.\n– Ah oui, je connais, quelle chance ! J'adorerais y retourner. Et tu vas y aller aussi ?\n– J'aimerais bien, mais j'ai des missions prévues prochainement. Mais bon, je vais voir mon patron demain. Je lui demanderai si je peux prendre des vacances.\n– Bonne chance. Tu m'écriras pour me raconter ton expérience là-bas et préviens-moi quand le film sortira."}, {"type": "document", "q": "Question 22. Que conseille cet intervenant aux parents ?", "c": ["D'attribuer à la lecture le statut de loisir.", "De favoriser la lecture en autonomie.", "De limiter la lecture d'histoires illustrées.", "De sélectionner des lectures classiques."], "a": 0, "k": "la lecture est avant tout un plaisir", "transcript": "Je crois que les difficultés en matière de lecture ont des causes à la fois individuelles et sociales. Les parents, par exemple, parce qu'ils sont angoissés par l'avenir de leurs enfants, leur présentent souvent la lecture comme une obligation, une démarche indispensable pour réussir. Et c'est une erreur parce que la lecture est avant tout un plaisir. Un livre, c'est un voyage, une découverte, une aventure, et il faudrait faire découvrir la lecture aux enfants comme on leur fait découvrir la cuisine chinoise ou les jeux dans la neige. Et puis les parents refusent aussi souvent à leurs enfants des lectures qu'ils considèrent comme mineures, les bandes dessinées, par exemple. Et ça aussi, c'est une erreur. Lire une bande dessinée, c'est lire et ça permet souvent d'ailleurs de découvrir ensuite d'autres formes de littérature."}, {"type": "document", "q": "Question 23. Pourquoi son responsable est-il satisfait de Chantal ?", "c": ["Elle a beaucoup d'expérience.", "Elle a vite appris son métier.", "Elle aime prendre des risques.", "Elle sait diriger ses collègues."], "a": 1, "k": "Elle a assimilé rapidement les manœuvres d'exécution", "transcript": "Chers auditeurs, nous allons aujourd'hui vous présenter Chantal Harvey, une franco-québécoise qui travaille au centre de service de Shawinigan et qui, tenez-vous bien, conduit un chasse-neige.\n– Alors Chantal, comment on se sent aux commandes de cette grosse machine ?\n– Je me sens parfaitement dans mon élément.\n– Et votre chef, qu'en pense-t-il ? Est-il satisfait d'avoir une femme dans votre équipe ?\n– Ah, j'en suis ravi. Elle a assimilé rapidement les manœuvres d'exécution et elle intervient efficacement aux endroits stratégiques. Même si elle s'y connaît peu en déneigement, elle a su tirer son épingle du jeu. C'est une personne courageuse et regardez comme elle est à l'aise aux manettes de cet engin. On jurerait qu'elle a fait ça toute sa vie."}, {"type": "document", "q": "Question 24. De quoi parle le journaliste ?", "c": ["De conservation des plantes.", "De nettoyage d'espaces verts.", "De procédés de recyclage.", "De techniques de culture."], "a": 2, "k": "elles sont triées dans l'usine de méthanisation", "transcript": "Eh bien à Amiens, les aspirateurs des agents de la voirie avalent 500 tonnes de feuilles chaque année. Celles-ci, une fois ramassées, sont d'abord stockées dans plusieurs lieux de la ville, puis elles sont triées dans l'usine de méthanisation Picardie Environnement. Elles ne vont pas toutes subir le même sort. Toutes ne sont pas traitées de la même manière. Les feuilles les plus propres, généralement celles ramassées dans les parcs et jardins, sont transformées en compost."}, {"type": "document", "q": "Question 25. Qu'est-ce que la fille achète ?", "c": ["Une paire de boucles d'oreille.", "Une paire de chaussures.", "Une paire de lunettes.", "Une paire de skis."], "a": 2, "k": "Elles vont très bien avec la couleur de tes cheveux", "transcript": "– Et celle-là, qu'est-ce que tu en penses ?\n– Pas mal. J'aime bien la forme des branches. Tourne-toi un peu pour voir. Ce sera parfait pour la montagne.\n– J'essaie encore ces trois paires et je me décide.\n– Moi, je préfère celle-là. Elles vont très bien avec la couleur de tes cheveux et elles sont très élégantes.\n– D'accord, ça va aller. Je les prends."}, {"type": "document", "q": "Question 26. Selon le reportage, que font les touristes pendant les grandes chaleurs ?", "c": ["Ils annulent leurs activités.", "Ils partent à la montagne.", "Ils préfèrent sortir la nuit.", "Ils sortent en train à l'extérieur."], "a": 1, "k": "pendant la nuit, les températures vont de 12 à 15 degrés", "transcript": "Il va faire chaud cette semaine, très chaud. La chaleur va de nouveau être difficile à supporter. Cette situation fait les affaires des professionnels du tourisme de la montagne. Là-bas, pendant la nuit, les températures vont de 12 à 15 degrés, ce qui permet de mieux se reposer. Pendant la journée, il est possible de faire des activités nautiques dans de l'eau bien fraîche. C'est ce dont tout le monde rêve actuellement."}, {"type": "document", "q": "Question 27. Qu'apprend-on sur Thierry Gras ?", "c": ["Il commercialise des filets de pêche fabriqués à partir de cheveux.", "Il dénonce la toxicité de certains traitements pour les cheveux.", "Il propose un produit pour protéger les cheveux des particuliers.", "Il récupère les cheveux de ses clients pour nettoyer les océans."], "a": 3, "k": "il va envoyer... sa collecte dans des centres de réinsertion afin qu'elle soit transformée... en barrière anti-pollution", "transcript": "Cette initiative nous emmène dans le Var, où Thierry Gras est coiffeur depuis 30 ans, installé à Saint-Zacharie, à côté d'Aubagne. Cela fait des années qu'il stocke les cheveux qu'il coupe. Dans quelques jours, il va envoyer pour la première fois sa collecte dans des centres de réinsertion afin qu'elle soit transformée, je cite, en barrière anti-pollution. La fibre capillaire aurait comme effet de pouvoir retenir certains polluants comme les huiles solaires ou les hydrocarbures, deux importantes causes de pollution marine. Avec un kilo de cheveux, on peut pomper huit litres de pétrole, annonce le Varois. Ces boudins, une fois réalisés, seront revendus à des ports, à des communautés de communes. Plusieurs d'entre eux se déclarent déjà intéressés."}, {"type": "document", "q": "Question 28. Que recherchent les habitants de ces lieux ?", "c": ["Adopter un mode de vie collectif responsable.", "Construire un réseau d'assainissement des eaux.", "Faire la promotion de logements écologiques.", "Mener une politique d'aménagement des villes."], "a": 0, "k": "des familles qui vivent côte à côte, mais aussi ensemble", "transcript": "Si demain vous viviez dans une oasis, je ne vous parle pas d'un lac avec des petits palmiers au milieu du désert, mais d'une communauté, d'une petite communauté en France, en ville ou à la campagne, où vos voisins seraient comme vous décidés à vivre de façon plus écolo. C'est ça les oasis, 500 petits groupes aujourd'hui, des familles qui vivent côte à côte, mais aussi ensemble, et c'est peut-être avant-gardiste. Prenez par exemple en Eure-et-Loir, l'écohameau du Plessis : 28 familles, soit 60 personnes, qui vivent dans des bâtiments bioclimatiques dont le chauffage, pour faire simple, ne pollue pas, qui toutes ont renoncé à se brancher au tout-à-l'égout. Leurs eaux grises sont traitées dans des bassins plantés de roseaux qui dépolluent. C'est parfaitement légal et ça marche."}, {"type": "document", "q": "Question 29. Pourquoi le directeur choisit-il de renoncer à ce projet ?", "c": ["Le directeur nourrit de plus grandes ambitions pour l'entreprise.", "Le groupe a décidé de restreindre son domaine d'intervention.", "Les partenaires européens trouvent le projet hasardeux.", "Les ressources financières de l'entreprise sont en baisse."], "a": 2, "k": "Rome et Berlin avaient déjà montré leurs réticences", "transcript": "– Alors, quelles informations avez-vous ramenées de Berne, Pierre ?\n– Notre partenaire suisse n'est pas favorable à l'élargissement de nos activités communes. Il estime que les investissements sont trop élevés par rapport aux retombées économiques possibles.\n– C'est également la position de nos collaborateurs anglais. Ils ne veulent pas prendre de risque inutile, étant donné le faible taux de croissance du pouvoir d'achat cette année. Ce projet est véritablement compromis.\n– Rome et Berlin avaient déjà montré leurs réticences.\n– Hum, eh bien, d'accord, arrêtons tout dès maintenant et commençons tout de suite à explorer de nouvelles pistes."}, {"type": "document", "q": "Question 30. Quel est le métier de Jean-Pierre ?", "c": ["Metteur en scène.", "Explorateur.", "Photographe.", "Journaliste."], "a": 3, "k": "vous mettez en scène les mots et non les images", "transcript": "– Jean-Pierre, pouvez-vous nous parler de votre métier, qui est une vraie passion pour vous ?\n– Oui, eh bien, ce qui me plaît le plus, c'est que je voyage beaucoup. Je dois toujours me déplacer si je veux que les gens soient informés au moment même où les événements se produisent.\n– On vous connaît comme un voyageur infatigable qui ne se sépare jamais de son appareil photo alors que vous ne vous en servez même pas.\n– J'ai toujours rêvé d'être reporter photographe et avoir cet appareil avec moi me donne l'impression que mon rêve est presque réel.\n– En réalité, vous mettez en scène les mots et non les images. C'est ce qui caractérise votre métier et vous a rendu célèbre."}, {"type": "document", "q": "Question 31. Quel est l'objectif de l'activité actuelle de Fatoumata ?", "c": ["Comparer les mouvements des galaxies.", "Étudier les trajectoires des déchets cosmiques.", "Prévenir les risques de chute de météorites.", "S'entraîner pour des voyages interplanétaires."], "a": 1, "k": "Je regarde comment ces 40 000 débris vont évoluer avec le temps", "transcript": "Fatoumata a 29 ans. Elle termine actuellement son doctorat en astronomie et vient aussi de passer un an au Japon pour se préparer à son futur métier d'astronome. Fatoumata veut être « femme de ménage de l'espace ». Des objets sont vraiment retombés sur terre, au Zimbabwe et en Arabie Saoudite. Plusieurs entreprises et agences ont proposé des solutions de nettoyage de l'espace, mais aucune n'a vraiment été testée dans des conditions réelles. Tout le monde se prépare à aller nettoyer l'espace parce que la NASA prévoit qu'à l'horizon 2025, on ne pourra plus envoyer d'objets dans l'espace tellement ce sera encombré de débris.\n– Donc en fait, je simule des explosions et des collisions dans l'espace. Par exemple, vous avez deux objets, ils entrent en collision, ça crée 40 000 débris. Je regarde comment ces 40 000 débris vont évoluer avec le temps autour de la terre. Voilà, mon travail."}, {"type": "document", "q": "Question 32. Que déplore cet homme à propos de l'individu dans le monde actuel ?", "c": ["L'absence de formes d'altruisme.", "La place accordée à l'apparence.", "La superficialité des relations.", "Le manque d'estime de soi."], "a": 3, "k": "devenez narcissique", "transcript": "Et je me suis rendu compte que nous vivons dans un monde où nous ne nous autorisons pas à être nous-mêmes, à nous écouter, à nous respecter. C'est surtout cette manière dont nous sommes pris par une forme d'auto-exploitation qui entraîne tant de gens jusqu'à l'épuisement, jusqu'au burn-out, qui m'a donné envie de dire : sauvez votre peau, devenez narcissique. Et je crois qu'en fait être narcissique, c'est pouvoir s'écouter, se rencontrer, se respecter et je crois que ça, c'est vraiment aujourd'hui crucial."}, {"type": "document", "q": "Question 33. Qu'explique Luc Julia à propos de l'intelligence artificielle ?", "c": ["Elle engendre une peur irrationnelle.", "Elle possède un nom inapproprié.", "Son champ d'action est restreint.", "Son développement est imprévisible."], "a": 1, "k": "on n'aurait pas dû appeler ça l'intelligence artificielle", "transcript": "– Luc Julia, vous êtes spécialiste de ce qu'il ne faut pas appeler l'intelligence artificielle. Donc pourquoi votre livre s'intitule-t-il « L'intelligence artificielle n'existe pas » ?\n– En fait, c'est un constat que je fais depuis quelques années. Je suis un peu fatigué par ce que j'entends, toutes les bêtises qu'on dit sur l'intelligence artificielle. Et donc j'ai juste voulu rétablir un peu la vérité en expliquant qu'on ne sait pas ce que c'est que l'intelligence et donc qu'on ne peut pas construire de l'intelligence artificielle en ne sachant pas ce que c'est. Et du coup, ce qu'on appelle l'intelligence artificielle depuis 1956, en fait, ce sont des techniques mathématiques, statistiques, etc., qui n'ont rien à voir avec l'intelligence et on n'aurait pas dû appeler ça l'intelligence artificielle."}, {"type": "document", "q": "Question 34. Qu'apprend-on sur le diamant ?", "c": ["Sa clientèle s'est diversifiée.", "Sa production s'est accélérée.", "Son estimation s'est complexifiée.", "Son prix en dollar s'est effondré."], "a": 0, "k": "Deux catégories de clients mangent les deux tiers du marché : les générations Y", "transcript": "Oui, les estimations viennent du maître du diamant, le premier producteur de la planète, l'anglo-américain De Beers. La demande mondiale de ce précieux caillou atteint le record de 82 milliards de dollars et ceux qui en raffolent poussent le diamant à battre ce record. Deux catégories de clients mangent les deux tiers du marché : les générations Y, autrement dit une population plutôt jeune, celle née dans les années 80 et dans les années 2000. Le diamant, à en croire le patron de De Beers, ce n'est plus un objet de luxe réservé à une élite aux cheveux gris."}, {"type": "document", "q": "Question 35. Qu'apprend-on sur l'équipe des Canadiens de Montréal ?", "c": ["C'est un exemple de réussite par le sport.", "C'est un modèle rare de mixité culturelle.", "C'est un symbole fort de cette province.", "C'est une référence pour son style de jeu."], "a": 2, "k": "un tremplin extraordinaire et un encouragement à décrocher leur propre succès", "transcript": "Fondés en 1909, les Canadiens de Montréal sont la plus ancienne équipe de hockey toujours en activité. Les joueurs qui ont composé cette ancestrale franchise ont longtemps été en grande majorité d'origine canadienne, puis nord-américaine. Mais ce qui a marqué longtemps l'histoire de ce fameux club de hockey, c'est que ses héros sur glace ont été francophones, dans un Québec dont les destinées étaient surtout menées par des compagnies anglaises et où l'i ui est un écosystème assez précieux et assez unique au monde. Mais il y a aussi cette richesse qu'on ne soupçonnait pas il y a une vingtaine ou trentaine d'années, ce pétrole dans le sous-sol. Alors, ça fait des débats de société assez importants ici."}, {"type": "document", "q": "Question 38. Comment s'est révélée la vocation de cet écrivain ?", "c": ["À l'occasion d'une entrevue.", "En côtoyant des auteurs connus.", "Grâce à des relations amicales.", "Lors d'une émission de radio."], "a": 0, "k": "qui un jour m'a appelée", "transcript": "C'est une dame que je ne connaissais pas du tout, une des deux filles d'Irène Némirovsky, une dame qui est décédée maintenant et qui s'appelait Élisabeth Gille, qui était éditrice chez Julliard, qui un jour m'a appelée en me disant : « Voilà, ça fait des années que je vous entends à la télé. Ça fait des années que je me dis qu'en fait vous êtes un écrivain qui ne le savait pas. » Et quand je suis arrivée dans son bureau, elle m'a expliqué qu'en fait je n'avais rien à faire à la télé, que ce n'était pas mon métier.\n– Mais vous croyez au hasard de la vie, aux rencontres, vous, essentiellement ?\n– À moi, ça m'est tout le temps arrivé ça. Oui, j'ai beaucoup de chance."}, {"type": "document", "q": "Question 39. Que dénonce ce journaliste à propos des supermarchés ?", "c": ["L'absence d'éthique de certains produits.", "La qualité relative des aliments labellisés bio.", "L'influence de la publicité sur le choix du client.", "L'utilisation systématique d'emballage."], "a": 0, "k": "des produits issus de l'exploitation des hommes ou de la nature", "transcript": "Faisons un tour au supermarché. Comme tous ceux de son espèce, celui de mon quartier a entamé progressivement sa mutation en accordant de plus en plus de place aux produits bio, au commerce équitable, aux emballages recyclables. C'est encore timide, mais disons qu'il y a le choix. Je peux donc, comme l'explique le professeur Patel, choisir ce qui est bien plutôt que ce qui est mal. Mais je réalise à présent que le mal fait aussi partie du choix. Le mal, autrement dit des produits issus de l'exploitation des hommes ou de la nature, qui maltraitent les premiers et détruisent la seconde, sont en vente libre. À chaque individu, en somme, de se débrouiller avec sa conscience."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 9/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test9_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 9</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 9 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
