<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 30 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

 Bonjour madame. J'aime beaucoup ces chaussures en cuir dans la vitrine. Elles existent en 38 ?\nA. Ah non, nous n'acceptons pas les chèques.\nB. Bien sûr, la caisse est à l'entrée du magasin.\nC. Désolée, nous n'avons plus cette pointure.\nD. Mais oui, les soldes commencent demain.", "k": "Désolée, nous n'avons plus cette pointure"}, {"type": "extrait", "q": "", "c": ["Merci, je ne veux rien.", "Non, c'est par là.", "Oui, je crois.", "Peut-être demain ?"], "a": 2, "transcript": "— Avez-vous entendu quelque chose ?\nA. Merci, je ne veux rien.\nB. Non, c'est par là.\nC. Oui, je crois.\nD. Peut-être demain ?", "k": "Oui, je crois"}, {"type": "extrait", "q": "", "c": ["Oui, ce sont ses fleurs préférées.", "Oui, elle va beaucoup aimer.", "Oui, il y aura toute sa famille.", "Oui, j'ai acheté un gâteau."], "a": 1, "transcript": "— Demain, c'est la fête d'anniversaire de Léa. On pourrait lui offrir une belle robe. Qu'en penses-tu ?\nA. Oui, ce sont ses fleurs préférées.\nB. Oui, elle va beaucoup aimer.\nC. Oui, il y aura toute sa famille.\nD. Oui, j'ai acheté un gâteau.", "k": "Oui, elle va beaucoup aimer"}, {"type": "extrait", "q": "", "c": ["Oui, attendez. J'ai la monnaie, je crois.", "Laisse, c'est moi qui t'invite aujourd'hui.", "Un grand verre de lait, s'il vous plaît.", "Non, il fait trop chaud pour boire ça."], "a": 2, "transcript": "— Et un jus d'orange ! Un ! Et pour vous monsieur, qu'est-ce que ce sera ?\nA. Oui, attendez. J'ai la monnaie, je crois.\nB. Laisse, c'est moi qui t'invite aujourd'hui.\nC. Un grand verre de lait, s'il vous plaît.\nD. Non, il fait trop chaud pour boire ça.", "k": "Un grand verre de lait"}, {"type": "extrait", "q": "", "c": ["J'avais rendez-vous chez le médecin.", "Moi non plus, je ne suis pas venu.", "Je ne sais pas, je n'étais pas là.", "Si, mais je n'ai pas eu le temps."], "a": 0, "transcript": "— Pourquoi étais-tu absent hier après-midi ?\nA. J'avais rendez-vous chez le médecin.\nB. Moi non plus, je ne suis pas venu.\nC. Je ne sais pas, je n'étais pas là.\nD. Si, mais je n'ai pas eu le temps.", "k": "J'avais rendez-vous chez le médecin"}, {"type": "document", "q": "Quel est le problème avec la voiture ?", "c": ["Elle est déjà vendue", "Elle est en panne", "Elle est irréparable", "Elle est trop chère"], "a": 1, "transcript": "— Allô ? Oui, bonjour. Je vous appelle pour votre petite annonce. Est-ce que votre voiture est toujours à vendre ? — Eh bien oui, mais vous avez compris qu'elle ne démarre pas. — Oui, ça j'ai compris. Vous voulez la vendre 800 euros ? — La réparation coûte 300 euros alors j'ai décidé de la laisser à 500 euros. — À ce prix-là, c'est une bonne affaire.", "k": "elle ne démarre pas"}, {"type": "document", "q": "Que souhaite la jeune femme ?", "c": ["Chercher un travail en France", "Obtenir une bourse d'études", "Suivre des cours à l'université", "Trouver un appartement à Marseille"], "a": 2, "transcript": "— Bonjour, je viens d'emménager à Marseille et je voudrais déposer un dossier pour m'inscrire à l'université. — Vous avez rempli le dossier ? — Oui, le voilà avec les justificatifs. — Très bien. Mais je ne vois pas la copie de votre passeport. C'est indispensable.", "k": "m'inscrire à l'université"}, {"type": "document", "q": "Que permet cette association ?", "c": ["De faire des rencontres", "De manger gratuitement", "De trouver un travail", "De vivre chez quelqu'un"], "a": 3, "transcript": "— Bonjour monsieur. Je suis étudiante, je cherche un logement. — Bienvenue chez nous. Est-ce que vous savez comment fonctionne notre association ? — Non, pas très bien. — Eh bien, vous habitez chez une personne âgée et en échange vous lui rendez quelques petits services : faire les courses, préparer le repas et surtout lui tenir compagnie. — Et combien ça coûte ? — Ça dépend du temps passé auprès de la personne.", "k": "vous habitez chez une personne âgée"}, {"type": "document", "q": "Pour quelle raison la femme hésite-t-elle à louer la maison ?", "c": ["Elle a besoin de réparations urgentes", "Elle est localisée loin des commerces", "Elle est située dans une rue bruyante", "Elle possède un garage trop étroit"], "a": 2, "transcript": "— Alors, que pensez-vous de la maison ? — Elle me plaît. Elle correspond à ce que je recherche : un lieu de vie clair et spacieux. — Vous pourrez refaire la peinture si vous voulez, elle est un peu vieille. — Moui, peut-être. Pour l'instant, je préférerais changer les fenêtres. On entend beaucoup les voitures dehors. — En effet, il y a un supermarché à l'angle de la rue. — C'est embêtant, je rêvais d'un endroit calme.", "k": "On entend beaucoup les voitures dehors"}, {"type": "document", "q": "Quel conseil cette étudiante donne-t-elle au jeune homme ?", "c": ["Constituer son dossier par voie électronique", "Consulter la section « Étudiant étranger » sur internet", "Obtenir une reconnaissance de son diplôme tunisien", "Se mettre directement en contact avec l'université"], "a": 3, "transcript": "— Je suis tunisien et je viens d'arriver au Canada. Et toi ? — Moi, je suis québécoise. — Alors, tu pourras peut-être me renseigner sur les démarches à suivre pour ma demande d'admission à l'université. — Il vaut mieux que tu t'adresses au secrétariat de l'université. En tant qu'étudiant étranger, il y a des modalités particulières. — Je ne peux pas faire de demande par courrier ou en ligne ? — Je l'ignore. Téléphone plutôt au secrétariat.", "k": "tu t'adresses au secrétariat de l'université"}, {"type": "document", "q": "Selon cette personne, que permet la fête de la gastronomie ?", "c": ["Conseiller les parents en matière d'alimentation", "Créer l'occasion de se retrouver en famille", "Découvrir des recettes de grand-mère", "Rassembler des enfants du monde entier"], "a": 1, "transcript": "Cette fête de la gastronomie est l'occasion d'évoquer un plaisir que l'on peut partager très tôt en famille : le plaisir de cuisiner à quatre mains, parents et enfants réunis autour d'une même recette. Cuisiner avec son enfant, c'est une activité à la fois ludique, créative, enrichissante pour un enfant puisqu'elle fait appel à tous ses sens et c'est bien entendu un bon moment à passer ensemble...", "k": "cuisiner à quatre mains, parents et enfants réunis"}, {"type": "document", "q": "Pourquoi l'informaticien vient-il ?", "c": ["Pour contrôler l'état des machines en service", "Pour donner une formation aux employés", "Pour mettre à jour toutes les applications", "Pour réparer des équipements informatiques"], "a": 3, "transcript": "— François, souvenez-vous que l'informaticien passera cet après-midi au service comptabilité. — Oui, je sais, pour les deux ordinateurs en panne. — Oui. Appelez la comptable pour vérifier qu'elle a bien noté le rendez-vous. — Elle est en formation jusqu'à la fin de la semaine, sur le nouveau logiciel de comptabilité justement. — Demandez à notre stagiaire d'être présent alors.", "k": "les deux ordinateurs en panne"}, {"type": "document", "q": "Qu'explique cet homme ?", "c": ["La crise de l'économie mondiale", "L'accroissement de la population", "Les nouvelles règles d'hygiène", "Les récentes découvertes médicales"], "a": 1, "transcript": "— Pourquoi en si peu de temps, on est venu à sept milliards sur Terre ? — Parce que la mortalité a diminué, notamment la mortalité des enfants, grâce au progrès de l'hygiène, de la médecine, au progrès économique. Résultat, les décès sont devenus moins nombreux et est apparu un excédent des naissances sur les décès qui a entraîné une augmentation de la population.", "k": "augmentation de la population"}, {"type": "document", "q": "Que demande Olivier ?", "c": ["À quel moment il pourra poser des congés", "Dans quelle ville il devra partir en mission", "Qui sera de permanence au mois d'août", "S'il sera autorisé à suivre un stage en été"], "a": 0, "transcript": "— Bonjour Monique. — Bonjour Olivier. Que puis-je pour vous ? — Je viens vous voir au sujet de mes vacances. Je voudrais les prendre en juillet. Je sais que certains collègues seront en formation et d'autres en extérieur pour les présentations de nos produits sur les marchés d'Europe. Est-ce que cela sera possible ? — Nous aurons peut-être besoin de vous effectivement. Je vais y réfléchir et je vous donne ma réponse cette semaine.", "k": "Je voudrais les prendre en juillet"}, {"type": "document", "q": "Pourquoi la femme refuse-t-elle d'aller à Rome ?", "c": ["C'est une destination inadaptée pour les plus jeunes", "Elle refuse de marcher des heures pour visiter la ville", "L'hôtel propose un niveau de confort insuffisant", "Le prix d'un séjour pour une famille est trop élevé"], "a": 0, "transcript": "— Tu as vu les promotions pour Rome ? Une semaine pour 200 euros par personne dans un hôtel 4 étoiles en plein centre-ville. Et c'est gratuit pour les moins de 7 ans. — Non merci. Moi je préfère la plage. On peut se baigner au moins avec les enfants. — C'est vrai qu'ils sont encore un peu petits pour les visites historiques.", "k": "encore un peu petits pour les visites historiques"}, {"type": "document", "q": "Pourquoi cette personne laisse-t-elle un message ?", "c": ["Pour confirmer un rendez-vous", "Pour demander un entretien", "Pour proposer un service", "Pour signaler un retard"], "a": 2, "transcript": "Bonjour, c'est un message de GRD Solution pour Monsieur Lalande. Je vous appelle au sujet du problème que vous avez rencontré en installant notre logiciel d'images. Nous avons un technicien qui pourrait vous dépanner et venir sur site rapidement. Vous pouvez me recontacter jusqu'à 18h30 au 01 28 12 87 43. Bonne journée.", "k": "un technicien qui pourrait vous dépanner"}, {"type": "document", "q": "Quel est le problème de Clément dans sa recherche d'un emploi ?", "c": ["Il a peu de diplômes", "Il est déjà trop âgé", "Il est mauvais en langues", "Il manque d'expérience"], "a": 3, "transcript": "— Alors Clément, ta recherche d'emploi, ça avance ? — Pas vraiment. Et ce n'est pas faute de chercher. — Mais attends, avec ta formation d'architecte décorateur et tous tes stages, c'est incroyable. — J'avais une piste dans un cabinet de Montréal, mais ils m'ont répondu qu'ils cherchaient un professionnel confirmé. — À 25 ans je ne peux pas avoir travaillé 10 ans dans la même entreprise.", "k": "ils cherchaient un professionnel confirmé"}, {"type": "document", "q": "Quelle était la motivation de cet homme pour devenir pêcheur ?", "c": ["L'envie de changer de profession", "La nécessité de trouver un travail", "La réalisation d'un rêve de jeunesse", "La rencontre avec un passionné"], "a": 1, "transcript": "— Je suis marin depuis les années 80. J'ai commencé le métier marin à 15 ans et demi. — Vous avez pris la suite de quelqu'un ? — Non non, j'ai commencé dans les années 81 à la pêche. — Je n'étais vraiment pas attiré par la mer. — Et pourtant vous avez franchi le pas pour faire pêcheur. — Je n'avais pas le choix, il fallait bien que je gagne ma vie. Ici, à part la pêche, il n'y a pas grand-chose comme boulot.", "k": "il fallait bien que je gagne ma vie"}, {"type": "document", "q": "Que fait la doctoresse ?", "c": ["Elle conseille une activité physique", "Elle propose un arrêt maladie", "Elle rédige un certificat médical", "Elle remplit une feuille de soins"], "a": 0, "transcript": "— Vous pratiquez un sport ? — Je n'ai plus le temps à cause de mon travail. — C'est dommage. Ça permet de garder une bonne hygiène de vie. Vous devriez essayer de trouver du temps. — D'accord, je vais y réfléchir. — Tenez, voici votre ordonnance. Prenez ces deux médicaments matin et soir pendant huit jours.", "k": "Vous devriez essayer de trouver du temps"}, {"type": "document", "q": "Que propose le site dans lequel cet intervenant travaille ?", "c": ["Des activités en faveur du développement durable", "Des formations aux nouveaux métiers de l'éducation", "Des sorties équestres pour les écoliers de la région", "Des stages à destination des animateurs jeunesse"], "a": 0, "transcript": "Être éco-éducateur, c'est être à cheval entre l'éducateur et le pédagogue. On va sensibiliser le public aux problématiques environnementales. La plupart du temps, on accueille un public d'enfants ou de scolaires. Ici, au Clos des Blancs Manteaux, notre entrée thématique, c'est l'écologie au quotidien : les éco-gestes, les astuces qu'on peut mettre en place dans notre vie de tous les jours pour participer à la préservation de la planète.", "k": "l'écologie au quotidien"}, {"type": "document", "q": "Qu'aurait souhaité cette personne en allant chez Georges Brassens ?", "c": ["Lui apporter un livre", "Lui demander conseil", "Lui présenter son travail", "Lui proposer une interview"], "a": 2, "transcript": "Quand j'étais adolescent, j'avais écrit un long poème à Georges Brassens. J'avais fini de le recopier dans le bistrot en face de l'impasse Florimont où il habitait. Et j'étais allé lui porter. Je me dis que si un jour j'avais reçu un petit mot de Brassens me disant : 'J'ai lu vos chansons et j'aimerais bien vous en parler', ça m'aurait intéressé.", "k": "J'ai lu vos chansons"}, {"type": "document", "q": "Que propose cette agence de voyages ?", "c": ["Des circuits respectueux de l'environnement", "Des formules adaptées à chaque client", "Des tarifs plus bas que la concurrence", "Des voyages à caractère humanitaire"], "a": 1, "transcript": "— En quoi votre agence est-elle différente des autres ? — Je cherche à définir les motivations des personnes qui viennent me voir afin de les orienter vers des formules auxquelles ils n'ont pas forcément pensé. En général, ils s'aperçoivent qu'un séjour classique ne coûte pas moins cher qu'un séjour sur mesure.", "k": "orienter vers des formules auxquelles ils n'ont pas forcément pensé"}, {"type": "document", "q": "Pourquoi la femme refuse-t-elle d'aller dans les Laurentides ?", "c": ["Parce qu'elle craint les grosses chaleurs de l'été", "Parce qu'elle pense que les Vaillancourt sont ennuyeux", "Parce qu'elle souhaite changer de destination estivale", "Parce qu'elle trouve les chalets inconfortables"], "a": 2, "transcript": "— Qu'est-ce que tu veux faire pour les prochaines vacances ? Il faut qu'on s'organise. — Ah oui, sinon ce sera difficile de trouver un chalet disponible. J'aimerais bien aller dans les Laurentides. Les Vaillancourt y seront tout le mois d'août. — Ah non ! On y passe tous nos étés depuis 10 ans.", "k": "On y passe tous nos étés depuis 10 ans"}, {"type": "document", "q": "Selon cet intervenant, comment augmenter ses chances d'obtenir un emploi ?", "c": ["En collaborant à des activités de bénévolat", "En effectuant des stages durant ses études", "En prenant part à des salons de recrutement", "En suivant plusieurs formations spécifiques"], "a": 0, "transcript": "Les jeunes pensent qu'une participation aux forums de recrutement, une formation professionnelle et plusieurs stages suffisent à décrocher un contrat. Or, les entreprises cherchent des personnes réellement motivées et passionnées. Un travail de bénévole dans des organisations humanitaires à l'étranger peut faire la différence. Il ne faut pas hésiter à mettre ces expériences caritatives sur son CV.", "k": "Un travail de bénévole dans des organisations humanitaires"}, {"type": "document", "q": "Qu'apprend-on sur les jardins communautaires ?", "c": ["Ils appartiennent à des demandeurs d'emploi", "Ils sont cultivés par des gens sans emploi", "Ils fournissent des légumes aux commerçants de la ville", "Ils sont cultivés par des jardiniers professionnels"], "a": 1, "transcript": "— Monsieur Goslin, pouvez-vous nous parler des jardins communautaires de Verdun ? — Oui, ce sont des jardins mis à la disposition des chômeurs par la ville de Montréal. — Donc, les chômeurs retrouvent une activité par la même occasion ? — Oui, et ils peuvent se nourrir des légumes cultivés.", "k": "jardins mis à la disposition des chômeurs"}, {"type": "document", "q": "Qu'est-ce que Léonard a de particulier ?", "c": ["Sa mémoire exceptionnelle", "Ses aptitudes au jardinage", "Ses origines sociales modestes", "Son parcours d'apprentissage"], "a": 3, "transcript": "Léonard reçoit une éducation relativement libre. C'est un enfant qui s'est mis en quelque sorte à l'école de la nature, qui scrute, qui observe tout. Il est passionné par tout ce qui l'entoure et il s'aperçoit vite que le sens de l'observation est peut-être le meilleur des enseignements.", "k": "s'est mis à l'école de la nature"}, {"type": "document", "q": "Quelle information le chef de train donne-t-il aux voyageurs ?", "c": ["Ils devront demander le remboursement de leur billet par écrit", "Ils devront descendre en gare de Valence suite à une panne", "Ils devront patienter à leur place jusqu'à l'arrêt complet du train", "Ils devront présenter leur billet à leur descente du train"], "a": 0, "transcript": "Mesdames, messieurs, suite à un incident technique, notre train arrive en gare de Valence TGV avec un retard de 45 minutes. Nous invitons tous les voyageurs qui descendent à se rapprocher du personnel de gare. Il vous remettra une enveloppe et un document à remplir et à retourner à l'adresse indiquée pour que la SNCF puisse vous virer la somme correspondant au prix de votre billet de train, à titre de dédommagement.", "k": "document à remplir et à retourner"}, {"type": "document", "q": "Pourquoi ce site plaît-il aux propriétaires de voitures ?", "c": ["il contrôle rigoureusement toutes les formalités de garantie", "il organise préalablement une rencontre avec les locataires", "il propose une première révision gratuite des véhicules", "il vérifie systématiquement l'identité de chacun de ses clients"], "a": 0, "transcript": "Zilok Auto se présente comme le numéro 1 du secteur. Marion Carrette : 'On a un contrat, on a un système d'assurance qui permet d'assurer vraiment le locataire pour la voiture pendant la durée de la location. On a un système d'évaluation, un système de caution, et tout ça fait que le propriétaire arrive sur notre site en étant rassuré.'", "k": "système d'assurance"}, {"type": "document", "q": "Quelle est l'idée avancée par la journaliste ?", "c": ["Aujourd'hui, être à la mode est une préoccupation superficielle", "Il faut porter des vêtements adaptés à toutes circonstances", "La société actuelle donne trop de place à l'apparence", "La tenue vestimentaire influence l'état psychologique"], "a": 3, "transcript": "Je n'ai rien à me mettre. Avez-vous déjà prononcé cette phrase devant votre armoire pleine de vêtements ? Si vous êtes femme, quel que soit votre gabarit, enfilez une robe qui vous met en valeur, de jolies chaussures, une touche de rouge à lèvres peut-être. Vous vous sentirez, sans aucun doute, plus sûre de vous. Votre caractère en sera peut-être même transformé.", "k": "Votre caractère en sera peut-être même transformé"}, {"type": "document", "q": "En quoi la biennale acta est-elle originale ?", "c": ["Elle donne l'occasion de découvrir de jeunes talents", "Elle offre une expérience à un public de tous âges", "Elle permet de jouer sur scène avec son enfant", "Elle présente la même pièce en différentes langues"], "a": 1, "transcript": "Alors même les bébés vont au théâtre. Dès les premiers jours de leur vie, c'est possible. J'ai découvert cette biennale acta où des artistes venus de Finlande, d'Espagne, d'Allemagne, d'Italie, de France proposent des temps de représentation très troublant où le bébé assis sur les genoux des parents partage vraiment à égalité avec l'adulte des émotions liées à des questions métaphysiques.", "k": "le bébé partage vraiment à égalité avec l'adulte"}, {"type": "document", "q": "Qu'est-ce qui ressort de ce reportage consacré à un jeu en réseau ?", "c": ["L'assujettissement insidieux des mineurs", "L'insuffisance d'information des parents", "La fatigue occasionnée chez les enfants", "Le manque d'intérêt éducatif de l'activité"], "a": 0, "transcript": "C'est une nouvelle façon de jouer à la poupée, un jeu en réseau totalement virtuel, mais qui peut coûter très cher à 11 ans et demi. Tu crées ta poupée, et on a envie de monter des niveaux. Il faut acheter des choses avec de l'argent. Les prélèvements passent inaperçus au début, et l'addiction aux jeux s'installe très vite.", "k": "addiction aux jeux s'installe très vite"}, {"type": "document", "q": "Quel changement annonce l'homme interviewé ?", "c": ["Un accès plus large aux fonds de la bibliothèque municipale", "Un contrat permettant de combiner différents types d'abonnements", "Un contrôle renforcé de l'identité des usagers des services de la ville", "Une modernisation des procédures d'emprunt des documents"], "a": 3, "transcript": "— Au lieu de passer au guichet de prêt muni de vos livres ou vidéos, en présentant votre carte d'abonné habituelle manuscrite et cartonnée, vous montrerez cette carte magnétique, format carte de crédit, qui identifie automatiquement l'emprunteur. — Quels en sont les avantages ? — Réduire l'attente au guichet et la facilité de rangement.", "k": "carte magnétique, format carte de crédit"}, {"type": "document", "q": "Quelle est l'accusation portée contre l'industrie pharmaceutique ?", "c": ["Elle commercialise des produits dangereux pour la santé", "Elle crée des besoins pour réutiliser de vieux remèdes", "Elle fait des profits grâce à la vente de traitements périmés", "Elle limite la recherche consacrée aux pathologies rares"], "a": 1, "transcript": "Comment inventer de nouvelles maladies pour recycler d'anciennes molécules. Quand une industrie comme celle-là ne trouve plus de médicaments, alors elle invente des maladies pour recycler les molécules antérieures et leur trouver de nouveaux créneaux d'exploitation.", "k": "elle invente des maladies pour recycler les molécules antérieures"}, {"type": "document", "q": "Quelle est l'opinion de cet homme au sujet des villes du futur ?", "c": ["Leur aménagement doit suivre un modèle vertical", "Leur conception doit s'affranchir des modes du passé", "Leur développement est une menace pour l'environnement", "Leur expansion est loin d'être un phénomène inéluctable"], "a": 1, "transcript": "L'urbaniste Jacques Ferrier : 'On va vivre dans un monde urbain. Ce monde urbain, ce n'est pas une fatalité que ça soit un monde repoussant. Mais pour ça, il faut changer la façon de voir la ville. Il faut arrêter de dessiner la ville comme sur du papier quadrillé, il faut dessiner la ville de façon autre et de façon beaucoup plus sensible.'", "k": "changer la façon de voir la ville"}, {"type": "document", "q": "Sur quoi s'appuient les recommandations de Thomas Le Peltier ?", "c": ["Sur des considérations morales", "Sur des convictions écologiques", "Sur des certitudes économiques", "Sur des prescriptions diététiques"], "a": 0, "transcript": "— C'est la condition animale qui vous intéresse principalement ? — Oui, c'est une question d'éthique animale. La notion de cruauté envers les animaux a de plus en plus de mal à être acceptée. Or, on a assisté depuis les 50 dernières années à une mise en place d'une industrie de la viande qui fait terriblement souffrir les animaux.", "k": "une question d'éthique animale"}, {"type": "document", "q": "Selon le chroniqueur, comment les médias utilisent-ils les faits divers ?", "c": ["Comme un prétexte pour éviter de traiter les questions significatives", "Comme une occasion de commenter ce qui ne va pas dans notre société", "Comme un moyen de sensibiliser le public aux problèmes des individus", "Comme une façon de distraire les individus de leurs petits soucis quotidiens"], "a": 0, "transcript": "Alors qu'il arrive 100 000 choses heureuses et agréables, l'information s'attache à l'horrible et à l'imprévu. Les médias contournent gaillardement les problèmes majeurs collectifs. À se demander si ces catastrophes si diverses ne sont pas mises en avant pour faire diversion, non pas pour divertir au sens de récréer, mais pour détourner de ce qui est plus général et plus important.", "k": "pour faire diversion"}, {"type": "document", "q": "Comment l'exposition sur Monet a-t-elle été conçue ?", "c": ["En regroupant les œuvres selon un ordre chronologique", "En regroupant les tableaux dans une même salle", "En regroupant les toiles autour d'un même sujet", "En regroupant ses créations avec celles d'autres artistes"], "a": 2, "transcript": "On a voulu faire une salle qui s'appelle 'Monet, peintre des impressions' pour vraiment mettre en valeur l'aspect très original de Monet parmi les impressionnistes. Dans la salle précédente, on a mis ses premiers paysages d'Argenteuil. Dans la salle 'Monet, peintre des impressions', on voulait vraiment mettre en valeur ce qu'était comme peintre des impressions.", "k": "mettre en valeur l'aspect très original de Monet"}]

<script>
var QQ = JSON.parse(document.getElementById('qdata').textContent);
var ans = {};
var cur = 0;
var logo = document.querySelector('.header img').src;

var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 30/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test30_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 30</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 30 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
