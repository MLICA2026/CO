<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 37 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

type": "extrait", "q": "Question 2 : À quelle heure arrivez-vous au travail ?", "prompt": "À quelle heure arrivez-vous au travail ?", "c": ["À droite.", "À midi.", "À Paris.", "À vélo."], "a": 1, "k": "À quelle heure", "transcript": "– À quelle heure arrivez-vous au travail ?"}, {"type": "extrait", "q": "Question 3. Bonjour madame la directrice, vous avez passé un bon week-end ?", "prompt": "Bonjour madame la directrice, vous avez passé un bon week-end ?", "c": ["Avec plaisir.", "C'est d'accord.", "Excusez-moi.", "Oui, et vous ?"], "a": 3, "k": "Oui, et vous ?", "transcript": "– Bonjour madame la directrice, vous avez passé un bon week-end ?"}, {"type": "extrait", "q": "Question 4 : On se rappelle pour déjeuner ensemble ?", "prompt": "On se rappelle pour déjeuner ensemble ?\n– Oui, ça me ferait plaisir.\n– Tu es libre quand ?", "c": ["À la cafétéria.", "Au centre-ville.", "Avec ma sœur.", "En début de semaine."], "a": 3, "k": "quand", "transcript": "– On se rappelle pour déjeuner ensemble ?\n– Oui, ça me ferait plaisir.\n– Tu es libre quand ?"}, {"type": "extrait", "q": "Question 5. Tu dois choisir ton orientation ce mois-ci.", "prompt": "Tu dois choisir ton orientation ce mois-ci.\n– Quel métier est-ce que tu veux faire plus tard ?", "c": ["J'ai trouvé l'examen difficile.", "J'aurai bientôt la réponse.", "Je prends des cours d'anglais.", "Je rêve d'être musicien."], "a": 3, "k": "Quel métier", "transcript": "– Tu dois choisir ton orientation ce mois-ci.\n– Quel métier est-ce que tu veux faire plus tard ?"}, {"type": "extrait", "q": "Question 6 : Bonjour Madame. Est-ce que je peux vous aider ?", "prompt": "Bonjour Madame.\n– Est-ce que je peux vous aider ?\n– Bonjour. Oui, j'ai rendez-vous avec Madame Cader à 10 heures pour un poste de vendeuse.", "c": ["Bien. Asseyez-vous.", "Entendu. Allongez-vous.", "Pardon, taisez-vous.", "Silence, levez-vous."], "a": 0, "k": "Bien. Asseyez-vous.", "transcript": "– Bonjour Madame.\n– Est-ce que je peux vous aider ?\n– Bonjour.\n– Oui, j'ai rendez-vous avec Madame Cader à 10 heures pour un poste de vendeuse."}, {"type": "extrait", "q": "Question 7 : J'ai deux places pour aller voir Hamlet au théâtre la semaine prochaine. Ça t'intéresse de venir avec moi ?", "prompt": "J'ai deux places pour aller voir Hamlet au théâtre la semaine prochaine.\n– Ça t'intéresse de venir avec moi ?", "c": ["Ah oui, c'est une bonne idée.", "Oui, j'ai aimé ce film.", "Oui, on prend les billets.", "Oui, regarde le programme !"], "a": 0, "k": "Ah oui, c'est une bonne idée.", "transcript": "– J'ai deux places pour aller voir Hamlet au théâtre la semaine prochaine.\n– Ça t'intéresse de venir avec moi ?"}, {"type": "extrait", "q": "Question 8 : C'est incroyable. Trois ministres vont quitter le gouvernement. Est-ce que tu as vu le journal télévisé ?", "prompt": "C'est incroyable. Trois ministres vont quitter le gouvernement.\n– Est-ce que tu as vu le journal télévisé ?", "c": ["Non, c'est impossible.", "Non, c'est trop tard.", "Non, je l'ai déjà regardé.", "Non, raconte-moi."], "a": 3, "k": "Non, raconte-moi.", "transcript": "– C'est incroyable.\n– Trois ministres vont quitter le gouvernement.\n– Est-ce que tu as vu le journal télévisé ?"}, {"type": "document", "q": "Question 9. Que souhaite la jeune femme ?", "c": ["Attendre la réponse.", "Compléter son dossier.", "Demander un passeport.", "Envoyer son inscription."], "a": 1, "k": "je ne vois pas la copie de votre passeport", "transcript": "– Bonjour, je viens d'emménager à Marseille et je voudrais déposer un dossier pour m'inscrire à l'université.\n– Vous avez rempli le dossier ?\n– Oui, le voilà, avec les justificatifs.\n– Très bien, mais je ne vois pas la copie de votre passeport. C'est indispensable."}, {"type": "document", "q": "Question 10. Que souhaite le client ?", "c": ["Choisir un pantalon différent.", "Découvrir la nouvelle collection.", "Être remboursé de son achat.", "Trouver un vêtement en solde."], "a": 2, "k": "Je préférais un remboursement", "transcript": "– Bonjour, j'ai acheté ce pantalon la semaine dernière, mais il a un défaut.\n– Dans ce cas, je peux vous l'échanger.\n– Je préférais un remboursement.\n– C'est impossible pendant les soldes, mais vous pouvez choisir un autre article, même dans la nouvelle collection."}, {"type": "document", "q": "Question 11. Que conseille le médecin à Madame Chabert ?", "c": ["Dormir plus longtemps.", "Faire un bilan de santé.", "Manger équilibré.", "Pratiquer un sport."], "a": 2, "k": "pensez à varier vos repas", "transcript": "– Bonjour Docteur.\n– Ah, bonjour Madame Chabert. Qu'est-ce qui vous amène ?\n– J'ai encore mal aux genoux et je me sens de plus en plus fatiguée.\n– C'est peut-être à cause de l'hiver ? Vous m'avez pourtant l'air en pleine forme. Pour la fatigue, je vais vous prescrire des vitamines. Et pensez à varier vos repas. Pour votre genou, nous allons regarder cela de plus près. Suivez-moi."}, {"type": "document", "q": "Question 12. De quoi parlent ces deux personnes ?", "c": ["D'un nouveau produit.", "De collègues de travail.", "De leur lieu d'habitation.", "De leurs derniers achats."], "a": 0, "k": "c'est le boîtier connecté pour trier les déchets", "transcript": "– Salut Pauline !\n– Salut Clément !\n– Ça y est, j'ai lancé mon projet avec mon équipe !\n– Ah oui, c'est le boîtier connecté pour trier les déchets ?\n– Oui, c'est ça ! On le fixe à côté de ces poubelles et après c'est très simple. On scanne le code des emballages avant de les jeter et le boîtier indique dans quelle poubelle il faut les jeter en fonction des règles de la ville où on réside.\n– C'est génial !"}, {"type": "document", "q": "Question 13. Qu'annonce-t-on aux voyageurs ?", "c": ["Il y a une manifestation sur les voies.", "Ils doivent changer de moyen de transport.", "Les tramways circulent avec du retard.", "Un accident bloque la circulation des bus."], "a": 1, "k": "prendre les navettes de remplacement", "transcript": "En raison des travaux de construction de la nouvelle ligne de tramway, la circulation de la ligne 1 est interrompue entre les stations Place de l'Europe et Corum. Nous vous invitons à prendre les navettes de remplacement à votre disposition aux stations pour poursuivre votre voyage. Nous nous excusons pour le dérangement occasionné et nous vous remercions de votre compréhension."}, {"type": "document", "q": "Question 14. Quelle est l'idée de François Boucher ?", "c": ["Construire des objets à partir de skis usés.", "Fabriquer des skis avec des produits écologiques.", "Faire découvrir le ski à des enfants défavorisés.", "Proposer des skis d'occasion en magasin."], "a": 0, "k": "il transforme les vieux skis en meubles", "transcript": "François Boucher, professeur de sport près de Québec, a créé une petite entreprise qui valorise les skis et planches à neige en fin de vie. Dans un pays comme le Canada, où les sports d'hiver sont populaires, ce matériel est source de beaucoup de déchets, car il est composé de matériaux non recyclables. Comme François cherchait un moyen de financer des sorties scolaires dans les stations de ski des environs, il a pensé qu'il pourrait trouver dans ses déchets une source de revenus. Aujourd'hui, il transforme les vieux skis en meubles."}, {"type": "document", "q": "Question 15. Qu'est-ce que Marie va faire à Vienne ?", "c": ["Manger des plats typiques.", "Rencontrer sa famille.", "Travailler toute la journée.", "Voir une exposition."], "a": 2, "k": "Je serai occupée du matin au soir par les réunions", "transcript": "– Alors Marie, prête pour le départ ?\n– Oui.\n– Tu as le guide touristique de Vienne ? Tu pourrais visiter la ville et goûter les spécialités locales ?\n– Oh, je ne sais pas. Je serai occupée du matin au soir par les réunions et des rendez-vous avec des clients.\n– Ah, et tu vas voir tes amis autrichiens ?\n– Non, pas cette fois."}, {"type": "document", "q": "Question 16. Qu'est-ce qu'on apprend sur Laurent ?", "c": ["Il a un restaurant.", "Il déteste les pizzas.", "Il préfère rester chez lui.", "Il sait bien faire la cuisine."], "a": 3, "k": "Laurent a préparé le repas", "transcript": "– Laurent et toi, vous avez dîné en ville hier soir ?\n– Ben non, notre restaurant préféré était fermé et il n'y avait plus de place à la pizzeria.\n– Qu'est-ce que vous avez fait ?\n– On est rentré chez nous. Laurent a préparé le repas. C'était excellent.\n– Tu as de la chance d'avoir un chef à la maison."}, {"type": "document", "q": "Question 17. Qu'est-ce qui dérange le jeune homme ?", "c": ["Devoir annuler son voyage.", "Devoir visiter les musées.", "Devoir écourter leur séjour.", "Devoir partir en voiture."], "a": 3, "k": "Oui, mais en voiture", "transcript": "– Alors, c'est toujours OK ? On part à Londres ce week-end en Eurostar ?\n– Oui, mais en voiture. Comme ça, on pourra s'arrêter dans le sud de l'Angleterre.\n– Je ne connais pas.\n– Attends, tu rigoles ! On n'a qu'un week-end.\n– En train, ça va, mais… Londres et ses alentours. En voiture, c'est plus facile, non ?\n– Mais non, pas pour visiter les musées de Londres, non !\n– Eh bien, on n'y va pas ce week-end, mais quand on aura un pont. Parce que moi, les musées...\n– Qu'en dis-tu ?\n– Tu gagnes toujours."}, {"type": "document", "q": "Question 18 : Que peut-on faire à l'anti-café ?", "c": ["Échanger des articles de seconde main.", "Louer du matériel de bureautique.", "Organiser des réunions professionnelles.", "Profiter d'une atmosphère familière."], "a": 3, "k": "être comme à la maison, hors de chez soi", "transcript": "À l'Anticafé, l'objet clé, c'est l'horloge. Ici, on ne paye pas sa consommation, mais le temps qu'on y passe. 4 euros la première heure, puis 2 euros chaque heure supplémentaire, avec un maximum de 14 euros la journée. Le tout avec des consommations à volonté. Objectif, être comme à la maison, hors de chez soi. Ici, vous allez être comme chez soi. Et la seule chose que vous payez chez vous, c'est le temps. Après, vous avez l'accès à tout ce qu'on propose. Le buffet, c'est les boissons chaudes et froides, c'est les choses pour travailler, comme l'imprimante, scanner, projecteur. Donc, on a vraiment essayé de créer l'espace qui ressemblera à votre propre appartement, mais qui soit un peu plus grand où vous pouvez voir vos amis."}, {"type": "document", "q": "Question 19 : Pourquoi Jean-Paul n'a-t-il pas envie d'aller à la campagne ?", "c": ["Il ne fera pas beau durant le week-end.", "La maison est mal chauffée.", "Le voyage est trop long.", "Il n'aime pas rester enfermé."], "a": 2, "k": "de faire tous ces kilomètres pour rester à peine deux jours", "transcript": "– Dis, Jean-Paul, t'as pas l'air d'avoir très envie d'aller à la campagne ce week-end.\n– En tout cas, moi j'ai peur d'avoir froid. Le chauffage marche si mal.\n– Moi, c'est pas ça. Ce qui m'ennuie, c'est de faire tous ces kilomètres pour rester à peine deux jours.\n– Oh, la route, c'est pas grave. Mais la météo n'est pas très bonne.\n– Ça ne me dit rien d'être bloqué tout le week-end dans la maison."}, {"type": "document", "q": "Question 20 : Qu'est-ce que Maël va faire ce soir ?", "c": ["Manger au restaurant.", "Regarder un film.", "Rester à la maison.", "Voir un spectacle."], "a": 0, "k": "nous allons dîner en ville", "transcript": "– Eh, salut Maël !\n– Alors, tu vas au théâtre avec tes parents ce soir ?\n– Non, finalement nous allons dîner en ville.\n– Ah bon ? Pourquoi ?\n– Ils ont changé d'avis, la pièce finit trop tard. Je leur ai proposé le cinéma mais c'est trop loin."}, {"type": "document", "q": "Question 21 : De quoi parlent ces personnes ?", "c": ["D'un projet de voyage.", "D'un changement de travail.", "D'un futur déménagement.", "D'une sortie au cinéma."], "a": 0, "k": "je lui demanderai si je peux prendre des vacances", "transcript": "– Salut, ça va ?\n– Ça va, mais mon petit ami est parti pour trois mois pour réaliser un documentaire sur la Gaspésie, une région assez sauvage du Québec.\n– Ah oui, je connais. Quelle chance ! J'adorerais y retourner.\n– Et tu vas y aller aussi ?\n– J'aimerais bien, mais j'ai des missions prévues prochainement, mais bon. Je vois mon patron demain, je lui demanderai si je peux prendre des vacances.\n– Bonne chance. Tu m'écriras pour me raconter ton expérience là-bas. Et préviens-moi quand le film sortira."}, {"type": "document", "q": "Question 22. Comment cet individu reçoit-il la proposition patronale ?", "c": ["Il est ironique.", "Il est favorable.", "Il est plein d'espoir.", "Il est méprisant."], "a": 0, "k": "Quelle belle initiative", "transcript": "Monsieur Morales, vous êtes donc secrétaire de la Fédération syndicale des travailleurs de l'alimentation, de l'agro-industrie et industries similaires. Comment jugez-vous les rapports entre votre organisation syndicale et les patrons ? Dans le cadre des discussions avec les partenaires sociaux, l'organisation patronale nous a récemment proposé, à titre expérimental, un système de résolution alternative des conflits. Ce système prévoit la formation, par le patronat, de médiateurs soi-disant indépendants et permettrait, je cite la représentante, d'intervenir en amont des conflits sociaux pour éviter le recours lent et coûteux aux inspections du travail et aux tribunaux. Quelle belle initiative ! Mais une question me taraude. Comment peut-on prétendre être à la fois juge et partie ?"}, {"type": "document", "q": "Question 23 : D'après cet intervenant, à quoi peut prétendre le meilleur chasseur d'une communauté ?", "c": ["À un poste de responsable du village.", "À un temps de loisir plus étendu.", "À une place spéciale dans l'histoire.", "À une plus grosse part de nourriture."], "a": 0, "k": "Le meilleur chasseur, c'est celui qui va devenir le chef du village", "transcript": "Le sport aurait commencé, d'après les anthropologues, d'après les historiens, d'abord d'après les archéologues, quand la chasse est devenue un sport. C'est-à-dire qu'on a cessé de chasser pour se nourrir et chasser pour le loisir, chasser pour le symbolique. Le meilleur chasseur, c'est celui qui va devenir le chef du village. Celui qui rapporte le plus de têtes d'animal, c'est le plus fort physiquement, donc il s'impose symboliquement. Donc le lien entre la chasse et la guerre est direct. Parce que si on fait encore un autre lien, celui qui est un bon chasseur va être un bon guerrier."}, {"type": "document", "q": "Question 24. Que déplore cet invité concernant les footballeuses ?", "c": ["L'inégalité salariale avec les hommes.", "Le manque de sérieux dans la sélection.", "Les discours discriminants stéréotypés.", "Les rares retransmissions des matchs."], "a": 2, "k": "des remarques sexistes, voire misogynes", "transcript": "La première des choses pour médiatiser les footballeuses de façon appropriée, ce serait de se centrer uniquement sur leur performance sur le terrain, ce qui n'est clairement pas le cas actuellement. On entend régulièrement encore des remarques sexistes, voire misogynes. D'ailleurs, vous parlez de foot féminin et de coupe du monde féminine. Pour moi, c'est déjà un problème que d'aborder cette question de cette façon-là. D'une part parce que quand on dit football féminin, on sous-entend que finalement c'est une autre discipline, un autre football. Parce qu'on ne dit jamais football masculin, comme si c'était la norme, le dogme. Et la deuxième chose c'est que quand on dit football féminin, ça sous-entend encore une fois l'injonction à la féminité."}, {"type": "document", "q": "Question 25 : Comment le choix du titre de ce film s'est-il fait ?", "c": ["C'est l'instituteur qui a proposé ce titre, qui lui plaisait, au réalisateur.", "Ce sont les parents d'élèves qui ont proposé ce titre au réalisateur.", "Les élèves faisaient un exercice de conjugaison quand le réalisateur les a rencontrés.", "Le réalisateur a trouvé que ces verbes résumaient les multiples aspects de la vie."], "a": 3, "k": "la conjugaison, c'est toute une vie, passé, présent, futur", "transcript": "Le réalisateur de films documentaires Nicolas Philibert a passé plusieurs semaines dans une école élémentaire composée d'une classe unique. Autour d'un seul instituteur, installé dans ce village d'Auvergne depuis plus de 20 ans, une douzaine d'enfants étudiaient ensemble de la maternelle à l'entrée au collège. Pourquoi avez-vous intitulé votre film Être et Avoir ? Vous savez, ce titre s'est imposé tout de suite. On a tous fait beaucoup d'exercices à l'école sur ces deux verbes. Et puis, la conjugaison, c'est toute une vie, passé, présent, futur, avoir. C'est aussi l'image d'un monde où nous sommes tentés par la possession, la consommation."}, {"type": "document", "q": "Question 26 : Selon l'intervenante, à quoi sont principalement liés les problèmes de santé des coiffeurs ?", "c": ["À l'emploi de produits chimiques.", "Au manque de considération des patrons.", "Aux conversations intimes avec les clients.", "Aux horaires de travail en décalé."], "a": 2, "k": "Une sollicitation émotionnelle trop forte peut les fragiliser", "transcript": "Trois coiffeurs sur quatre déclarent avoir au moins un problème de santé. Alors il y a bien sûr le fait de travailler le dos courbé, la tête penchée, le coude levé. Il y a aussi les produits utilisés, teintures ou autres. Enfin, il y a aussi la charge mentale, comprenez. Les clients, beaucoup, n'hésitent pas à se décharger sur leur coiffeur. Infidélité du conjoint, problème au boulot, maladie incurable ou encore soucis financiers. Les coiffeurs se transforment de plus en plus souvent en psy face à des clients en mal de confident. Et ça a des répercussions sur leur santé, à eux. Une sollicitation émotionnelle trop forte peut les fragiliser. La patronne d'un salon confiant s'y être épuisée à la fin de sa journée, non pas par son travail en tant que tel, mais pour avoir écouté ses clientes."}, {"type": "document", "q": "Question 27 : Que dit le journaliste sur la lumière artificielle ?", "c": ["Elle assure la sécurité en ville.", "Elle empêche d'admirer le ciel.", "Elle est indispensable à l'organisme.", "Elle est insuffisante à la campagne."], "a": 1, "k": "contempler à nouveau les étoiles", "transcript": "Pourquoi ne pas réclamer le droit au noir, qui permettrait de contempler à nouveau les étoiles, une manière de transporter les villes à la campagne, puisqu'à chaque fois que je suis à la campagne, je suis frappé par la richesse du ciel, et après tout, voir Jupiter, ça vaut bien des paysages. Ce n'est plus à démontrer, la lumière perpétuelle est une agression, c'est une manière de dérégler notre organisme, dit-on, qui a besoin de ne rien voir un moment pour pouvoir voir à d'autres moments. Voilà pourquoi on pourrait songer à demander une extinction des feux, pour toutes les raisons d'ailleurs. Nos plus claires idées sont filles d'un travail obscur, disait Paul Valéry. Alors éteignez les lumières, il ne fait pas encore jour."}, {"type": "document", "q": "Question 28 : Selon ce reportage, pourquoi les futurs apprentis doivent-ils se montrer tenaces ?", "c": ["Parce que l'apprentissage est une formation longue.", "Parce que le lieu de stage peut être difficile à trouver.", "Parce que les centres de formation sont surchargés.", "Parce que les patrons préfèrent les jeunes diplômés."], "a": 1, "k": "Il faut parfois démarcher plusieurs dizaines d'entreprises", "transcript": "L'apprentissage en centre de formation est une voie possible après la classe de troisième. Pour y parvenir, deux mots d'ordre. Motivation et ténacité. Motivation, car c'est l'un des critères majeurs de recrutement par des patrons. Ténacité, car il faut impérativement décrocher un stage pour pouvoir s'inscrire dans tout centre de formation. Et là, ce n'est pas forcément gagner d'entrée. Il faut parfois démarcher plusieurs dizaines d'entreprises avant de trouver son bonheur."}, {"type": "document", "q": "Question 29 : Qu'explique la journaliste ?", "c": ["Les déchets abandonnés rendent les pistes très dangereuses.", "Les skieurs contribuent en partie à la pollution des océans.", "Les stations veulent interdire la vente de certains produits.", "Les touristes doivent participer aux opérations de nettoyage."], "a": 1, "k": "sur une plage en Camargue des emballages en plastique", "transcript": "La saison de ski se termine. Les dernières stations encore ouvertes vont fermer ce week-end. Place au nettoyage. Des associations vont organiser des ramassages de déchets car au pied des télésièges, on trouve des choses qui n'ont rien à y faire. Oui, des papiers de barres chocolatées, des canettes, des tubes vides de crème solaire jetés au pied des sapins. Mais avec la fonte des neiges, ces déchets se retrouvent souvent dans un ruisseau qui mène à une rivière qui mène jusqu'à la mer. Donc on peut retrouver sur une plage en Camargue des emballages en plastique jetés depuis un télésiège en Savoie et apportés par le Rhône."}, {"type": "document", "q": "Question 30. Selon le chroniqueur, que permet la course par rapport à la marche ?", "c": ["De maigrir plus rapidement.", "De manger sans compter.", "De s'entraîner moins souvent.", "De vivre plus longtemps."], "a": 0, "k": "en ce qui concerne la perte de poids, c'est la course qui l'emporte", "transcript": "Marcher ou courir ? Ça dépend. C'est ce qui ressort de quelques études récentes qui ont opposé les deux exercices et mesuré leurs effets. L'une d'elles a été publiée le mois dernier dans la revue Medicine and Science in Sports and Exercise. Conclusion, en ce qui concerne la perte de poids, c'est la course qui l'emporte. Les coureurs sont plus minces, moins de surcharge pondérale que les marcheurs. Et passé l'âge de 55 ans, c'est encore plus vrai, même si le nombre de kilomètres parcourus à la course par semaine est minime, il y a une différence entre les coureurs et les marcheurs. Et la cause pourrait être l'effet de la course sur l'appétit."}, {"type": "document", "q": "Question 31 : Quel aspect de ce projet est mis en avant ?", "c": ["L'influence sur l'aménagement urbain.", "La portée socio-environnementale.", "La solide formation des salariés.", "Le poids des retombées économiques."], "a": 1, "k": "alliant économie circulaire et économie sociale", "transcript": "Notre prochain arrêt va nous faire découvrir une initiative qui innove en alliant économie circulaire et économie sociale. Car si le projet de voie publique vise à recycler le bois des arbres malades pour en faire des pièces de mobiliers urbains, sa force repose sur sa collaboration avec des ateliers des ébénisteries qui misent sur l'insertion sociale. Un véritable travail d'équipe qui permet à la communauté qui a perdu ses arbres de les retrouver sous une autre forme."}, {"type": "document", "q": "Question 32 : Quel était l'objectif de Georges Moustaki avec cette chanson ?", "c": ["Appeler à la fraternité dans le monde entier.", "Envoyer un message à tous les jeunes immigrés.", "Raconter un épisode sentimental de sa propre vie.", "Se faire rapidement connaître auprès du grand public."], "a": 2, "k": "il ne s'agissait que d'une chanson sur un amour déçu", "transcript": "Georges Moustaki tente de séduire une jeune femme. Les parents de celle-ci sont furieux et traitent le courtisan de Métec. Une malheureuse aventure qui lui inspire la chanson Le Métec. Elle a eu un succès immédiat. C'était absolument imprévisible. C'est une bonne chanson. Enfin, j'en étais assez content. Mais ce qu'elle racontait ne me paraissait pas être appelé à devenir universel. Or, je ne compte plus les pays qui l'ont adoptée. Elle existe en... en italien, portugais, espagnol, turc. Je ne pensais pas que cette chanson ferait une carrière. La diffusion du METEC intervenant un an après mai 68, le public y entend un chant libertaire, alors qu'au départ, il ne s'agissait que d'une chanson sur un amour déçu."}, {"type": "document", "q": "Question 33 : Quel est l'objectif de la conférence sur les catastrophes naturelles ?", "c": ["Se faire rapidement connaître auprès du grand public.", "Définir des politiques pour tenter de les enrayer.", "Informer sur leur dangerosité et leur accroissement.", "Soutenir financièrement les pays les plus touchés."], "a": 1, "k": "l'accent soit mis sur les actions de prévention", "transcript": "Actuellement, 90% des catastrophes naturelles sont liées à des phénomènes extrêmes météorologiques. Inondations, tsunamis ou bien ouragans. Et pour la plupart de ces phénomènes, il est possible de fournir des alertes pour des actions de prévention, pour sauver des vies mais aussi pour minimiser l'impact économique. C'est l'enjeu de la conférence qui se réunit en ce moment à Genève. C'est de faire en sorte que l'accent soit mis sur les actions de prévention, de telle sorte qu'on ait moins à faire après. Parce que, n'oublions pas qu'avec le changement climatique, ces phénomènes extrêmes vont devenir plus fréquents, et pour un certain nombre d'entre eux, plus intenses."}, {"type": "document", "q": "Question 34 : Qu'explique la personne interviewée ?", "c": ["Établir des priorités s'avère très difficile.", "Grâce au numérique, les gains de temps sont importants.", "Il n'y a pas de limite à la quantité d'informations traitées.", "La communication en ligne est addictive."], "a": 0, "k": "on est submergé de vingtaines, trentaines d'informations", "transcript": "Si vous voulez vraiment voir quelles sont vos priorités dans une journée, vous verrez que vous n'en avez pas 10 ou 20. Ce qui est vraiment important, ça se compte sur les doigts d'une main. Et à ce moment-là, vous pouvez mettre en place des temps longs d'une heure pour faire ceci, une demi-heure pour faire cela. Et à la fin, vous y arrivez. Le problème, c'est que le flux d'informations aujourd'hui est tel, avec tous ces outils de communication numérique, qu'on est submergé de vingtaines, trentaines d'informations parmi lesquelles on perd un petit peu le sens de la priorité."}, {"type": "document", "q": "Question 35 : Selon l'intervenant, quel est le rôle de la littérature ?", "c": ["Aider à une réflexion sur l'existence.", "Contribuer à l'évasion du quotidien. <script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 37/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test34_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 37</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 34 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
