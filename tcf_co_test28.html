<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 28 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

 a des chambres libres.", "Oui, le centre-ville est très proche.", "Oui, le petit-déjeuner est compris.", "Oui, nous avons un parking privé."], "a": 0, "k": "Oui, il y a des chambres libres.", "transcript": "– Bonjour, madame. Je souhaiterais réserver dans votre hôtel pour le week-end prochain. Vous avez de la place disponible ?"}, {"type": "extrait", "q": "Question 10. Choisissez la bonne réponse.", "c": ["J'ai cassé ma raquette.", "J'ai oublié mon ballon.", "J'ai perdu mon maillot.", "J'ai trouvé mes chaussures."], "a": 2, "k": "J'ai perdu mon maillot.", "transcript": "– Si tu veux, je t'emmène à la piscine cet après-midi. Qu'est-ce que tu en penses ?"}, {"type": "extrait", "q": "Question 11. Choisissez la bonne réponse.", "c": ["Le fax est en panne, j'ai appelé le réparateur.", "Mme Marcos est passée prendre le dossier Mali.", "M. Dupont a téléphoné et veut vous voir.", "Vous avez rendez-vous avec M. Posay."], "a": 2, "k": "M. Dupont a téléphoné et veut vous voir.", "transcript": "– Martine, est-ce qu'il y a eu des appels pour moi ?"}, {"type": "document", "q": "Question 12. Que doit faire la personne pour se rendre au bureau 309 ?", "c": ["Aller au 2e étage", "Monter à pied", "Prendre l'ascenseur", "Passer par la cafétéria"], "a": 1, "k": "Vous devez prendre l'escalier au bout du couloir.", "transcript": "Pourriez-vous me dire où se trouve le bureau 309, s'il vous plaît ?\n– Au troisième étage, deuxième porte à gauche, avant la cafétéria.\n– Apparemment, l'ascenseur est en panne.\n– Oui, malheureusement. Vous devez prendre l'escalier au bout du couloir.\n– Celui-ci ?"}, {"type": "document", "q": "Question 13. Que veulent faire ces personnes samedi s'il ne pleut pas ?", "c": ["Inviter des amis chez elles", "Rendre visite à un ami", "Faire des courses", "Manger en plein air"], "a": 3, "k": "Nous ferons un pique-nique samedi prochain.", "transcript": "Alors c'est d'accord. Nous ferons un pique-nique samedi prochain.\n– Oui, mais cela dépendra aussi du temps. S'il pleut, Pierre a proposé d'aller chez lui. Il a une maison de campagne avec une grande véranda qui s'ouvre sur le jardin.\n– Ah oui ? Alors c'est d'accord. Tu apportes les salades ?\n– Oui, et toi des fruits. Pierre s'occupera des boissons et du pain.\n– Bon, espérons qu'il fera beau."}, {"type": "document", "q": "Question 14. Dans quel type de logement habite cette personne ?", "c": ["Une chambre d'hôtel", "Une maison individuelle", "Un grand appartement", "Un studio en ville"], "a": 3, "k": "Il y a une seule pièce. C'est au deuxième étage d'un immeuble situé en plein centre-ville.", "transcript": "Alors, tu as trouvé un logement ?\n– Oui, c'est tout petit. Il y a une seule pièce. C'est au deuxième étage d'un immeuble situé en plein centre-ville. En plus, la propriétaire est gentille. C'est ce qu'il me faut."}, {"type": "document", "q": "Question 15. Pourquoi l'informaticien vient-il ?", "c": ["Pour contrôler l'état des machines en service", "Pour donner une formation aux employés", "Pour mettre à jour toutes les applications", "Pour réparer des équipements informatiques"], "a": 3, "k": "Pour les deux ordinateurs en panne ?", "transcript": "François, souvenez-vous que l'informaticien passera cet après-midi au service comptabilité.\n– Oui, je sais. Pour les deux ordinateurs en panne ?\n– Oui. Appelez la comptable pour vérifier qu'elle a bien noté le rendez-vous.\n– Elle est en formation jusqu'à la fin de la semaine, sur le nouveau logiciel de comptabilité justement. Elle revient lundi.\n– Demandez à notre stagiaire d'être présent, alors.\n– Je m'en occupe tout de suite."}, {"type": "document", "q": "Question 16. Selon l'intervenant, qu'est-ce qui explique les troubles du comportement ?", "c": ["Un emploi du temps surchargé", "Un encadrement trop rigide", "Un manque d'activités de plein air", "Un usage excessif des écrans"], "a": 2, "k": "les jeunes jouent beaucoup moins à l'extérieur", "transcript": "En fait, en quelques mots, les jeunes jouent beaucoup moins à l'extérieur. Les jeunes sont plus inactifs. Les jeunes ont plus de troubles du comportement. De plus en plus d'études scientifiques font un lien direct entre le fait que les enfants n'aient même pas de temps libre, n'aient pas de jeu libre, ne jouent pas dehors, ne soient pas en lien avec la nature qui les environne. Et donc, sur des études qui ont été faites, par exemple sur des rats, on a constaté que des rats qui ne bougent pas, qui ne peuvent pas jouer, qui ne peuvent pas sortir librement à l'extérieur développent des troubles du comportement comme ceux que l'on constate absolument actuellement chez les enfants."}, {"type": "document", "q": "Question 17. Quelle est la fonction de cette annonce publique ?", "c": ["Prévenir d'un danger", "Signaler le départ d'un train", "Annoncer l'arrivée d'un train", "Avertir d'un incident"], "a": 0, "k": "Pour votre sécurité, attention à la marche en descendant du train.", "transcript": "Pour votre sécurité, attention à la marche en descendant du train."}, {"type": "document", "q": "Question 18. Pour quelles raisons la jeune fille est-elle si contente ?", "c": ["Elle a trouvé pour son ami un emploi à temps complet dans une société", "Son ami est définitivement employé dans la société où il travaille", "Son ami vient de trouver son premier emploi à l'essai", "Elle va signer un contrat d'embauche à temps complet"], "a": 1, "k": "je signe lundi prochain mon contrat définitif et à temps complet", "transcript": "Ah, qu'est-ce qui t'arrive ? T'es super beau habillé comme ça. Où vas-tu ?\n– Je sors de chez le coiffeur et je viens de m'acheter ce costume.\n– Magnifique. T'as un look d'enfer, mais pourquoi ? Pour moi ?\n– Je viens juste de terminer mes six mois d'essai chez mon patron. Et comme j'ai donné satisfaction, je signe lundi prochain mon contrat définitif et à temps complet, pas partiel.\n– Ah, ton contrat définitif, mais c'est extra. Te voilà dans la vie active. Bravo. Je suis enchantée pour toi et tu penses à nous maintenant."}, {"type": "document", "q": "Question 19. Que propose chaque semaine cette radio à ses auditeurs ?", "c": ["De déjeuner ensemble", "De faire une soirée", "De participer à un jeu", "De rencontrer un invité"], "a": 0, "k": "chaque vendredi, vous ouvrez le local à 13h. On peut venir avec son panier et on partage en commun le repas.", "transcript": "Tout le monde rêve de faire de la proximité, d'être proche des auditeurs. Alors quand on est une radio associative locale, on a plus de facilités. Vous, chaque vendredi, vous ouvrez le local à 13h. On peut venir avec son panier et on partage en commun le repas. Tout à fait. Et là, pour la fin de l'année, on a donc lancé une invitation à tous ceux qui voudraient venir manger avec nous et réaliser une émission collective de fin d'année. Un petit peu festive."}, {"type": "document", "q": "Question 20. Que dit cette intervenante au sujet du travail à Londres ?", "c": ["Le recrutement se fonde sur l'expérience", "Les salaires à l'embauche sont très élevés", "L'évolution professionnelle est très lente", "L'obtention d'un premier emploi est aisée"], "a": 0, "k": "On va surtout regarder les postes que vous avez déjà occupés.", "transcript": "On dit souvent qu'à Londres, on peut changer de job quasiment comme de chemise. Est-ce que c'est toujours vrai ?\n– Il est toujours facile de passer d'un job à l'autre. Le diplôme a beaucoup moins d'importance. On va surtout regarder les postes que vous avez déjà occupés. On va aussi tenir compte de vos motivations. C'est vrai qu'on vous donne aussi la possibilité d'augmenter... Comment dire, de franchir les étapes beaucoup plus rapidement. On retrouve assez régulièrement des personnes vers 22, 23 ans et déjà manager, tandis qu'en France, c'est quand même un petit peu plus compliqué."}, {"type": "document", "q": "Question 21. Pourquoi le client n'obtient-il pas le transfert de sa ligne téléphonique ?", "c": ["Le promoteur a oublié de prévenir la compagnie de téléphone", "Le réseau téléphonique du nouvel immeuble est déjà saturé", "Les travaux nécessaires ne sont pas encore achevés", "La compagnie de téléphone manque de personnel pour le faire"], "a": 2, "k": "Les travaux ne sont pas encore terminés.", "transcript": "Bonjour monsieur. Je viens de transférer ma ligne téléphonique. J'emménage demain dans les logements neufs de la rue de l'université.\n– Oh là là, ça ne sera pas fini avant 10 jours. Les travaux ne sont pas encore terminés. Le promoteur a du retard. Nous attendons son autorisation pour installer le réseau.\n– 10 jours. Mais comment je fais sans téléphone ? Moi, j'en ai besoin pour mon travail.\n– Je suis désolé, monsieur, mais vous n'êtes pas le seul dans ce cas. Et on ne peut pas aller plus vite que les travaux."}, {"type": "document", "q": "Question 22. Que propose le site dans lequel cet intervenant travaille ?", "c": ["Des activités en faveur du développement durable", "Des formations aux nouveaux métiers de l'éducation", "Des sorties équestres pour les écoliers de la région", "Des stages à destination des animateurs jeunesse"], "a": 0, "k": "l'écologie au quotidien, les écogestes, les astuces qu'on peut mettre en place", "transcript": "Être écoéducateur, c'est être à cheval entre l'éducateur et le pédagogue, puisqu'on va sensibiliser le public aux problématiques environnementales, mais en même temps expliquer ces problématiques et puis les solutions qui sont actuellement préconisées. La plupart du temps, on accueille un public d'enfants, soit scolaire, soit de centres de loisirs. Mais en vérité, on touche tous les publics puisqu'on est ouvert le week-end. Néanmoins, notre journée ne se cantonne pas à ça. On a aussi le montage de tous les projets événementiels ou d'animation future qui nécessitent de créer des supports, d'élaborer des déroulements pédagogiques ici au clos des Blancs-Manteaux. Notre entrée thématique, c'est l'écologie au quotidien, les écogestes, les astuces qu'on peut mettre en place dans notre vie de tous les jours pour participer à la préservation de la planète."}, {"type": "document", "q": "Question 23. Qu'est-ce que cette personne cherche à savoir ?", "c": ["Comment protéger ses végétaux", "Comment recycler son sapin", "Comment replanter un arbre", "Comment scier une branche"], "a": 1, "k": "Vous sauriez ce que je dois faire de mon arbre de Noël pour qu'il soit ramassé ?", "transcript": "Bonjour, je suis nouveau à Charlesbourg. Vous sauriez ce que je dois faire de mon arbre de Noël pour qu'il soit ramassé ? Vous n'avez qu'à déneiger devant chez vous et puis le laisser dans la rue. La collecte a lieu demain matin. Il est grand, votre arbre, regardez, je l'ai mis dans le jardin et il fait bien trois mètres de haut. Alors il faut le couper en deux, et puis aussi enlever tout ce qui est dessus."}, {"type": "document", "q": "Question 24. Pourquoi la personne cherche-t-elle du travail à Montréal ?", "c": ["Pour changer de profession", "Pour découvrir de nouveaux lieux", "Pour se rapprocher de sa famille", "Pour suivre son compagnon"], "a": 3, "k": "mon petit ami a été muté à Montréal, alors j'ai dû démissionner", "transcript": "Bonjour monsieur, j'ai vu votre annonce. Vous cherchez toujours une vendeuse ? Oui, cela vous intéresse ? Vous avez de l'expérience ? J'ai été vendeuse pendant 15 ans à Québec, mais mon petit ami a été muté à Montréal, alors j'ai dû démissionner. Vous habitez encore là-bas ? Non, nous sommes chez mes parents en attendant de trouver un logement. Vous parlez anglais ? Bien sûr. Bien, vous pouvez revenir demain pour un essai. Avec plaisir."}, {"type": "document", "q": "Question 25. Les journalistes évoquent une tendance qui concerne les Français. Laquelle ?", "c": ["Ils aiment passer leurs vieux jours dans le sud de la France", "Ils osent davantage partir à l'étranger qu'auparavant", "Ils payent plus d'impôts que les autres citoyens européens", "Ils prennent des cours de langue pour améliorer leur niveau"], "a": 1, "k": "ils n'ont plus peur de partir à la conquête du monde", "transcript": "Gros plan sur les Français qui partent pour réussir. Oui, tous ces Français que l'on dit nuls en anglais, eh bien, ils n'ont plus peur de partir à la conquête du monde. En fait, il est toujours un peu difficile de cerner leurs motivations profondes, entre ceux qui franchissent les frontières pour monter un business, ceux qui cherchent un job, ceux qui s'exilent pour fuir une fiscalité asphyxiante ou bien ceux qui veulent tout simplement profiter d'une retraite au soleil."}, {"type": "document", "q": "Question 26. Selon le journaliste, quel genre d'ouvrage cette philosophe française vient-elle d'écrire ?", "c": ["Un essai historique sur la vie à Paris pendant la Seconde Guerre mondiale", "Un livre de souvenirs sur l'histoire mouvementée de sa famille", "Un récit autobiographique ancré dans la vie intellectuelle du siècle dernier", "Un roman sur l'impact des événements historiques sur le destin individuel"], "a": 2, "k": "qui publie ces jours-ci ses mémoires", "transcript": "À mes côtés cette semaine, une philosophe, essayiste et romancière née à Paris, grande voyageuse, passionnée d'Afrique, férue de politique et d'opéra, qui publie ces jours-ci ses mémoires. Si vous aimez la petite et la grande histoire, sans vraiment savoir ce que pouvait signifier naître petite fille dans une famille de la bourgeoisie cultivée des années 40, si vous voulez comprendre ce que cela voulait dire, à la fin des années 50, intégrer la grande fabrique intellectuelle française — quelles sont les grandes écoles ? — si vous aimez la philosophie, les voyages et la politique, bref, si l'histoire intellectuelle de la seconde moitié du 20e siècle vous passionne, alors vous allez lire comme moi d'une traite le dernier livre de Claire Robert."}, {"type": "document", "q": "Question 27. De quoi se plaint Géraldine ?", "c": ["De ses difficultés à se réveiller le matin", "De son dernier salaire qui est insuffisant", "De son emploi du temps professionnel", "De son manque d'organisation habituel"], "a": 2, "k": "je commence à six heures du matin et à une heure de chez moi en plus", "transcript": "Salut Géraldine, ça va ? Non, pas trop. Tu sais que je cherchais du travail. Eh bien, maintenant que je l'ai trouvé, je ne suis pas très contente. Pourquoi, tu ne touches pas assez d'argent ? Non, c'est que deux fois par semaine, je commence à six heures du matin et à une heure de chez moi en plus. Oh, c'est tôt. Et comment tu vas faire pour les enfants ? Or, Gil va s'en occuper. Mais moi, imagine, je ne sais pas comment je vais faire pour récupérer. Tu vas dormir les week-ends."}, {"type": "document", "q": "Question 28. Comment la jeune fille a-t-elle passé sa soirée ?", "c": ["Elle est sortie en boîte de nuit", "Elle a dîné avec sa famille", "Elle est restée toute seule", "Elle a vu un mauvais film"], "a": 2, "k": "Alors je suis rentrée, je me suis couchée.", "transcript": "Salut Marie. Alors finalement, qu'est-ce que tu as fait samedi soir ? Je n'avais pas le moral. J'étais invitée chez ma sœur, je n'y suis pas allée. Il y a des amis qui m'ont appelée pour aller danser au dernier moment, je n'ai pas eu envie. Tu as fait quoi ? Alors finalement, j'ai voulu aller au cinéma. La séance était annulée pour raisons techniques. Alors je suis rentrée, je me suis couchée. Si j'avais su, je serais venu te chercher. On est allés jouer au bowling. On a passé une super soirée."}, {"type": "document", "q": "Question 29. Selon cette femme, qu'est-ce qui explique son amour inconditionnel du cinéma ?", "c": ["L'absence de distractions dans le village où elle habitait", "L'influence autoritaire que son père a exercée sur elle", "Le choc du tout premier film qu'elle a vu dans sa vie", "Sa fréquentation des salles dès son plus jeune âge"], "a": 3, "k": "mon père m'emmenait au cinéma alors que j'étais encore au biberon", "transcript": "Vous avez vu le premier film de Robert Feuillade hier ? Non, ce n'est pas le genre de film que j'aime. Moi, je regarde tous les films. J'adore le cinéma depuis toujours, sans doute parce que mon père m'emmenait au cinéma alors que j'étais encore au biberon. Je me souviens encore de mon premier western dans la petite ville où on habitait, tous les samedis. Il y avait le cinéma en plein air gratuit. Moi, ce que je préférais quand j'allais au cinéma avec mon père, c'était la glace à la vanille qu'il m'achetait."}, {"type": "document", "q": "Question 30. Selon le locuteur, à quoi servent les notes à l'école ?", "c": ["À classer les établissements selon un taux de performance", "À communiquer sur les progrès de l'élève dans chaque matière", "À créer une échelle lisible de classification des élèves", "À susciter chez l'élève l'envie de devenir le meilleur de la classe"], "a": 2, "k": "Elles servent à visibiliser les hiérarchies à l'intérieur de la classe.", "transcript": "L'effet sur l'apprentissage est faible, mais les notes ont d'autres fonctions. Elles servent à visibiliser les hiérarchies à l'intérieur de la classe. Elles servent à savoir exactement à quel niveau se trouvent les élèves, donc elles donnent une indication très claire. Donc ensuite, elles permettent de faire le tri en termes de redoublement ou d'orientation. Et elles permettent aussi d'objectiver, une réunification du jugement qu'on donne de l'élève. Par exemple, lorsqu'on communique les résultats aux parents, c'est numérique, c'est vrai, c'est objectif, c'est objectif."}, {"type": "document", "q": "Question 31. Que conseille le médecin à son patient pour perdre du poids ?", "c": ["Manger de tout, y compris ce qu'il n'aime pas", "Cesser de consommer du pain ou des féculents", "Manger plus léger sans changer ses habitudes", "Se garder de consommer des aliments sucrés"], "a": 2, "k": "L'essentiel pour parvenir à maigrir et à ne pas recommencer à grossir est de moins manger", "transcript": "Docteur, quels aliments dois-je supprimer pour ne pas grossir ? L'essentiel pour parvenir à maigrir et à ne pas recommencer à grossir est de moins manger, mais tout en respectant son mode de vie et ses goûts. Vraiment, on peut manger de tout, oui, aucun aliment n'est mauvais en soi. Tout dépend des quantités et de la façon dont il est consommé. Il faut privilégier la diversité, c'est tout. Oui, deux conseils encore : réduisez l'apport en lipides et en sucre. Privilégiez les légumes verts, en quantité modérée, ainsi que les féculents et le pain."}, {"type": "document", "q": "Question 32. Qu'est-ce qui caractérise l'écriture théâtrale de cet auteur ?", "c": ["La diversité des parlers régionaux des personnages", "La mise en relief des formules figées de la langue", "Le recours constant au registre familier", "Les jeux de mots récurrents dans les titres"], "a": 1, "k": "il y a énormément de langue de bois qui est pointée du doigt", "transcript": "C'est assez étonnant de lire les titres des textes de Nathalie Sarraute, des pièces de théâtre, parce que ce sont toujours des structures de phrases très stéréotypées. Vous les entendez : « C'est beau », « Pour un oui ou pour un non », elle est là, on ne peut pas faire plus simple. Et en fait, derrière, il y a des gouffres, en effet, oui. Et puis en plus, elle est très sensible à ce qui, dans le langage, sert de, je dirais, de costume prêt-à-porter. Il y a énormément de langue de bois qui est pointée du doigt dans « Lieux communs ». On a eu « Lieux communs », elle adore ça et elle le fait partager. Donc les personnages qu'elle met en scène ont des forces énormes, mais qui sont canalisées par ce travail avec les mots, et elle se débrouille avec ça."}, {"type": "document", "q": "Question 33. Quelle était la préoccupation de la comédienne au début de sa carrière ?", "c": ["Augmenter la fréquentation des théâtres", "Créer une troupe de théâtre indépendante", "Déterminer les nouveaux enjeux du théâtre", "Jouer dans des pièces de théâtre inédites"], "a": 2, "k": "Je me demandais moins comment il fallait le faire, mais surtout pourquoi il fallait le faire", "transcript": "Est-ce que vous pouvez nous décrire votre itinéraire ? Oui, j'ai fait mes études de comédienne à Montréal, à l'École nationale de théâtre, dans les années 70. Et puis quand je suis sortie de l'école avec mon diplôme de comédienne, c'était la grande époque héroïque des créations collectives et du théâtre qu'on appelait engagé, à l'époque. Et moi, j'étais tout à fait dans ce courant-là. J'étais très passionnée par le sens, justement, et par le pourquoi du théâtre. Je me demandais moins comment il fallait le faire, mais surtout pourquoi il fallait le faire, et à qui on s'adressait. À ce moment-là, c'était une question très importante : à qui s'adresse le théâtre ? Et moi, j'ai fait partie de ce grand mouvement qui a voulu aller porter le théâtre aux gens."}, {"type": "document", "q": "Question 34. Que faut-il éviter pour progresser au sein d'une entreprise ?", "c": ["De prendre ouvertement position dans des rivalités internes", "De se confier à tous ses collègues avant de les connaître", "De trop faire valoir ses compétences pour montrer sa supériorité", "De vouloir participer à tous les projets sans vraiment s'investir"], "a": 0, "k": "Évitez cependant de rentrer dans les stratégies de clan, les querelles, les intrigues", "transcript": "Progresser dans l'entreprise est une question de compétence, mais également d'intelligence relationnelle. Ne soyez pas naïf, le monde du travail est un monde de compétition et de rivalité, une ambiance qui peut toutefois vous stimuler et accroître votre envie de réussir et de progresser. Évitez cependant de rentrer dans les stratégies de clan, les querelles, les intrigues au sein de l'entreprise. Le pouvoir peut changer de main à vos dépens. Soyez un observateur attentif des relations au sein du service, cernez la personnalité des uns et des autres et les jeux de cour, sans y participer."}, {"type": "document", "q": "Question 35. D'après cet entretien, que souhaite l'ensemble des intéressés ?", "c": ["De nouveaux modes de cultures", "Des circuits de distribution courts", "Des contrôles sanitaires plus rapides", "Des systèmes de production innovants"], "a": 1, "k": "réduire la distance entre la production elle-même et l'assiette", "transcript": "Le souhait de tout le monde aujourd'hui, des producteurs comme des consommateurs, c'est de réduire la distance entre la production elle-même et l'assiette. Mais c'est exactement ça, et donc nous avons vu surgir toutes les pratiques que l'on connaît, les modes de distribution relativement rapides. Et donc le premier forum a voulu être un lieu de rencontre des professionnels pour apprécier les évolutions et les modes de commercialisation et d'achat de nos concitoyens."}, {"type": "document", "q": "Question 36. Pourquoi le baccalauréat devrait être réformé selon celui qui s'exprime ?", "c": ["L'intérêt principal de sa mise en place a disparu", "Le ministère manque de moyens pour l'organiser", "Le taux de réussite des candidats est en baisse", "Le nombre de fraudes constatées augmente"], "a": 0, "k": "il n'apporte plus aujourd'hui les garanties de sélection", "transcript": "Est-ce qu'il est irréformable, ce bac ? Car on y arrivera bien un jour à le réformer, c'est obligatoire de toute façon. Ce qu'on voit bien, c'est un examen qui coûte cher, tout le monde le sait, qui a beaucoup d'inconvénients. En plus, il n'apporte plus aujourd'hui les garanties de sélection, parce qu'au fond, c'est ça le bac : s'il y a un examen, c'est bien pour sélectionner ceux qui l'ont, de ceux qui ne sont pas jugés capables par l'Éducation nationale de sortir de ce système et d'aller vers l'enseignement supérieur. Donc, à partir du moment où il n'y a plus cette garantie-là, il faut le faire évoluer."}, {"type": "document", "q": "Question 37. Quelle réserve le sociologue Renaud Epstein émet-il ?", "c": ["Les bâtiments restaurés sont en nombre insuffisant", "Les cités réaménagées sont surtout résidentielles", "Les municipalités privilégient les projets coûteux", "Les réhabilitations ont une portée limitée"], "a": 3, "k": "ça ne change pas nécessairement les moyens qui sont mis à disposition de ces écoles", "transcript": "La rénovation urbaine est aujourd'hui plébiscitée par les élus locaux et les habitants des banlieues, mais ce programme a aussi eu des effets pervers. Selon Renaud Epstein, sociologue spécialiste des politiques urbaines, la mobilisation de milliards d'euros pour changer le bâti et changer l'urbanisme s'est faite aux dépens d'autres domaines d'intervention dans ces mêmes quartiers. Parfois, on a pu rebâtir des écoles, mais ça ne change pas nécessairement les moyens qui sont mis à disposition de ces écoles pour réaliser leur mission, et il en va de même pour les équipements socioculturels dans ces quartiers. Est-ce que l'enjeu ne devrait pas être plutôt d'améliorer la qualité de service dans ces quartiers ?"}, {"type": "document", "q": "Question 38. Qu'est-ce qui dérange la sociologue dans la conception actuelle du travail ?", "c": ["L'accès à la reconnaissance sociale est conditionné par le travail", "La réalisation de soi par le travail est devenue une obligation", "Les responsabilités au travail sont considérées comme des priorités absolues", "Le travail est systématiquement opposé à l'épanouissement personnel"], "a": 1, "k": "Il faut être complètement épanoui par le travail, forme de prescription à prendre du plaisir dans le travail.", "transcript": "Marianne Dujarier, vous êtes sociologue. Dans votre livre, L'idéal au travail, vous parlez d'un phénomène social que vous constatez dans des milieux très différents. Le travail, pour beaucoup, ressemble à un idéal qu'on n'atteint jamais. C'est cela.\n– Plus exactement le travail tel qu'il est prescrit est aujourd'hui idéal, c'est-à-dire qu'on ne peut pas déroger à cet idéal, non ? Autrement dit, l'idéal a perdu son statut d'idéal, il serait devenu une sorte de norme impossible, évidemment, à atteindre. Il faut être complètement épanoui par le travail, forme de prescription à prendre du plaisir dans le travail."}, {"type": "document", "q": "Question 39. Selon le chroniqueur, pourquoi l'expression « États-Unis d'Europe » est-elle taboue ?", "c": ["Elle est trop éloignée des orientations politiques actuelles", "Elle fait référence à des événements historiques douloureux", "Elle fait resurgir des rivalités ou des antagonismes oubliés", "Elle remet en cause la domination de fait de certains pays"], "a": 2, "k": "ce serait rompre avec certaines nations, susciter de nouvelles querelles", "transcript": "Avant-hier, dans une tribune officielle, une élue française a brisé un tabou, et sans doute heureusement, en parlant des États-Unis d'Europe comme de l'objectif ultime du processus d'unification européenne. Elle a d'un coup redonné une clarté à cette entreprise si complexe, qu'elle en était devenue obscure à tant d'Européens de crainte de passer pour de doux rêveurs romantiques, utopistes ignorants des réalités politiques. Même les plus déterminés des partisans de l'unité de l'Europe n'osaient plus employer l'expression de Victor Hugo. On ne peut pas, dit-on, ce serait briser net un consensus, ce serait rompre avec certaines nations, susciter de nouvelles querelles, bien plus violentes encore que celles du traité constitutionnel. L'idée véhiculée par les États-Unis d'Europe, c'est-à-dire des états soumis à un pouvoir fédéral, n'est pas du tout à l'ordre du jour."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 28/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test34_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 28</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 28 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
      .score-msg{font-size:13px;color:#444}
      .section-title{font-size:15px;font-weight:700;color:#185FA5;border-bottom:1px solid #B5D4F4;padding-bottom:5px;margin:1.5rem 0 1rem}
      .report-item{border:1px solid #e0ddd5;border-radius:8px;padding:.75rem;margin-bottom:.75rem;page-break-inside:avoid}
      .qnum{font-size:12px;font-weight:700;color:#185FA5;margin-bottom:.4rem}
      .question{font-size:13px;font-weight:600;margin-bottom:.5rem}
      .report-choice{padding:5px 10px;border-radius:5px;font-size:12px;margin-bottom:4px}
      .report-choice.neutral{background:#f5f4f0}
      .report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
      .report-choice.wrong{background:#FAECE7;color:#4A1B0C}
      .transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:5px;padding:.6rem .9rem;font-size:12px;line-height:1.7;font-style:italic;margin-top:.5rem}
      .transcript-box mark{background:#FAC775;color:#412402;border-radius:2px;padding:1px 2px;font-style:normal}
      .key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:4px;padding:2px 8px;font-size:11px;margin-bottom:.3rem}
      @media print{body{padding:0} .no-print{display:none}}
    </style></head><body>
    <div class="print-header">
      <img src="${logo}" alt="MLI">
      <div><h1>Compréhension orale – Test 28</h1><p>Rapport complet · ${new Date().toLocaleDateString('fr-CA')}</p></div>
    </div>
    <div class="score-summary">
      <div>
        <div class="score-big">${r.ok} / 39 ✓</div>
        <div style="font-size:13px;color:#444">Score TCF estimé : <strong>${r.score}</strong> / 699</div>
      </div>
      <div>
        <div class="score-nclc">${nclc.level}</div>
        <div class="score-msg">${nclc.msg}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">Seuil NCLC 7 : 458 pts</div>
      </div>
    </div>
    <div class="section-title">Toutes les questions avec corrections et textes audio</div>
    ${allQHtml}
    <p style="font-size:10px;color:#aaa;text-align:center;margin-top:2rem">* Score estimatif – l'Institut de langues de Montréal</p>
    <div class="no-print" style="text-align:center;margin-top:1rem">
      <button onclick="window.print()" style="padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer / Enregistrer en PDF</button>
    </div>
  </body></html>`);
  pw.document.close();
}

function reset() {
  pauseAllAudio();
  ans = {};
  audioObjs = {};
  render(0);
}

window.onload = function() { render(0); };
</script>
</body>
</html>
