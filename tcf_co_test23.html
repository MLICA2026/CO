<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 23 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

0, "k": "Désolé, je mange avec mes collègues.", "transcript": "– J'ai trouvé un nouveau restaurant. On réserve une table pour deux à midi ? Tu es d'accord ?"}, {"type": "extrait", "q": "Question 8. Choisissez la bonne réponse.", "prompt": "Ma nièce Camille va avoir 10 ans vendredi prochain. J'aimerais l'emmener au cirque. Tu en penses quoi ?", "c": ["Bien sûr, je déteste les animaux.", "D'accord, le spectacle est complet.", "Non, la réservation est obligatoire.", "Pourquoi pas ? C'est un beau cadeau."], "a": 3, "k": "Pourquoi pas ? C'est un beau cadeau.", "transcript": "– Ma nièce Camille va avoir 10 ans vendredi prochain. J'aimerais l'emmener au cirque. Tu en penses quoi ?"}, {"type": "extrait", "q": "Question 9. Choisissez la bonne réponse.", "prompt": "Vous avez mal au ventre depuis combien de temps ?", "c": ["Deux fois par mois.", "La semaine prochaine.", "Tous les matins.", "Trois jours."], "a": 3, "k": "Trois jours.", "transcript": "– Vous avez mal au ventre depuis combien de temps ?"}, {"type": "document", "q": "Question 10. Pourquoi est-ce qu'Elias a téléphoné à sa mère ?", "c": ["Pour aller manger ensemble.", "Pour annuler leur rendez-vous.", "Pour faire une promenade.", "Pour prendre des nouvelles."], "a": 0, "k": "notre repas au restaurant", "transcript": "Allô, maman ? Prête pour notre repas au restaurant près du Parc des Rosiers ce midi ?\n– Désolé Elias, j'ai un gros rhume, je préfère rester à la maison."}, {"type": "document", "q": "Question 11. Que veut faire cet homme ?", "c": ["Acheter un plan.", "Prendre un train.", "Trouver un hôtel.", "Visiter un musée."], "a": 1, "k": "mon train part dans 5 minutes", "transcript": "Excusez-moi, madame, mais je suis complètement perdu. Je ne trouve pas la gare et mon train part dans 5 minutes. À l'hôtel, on m'a dit de passer par là.\n– Montrez-moi votre plan, mais vous le regardez à l'envers. Une idée est au bout de la rue, et la gare, juste derrière.\n– Oh, merci beaucoup."}, {"type": "document", "q": "Question 12. Qu'apprend-on ici au sujet de certains aliments gras ?", "c": ["Ils causent de nouvelles maladies.", "Ils favorisent les prises de poids.", "Ils sont bénéfiques pour la santé.", "Ils sont indispensables aux sportifs."], "a": 2, "k": "dont le corps et le cerveau ont besoin pour fonctionner pleinement", "transcript": "On entend souvent dire qu'il y a trop de gras dans notre alimentation, mais est-ce bien vrai ? Ce n'est pas certain. En réalité, nous manquons de bons gras, dont le corps et le cerveau ont besoin pour fonctionner pleinement. Il est par exemple recommandé de consommer du fromage le matin, ainsi que des poissons gras. Pour les végétariens, pensez aux œufs et aux noix."}, {"type": "document", "q": "Question 13. Que conseille Mathieu à son ami ?", "c": ["D'apprendre une langue.", "D'arrêter des études.", "De partir à l'étranger.", "De rencontrer du monde."], "a": 2, "k": "Alors fais-le", "transcript": "Mathieu, j'aurais besoin d'un conseil. Est-ce que tu penses que je devrais aller aux Etats-Unis pour finir mon master ?\n– C'est très personnel comme décision. Est-ce que tu crois que ce sera une bonne opportunité pour ta carrière ?\n– Oui, d'après mes profs, si j'y vais, j'aurai un meilleur niveau d'anglais et je pourrai plus facilement obtenir un poste dans une entreprise bilingue.\n– Alors fais-le, et en plus tu feras de nouvelles connaissances."}, {"type": "document", "q": "Question 14. Que recommande l'annonce au baigneur ?", "c": ["D'attendre la fin de la journée pour nager.", "De s'équiper avant de se mettre à l'eau.", "De se baigner dans les secteurs prévus.", "De faire attention aux surfeurs."], "a": 2, "k": "Ne vous baignez pas dans les zones non surveillées", "transcript": "Mesdames et Messieurs, la mer étant très agitée et la météo annonçant une forte aggravation de la situation en fin d'après-midi, il vous est demandé de faire preuve d'une grande prudence. Ne vous baignez pas dans les zones non surveillées. Ne nagez pas au-delà de la ligne des flotteurs et des bouées de sécurité. Ne pratiquez aucun sport nautique, tel que la planche à voile ou autre. Tout non-respect de ces recommandations se fera sous votre entière responsabilité."}, {"type": "document", "q": "Question 15. Qu'est-ce qui pose problème aux clients ?", "c": ["La date de départ.", "La durée du voyage.", "La situation de l'hôtel.", "Le prix du séjour."], "a": 3, "k": "C'est au-dessus de mes moyens", "transcript": "Je voudrais réserver un séjour aux Seychelles. Alors, j'ai plusieurs formules de voyage à vous proposer. J'ai notamment quelque chose de très intéressant, un combiné avec avion plus hôtel quatre étoiles sur l'île principale à 1300 euros la semaine, départ entre le 10 et le 15 décembre.\n– C'est au-dessus de mes moyens. Auriez-vous d'autres propositions à me faire ? J'ai aussi des hôtels de catégories inférieures.\n– Oui, je préférerais."}, {"type": "document", "q": "Question 16. Que demande-t-on à Pascal ?", "c": ["Une contribution financière.", "Une formation artistique.", "Une intervention télévisée.", "Une participation bénévole."], "a": 3, "k": "gratuitement", "transcript": "Bonjour, vous êtes la chanteuse Pascal Lune, n'est-ce pas ? Oui, c'est moi.\n– Bonjour. Voilà. Nous sommes une association et nous organisons chaque année une grande soirée, une fête solidaire au profit d'un programme de lutte contre la malnutrition au Burkina Faso. Et nous proposons à différents artistes de se produire ce soir-là, gratuitement, bien entendu. Et donc on a pensé à vous cette année, on vous invite à participer à ce moment de solidarité. Chaque artiste invité dispose de 20 minutes sur scène et on met à votre disposition une équipe de techniciens pour vous aider. On espère ainsi récolter suffisamment de fonds pour poursuivre cette action. Cela vous intéresse."}, {"type": "document", "q": "Question 17. Pourquoi ce stage intéresse-t-il la jeune femme ?", "c": ["Il correspond à ses attentes.", "Il dure six mois au total.", "Il est proche de son domicile.", "Il offre un très bon salaire."], "a": 0, "k": "Toi qui adores les chiffres", "transcript": "Ça y est, j'ai trouvé un stage pour cet été dans une société de transport. C'est assez loin de chez moi, mais je suis super contente.\n– Tu seras payée ?\n– Pas beaucoup, mais ce sera une bonne expérience.\n– Et tu vas faire quoi ?\n– Des statistiques sur la circulation des bus.\n– Toi qui adores les chiffres, c'est super. Comment tu as trouvé ce stage ?\n– Par un ami de mon père. Il travaille là-bas."}, {"type": "document", "q": "Question 18. Qu'explique la journaliste ?", "c": ["Les causes de la dépression saisonnière.", "Pourquoi le sommeil est de bonne qualité.", "Comment la saison influence sur la santé.", "En hiver, le corps humain est résistant."], "a": 0, "k": "de nombreuses personnes font la fameuse dépression saisonnière", "transcript": "Février est l'un des mois les plus maussades au niveau de la météo, c'est souvent le mois le plus gris et le plus froid de l'année. Du coup, les gens ont tendance, d'une part, à surchauffer leur chambre et aussi à moins l'aérer. Or tous les spécialistes le disent, une température intérieure au-dessus de 19 degrés et le manque d'air frais sont néfastes à la qualité du sommeil. Et cette fatigue en février serait uniquement due au problème de sommeil, non ? Il se trouve qu'en février, enfin, l'hiver, l'organisme est plus vulnérable, d'autant qu'il est mis à rude épreuve, notamment avec tous les virus qui circulent. Et puis aussi le manque de lumière. Un peu comme en octobre-novembre, de nombreuses personnes font la fameuse dépression saisonnière."}, {"type": "document", "q": "Question 19. Quelle information donne le journaliste ?", "c": ["Les accidents sont importants.", "Les arrêts sont interdits.", "Les départs sont nombreux.", "Les embouteillages sont finis."], "a": 2, "k": "Il y a beaucoup de monde sur les routes", "transcript": "Et bonjour à tous. Voici des informations sur la circulation et les premiers problèmes ce matin sur les routes de France pour le premier week-end de vacances scolaires. Il y a beaucoup de monde sur les routes. Donc, faites très attention quand vous êtes en voiture et n'oubliez pas de vous arrêter toutes les deux heures pour faire une pause."}, {"type": "document", "q": "Question 20. Pour Hélène Carrère, quel est le problème des lycées français de l'étranger ?", "c": ["Le nombre d'élèves est en baisse.", "Les frais de scolarité sont élevés.", "Leurs programmes sont inadaptés.", "Leurs financements sont fragilisés."], "a": 3, "k": "C'est l'État seul qui soutient les lycées", "transcript": "Hélène Carrère d'Encausse, votre article nous informe du danger qui menace l'existence et le développement des lycées français de l'étranger. Oui, ces lycées étaient payants, ils sont devenus gratuits en 2007. Cette décision, au départ généreuse, se retourne finalement contre les lycées, car les entreprises qui payaient ne le font plus. C'est l'État seul qui soutient les lycées. Donc, quand cela deviendra trop lourd pour l'État, il risque de vouloir en fermer certains."}, {"type": "document", "q": "Question 21. Que va faire la cliente ?", "c": ["Elle va repartir avec sa voiture.", "Elle va revenir dans dix minutes.", "Elle va revenir le lendemain.", "Elle va repartir sans sa voiture."], "a": 3, "k": "laissez-la-moi toute l'après-midi", "transcript": "Bonjour Madame Léves, qu'est-ce qui vous amène aujourd'hui ?\n– Eh bien, ma voiture a un problème au démarrage depuis hier. Elle démarre assez bien, puis elle s'arrête brusquement au bout de 10 minutes. Vous pouvez voir ce qui se passe là ?\n– Maintenant, ce n'est pas possible. Demain peut-être, ah, c'est dommage.\n– J'en ai vraiment besoin demain.\n– C'est la voix. Attendez, je regarde mon agenda… écoutez, laissez-la-moi toute l'après-midi et vous la reprendrez ce soir, elle sera prête.\n– C'est vraiment très gentil de votre part. Alors, à ce soir, merci."}, {"type": "document", "q": "Question 22. Qu'est-ce qui inquiète cette mère de famille ?", "c": ["La fréquence des compétitions sportives.", "Le contenu des programmes sportifs.", "Les contraintes liées aux pratiques sportives.", "L'insuffisance des résultats sportifs."], "a": 2, "k": "on fait plusieurs entorses à l'hygiène de vie", "transcript": "Est-ce que c'est toujours compatible, ça, d'avoir beaucoup d'heures de sport comme ça et de pouvoir concilier les études aussi ?\n– Non, spontanément, ce n'est pas toujours compatible. Et puis c'est un grand paradoxe qui s'installe d'entrée de jeu parce qu'on fait faire du sport à nos enfants pour développer des valeurs, des valeurs de rigueur, de saines habitudes de vie, de qualité de vie. Et puis on se retrouve à devoir composer avec des attitudes qui ne sont pas de très grande qualité. On va faire manger les enfants dans la voiture en s'en allant à l'aréna, on va faire les devoirs deux ou trois fois plus vite parce qu'on sait que tel jour, on n'aura pas le temps de les faire. Donc on fait plusieurs entorses à l'hygiène de vie, parfois pour réussir à respecter les horaires."}, {"type": "document", "q": "Question 23. Dans ce dialogue, quelle est l'intention de Monsieur ?", "c": ["Il fait des compliments.", "Il formule une invitation.", "Il cherche à convaincre.", "Il donne des conseils."], "a": 2, "k": "il faut que vous y alliez", "transcript": "Et, tiens, c'est le Salon de l'Agriculture la semaine prochaine, il faut que vous y alliez, Françoise. Je suis sûr que vous allez adorer.\n– Vous savez moi, j'y connais rien. Ce n'est pas le genre de salon que je fréquente.\n– Vous avez tort, moi, j'y vais tous les ans. Imaginez la plus grande ferme du monde qui s'installe en plein Paris pour 10 jours.\n– Oui, bien sûr.\n– Et il y a plein d'autres choses intéressantes à faire à Paris, bien sûr, mais il faut y aller. Vous allez voir les animaux, par exemple. C'est incroyable. Vous pourrez les caresser et je ne vous parle même pas des spécialités gastronomiques, un régal !\n– Vous savez, moi, les animaux…\n– Cependant, vous avez éveillé ma curiosité, mais il faudra venir avec moi."}, {"type": "document", "q": "Question 24. Selon cette personne, qu'est-ce qui caractérise une structure médicale de bonne qualité ?", "c": ["La qualité de l'accueil des visiteurs et des familles.", "Le souci du bien-être des personnes hospitalisées.", "La capacité d'adaptation du personnel médical.", "La prise en charge personnalisée en fonction de l'âge."], "a": 1, "k": "un grand respect du sujet plutôt que de sa maladie", "transcript": "Je crois que l'enjeu de cette maison, c'est que ça déborde. Je crois vraiment que le côté de l'adolescence, c'est peut-être quelque chose où l'on fait du théâtre, de la musique, avec des soignants différents, des parents présents, un espace de circulation ouvert, vitré et transparent, avec de jolies couettes, de jolis meubles, de jolis espaces et un grand respect du sujet plutôt que de sa maladie. Comme si on attaquait la maladie, mais en respectant le patient."}, {"type": "document", "q": "Question 25. Selon cet homme, qu'est-ce qui permet d'apprécier pleinement ce que l'on mange ?", "c": ["Écouter de la musique classique.", "Parler des plats que l'on savoure.", "Partager un repas en famille.", "Avoir une table bien décorée."], "a": 1, "k": "Il faut commenter tout ce que l'on déguste", "transcript": "De manière de ne pas goûter les aliments, c'est de manger en silence. On les trouve moins bons ou de manger avec un bruit sonore de la musique constamment ou un bruit de fond continu qui altère le goût des aliments. La dimension sonore adaptée au goût des aliments, c'est la parole. Il faut commenter tout ce que l'on déguste, commenter les aliments. Et à ce moment-là, on éprouve mieux leur goût. On éprouve mieux leur saveur quand on discute avec quelqu'un, alors que lorsque l'on est seul dans le silence, le plaisir de manger et de boire est bien moins grand."}, {"type": "document", "q": "Question 26. Qu'est-ce que cette personne conseille aux étudiants ?", "c": ["Aller à l'essentiel.", "Faire des phrases courtes.", "Hiérarchiser ses idées.", "S'exprimer avec précision."], "a": 3, "k": "remplacer le verbe être dans vos textes par d'autres verbes, plus appropriés", "transcript": "Étudiant, lycéen ? Il existe une façon très simple d'améliorer vos copies, c'est d'éviter l'utilisation du verbe être. Ce verbe apparaît trop souvent dans les dissertations. Or, le verbe être, c'est la description d'un état et une succession de descriptions d'états n'a jamais constitué une explication. Vous pouvez vous entraîner à remplacer le verbe être dans vos textes par d'autres verbes, plus appropriés à ce que vous voulez dire. Vous verrez, vous allez enrichir votre vocabulaire et vous trouverez votre production bien plus intéressante. Après tout, Georges Perec, qui a écrit un livre qui s'appelle La Disparition, dans lequel il n'a pas utilisé la lettre « e », vous pouvez bien rédiger une rédaction sans être."}, {"type": "document", "q": "Question 27. Qu'apprend-on sur l'attitude des jeunes français face à leur avenir ?", "c": ["Ils espèrent obtenir une allocation de l'état.", "Ils voient leur futur de manière positive.", "Ils comptent sur le soutien de leurs proches.", "Ils refusent d'habiter chez leurs parents."], "a": 1, "k": "les jeunes ont plutôt confiance en l'avenir à 52 %", "transcript": "Comment les jeunes français envisagent-ils leur avenir ? La réponse est à lire dans le sondage publié aujourd'hui par le tout nouvel observatoire des jeunes et des familles. 1000 jeunes de 18 à 25 ans et 1000 familles ont été interrogées. Première surprise, les jeunes ont plutôt confiance en l'avenir à 52 %. Et même si les difficultés économiques, les angoisses, huit sur dix estiment qu'ils obtiendront ce qu'ils veulent. Mais les principaux obstacles seront le travail et le logement."}, {"type": "document", "q": "Question 28. Quels problèmes soulève l'étude menée par l'université de Laval ?", "c": ["Les élèves manquent de temps pour prendre leurs repas.", "Les habitudes alimentaires des élèves sont difficiles à modifier.", "Les menus des cantines scolaires sont très mal équilibrés.", "Les restaurants scolaires coutent cher aux familles."], "a": 1, "k": "encore trop nombreux à manger à l'extérieur de l'école et à privilégier la restauration rapide", "transcript": "Des menus équilibrés ? Un bar à salades, un sandwich… L'école secondaire de Rochebelle à Sainte-Foy, au Québec, fait tout pour inciter les jeunes à mieux manger. J'aime la nourriture, le choix, les sandwiches et le bar à salades. Fatigués de manger gras. Une étude parue l'année dernière sur les habitudes des jeunes, menée en collaboration avec l'université de Laval, montre qu'ils sont encore trop nombreux à manger à l'extérieur de l'école et à privilégier la restauration rapide. On aimerait augmenter de 15 % la proportion des élèves qui restent à l'école pour déjeuner."}, {"type": "document", "q": "Question 29. Que dénonce cette personne ?", "c": ["L'absence de formation à l'élaboration du budget.", "Le désintérêt des jeunes pour les questions financières.", "Le manque de cours d'économie à l'université.", "Le peu d'information des banques sur les crédits."], "a": 0, "k": "aucune séance de travail n'est dédiée à cette question", "transcript": "Apprendre à gérer son argent n'est pas une priorité éducative. Alors que l'argent nous accompagne toute notre vie, construire un budget, ça prend du temps, mais trop souvent, le sujet est considéré tabou par les adultes. Donc la question d'en parler avec les enfants dans la sphère de l'école, aucune séance de travail n'est dédiée à cette question. Pourtant chacun est concerné dans sa vie professionnelle et personnelle par les principales notions que sont les coûts, les crédits, les prêts et tout d'intérêt, l'endettement, l'économie à l'échelle de l'individu. Voilà un domaine qui touche chaque français sans que jamais celui-ci y soit vraiment initié."}, {"type": "document", "q": "Question 30. D'après cette chronique, quel est l'objet à la mode que l'on rapporte de voyage ?", "c": ["Un bijou d'artisanat local.", "Un guide touristique illustré.", "Un modèle réduit de bateau.", "Un album de souvenirs personnels."], "a": 3, "k": "le carnet de voyages, composé d'aquarelles, de croquis", "transcript": "Et aujourd'hui, quand le voyageur rentre de Bamako, de Sarajevo ou de Québec, il rapporte un trésor très précieux : le carnet de voyages, composé d'aquarelles, de croquis, de descriptions de petits riens, de photos, de textes ou de collages, de sable ou de coquillages. Ces petits objets de mémoire et d'évasion sont à la mode en France, notamment depuis le succès des carnets de voyage du navigateur Quitou L'Am."}, {"type": "document", "q": "Question 31. Qu'est-ce qui participe à la charge mentale des salariés ?", "c": ["L'inégalité dans la répartition des tâches.", "La surabondance de sollicitations.", "Le manque de fonctionnalité des locaux.", "Les interventions des collègues."], "a": 1, "k": "en permanence dérangés par des notifications par des mails", "transcript": "Vous savez, aujourd'hui, on parle beaucoup des effets négatifs des écrans pour les enfants et les psychologues s'accordent à dire que des enfants qui sont trop soumis aux écrans ont des troubles de l'apprentissage, de la concentration, voire des difficultés de sommeil. En fait, pour les adultes, c'est exactement la même chose. Et on voit des salariés aujourd'hui qui ont du mal à se concentrer parce qu'ils sont en permanence dérangés par des notifications par des mails. Donc ces difficultés de concentration, ces difficultés parfois d'apprentissage. Et il y a beaucoup de salariés qui aujourd'hui se plaignent de cette charge mentale. Il y a une étude récente qui chiffre qu'un tiers des salariés se sentent surchargés par l'information sur le lieu de travail. Donc, l'enjeu, c'est de revenir justement à des temps de calme, de sérénité, propices à la concentration, propices à la créativité."}, {"type": "document", "q": "Question 32. Que font les jeunes parisiens, dont parle ce reportage ?", "c": ["Ils nagent en plein air dans la capitale.", "Ils s'amusent dans un parc d'attraction.", "Ils se retrouvent à la piscine municipale.", "Ils sont en vacances au bord de la mer."], "a": 0, "k": "le canal de l'eau est devenu notre espace de baignade quotidien", "transcript": "En fait, comme on invite tout l'arrondissement de Paris, le canal de l'eau est devenu notre espace de baignade quotidien après une journée de travail. Généralement, on se retrouve au bord du canal tous ensemble et on se baigne. Aujourd'hui, on est entre 15 et 20 à se baigner régulièrement dans le canal de l'eau. On est déjà étudiant, fauché, on vit pour s'amuser, on n'a pas forcément les moyens de partir de Paris."}, {"type": "document", "q": "Question 33. Pourquoi la journaliste a-t-elle été touchée de rencontrer Raoul Sosa ?", "c": ["Parce qu'elle admire l'orchestre du conservatoire et qu'elle espère y jouer.", "Parce qu'elle aspire à rencontrer tous les grands interprètes classiques du moment.", "Parce qu'elle connait la discipline dont il faut faire preuve pour bien jouer.", "Parce qu'elle est elle-même migrante et sait combien peut lui être utile."], "a": 2, "k": "j'ai étudié le piano et donc n'ai aucun mal à imaginer ce que ça prend", "transcript": "On rend hommage aujourd'hui à un grand pianiste, chef d'orchestre, compositeur canadien et d'origine argentine, qui est considéré comme un des musiciens actuels les plus importants.\n– Oui, j'ai eu ce grand privilège de rencontrer Raoul Sosa au conservatoire de Montréal, où il donne des cours au futur grand pianiste canadien. Et vous savez, Raymond, ce sujet me tient particulièrement à cœur parce que j'ai étudié le piano et donc n'ai aucun mal à imaginer ce que ça prend pour arriver au niveau de cet artiste originaire de Buenos Aires. Il a quitté son pays à l'âge de 20 ans pour étudier en Europe, et en 1978 il a reçu le prix de la meilleure émission radiophonique d'un soliste canadien par le Conseil canadien de la musique à Ottawa."}, {"type": "document", "q": "Question 34. Pourquoi développe-t-on l'habillage sonore des voitures en France ?", "c": ["Pour réduire la pollution sonore des voitures.", "Pour améliorer le confort et le plaisir des conducteurs.", "Pour augmenter la sécurité et la performance des voitures.", "Pour respecter les réglementations européennes."], "a": 1, "k": "Transformer les bruits que produisent les voitures en sons utiles et agréables", "transcript": "L'équipe d'Interception vous propose de découvrir le travail d'habillage sonore qui entre aujourd'hui dans la conception des véhicules automobiles, aussi bien ceux qui sont équipés d'un moteur à explosion que les autres. Transformer les bruits que produisent les voitures en sons utiles et agréables. C'est un métier, et la France est plutôt bien placée dans ce domaine, planchant sur la mise au point d'un environnement sonore à la carte d'un clic. Tout conducteur pourra bientôt choisir le bruit de son moteur ou de ses clignotants. Il en changera même au gré de ses humeurs."}, {"type": "document", "q": "Question 35. Que redoute Jean à propos de cet emploi ?", "c": ["La perte de sa liberté intellectuelle.", "Les nombreux voyages à l'étranger.", "Un manque de reconnaissance.", "Une rémunération insuffisante."], "a": 0, "k": "la rédaction garde un droit de regard sur les papiers", "transcript": "Alors Jean, c'était ce journal. Qu'est-ce que ça a donné ?\n– C'était passionnant, épuisant parce que l'on ne compte pas ces heures. Il y a énormément de déplacements. Ça, c'est un côté agréable, mais qu'il faut gérer intelligemment par rapport à la vie de famille.\n– C'est un travail très valorisant, non ?\n– C'est vrai. On bénéficie d'une considération exceptionnelle, mais ça aussi, il faut gérer. C'est que la rédaction garde un droit de regard sur les papiers. Je crains que le travail avec eux soit trop orienté. Ils ont des accointances fortes avec certains élus, même s <script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 23/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test34_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 23</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 23 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
