<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF-CO Test 27 – Compréhension orale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:52px;object-fit:contain}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px;margin-bottom:4px}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:1rem}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444}
.btn:hover{background:#f5f4f0}
.btn-results{margin-left:auto;border-color:#185FA5;color:#185FA5;font-weight:600;background:#fff}
.btn-results:hover{background:#e6f1fb}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-type-label{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.75rem;font-weight:500}
.img-wrap{text-align:center;margin-bottom:1rem}
.img-wrap img{max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e0ddd5}
.audio-row{display:flex;align-items:center;gap:10px;background:#f0f6fe;border:1px solid #B5D4F4;border-radius:8px;padding:.65rem 1rem;margin-bottom:1rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #185FA5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:background .15s}
.play-btn:hover{background:#e6f1fb}
.audio-label{flex:1;font-size:13px;color:#185FA5;font-weight:500}
.audio-status{font-size:12px;color:#378ADD}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.sub-question{font-size:14px;color:#444;font-style:italic;margin-bottom:.75rem;padding-left:.5rem;border-left:3px solid #B5D4F4}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%;box-sizing:border-box;text-align:left;transition:background .15s,border-color .15s}
.choice:hover:not(.correct):not(.wrong):not(.disabled){background:#f5f4f0}
.choice.disabled{cursor:default}
.choice .badge{font-weight:700;min-width:22px;flex-shrink:0;color:#185FA5;font-size:15px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.correct .badge{color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.choice.wrong .badge{color:#4A1B0C}
.feedback{border-radius:8px;padding:10px 14px;margin-top:.85rem;font-size:14px}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B}
.transcript-wrap{margin-top:.85rem}
.transcript-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid #B5D4F4;border-radius:8px 8px 0 0;padding:7px 14px;cursor:pointer;font-size:13px;color:#185FA5;width:100%;border-bottom:none}
.transcript-toggle:hover{background:#e6f1fb}
.transcript-box{background:#f0f6fe;border:1px solid #B5D4F4;border-radius:0 0 8px 8px;padding:.9rem 1.1rem;font-size:13.5px;line-height:1.85;color:#1a1a1a;display:none;font-style:italic}
.transcript-box mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{display:inline-block;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:6px;padding:3px 10px;font-size:12px;margin-bottom:.5rem}
.summary{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem}
.summary h2{font-size:20px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.score-block{text-align:center;margin-bottom:1.5rem}
.score-correct{font-size:32px;font-weight:700;color:#185FA5}
.score-tcf{font-size:22px;font-weight:600;margin-top:.5rem;color:#1a1a1a}
.score-nclc{font-size:28px;font-weight:700;color:#BA7517;margin-top:.4rem}
.score-msg{font-size:14px;color:#555;margin-top:.5rem}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1.25rem 0}
.grid-btn{width:36px;height:36px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.grid-btn.ok{background:#1D9E75}
.grid-btn.ko{background:#993C1D}
.grid-btn.na{background:#bbb}
.sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.sum-btn{padding:8px 18px;border-radius:8px;border:1px solid #B5D4F4;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#185FA5}
.sum-btn:hover{background:#e6f1fb}
.sum-btn.red{border-color:#F0997B;color:#993C1D}
.sum-btn.red:hover{background:#FAECE7}
.sum-btn.pdf{border-color:#639922;color:#3B6D11;background:#EAF3DE}
.sum-btn.pdf:hover{background:#c0dd97}
.sum-note{font-size:11px;color:#aaa;margin-top:.75rem}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.report-item{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.1rem;margin-bottom:.85rem}
.qnum{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:.6rem}
.report-choice{padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:5px}
.report-choice.neutral{background:#f5f4f0}
.report-choice.correct{background:#E1F5EE;color:#085041;font-weight:600}
.report-choice.wrong{background:#FAECE7;color:#4A1B0C}

/* ===== PRINT / PDF ===== */
@media print {
  body{background:#fff;padding:0}
  #app{max-width:100%}
  .nav,.sum-actions,.prog-bar,.prog-labels,.transcript-toggle{display:none!important}
  .card{border:1px solid #ccc;border-radius:0;page-break-inside:avoid;margin-bottom:.5rem;padding:.75rem}
  .transcript-box{display:block!important;border:1px solid #ccc;background:#f9f9f9}
  .summary{border:none}
  .grid-btn{width:28px;height:28px;font-size:10px}
  .print-section{display:block!important}
  .no-print{display:none!important}
}
.print-section{display:none}
</style>
</head>

 dernière."], "a": 1, "k": "J'ai eu un rendez-vous pour demain matin.", "transcript": "– Dis-moi, quand est-ce que tu dois aller à la préfecture ?"}, {"type": "extrait", "q": "Question 9. Choisissez la bonne réponse.", "prompt": "Allô ! Bonjour ! Est-ce que je peux parler à Céline s'il vous plaît ?", "c": ["C'est de la part de qui ?", "Elle a un numéro de téléphone.", "Je suis bien au 01 42 35 80 96.", "Vous voulez laisser un message ?"], "a": 0, "k": "C'est de la part de qui ?", "transcript": "– Allô ! Bonjour ! Est-ce que je peux parler à Céline s'il vous plaît ?"}, {"type": "extrait", "q": "Question 10. Choisissez la bonne réponse.", "prompt": "Je serai votre guide pendant cette visite. Suivez-moi, s'il vous plaît.", "c": ["Je vais vous faire découvrir ce musée.", "Je vais vous indiquer la salle d'attente.", "Je vais vous installer à une table.", "Je vais vous montrer votre chambre."], "a": 0, "k": "Je vais vous faire découvrir ce musée.", "transcript": "– Je serai votre guide pendant cette visite. Suivez-moi, s'il vous plaît."}, {"type": "document", "q": "Que fera Pierre la semaine prochaine ?", "c": ["Il aura la visite de sa famille", "Il fera une compétition", "Il pourra travailler au calme", "Il sera en vacances"], "a": 3, "k": "On descend avec les enfants dans notre maison de campagne dans le sud.", "transcript": "– Pierre, tu travailles la semaine prochaine ?\n– Non. On descend avec les enfants dans notre maison de campagne dans le sud.\n– Tu as de la chance de te reposer un peu.\n– Oui. Je vais enfin pouvoir jouer au tennis."}, {"type": "document", "q": "Que fait le jeune homme ?", "c": ["Il baisse le volume", "Il change de wagon", "Il éteint son appareil", "Il met un casque"], "a": 0, "k": "Attendez un instant. C'est mieux comme ça ?", "transcript": "– Monsieur, s'il vous plaît.\n– Oui ?\n– Moi aussi, j'aime beaucoup ce groupe. Mais vous gênez tous les voyageurs en l'écoutant si fort. Le train est un lieu public et tout le monde n'a pas envie d'écouter votre musique. Et certains aimeraient bien dormir.\n– Ah, ça vous dérange ? Excusez-moi, je ne pensais pas que c'était si fort. Avec les écouteurs, on ne se rend pas compte. Attendez un instant. C'est mieux comme ça ?\n– Oui, merci."}, {"type": "document", "q": "Que doit faire la personne pour se rendre au bureau 309 ?", "c": ["Aller au 2ème étage", "Monter à pied", "Prendre l'ascenseur", "Passer par la cafétéria"], "a": 1, "k": "Vous devez prendre l'escalier au bout du couloir.", "transcript": "– Pourriez-vous me dire où se trouve le bureau 309, s'il vous plaît ?\n– Au troisième étage, deuxième porte à gauche, avant la cafétéria.\n– Apparemment, l'ascenseur est en panne.\n– Oui, malheureusement. Vous devez prendre l'escalier au bout du couloir.\n– Celui-ci ?"}, {"type": "document", "q": "Pourquoi Pierre refuse-t-il ce poste ?", "c": ["La mission est sans intérêt", "La société est loin de chez lui", "Le contrat est temporaire", "Le salaire est insuffisant"], "a": 0, "k": "le poste ne m'attire pas", "transcript": "– Alors Pierre, qu'est-ce que tu as décidé ? Tu vas accepter cette offre d'emploi ?\n– Ah non, j'ai déjà refusé. Honnêtement, je préfère continuer à chercher.\n– Je pense que tu fais une bêtise. C'est très bien payé et puis les horaires te conviennent, non ?\n– Oui, mais ce n'est pas une raison pour accepter le poste. Ce qui est important pour moi, c'est le travail lui-même. Et de ce point de vue, le poste ne m'attire pas.\n– J'espère que tu ne vas pas regretter ta décision."}, {"type": "document", "q": "Qu'arrive-t-il à la femme ?", "c": ["Elle a cassé son téléphone", "Elle a raté un appel important", "Elle n'a pas été invitée à un anniversaire", "Elle n'a pas eu l'appel espéré"], "a": 3, "k": "David ne m'a pas téléphoné pour mon anniversaire. J'ai attendu son appel toute la journée.", "transcript": "– Qu'est-ce qui t'arrive ? Tu as l'air triste.\n– David ne m'a pas téléphoné pour mon anniversaire. J'ai attendu son appel toute la journée.\n– Oh, il va peut-être le faire ce soir. Ne t'inquiète pas."}, {"type": "document", "q": "Qu'apprend-on à propos du test de Julie ?", "c": ["Il aura lieu plus tard dans le semestre", "Il évaluera le chapitre des maladies", "Il se fera dans le grand amphithéâtre", "Il sera corrigé par un enseignant extérieur"], "a": 0, "k": "Le prof préfère le faire dans deux semaines.", "transcript": "– Tiens Julie, qu'est-ce que tu fais là ?\n– Je viens pour le test de biologie.\n– Tu ne sais pas qu'il a été annulé ?\n– Non, j'étais absente au dernier cours. Pourquoi ce changement ?\n– À cause de la grippe. Il y a eu beaucoup d'absents cette semaine. Le prof préfère le faire dans deux semaines. Mais puisque tu es là, accompagne-moi en salle B14. Il y a une conférence intéressante."}, {"type": "document", "q": "Qu'est-ce qui dérange le jeune homme ?", "c": ["Devoir annuler son voyage", "Devoir visiter les musées", "Devoir écourter leur séjour", "Devoir partir en voiture"], "a": 3, "k": "Oui, mais en voiture.", "transcript": "– Alors, c'est toujours ok ? On part à Londres ce week-end en Eurostar ?\n– Oui, mais en voiture. Comme ça, on pourra s'arrêter dans le sud de l'Angleterre.\n– Je ne connais pas. Attends, tu rigoles. On n'a qu'un week-end. En train, ça va, mais… Londres et ses alentours. En voiture, c'est plus facile, non ?\n– Mais non, pas pour visiter les musées de Londres, non.\n– Eh bien, on n'y va pas ce week-end. Mais quand on aura un pont. Parce que moi, les musées…\n– Tu gagnes toujours."}, {"type": "document", "q": "Qu'est-ce qui déplaît à la jeune femme dans les achats en ligne ?", "c": ["Le prix élevé des produits", "Les délais pour être livrée", "Les difficultés en cas d'échange", "Les tailles de vêtements différents"], "a": 2, "k": "J'ai réussi à le rendre, mais c'était compliqué.", "transcript": "– Est-ce que tu achètes des vêtements sur Internet ?\n– Oui, souvent. Les prix sont vraiment intéressants.\n– Moi, j'ai eu une mauvaise expérience l'autre jour. J'ai commandé un pantalon, mais ils ont fait une erreur. Et ils m'ont envoyé un modèle complètement différent. J'ai réussi à le rendre, mais c'était compliqué. Finalement, je préfère les boutiques. Au moins, on sait ce qu'on achète.\n– Tu n'as pas eu de chance."}, {"type": "document", "q": "Que dit cette intervenante au sujet du travail à Londres ?", "c": ["Le recrutement se fonde sur l'expérience", "Les salaires à l'embauche sont très élevés", "L'évolution professionnelle est très lente", "L'obtention d'un premier emploi est aisée"], "a": 0, "k": "On va surtout regarder les postes que vous avez déjà occupés.", "transcript": "– On dit souvent qu'à Londres, on peut changer de job quasiment comme de chemise. Est-ce que c'est toujours vrai ?\n– Il est toujours facile de passer d'un job à l'autre. Le diplôme a beaucoup moins d'importance. On va surtout regarder les postes que vous avez déjà occupés. On va aussi tenir compte de vos motivations. C'est vrai qu'on vous donne aussi la possibilité d'augmenter assez… enfin, comment dire ? De franchir les étapes beaucoup plus rapidement. On retrouve assez régulièrement des personnes vers 22, 23 ans et déjà managers, tandis qu'en France, c'est quand même un petit peu plus compliqué."}, {"type": "document", "q": "Quel temps fait-il aujourd'hui ?", "c": ["Il fait plus beau qu'hier", "Il fait plus mauvais qu'hier", "Il pleut plus qu'hier", "Il y a moins de soleil qu'hier"], "a": 0, "k": "mais au moins, il y a du soleil", "transcript": "– Quel froid ce matin !\n– Oui, mais au moins, il y a du soleil. C'est sûr, à côté d'hier, la pluie toute la journée, c'était l'horreur.\n– Ah oui, j'aime mieux ce froid sec."}, {"type": "document", "q": "Que se passe-t-il dans la région ?", "c": ["Des habitants ont voté pour un maire écologiste", "Les écologistes refusent la construction d'une autoroute", "L'Union européenne veut faire construire une autoroute", "Un maire propose d'ouvrir une réserve naturelle"], "a": 1, "k": "il est obligé d'affronter les écologistes et même l'Union européenne.", "transcript": "– Tu as entendu les informations ? Il paraît que le maire veut faire construire une autoroute qui passe par la réserve naturelle de la région.\n– Ah bon ? Et il va vraiment le faire.\n– Pour l'instant, il est obligé d'affronter les écologistes et même l'Union européenne."}, {"type": "document", "q": "Pour quelle raison Marie-Hélène fréquente-t-elle les cours de bricolage ?", "c": ["Pour apprendre les termes spécifiques de la plomberie", "Pour économiser les frais d'un dépannage par un artisan", "Pour être autonome face aux petits travaux de la maison", "Pour rencontrer d'autres femmes ayant la même passion"], "a": 2, "k": "Pour être plus indépendante et savoir changer un joint, éventuellement des robinets.", "transcript": "Voici l'initiative originale d'une société spécialisée dans les cours de bricolage et qui accueille les femmes jeunes ou moins jeunes, mariées, divorcées, célibataires, étudiantes ou même retraitées. Celles qui s'inscrivent n'ont qu'un désir, ne plus se sentir démunies face à une chasse d'eau qui fuit. Marie-Hélène a assisté au cours du samedi matin, le B.A.B. de la plomberie. Le plus dur au départ, c'est le vocabulaire. Téflon, joint, siphon, une langue étrangère pour Marie-Hélène qui nous explique sa motivation. Pour être plus indépendante et savoir changer un joint, éventuellement des robinets. Est-ce que c'est rassurant qu'il n'y ait que des femmes ? Peut-être. Parce qu'on se dit que les hommes risqueraient de se moquer de nous. C'est plus, oui, rassurant."}, {"type": "document", "q": "Que propose cette émission ?", "c": ["Un point de vue sur la situation mondiale aujourd'hui", "Une analyse de l'actualité économique dans le monde", "Une critique des conséquences de la mondialisation", "Une réflexion sur les relations politiques mondiales"], "a": 0, "k": "Jacques Lecomte nous donne à voir ce matin une humanité en progrès.", "transcript": "Bonjour, ravi de vous retrouver dans Grand Bien Vous Fasse. La pauvreté dans le monde recule, la démocratie avance, la couche d'ozone se reconstitue, ou encore le monde n'a jamais connu aussi peu de violence. Ce matin, nous recevons un rameur à contre-courant de certaines idées reçues. Le spécialiste en psychologie positive Jacques Lecomte nous donne à voir ce matin une humanité en progrès. En s'appuyant sur une série de chiffres, des statistiques et de rapports internationaux fiables, Jacques Lecomte nous invite à regarder notre monde avec un optimisme réaliste. Il appelle ça l'optiréalisme, loin des discours catastrophistes des prophètes de malheur."}, {"type": "document", "q": "Qu'est-ce que Sarah regrette ?", "c": ["De disposer d'une petite surface", "De partager sa salle de bain", "De payer un loyer excessif", "De prendre ses repas seule"], "a": 1, "k": "une seule douche pour quatre, ça n'est vraiment pas commode", "transcript": "– Alors, Sarah, comment se passe la vie en colocation ?\n– Ah, écoute, tu sais, une seule douche pour quatre, ça n'est vraiment pas commode, surtout le matin. Mais bon, faut s'organiser un peu, c'est tout.\n– Hum, c'est toujours mieux que la chambre de bonne que tu avais avant, non ?\n– T'as raison, neuf mètres carrés pour 750 euros, c'est exagéré, même avec une vue sur la tour Eiffel. Au moins, maintenant, le loyer est divisé par quatre. Et pour les courses, vous faites aussi caisse commune ?\n– Ah non, là, c'est chacun pour soi. Et c'est aussi bien, d'ailleurs. Sinon, le frigo serait toujours vide."}, {"type": "document", "q": "Pourquoi cette étudiante a-t-elle apprécié ses études en Allemagne ?", "c": ["Elle a changé de cursus universitaire", "Elle a rencontré des gens étonnants", "Elle a suivi des enseignements variés", "Elle a trouvé le niveau des cours facile"], "a": 2, "k": "Là, j'ai pu choisir mes matières. J'ai pris des cours sur la presse, sur Napoléon", "transcript": "En Allemagne, elle a profité d'études peu coûteuses, mais aussi découvert un rapport aux études supérieures complètement décomplexé par rapport à ceux qu'on connaît en France. Contrairement à la France où on est vraiment dans un programme prédéfini avec une option fortement recommandée. Donc, on n'a pas vraiment le choix. Là, j'ai pu choisir mes matières. J'ai pris des cours sur la presse, sur Napoléon, sur…\n– Napoléon, c'est original, ça.\n– Oui, Napoléon, c'est marrant de voir la vision… Bon, par exemple, eux, ils ne disent pas la défaite de Waterloo, mais la victoire de Waterloo."}, {"type": "document", "q": "Que veut Loïc Lemaire ?", "c": ["Avoir la liberté d'être son propre patron", "Innover dans le domaine informatique", "Mener un projet aux Etats-Unis", "Mieux réussir que ses parents"], "a": 0, "k": "je pense que je serais volontiers indépendant.", "transcript": "Élu récemment par le magazine Business Week parmi les 25 personnes les plus influentes du web, Loïc Lemaire, qui vit désormais à San Francisco, en Californie, au cœur de la Silicon Valley. C'est là qu'il a créé sa nouvelle société, Seesmic, qui n'est pas un coup d'essai. Ce diplômé de l'école des hautes études commerciales de Paris est devenu, au fil du temps, un serial entrepreneur.\n– Mon père était entrepreneur et mon grand-père aussi était commerçant. J'ai jamais eu vraiment envie de travailler pour qui que ce soit d'autre que moi, y compris… Peu importe la taille, en fait, de ce que je faisais, je pense que je serais volontiers indépendant. J'ai toujours voulu créer ma propre entreprise dans l'Internet. Donc, c'est les deux passions que j'ai toujours."}, {"type": "document", "q": "De quoi est-il question ?", "c": ["Des besoins énergétiques des jeunes", "Des bons réflexes pour les repas", "Des comportements alimentaires", "Des conseils de préparation culinaire"], "a": 2, "k": "les enfants mangent principalement par plaisir", "transcript": "Si les enfants ne mangent pas assez de fruits et légumes, c'est peut-être parce qu'ils n'aiment pas ça. En fait, les enfants mangent principalement par plaisir et c'est une fonction que ne remplissent pas les fruits et légumes. Certes, tout le monde est d'accord pour dire que c'est bon à la santé, que c'est nécessaire, que c'est souvent contraignant à préparer, que cela ne remplit pas l'estomac, voire que ce n'est pas bon. Mais on trouve rarement la notion de plaisir associée aux fruits et légumes."}, {"type": "document", "q": "Que recommande cette universitaire pour trouver un travail au Québec ?", "c": ["De devenir entrepreneur en créant son entreprise", "De s'informer sur les secteurs porteurs d'emplois", "De suivre une formation diplômante à l'université", "D'élargir sa recherche d'emploi à d'autres domaines"], "a": 3, "k": "Tu pourrais trouver un emploi demain matin si tu misais sur le développement de tes compétences plutôt que sur ton bout de papier.", "transcript": "Quand un Français s'aperçoit que ses compétences ne sont pas en adéquation avec le marché du travail québécois, il commet généralement la même erreur. Plutôt que d'aller chercher une autre expérience en se disant « Ce n'est pas grave, je vais peut-être obtenir un poste avec moins de responsabilités », mais je vais chercher à développer de nouvelles compétences en occupant un nouvel emploi dans un secteur différent, il essaie de retourner à l'université et refait un certificat. Que conseillez-vous alors ?\n– En tant qu'enseignant à l'université, je lui dis « Tu pourrais trouver un emploi demain matin si tu misais sur le développement de tes compétences plutôt que sur ton bout de papier. »"}, {"type": "document", "q": "Quel principe retrouve-t-on dans l'architecture haussmannienne ?", "c": ["L'absence d'éléments ornementaux", "La limitation du nombre d'étages", "Le respect d'obligations légales", "L'utilisation d'un matériau unique"], "a": 3, "k": "Vous devez utiliser de la pierre pour les façades.", "transcript": "– M. Rinon, vous êtes architecte et vous allez nous présenter une avenue à Paris datant de la fin du XIXe siècle. La façade haussmannienne est-elle toujours en pierre ?\n– Oui, c'était une obligation qui figurait dans l'acte de vente. C'était la manière finalement dont Haussmann légiféra puisqu'il n'y avait pas de loi.\n– Pourquoi ? Le permis de construire n'existait pas ?\n– Le permis de construire, en effet, viendra plus tard. Donc on leur disait simplement « Vous devez utiliser de la pierre pour les façades. »\n– C'est ça. Quand les propriétaires achètent le terrain pour construire, on leur imposait une pierre de taille. Dans les belles avenues comme celle de l'Opéra, on indiquait aussi que les lignes devaient filer pour donner une certaine harmonie, une certaine homogénéité, une certaine monotonie pour ceux qui n'apprécient pas cette esthétique. L'idée d'Haussmann, c'était qu'à partir du moment où on construisait un immeuble dans une avenue, les immeubles suivants devaient le prendre comme modèle."}, {"type": "document", "q": "À quel type d'entreprise appartient ce service ?", "c": ["Un groupe de centres d'appels téléphoniques", "Un service de livraison express du courrier", "Un spécialiste de création de sites internet", "Un fournisseur pour la restauration à domicile"], "a": 1, "k": "Nous acheminons chaque jour plus de 75 millions de plis.", "transcript": "Coli.com, toujours à votre service. Nous acheminons chaque jour plus de 75 millions de plis. Si, malgré tous nos efforts, un envoi n'est pas parvenu à son destinataire, des professionnels sont à votre disposition pour réaliser les recherches nécessaires et s'engagent à vous tenir informés dans les plus brefs délais. Pour ce faire, connectez-vous à notre site www.coli.com ou appelez le 08 67 35 35 35. Nous serons toujours à votre écoute."}, {"type": "document", "q": "Comment la personne considère-t-elle la marche ?", "c": ["C'est un temps de découverte et d'humanité", "C'est une occasion de dépenser son énergie", "C'est une opportunité d'apprécier la solitude", "C'est une possibilité quotidienne d'évasion"], "a": 0, "k": "On y rencontre à la fois le paysage, les autres, mais on se rencontre aussi soi-même.", "transcript": "Je suis un marcheur, et mes vacances se passent à marcher parce que ça me permet de réfléchir, que le rythme de la marche est musical pour les oreilles, éblouissant pour les paysages, et que les médecins m'ont démontré que l'activité musculaire permettait d'éviter des fractures des os importants, et que la vieillesse doit marcher. Je ne marche pas n'importe où, je marche sur des sentiers de grande randonnée, et j'y ai souvent fait des rencontres vraiment merveilleuses. On y rencontre à la fois le paysage, les autres, mais on se rencontre aussi soi-même."}, {"type": "document", "q": "Comment Monique Lerou explique-t-elle le succès des entreprises coopératives ?", "c": ["Elles appuient leur gestion sur la concertation", "Elles garantissent des évolutions de carrière", "Elles œuvrent dans des secteurs traditionnels", "Elles s'engagent dans des projets audacieux"], "a": 0, "k": "En grande partie grâce à la gouvernance démocratique, avec un grand nombre de personnes qui, très souvent, participent et contribuent à la prise de décision.", "transcript": "Les chiffres parlent d'eux-mêmes. Selon une étude internationale, près de la moitié des 300 plus grandes coopératives de la planète ont 70 ans et plus. Elles créent souvent davantage d'emplois et font faillite moins souvent que les entreprises capitalistes classiques. Monique Leroux : De façon générale, on constate que les entreprises coopératives sont plus résilientes. Leur prise de risque, globalement, qu'elle soit petite, moyenne ou grande, se fait d'une façon généralement plus prudente. En grande partie grâce à la gouvernance démocratique, avec un grand nombre de personnes qui, très souvent, participent et contribuent à la prise de décision."}, {"type": "document", "q": "Pourquoi la journaliste reste-t-elle prudente ?", "c": ["La conférence qui a eu lieu est uniquement symbolique", "La secrétaire d'Etat a fait part de son pessimisme", "Les discussions s'annoncent longues et difficiles", "Tous les points de l'accord ont déjà été traités sans succès"], "a": 2, "k": "Beaucoup de points n'ont pas encore été abordés et n'ont pas été détaillés dans le document conjoint, car les deux parties n'ont pas réussi à se mettre d'accord sur la formulation.", "transcript": "C'est au cours de cette réunion internationale qu'un premier accord a été trouvé, in extremis, entre les deux pays. Et de nouvelles négociations commencent aujourd'hui, mais sur le front, rien n'est encore fait. En effet, il aura fallu deux jours de négociations marathon pour parvenir à accoucher de ce document conjoint. Cela marque donc le début d'un processus, mais il faut rester prudent car c'est maintenant que les choses démarrent réellement. Alors, amorce d'un processus de paix ou conférence symbolique ? La secrétaire d'État a d'ailleurs précisé hier soir que l'échec n'était pas une option. En fait, on n'est pas encore rentré dans le vif du sujet. Beaucoup de points n'ont pas encore été abordés et n'ont pas été détaillés dans le document conjoint, car les deux parties n'ont pas réussi à se mettre d'accord sur la formulation."}, {"type": "document", "q": "Que propose cette spécialiste pour éviter une catastrophe écologique ?", "c": ["Durcir les normes appliquées à la fabrication de voitures", "Inciter les usagers à pratiquer d'autres modes de déplacement", "Pousser les industriels à employer des technologies innovantes", "Rendre obligatoire l'utilisation de carburants propres"], "a": 1, "k": "Il faut donc nous affranchir de ce modèle de civilisation qui repose sur le transport individuel.", "transcript": "Les constructeurs automobiles préparent leur modèle écologique pour profiter de ce nouveau marché. Où en est-on au niveau de la pollution ? Si on regarde la moyenne des émissions des véhicules vendus en France, ça va dans le bon sens grâce à une série de mesures législatives. On voit apparaître des véhicules de moins en moins polluants dont l'émission est inférieure à 140 grammes. Malheureusement, ça ne résout pas le problème du développement de la civilisation automobile. Si le taux d'équipement augmente à l'échelle mondiale, on se retrouve face à une catastrophe écologique considérable. Il faut donc nous affranchir de ce modèle de civilisation qui repose sur le transport individuel."}, {"type": "document", "q": "Quel est le concept de cette librairie ?", "c": ["Animer des ateliers d'écriture thématiques", "Faire connaitre de jeunes philosophes talentueux", "Organiser des lectures pendant les repas du midi", "Trouver des solutions aux difficultés quotidiennes"], "a": 3, "k": "Cette librairie a pour objectif d'aider les gens avec leurs problèmes de tous les jours en apportant de nouvelles pistes de réflexion.", "transcript": "C'est une idée originale et réussie qu'a eue un philosophe. Créer l'école de la vie. L'endroit est accueillant, rempli de livres, de fleurs, on peut y boire et manger. Cette librairie a pour objectif d'aider les gens avec leurs problèmes de tous les jours en apportant de nouvelles pistes de réflexion. On y vient au petit déjeuner ou le week-end pour des ateliers. On y pratique aussi des consultations littéraires, d'où l'on repart avec une ordonnance de livres."}, {"type": "document", "q": "Quel est l'objectif de l'intervention de cette journaliste ?", "c": ["Favoriser la visibilité des ouvrages peu accessibles", "Intervenir dans le choix des publications à venir", "Modifier notre regard sur les livres « grand public »", "Soutenir les petits éditeurs et leurs parutions"], "a": 0, "k": "Nous espérons que cette intervention radiophonique vous donnera envie de découvrir ce joyau méconnu de la littérature mondiale.", "transcript": "Bonjour à tous. Vous écoutez radio culture, l'émission qui vous fait découvrir des livres méconnus ou difficiles à trouver. Aujourd'hui, nous allons vous parler d'un ouvrage exceptionnel, mais hélas, introuvable en librairie, les mémoires d'un chat de Natsume Soseki. Il s'agit d'un roman japonais publié en 1905, qui raconte la vie d'un chat domestique, observant avec ironie et tendresse les mœurs de ses maîtres. Ce livre est un chef-d'œuvre de la littérature japonaise, mais il n'a jamais été réédité en français depuis sa première traduction. En 1939, nous avons eu la chance de dénicher un exemplaire dans une bouquinerie et nous allons vous en lire quelques extraits. Si vous êtes intéressé par ce livre, vous pouvez le commander sur internet ou le chercher dans les bibliothèques spécialisées. Nous espérons que cette intervention radiophonique vous donnera envie de découvrir ce joyau méconnu de la littérature mondiale."}, {"type": "document", "q": "Sur quoi porte l'intervention ?", "c": ["La relation liant Camille Claudel et Rodin", "La richesse du musée Auguste Rodin", "Les difficultés rencontrées par Rodin", "Les sources d'inspiration de Rodin"], "a": 0, "k": "Camille Claudel restera pour la postérité une élève de Rodin.", "transcript": "Camille Claudel restera pour la postérité une élève de Rodin. Elle est exposée dans le musée Auguste Rodin. Elle est connue comme telle. Elle a beaucoup reçu de Rodin, mais elle s'en est servie pour créer une œuvre totalement différente. On connaît évidemment la fameuse phrase « Je lui ai montré où trouver de l'or, mais l'or qu'elle trouvait bien à elle ». C'est très flagrant quand on compare plusieurs œuvres. À côté du Penseur, qui est, c'est vrai, d'une puissance ramassée, tout en muscles, et qui dégage une force presque brute, l'homme penché, lui, est construit comme presque un arbre dont on voit les nervures, dont on saisit les muscles, les nerfs, l'attitude, et presque plus la pensée que chez le Penseur."}, {"type": "document", "q": "D'après le journaliste, en quoi les bons résultats européens en matière d'écologie sont-ils contestables ?", "c": ["Ils font l'objet de manipulations douteuses par les pollueurs", "Ils répondent à des critères insuffisamment exigeants", "Ils sont destinés à justifier les politiques économiques", "Ils sont publiés par des organismes liés aux entreprises"], "a": 1, "k": "Les quotas de rejet de CO2, fixés à l'avance, ont été calculés de manière à ne pas trop effaroucher les industriels.", "transcript": "Les pays européens sont presque tous d'excellents élèves de l'écologie. Mais est-ce une bonne nouvelle ? s'interroge le Figaro. Pas si sûr. L'Europe, dit Gérard Dupuy, dans Libération, ne paraît vertueuse que parce que son double décimètre était truqué. Les quotas de rejet de CO2, fixés à l'avance, ont été calculés de manière à ne pas trop effaroucher les industriels. Du coup, ils ne servaient à rien. Mais, reconnaît Gérard Dupuy, il serait tout aussi erroné, à l'inverse, d'avoir des exigences drastiques mais irréalistes. Les industriels savent d'ailleurs agiter un épouvantail efficace. La méthode la plus simple, pour arriver à une absence complète de pollution, c'est de fermer une usine et de la délocaliser sous d'autres cieux. Ce n'est pas toujours une menace en l'air."}, {"type": "document", "q": "Pourquoi le locuteur nuance-t-il son appréciation du film ?", "c": ["La réalisation est trop extravagante", "L'actrice principale est omniprésente", "Le montage manque de cohérence", "Le scénario manque de singularité"], "a": 3, "k": "je trouve qu'on ne retrouve pas dans son long métrage l'originalité qu'il y avait dans les courts métrages.", "transcript": "– Est-ce qu'on peut ne pas aimer un film quand on a une comédienne aussi extraordinaire que Karine Viard ?\n– J'aime aussi beaucoup cette comédienne qui joue sa mère. Karine Viard est tellement extraordinaire que, effectivement, dans les scènes de radio, par exemple, elle est formidable, elle est formidable tout le temps, à chaque séquence, et en même temps, je trouve que le film... C'est cette histoire de recherche de la mère, j'ai vraiment, je n'ai pas été très passionné, c'est dommage parce que Pinault avait fait des courts métrages de grande qualité, je trouve qu'on ne retrouve pas dans son long métrage l'originalité qu'il y avait dans les courts métrages. Là, on est vraiment dans une histoire, encore une fois, une sorte de réalisme à la française, elle va retrouver la famille, les scènes de banlieue et tout ça, on est dans une sorte de naturalisme, un peu, vraiment sans relief."}]</script>

<script>
var QQ = JSON.parse(document.getElementById("qdata").textContent);
var ans = {};
var cur = 0;
var audioObjs = {};

function getPoints(i) {
  var n = i + 1;
  if (n <= 4)  return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 523) return { level: "NCLC 9",   msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 503) return { level: "NCLC 8",   msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 458) return { level: "NCLC 7",   msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 398) return { level: "NCLC 6",   msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 369) return { level: "NCLC 5",   msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 331) return { level: "NCLC 4",   msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  var t = String(s);
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hlText(text, key) {
  var h = esc(text).replace(/\n/g,"<br>");
  if (!key) return h;
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx, idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function getTypeLabel(type) {
  if (type==="image")   return "🖼️ Image + 4 propositions";
  if (type==="extrait") return "🎙️ Extrait sonore";
  return "📻 Document sonore";
}

function updateHeader() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  document.getElementById("hdr-sub").textContent = "39 questions · " + score + " pt";
  var pct = Math.round((Object.keys(ans).length / QQ.length) * 100);
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("pleft").textContent = "Question " + (cur+1) + " / 39";
  document.getElementById("pright").textContent = pct + "% complété";
}

function formatTimeJS(s) {
  if (!s || !isFinite(s) || s < 0) return "0:00";
  var m = Math.floor(s/60);
  var sec = Math.floor(s%60);
  return m + ":" + (sec<10?"0":"") + sec;
}

function pauseAllAudio() {
  for (var k in audioObjs) {
    var a = audioObjs[k];
    if (a && !a.paused) {
      a.pause();
      var icon = document.getElementById("play-icon-"+k);
      if (icon) icon.textContent = "▶";
    }
  }
}

function getOrCreateAudio(qi) {
  if (audioObjs[qi]) return audioObjs[qi];
  var q = QQ[qi];
  var src = q.audio || ("CO 10/" + String(qi+1).padStart(3,"0") + ".MP3");
  var a = new Audio(src);
  audioObjs[qi] = a;
  a.addEventListener("loadedmetadata", function(){
    var seekEl = document.getElementById("seek-"+qi);
    var durEl = document.getElementById("time-dur-"+qi);
    if (seekEl) seekEl.max = a.duration;
    if (durEl) durEl.textContent = formatTimeJS(a.duration);
  });
  a.addEventListener("timeupdate", function(){
    var curEl = document.getElementById("time-cur-"+qi);
    var seekEl = document.getElementById("seek-"+qi);
    if (curEl) curEl.textContent = formatTimeJS(a.currentTime);
    if (seekEl) seekEl.value = a.currentTime;
  });
  a.addEventListener("ended", function(){
    var icon = document.getElementById("play-icon-"+qi);
    if (icon) icon.textContent = "▶";
  });
  return a;
}

function playAudio(qi) {
  var a = getOrCreateAudio(qi);
  var icon = document.getElementById("play-icon-"+qi);
  if (!a.paused) {
    a.pause();
    if (icon) icon.textContent = "▶";
    return;
  }
  pauseAllAudio();
  a.play().catch(function(){});
  icon = document.getElementById("play-icon-"+qi);
  if (icon) icon.textContent = "⏸";
}

function seekAudio(qi, val) {
  var a = getOrCreateAudio(qi);
  a.currentTime = parseFloat(val);
}

function toggleTranscript(qi) {
  var box = document.getElementById("tbox-"+qi);
  var btn = document.getElementById("tbtn-"+qi);
  if (!box) return;
  var showing = box.style.display==="block";
  box.style.display = showing ? "none" : "block";
  if (btn) btn.textContent = (showing ? "▼ " : "▲ ") + (showing ? "Afficher le texte audio" : "Masquer le texte audio");
}

function render(i) {
  pauseAllAudio();
  cur = i;
  var q = QQ[i];
  var ua = ans[i];
  var done = ua !== undefined;
  var labels = ["A","B","C","D"];
  var isImage = q.type === "image";
  var isExtrait = q.type === "extrait";

  var imgHtml = "";
  if (isImage) {
    var imgSrc = q.imgData || ("img/co_test34_q" + String(i+1).padStart(2,"0") + ".jpg");
    imgHtml = "<div class='img-wrap'><img src='" + imgSrc + "' alt='Q"+(i+1)+"'></div>";
  }

  var promptHtml = "";

  var existingAudio = audioObjs[i];
  var curT = existingAudio ? existingAudio.currentTime : 0;
  var durT = (existingAudio && isFinite(existingAudio.duration)) ? existingAudio.duration : 0;
  var isPlaying = existingAudio && !existingAudio.paused;
  var audioHtml =
    "<div class='audio-row' style='flex-direction:column;align-items:stretch;gap:8px'>" +
      "<div style='display:flex;align-items:center;gap:10px'>" +
        "<button class='play-btn' onclick='playAudio("+i+")'>"+
          "<span id='play-icon-"+i+"'>"+(isPlaying?"⏸":"▶")+"</span>"+
        "</button>" +
        "<span class='audio-label'>Écouter le document</span>" +
      "</div>" +
      "<div style='display:flex;align-items:center;gap:8px'>" +
        "<span style='font-size:11px;color:#185FA5;min-width:30px;text-align:right' id='time-cur-"+i+"'>"+formatTimeJS(curT)+"</span>" +
        "<input type='range' min='0' max='"+(durT||100)+"' step='0.1' value='"+curT+"' id='seek-"+i+"' oninput='seekAudio("+i+",this.value)' style='flex:1;height:4px;accent-color:#185FA5'>" +
        "<span style='font-size:11px;color:#888;min-width:30px' id='time-dur-"+i+"'>"+formatTimeJS(durT)+"</span>" +
      "</div>" +
    "</div>";

  var choicesHtml = "";
  for (var ci=0; ci<q.c.length; ci++) {
    var cls = "choice";
    if (done) {
      cls += " disabled";
      if (ci === q.a) cls += " correct";
      else if (ua.choice === ci) cls += " wrong";
    }
    // image/extrait: hide choice text before answering; document: always show
    var txt;
    if (q.type === "document") {
      txt = "<span>" + esc(q.c[ci]) + "</span>";
    } else {
      txt = done ? "<span>" + esc(q.c[ci]) + "</span>" : "";
    }
    choicesHtml += "<button class='"+cls+"' onclick='pick("+i+","+ci+")'><span class='badge'>"+labels[ci]+"</span>"+txt+"</button>";
  }

  var feedbackHtml = "";
  if (done) {
    feedbackHtml = ua.ok
      ? "<div class='feedback ok'>✅ Bonne réponse !</div>"
      : "<div class='feedback ko'>❌ Réponse incorrecte. La bonne réponse est <strong>"+labels[q.a]+". "+esc(q.c[q.a])+"</strong></div>";
  }

  var transcriptHtml = "";
  if (done && q.transcript) {
    var tContent = hlText(q.transcript.replace(/^— /gm,""), q.k);
    var questionLine = (q.type === "document" && q.q) ? ("<div style='margin-top:.7rem;font-weight:500;font-style:normal'>" + esc(q.q) + "</div>") : "";
    transcriptHtml =
      "<div class='transcript-box' style='display:block;margin-top:.85rem'>" +
        tContent + questionLine +
      "</div>";
    if (q.k) {
      transcriptHtml += "<div class='key-label' style='margin-top:.6rem'>🔑 Phrase-clé surlignée</div>";
    }
  }

  var prevDis = i===0 ? " disabled" : "";
  var nextDis = i===QQ.length-1 ? " disabled" : "";

  document.getElementById("view").innerHTML =
    "<div class='nav'>" +
      "<button class='btn'"+prevDis+" onclick='render("+(i-1)+")'>← Précédente</button>" +
      "<button class='btn'"+nextDis+" onclick='render("+(i+1)+")'>Suivante →</button>" +
      "<button class='btn btn-results' onclick='summary()'>Résultats</button>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='q-type-label'>"+getTypeLabel(q.type)+"</div>" +
      imgHtml + audioHtml +
      "<div class='question'>Q"+(i+1)+". " + (
        q.type === "document"
          ? "Écoutez le document sonore et la question, choisissez la bonne réponse."
          : q.type === "extrait"
          ? "Écoutez l'extrait sonore et les 4 propositions. Choisissez la bonne réponse."
          : "Écoutez les 4 propositions, choisissez celle qui correspond à l'image."
      ) + "</div>" +
      "<div class='choices'>"+choicesHtml+"</div>" +
      feedbackHtml + transcriptHtml +
    "</div>";

  updateHeader();
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function calcScore() {
  var ok=0, score=0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  return { ok:ok, score:score };
}

function summary() {
  pauseAllAudio();
  var r = calcScore();
  var nclc = getNclc(r.score);
  var gridHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var cls = "grid-btn na";
    var ua = ans[i];
    if (ua) cls = ua.ok ? "grid-btn ok" : "grid-btn ko";
    gridHtml += "<button class='"+cls+"' onclick='render("+i+")' title='Q"+(i+1)+"'>"+(i+1)+"</button>";
  }
  document.getElementById("view").innerHTML =
    "<div class='summary'>" +
      "<h2>📊 Résultats – Compréhension orale Test 27</h2>" +
      "<div class='score-block'>" +
        "<div class='score-correct'>"+r.ok+" / 39 ✓</div>" +
        "<div class='score-tcf'>Score TCF estimé : <strong>"+r.score+"</strong> / 699</div>" +
        "<div class='score-nclc'>"+nclc.level+"</div>" +
        "<div class='score-msg'>"+nclc.msg+"</div>" +
      "</div>" +
      "<div class='grid'>"+gridHtml+"</div>" +
      "<div class='sum-actions'>" +
        "<button class='sum-btn' onclick='showReport()'>📋 Erreurs fréquentes</button>" +
        "<button class='sum-btn pdf' onclick='printPDF()'>🖨️ Exporter PDF</button>" +
        "<button class='sum-btn red' onclick='reset()'>↺ Recommencer</button>" +
      "</div>" +
      "<div class='sum-note'>* Score estimatif à titre indicatif · Seuil NCLC 7 (écoute) : 458 pts</div>" +
    "</div>";
  updateHeader();
}

function showReport() {
  pauseAllAudio();
  var labels = ["A","B","C","D"];
  var wrongItems = [];
  var html = "";
  for (var i=0; i<QQ.length; i++) {
    var ua = ans[i];
    if (!ua || ua.ok) continue;
    wrongItems.push(i);
    var q = QQ[i];
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
      else if (ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    html +=
      "<div class='report-item'>" +
        "<div class='qnum'>Question "+(i+1)+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.6rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.6rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }
  if (!html) html = "<div style='text-align:center;padding:2rem;color:#185FA5;font-weight:600'>🎉 Aucune erreur ! Bravo !</div>";
  document.getElementById("view").innerHTML =
    "<div class='report-header no-print'>" +
      "<strong style='font-size:16px'>📋 Rapport des erreurs ("+wrongItems.length+" question"+(wrongItems.length!==1?"s":"")+")</strong>" +
      "<button class='btn btn-results' onclick='summary()'>← Retour aux résultats</button>" +
    "</div>" +
    html;
}

function printPDF() {
  var r = calcScore();
  var nclc = getNclc(r.score);
  var labels = ["A","B","C","D"];
  var allQHtml = "";
  for (var i=0; i<QQ.length; i++) {
    var q = QQ[i];
    var ua = ans[i];
    var done = ua !== undefined;
    var choicesHtml = "";
    for (var ci=0; ci<q.c.length; ci++) {
      var cls = "report-choice neutral";
      var icon = "";
      if (done) {
        if (ci===q.a) { cls="report-choice correct"; icon="✓ "; }
        else if (ua && ua.choice===ci) { cls="report-choice wrong"; icon="✗ "; }
      }
      choicesHtml += "<div class='"+cls+"'><strong>"+labels[ci]+".</strong> "+icon+esc(q.c[ci])+"</div>";
    }
    var tContent = q.transcript ? hlText(q.transcript, q.k) : "";
    var keyLabel = q.k ? "<div class='key-label' style='margin-bottom:.4rem'>🔑 Phrase-clé surlignée</div>" : "";
    var statusBadge = done ? (ua.ok ? " ✅" : " ❌ (→"+labels[q.a]+")") : " —";
    allQHtml +=
      "<div class='report-item'>" +
        "<div class='qnum'>Q"+(i+1)+statusBadge+" · "+getTypeLabel(q.type)+"</div>" +
        "<div class='question' style='font-size:14px;margin-bottom:.5rem'>"+esc(q.q)+"</div>" +
        choicesHtml +
        (tContent ? "<div class='transcript-box' style='display:block;margin-top:.5rem'>"+keyLabel+tContent+"</div>" : "") +
      "</div>";
  }

  var pw = window.open("","_blank");
  pw.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>TCF CO Test 27 – Rapport complet</title>
    <style>
      body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:1.5rem;max-width:860px;margin:0 auto;font-size:13px}
      .print-header{display:flex;align-items:center;gap:1.5rem;border-bottom:2px solid #185FA5;padding-bottom:1rem;margin-bottom:1.5rem}
      .print-header img{height:48px}
      .print-header h1{font-size:18px;color:#185FA5}
      .print-header p{font-size:12px;color:#666;margin-top:3px}
      .score-summary{background:#E6F1FB;border-radius:8px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:2rem;align-items:center}
      .score-big{font-size:28px;font-weight:700;color:#185FA5}
      .score-nclc{font-size:22px;font-weight:700;color:#BA7517}
